<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACK://IT-HEAD — шпаргалка к собеседованию</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
:root{
  --bg:#10141a;
  --panel:#161c25;
  --panel-2:#1c2430;
  --line:#2a3442;
  --line-soft:#212a37;
  --text:#e7ecf2;
  --muted:#8a96a6;
  --muted-2:#5f6b7a;
  --amber:#e8a33d;
  --cyan:#4fd1c5;
  --red:#e2574c;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size:38px 38px;
  opacity:.25;
  pointer-events:none;
  z-index:0;
}

/* ===== HEADER / STATUS BAR ===== */
.statusbar{
  position:relative;z-index:2;
  display:flex;align-items:center;gap:18px;
  padding:10px 22px;
  background:#0c1016;
  border-bottom:1px solid var(--line);
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
  flex-wrap:wrap;
}
.statusbar .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:pulse 2.4s infinite;display:inline-block;margin-right:6px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.statusbar span.sep{color:var(--line);}
.statusbar b{color:var(--text);font-weight:600;}

.wrap{position:relative;z-index:1;display:flex;min-height:calc(100vh - 37px);}

/* ===== SIDEBAR: RACK ===== */
.rack{
  width:280px;flex:none;
  background:var(--panel);
  border-right:1px solid var(--line);
  padding:22px 14px 22px;
}
.rack-title{
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;
  color:var(--muted-2);text-transform:uppercase;
  padding:0 8px 14px;
  border-bottom:1px dashed var(--line);
  margin-bottom:10px;
}
.rack-title strong{color:var(--amber);}
.slot{
  position:relative;
  display:flex;align-items:center;gap:10px;
  width:100%;text-align:left;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:3px;
  color:var(--muted);
  font-family:var(--mono);
  font-size:12.5px;
  padding:11px 12px 11px 14px;
  margin-bottom:7px;
  cursor:move;
  transition:background .15s,border-color .15s,color .15s;
  user-select:none;
}
.slot.drag-over{
  background:var(--panel);
  border-color:var(--cyan);
  box-shadow:0 0 8px rgba(79, 209, 197, 0.3);
}
.slot.dragging{
  opacity:0.5;
}
.slot::before,.slot::after{
  content:"";position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--line);left:5px;
}
.slot::before{top:5px;} .slot::after{bottom:5px;}
.slot .u{color:var(--amber);font-weight:600;min-width:26px;}
.slot .led{width:6px;height:6px;border-radius:50%;background:var(--line);margin-left:auto;flex:none;}
.slot .label-full{display:block;font-family:var(--sans);font-size:11px;color:var(--muted-2);margin-top:2px;}
.slot:hover{border-color:var(--muted-2);color:var(--text);}
.slot.active{
  background:linear-gradient(180deg,#1e2732,#182029);
  border-color:var(--cyan);color:var(--text);
}
.slot.active .led{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}
.slot.active .u{color:var(--cyan);}

.rack-foot{margin-top:16px;padding:12px 10px;border-top:1px dashed var(--line);font-family:var(--mono);font-size:10.5px;color:var(--muted-2);}

/* ===== MAIN ===== */
.main{flex:1;min-width:0;padding:30px 40px 70px;}
.panel-head{margin-bottom:22px;}
.eyebrow{font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;}
.panel-head h1{margin:0 0 8px;font-size:26px;font-weight:600;font-family:var(--sans);color:var(--text);}
.panel-head p{margin:0;color:var(--muted);max-width:760px;font-size:14px;}

.search{
  margin:20px 0 24px;
  display:flex;align-items:center;gap:10px;
  background:var(--panel-2);border:1px solid var(--line);
  border-radius:4px;padding:9px 14px;max-width:460px;
}
.search input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--mono);font-size:13px;
}
.search input::placeholder{color:var(--muted-2);}
.search svg{flex:none;color:var(--muted-2);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:980px){.grid{grid-template-columns:1fr;}}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:6px;
  overflow:hidden;
  cursor:move;
  user-select:none;
  transition:opacity .15s;
}
.card.drag-over{
  border-color:var(--cyan);
  box-shadow:0 0 12px rgba(79, 209, 197, 0.2);
}
.card.dragging{
  opacity:0.5;
}
.card summary{
  list-style:none;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
}
.card summary::-webkit-details-marker{display:none;}
.abbr{
  font-family:var(--mono);font-weight:700;font-size:14px;
  color:var(--amber);letter-spacing:.02em;min-width:64px;
}
.term-name{font-size:13.5px;color:var(--text);font-weight:500;flex:1;}
.chev{color:var(--muted-2);transition:transform .2s;flex:none;}
.card[open] .chev{transform:rotate(90deg);color:var(--cyan);}
.card-body{padding:0 16px 16px 16px;border-top:1px solid var(--line-soft);}
.card-body{padding-top:12px;font-size:13.5px;color:#c7cfda;}
.card-body p{margin:0 0 10px;}
.card-body ul{margin:0 0 10px;padding-left:18px;}
.card-body li{margin-bottom:5px;}
.card-body code{
  font-family:var(--mono);background:#0d1218;border:1px solid var(--line);
  border-radius:3px;padding:1px 6px;color:var(--cyan);font-size:12px;
}
.tag{
  display:inline-block;font-family:var(--mono);font-size:10px;
  padding:2px 7px;border-radius:10px;margin:0 6px 6px 0;
  border:1px solid var(--line);color:var(--muted);
}
.tag.warn{color:var(--red);border-color:#5a2a28;}
.tag.ok{color:var(--cyan);border-color:#1f4744;}
.tag.info{color:var(--amber);border-color:#4e3c1f;}

.subhead{
  font-family:var(--mono);font-size:11px;color:var(--muted-2);
  text-transform:uppercase;letter-spacing:.1em;
  margin:28px 0 12px;padding-top:14px;border-top:1px dashed var(--line);
}
.subhead:first-of-type{border-top:none;padding-top:0;margin-top:6px;}

.diagram{
  font-family:var(--mono);font-size:12px;color:var(--muted);
  background:#0d1218;border:1px solid var(--line);border-radius:6px;
  padding:14px 16px;margin:14px 0 22px;overflow-x:auto;white-space:pre;line-height:1.6;
}
.diagram b{color:var(--cyan);}
.diagram i{color:var(--amber);font-style:normal;}

.qa-block{margin-top:8px;}
.qa-item{padding:16px 0;border-top:1px dashed var(--line);}
.qa-item:first-child{border-top:none;padding-top:0;}
.qa-item summary{list-style:none;cursor:pointer;user-select:none;}
.qa-item summary::-webkit-details-marker{display:none;}
.qa-q{font-weight:600;color:var(--text);font-size:13.5px;display:flex;align-items:center;gap:8px;}
.qa-q .qmark{font-family:var(--mono);color:var(--cyan);flex:none;}
.qa-q .qa-chev{color:var(--muted-2);transition:transform .2s;flex:none;margin-left:auto;}
.qa-item[open] .qa-q .qa-chev{transform:rotate(90deg);color:var(--cyan);}
.qa-item[open] .qa-q{margin-bottom:8px;}
.qa-a{color:#c7cfda;font-size:13.5px;padding-left:22px;padding-top:2px;}
.qa-a p{margin:0 0 8px;}
.qa-a p:last-child{margin-bottom:0;}
.qa-a ul{margin:0;padding-left:18px;}
.qa-a li{margin-bottom:4px;}

.script-block{margin-top:8px;}
.script-item{padding:16px 0;border-top:1px dashed var(--line);}
.script-item:first-child{border-top:none;padding-top:0;}
.script-item summary{list-style:none;cursor:pointer;user-select:none;}
.script-item summary::-webkit-details-marker{display:none;}
.script-q{font-weight:600;color:var(--text);font-size:13.5px;display:flex;align-items:center;gap:8px;}
.script-q .qmark{font-family:var(--mono);color:var(--amber);flex:none;}
.script-q .qa-chev{color:var(--muted-2);transition:transform .2s;flex:none;margin-left:auto;}
.script-item[open] .script-q .qa-chev{transform:rotate(90deg);color:var(--cyan);}
.script-item[open] .script-q{margin-bottom:8px;}
.script-a{color:#c7cfda;font-size:13.5px;padding-left:22px;padding-top:2px;}
.script-a pre{background:#0d1218;border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin:0;overflow-x:auto;}
.script-a pre code{background:none;border:none;padding:0;color:#c7cfda;font-size:12px;line-height:1.55;font-family:var(--mono);}

/* ===== EXPANDED MARKUP (shared by cards and Q&A answers) ===== */
.card-body ol,.qa-a ol{margin:0 0 10px;padding-left:20px;}
.qa-a ol{margin:0;}
.card-body li ul,.card-body li ol,.qa-a li ul,.qa-a li ol{margin:6px 0 0;}
.card-body h4,.card-body h5,.card-body h6,
.qa-a h4,.qa-a h5,.qa-a h6{font-family:var(--sans);color:var(--text);margin:14px 0 8px;line-height:1.3;}
.card-body h4:first-child,.card-body h5:first-child,.card-body h6:first-child,
.qa-a h4:first-child,.qa-a h5:first-child,.qa-a h6:first-child{margin-top:0;}
.card-body h4,.qa-a h4{font-size:16px;font-weight:600;}
.card-body h5,.qa-a h5{font-size:14.5px;font-weight:600;color:var(--cyan);}
.card-body h6,.qa-a h6{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.card-body hr,.qa-a hr{border:none;border-top:1px dashed var(--line);margin:14px 0;}
.card-body blockquote,.qa-a blockquote{
  margin:0 0 10px;padding:8px 14px;border-left:3px solid var(--cyan);
  background:rgba(79,209,197,.06);color:#c7cfda;border-radius:0 4px 4px 0;
}
.card-body blockquote p,.qa-a blockquote p{margin:0 0 6px;}
.card-body blockquote p:last-child,.qa-a blockquote p:last-child{margin-bottom:0;}
.card-body pre,.qa-a pre{
  background:#0d1218;border:1px solid var(--line);border-radius:6px;
  padding:12px 14px;margin:0 0 10px;overflow-x:auto;
}
.card-body pre code,.qa-a pre code{background:none;border:none;padding:0;color:#c7cfda;font-size:12px;line-height:1.55;}
.card-body table,.qa-a table{width:100%;border-collapse:collapse;margin:0 0 12px;font-size:13px;}
.card-body th,.card-body td,.qa-a th,.qa-a td{border:1px solid var(--line);padding:6px 10px;text-align:left;}
.card-body th,.qa-a th{background:var(--panel-2);color:var(--text);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.card-body td,.qa-a td{color:#c7cfda;}
.card-body .columns,.qa-a .columns{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:0 0 12px;}
.card-body .columns .col > *:last-child,.qa-a .columns .col > *:last-child{margin-bottom:0;}
.card-body a,.qa-a a{color:var(--cyan);text-decoration:underline;text-decoration-color:rgba(79,209,197,.4);}
.card-body a:hover,.qa-a a:hover{text-decoration-color:var(--cyan);}

/* ===== MARKUP HELP ===== */
.md-help{margin-top:8px;font-size:11px;}
.md-help summary{cursor:pointer;color:var(--muted-2);font-family:var(--mono);list-style:none;}
.md-help summary::-webkit-details-marker{display:none;}
.md-help summary:hover{color:var(--text);}
.md-help[open] summary{color:var(--cyan);}
.md-help-body{margin-top:8px;padding:10px 12px;background:#0d1218;border:1px solid var(--line);border-radius:4px;color:var(--muted);line-height:1.75;}
.md-help-body>div{margin-bottom:6px;}
.md-help-body>div:last-child{margin-bottom:0;}
.md-help-body code{font-family:var(--mono);background:var(--panel-2);border:1px solid var(--line);border-radius:3px;padding:1px 5px;color:var(--cyan);font-size:10.5px;white-space:pre;}

.hidden{display:none !important;}
.no-results{color:var(--muted-2);font-family:var(--mono);font-size:13px;padding:30px 4px;}

.section{display:none;}
.section.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:800px){
  .statusbar{padding:8px 14px;gap:8px;font-size:10.5px;}
  .sep-extra,.stat-extra{display:none;}

  .wrap{flex-direction:column;}
  .rack{width:100%;border-right:none;border-bottom:1px solid var(--line);
    display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:8px;padding:14px;}
  .rack-title,.rack-foot{display:none;}
  .rack-add,.rack-export{flex:none;padding:0;display:flex;align-items:center;}
  .rack-add .btn,.rack-export .btn{width:auto;white-space:nowrap;padding:0 14px;height:100%;font-size:11px;}
  .block-form{padding:18px;width:92%;}
  .slot{min-width:150px;margin-bottom:0;}

  .main{padding:20px 16px 50px;}
  .panel-head h1{font-size:21px;}
  .panel-head p{font-size:13px;}

  .search{max-width:100%;margin:16px 0 20px;padding:8px 12px;}

  .card summary{padding:12px 14px;gap:10px;}
  .abbr{min-width:0;font-size:13px;}
  .term-name{font-size:13px;}
  .card-body{padding:0 14px 14px;}
  .card-body{padding-top:12px;}

  .qa-q{font-size:13px;gap:6px;}
  .qa-a{padding-left:18px;font-size:13px;}
  .qa-btn{padding:4px 6px;}

  .script-q{font-size:13px;gap:6px;}
  .script-a{padding-left:18px;font-size:13px;}

  .card-form .form-row{flex-direction:column;gap:0;}
  .form-actions{flex-wrap:wrap;}

  .diagram{font-size:11px;padding:12px 12px;}
}

@media(max-width:480px){
  .statusbar{font-size:10px;gap:6px;}
  .panel-head h1{font-size:19px;}
  .abbr{min-width:0;font-size:12px;}
  .term-name{font-size:12.5px;}
  .card summary{padding:11px 12px;gap:8px;}
  .qa-btn-label{display:none;}
  .qa-actions{gap:6px;}
}
:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;}

/* ===== EDITOR TOOL ===== */
.btn{
  font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;
  border:1px solid var(--line);background:var(--panel-2);color:var(--muted);
  border-radius:4px;padding:8px 12px;cursor:pointer;transition:all .15s;
}
.btn:hover{border-color:var(--muted-2);color:var(--text);}
.btn-primary{border-color:var(--cyan);color:var(--cyan);}
.btn-primary:hover{background:rgba(79,209,197,.1);color:var(--cyan);}
.btn-ghost{background:none;border-color:transparent;color:var(--muted-2);padding:8px 10px;}
.btn-ghost:hover{color:var(--text);border-color:var(--line);}
.btn-small{padding:5px 9px;font-size:10.5px;}

.rack-add{padding:14px 8px 4px;}
.rack-add .btn{width:100%;}

.rack-export{padding:4px 8px 6px;}
.rack-export .btn{width:100%;}

.block-form{
  margin:10px 8px 4px;padding:12px;
  background:var(--panel-2);border:1px solid var(--line);border-radius:5px;
}
.field-label{
  display:block;font-family:var(--mono);font-size:10.5px;color:var(--muted-2);
  text-transform:uppercase;letter-spacing:.08em;margin:10px 0 5px;
}
.field-label:first-child{margin-top:0;}
.field-input,.field-textarea{
  width:100%;background:#0d1218;border:1px solid var(--line);border-radius:4px;
  color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;
  outline:none;box-sizing:border-box;
}
.field-input:focus,.field-textarea:focus{border-color:var(--cyan);}
.field-textarea{resize:vertical;min-height:70px;font-family:var(--mono);font-size:12.5px;line-height:1.5;}
.field-select{
  width:100%;background:#0d1218;border:1px solid var(--line);border-radius:4px;
  color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;
}
.field-hint{font-size:11px;color:var(--muted-2);margin-top:5px;}
.form-actions{display:flex;gap:8px;margin-top:14px;}

.add-card-bar{margin:6px 0 4px;}

.card-form{
  margin:0 0 16px;padding:16px;
  background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
}
.card-form .form-row{display:flex;gap:10px;}
.card-form .form-row .field-block{flex:1;}

/* ===== EDIT BLOCK MODAL ===== */
.block-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;}
.block-overlay.visible{display:block;}
.block-form{
  background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:24px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;
  max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.block-form.hidden{display:none;}
.block-form h2{margin:0 0 20px;color:var(--text);font-size:18px;border-bottom:1px dashed var(--line);padding-bottom:12px;}

/* ===== DELETE / EDIT CONTROLS ===== */
.card-del{
  font-family:var(--mono);font-size:12px;line-height:1;
  background:none;border:1px solid transparent;color:var(--muted-2);
  border-radius:3px;padding:3px 7px;cursor:pointer;flex:none;
  transition:all .15s;
}
.card-del[data-edit-card]{color:var(--amber);}
.card-del[data-edit-card]:hover{color:var(--text);border-color:#4e3c1f;background:rgba(232,163,61,.08);}
.card-del[data-del-card]:hover{color:var(--red);border-color:#5a2a28;background:rgba(226,87,76,.08);}

.slot-del{
  position:absolute;top:5px;right:5px;
  font-family:var(--mono);font-size:11px;line-height:1;
  background:#161c25;border:1px solid var(--line);color:var(--muted-2);
  border-radius:3px;padding:1px 5px;cursor:pointer;z-index:1;
  opacity:0;transition:opacity .15s,color .15s,border-color .15s;
}
.slot:hover .slot-del{opacity:1;}
.slot-del:hover{color:var(--red);border-color:#5a2a28;background:rgba(226,87,76,.15);}

.qa-actions{display:flex;gap:4px;flex:none;}
.qa-q-text{flex:1;}
.qa-btn{
  font-family:var(--mono);font-size:11px;line-height:1;
  background:none;border:1px solid var(--line);color:var(--muted-2);
  border-radius:3px;padding:3px 7px;cursor:pointer;transition:all .15s;flex:none;
}
.qa-btn:hover{color:var(--text);border-color:var(--muted-2);}
.qa-btn-del:hover{color:var(--red);border-color:#5a2a28;background:rgba(226,87,76,.08);}
</style>
</head>
<body>

<div class="statusbar">
  <span><span class="dot"></span><b>RACK://IT-HEAD</b></span>
  <span class="sep">│</span>
  <span>СТАТУС: <b style="color:var(--cyan)">готов к собеседованию</b></span>
  <span class="sep sep-extra">│</span>
  <span>РАЗДЕЛОВ: <b id="sectionCount">24</b></span>
  <span class="sep sep-extra">│</span>
  <span class="stat-extra">UPTIME KNOWLEDGE: <b>99.9%</b></span>
</div>

<div class="wrap">
  <nav class="rack" id="rack">

<script type="application/json" id="data-store">[{"id":"itsm","u":"U1","short":"ITIL","full":"ITIL / ITSM","title":"ITIL / ITSM","eyebrow":"Управление ИТ-услугами","desc":"Терминология процессного управления: как отличать инцидент от проблемы, что стоит за SLA/OLA и зачем нужна CMDB.","extra":"<div class=\"subhead\">Как это соотносится между собой</div>\n  <div class=\"diagram\">Пользователь → <b>Incident</b> (сбой сейчас, чиним быстро, можно Workaround)\n                    │\n                    ▼  повторяется / не находим причину\n              <b>Problem</b> (ищем Root Cause → KEDB, Known Error)\n                    │\n                    ▼  нужно устранить причину навсегда\n                <b>Change</b> (через CAB / Standard / Emergency)\n\nОтдельно: <i>Service Request</i> — не сбой, а стандартная просьба\n(доступ, консультация, установка ПО) из каталога услуг.</div>","cards":[{"a":"CHG","t":"Change — Изменение","tags":["warn"],"b":"\n      <p>Управляемое добавление, изменение или удаление чего-либо, что может повлиять на ИТ-услуги.</p>\n      <ul>\n        <li><b>Standard Change</b> — заранее одобренный, низкий риск, повторяемый (например, замена картриджа).</li>\n        <li><b>Normal Change</b> — проходит через <b>CAB</b> (Change Advisory Board) — комитет по оценке рисков.</li>\n        <li><b>Emergency Change</b> — срочное изменение, утверждается через ускоренный ECAB.</li>\n        <li>Всегда должен быть план отката (rollback plan).</li>\n      </ul>"},{"a":"PRB","t":"Problem — Проблема","tags":["ok"],"b":"\n      <p>Причина одного или нескольких инцидентов, часто повторяющихся. Работа ведётся не «быстро», а «навсегда» — через анализ первопричины.</p>\n      <ul>\n        <li><b>RCA</b> (Root Cause Analysis) — поиск первопричины (5 Why, Ishikawa и т.п.).</li>\n        <li><b>Known Error</b> — проблема с задокументированной причиной и обходным путём, хранится в <b>KEDB</b> (Known Error Database).</li>\n        <li>Результат — либо постоянное решение, либо переход в Change для устранения.</li>\n      </ul>"},{"a":"INC","t":"Incident — Инцидент","tags":["ok"],"b":"\n      <p>Незапланированное прерывание ИТ-услуги или снижение её качества. Цель обработки — <b>восстановить услугу как можно быстрее</b>, причина сбоя на этом этапе не обязательна к устранению — достаточно <code>Workaround</code> (обходного решения).</p>\n      <ul>\n        <li>Жизненный цикл: регистрация → категоризация → приоритизация → диагностика → решение → закрытие.</li>\n        <li>Приоритет обычно = <code>Impact × Urgency</code>.</li>\n        <li>Ключевые метрики: <code>MTTA</code> (среднее время реакции), <code>MTTR</code> (среднее время восстановления).</li>\n      </ul>"},{"a":"REQ","t":"Service Request — Запрос на обслуживание","tags":[],"b":"\n      <p>Стандартная просьба пользователя, не связанная со сбоем: предоставить доступ, проконсультировать, установить ПО, выдать оборудование.</p>\n      <ul>\n        <li>Обрабатывается через <b>Service Catalog</b> (каталог услуг) — заранее описанные позиции с сроками выполнения.</li>\n        <li>Часто идёт по преодобренному workflow (согласование руководителя → выполнение).</li>\n      </ul>"},{"a":"SLA","t":"Service Level Agreement","tags":["info"],"b":"\n      <p>Соглашение об уровне услуг между ИТ и заказчиком/бизнесом: <b>что</b> предоставляется, <b>как быстро</b> и <b>с каким качеством</b>.</p>\n      <ul>\n        <li>Метрики: время реакции, время решения по приоритетам, доступность сервиса (% uptime), окна обслуживания.</li>\n        <li>Нарушение SLA обычно влечёт эскалацию или штрафные санкции (в аутсорс-контрактах).</li>\n      </ul>"},{"a":"OLA","t":"Operational Level Agreement","tags":["info"],"b":"\n      <p>Внутреннее соглашение между подразделениями ИТ (например, Service Desk и сетевой командой), которое обеспечивает выполнение внешнего SLA.</p>\n      <p>Если SLA перед бизнесом — «решаем инцидент за 4 часа», то OLA внутри ИТ может звучать так: «сетевой отдел передаёт диагностику Service Desk за 30 минут».</p>"},{"a":"CMDB","t":"Configuration Management Database","tags":[],"b":"\n      <p>База данных конфигурационных единиц (<b>CI</b> — Configuration Item): серверы, сетевое оборудование, ПО, лицензии, и — главное — <b>связи между ними</b> (что от чего зависит).</p>\n      <ul>\n        <li>Является частью более широкой системы <b>CMS</b> (Configuration Management System).</li>\n        <li>Используется при анализе влияния (Impact Analysis) перед изменениями.</li>\n      </ul>"},{"a":"KPI","t":"Key Performance Indicator","tags":[],"b":"\n      <p>Ключевые показатели эффективности ИТ-поддержки, которые обычно спрашивают на собеседовании руководителя поддержки:</p>\n      <ul>\n        <li><b>MTTR</b> — среднее время восстановления/решения.</li>\n        <li><b>MTTA</b> — среднее время реакции на обращение.</li>\n        <li><b>MTBF</b> — среднее время между сбоями (надёжность).</li>\n        <li><b>FCR</b> (First Call/Contact Resolution) — доля обращений, закрытых с первого раза.</li>\n        <li><b>CSAT</b> — индекс удовлетворённости пользователей.</li>\n        <li>% обращений, решённых в рамках SLA.</li>\n      </ul>"},{"a":"CMDB","t":"CMDB","tags":[],"b":"<p><b>CMDB (Configuration Management Database)</b> — хранилище всех конфигурационных единиц (CI): сервера, ПО, лицензии, и главное — связи между ними (зависимости).</p><ul><li><b>Назначение:</b> служит основой для планирования изменений (Impact Analysis), оценки критичности инцидентов, аудита инфраструктуры.</li><li><b>Содержание примера:</b> Exchange-сервер CI, зависит от Active Directory CI, SQL-сервер CI, сетевой коммутатор CI. При падении коммутатора сразу видно какие CI затронуты.</li><li><b>Инструменты:</b> ServiceNow (лидер market), Atlassian Asset Management, собственные системы на базе БД.</li></ul>"},{"a":"ДОКУМЕНТИРОВАНИЕ СЕТЕЙ","t":"Документирование сетей и сервисов (Visio)","tags":[],"b":"<p><b>Документирование инфраструктуры</b> — диаграммы сетевой топологии, расположение серверов, связи между компонентами, потоки данных. Выполняется обычно в Microsoft Visio, Lucidchart или подобных.</p><ul><li><b>Содержание:</b> WAN-каналы, маршрутизаторы, коммутаторы, VLAN-структура, сервера и их сетевые интерфейсы, приложения и их зависимости.</li><li><b>Обновление:</b> при каждом изменении (Change Management), документация становится частью CMDB как описание CI (Configuration Items).</li><li><b>Использование:</b> для training новых сотрудников, планирования расширения сети, анализа влияния (Impact Analysis) перед изменениями.</li></ul>"}]},{"id":"team","u":"U2","short":"Команда","full":"Команда и люди","title":"Команда и люди","eyebrow":"Управление командой","desc":"Структура команды поддержки, роли, наём, мотивация и работа с людьми — блок, который чаще всего спрашивают именно у руководителя, а не у линейного специалиста.","cards":[{"a":"STRUCT","t":"Структура команды поддержки","tags":["ok"],"b":"\n      <p>Типовая структура строится по линиям (L1/L2/L3) плюс отдельные роли, которые не входят в линии напрямую.</p>\n      <ul>\n        <li><b>L1</b> — приём и первичная обработка обращений, работа по скриптам и базе знаний.</li>\n        <li><b>L2</b> — специалисты по направлениям (инфраструктура, 1С, телефония и т.д.), решают то, что не смог L1.</li>\n        <li><b>L3 / вендор</b> — разработчики систем, вендорская поддержка, привлекается по сложным или архитектурным вопросам.</li>\n        <li><b>Тимлид</b> — операционное управление конкретной линией/сменой: распределение нагрузки, эскалации, наставничество.</li>\n        <li><b>Руководитель поддержки</b> — отвечает за SLA перед бизнесом, процессы, найм, бюджет, развитие команды в целом.</li>\n        <li>Отдельно может стоять <b>дежурная смена (on-call)</b> для критичных сервисов вне рабочего времени.</li>\n      </ul>"},{"a":"HIRING","t":"Наём в команду поддержки","tags":[],"b":"\n      <ul>\n        <li><b>Профиль L1</b> — коммуникабельность и стрессоустойчивость важнее глубоких технических знаний: этому можно научить, а терпению и вежливости с пользователями — сложнее.</li>\n        <li><b>Профиль L2</b> — конкретный технический стек компании (AD, 1С, сеть) и опыт самостоятельной диагностики без пошаговых инструкций.</li>\n        <li><b>Тестовое задание</b> — практические кейсы («опишите, как будете диагностировать...») показывают ход мысли лучше, чем теоретические вопросы.</li>\n        <li><b>Пробный день/смена</b> — распространённая практика для линейного персонала перед офером, снижает риск быстрого увольнения в первый месяц.</li>\n        <li>Хорошая практика — заранее прописанный профиль компетенций для каждой роли, чтобы разные интервьюеры оценивали кандидата по одним и тем же критериям.</li>\n      </ul>"},{"a":"ONBOARD-M","t":"Онбординг нового сотрудника (взгляд руководителя)","tags":[],"b":"\n      <p>Отличается от карточки в разделе про L1/L2 тем, что здесь фокус на организационной стороне, а не на техническом чек-листе.</p>\n      <ul>\n        <li>Назначение наставника (buddy) с первого дня — у нового сотрудника всегда должен быть конкретный человек, к кому идти с вопросом.</li>\n        <li>Смягчённые KPI на испытательный срок с прозрачными контрольными точками (например, на 2-й и 4-й неделе).</li>\n        <li>Короткие check-in встречи с руководителем в первые недели — не ждать окончания испытательного срока, чтобы понять проблему.</li>\n        <li>Явные критерии прохождения испытательного срока, известные сотруднику заранее, а не «по ощущениям».</li>\n      </ul>"},{"a":"MOTIV","t":"Мотивация и удержание","tags":["ok"],"b":"\n      <ul>\n        <li><b>Материальная</b> — грейдинг/карьерная сетка (L1 → L2 → L3/тимлид), бонусы за SLA/KPI команды, доплата за дежурства и ночные смены.</li>\n        <li><b>Нематериальная</b> — прозрачный карьерный трек, обучение и сертификации за счёт компании, публичное признание закрытых сложных кейсов.</li>\n        <li><b>Ротация задач</b> — чередование рутинных и интересных обращений/проектов, чтобы снизить монотонность на L1.</li>\n        <li>Для поддержки характерна высокая текучка на L1 — удержание там часто дешевле и эффективнее, чем постоянный найм и онбординг новых людей.</li>\n      </ul>"},{"a":"ONE2ONE","t":"1-1 встречи и обратная связь","tags":[],"b":"\n      <ul>\n        <li>Регулярность — обычно раз в 1-2 недели, короткие (20-30 минут), с фиксированной структурой: статус задач, сложности, обратная связь в обе стороны.</li>\n        <li>Обратная связь по модели <b>SBI</b> (Situation — Behavior — Impact): конкретная ситуация → что сделал → к чему привело — вместо общих оценочных фраз.</li>\n        <li>Критику — точечно и наедине, признание — при возможности публично при команде.</li>\n        <li>1-1 — это в первую очередь время сотрудника, а не отчёт руководителю: полезно спрашивать не только «что сделано», но и «что мешает».</li>\n      </ul>"},{"a":"CONFLICT","t":"Конфликты в команде и с заказчиком","tags":["warn"],"b":"\n      <ul>\n        <li><b>Конфликт между линиями (L1 vs L2)</b> — чаще всего из-за неполной передачи контекста при эскалации; решается регламентом эскалации и разбором конкретных кейсов, а не общими призывами «работать лучше».</li>\n        <li><b>Конфликт с внутренним заказчиком/пользователем</b> — руководитель подключается, когда нарушен или под угрозой SLA, либо есть репутационный/политический риск (VIP, топ-менеджмент).</li>\n        <li>Практика — разбирать конфликт по фактам (что зафиксировано в тикете, какие договорённости были), а не по эмоциональным оценкам сторон.</li>\n        <li>Хроническую перегрузку сотрудника, которая выглядит как конфликтность, стоит проверять через анализ нагрузки, а не сразу как проблему коммуникации.</li>\n      </ul>"},{"a":"MEETINGS","t":"Регулярные встречи в команде","tags":[],"b":"\n      <ul>\n        <li><b>Daily/пересменка</b> — короткая синхронизация по открытым критичным обращениям и дежурствам.</li>\n        <li><b>Разбор инцидентов (Post-mortem)</b> — после крупных инцидентов, без поиска виноватых (blameless), фокус на процессе и первопричине.</li>\n        <li><b>Ретроспектива команды</b> — периодический разбор, что мешает работать эффективнее (инструменты, процессы, нагрузка).</li>\n        <li><b>Встреча с заказчиком/бизнесом</b> — отчёт по SLA и открытым проблемам, обычно ежемесячно.</li>\n      </ul>"},{"a":"BURNOUT","t":"Выгорание и нагрузка на первой линии","tags":["warn"],"b":"\n      <p>L1 — самая уязвимая к выгоранию роль: монотонность, постоянный поток обращений, эмоционально тяжёлое общение с недовольными пользователями.</p>\n      <ul>\n        <li>Признаки — рост Reopen rate и падение CSAT у конкретного сотрудника, увеличение больничных/отгулов, снижение инициативности.</li>\n        <li>Меры — WIP-лимиты на одновременные обращения, ротация между «живым» общением и более спокойными задачами, честная обратная связь о загрузке, а не только требование показателей.</li>\n        <li>Руководителю важно отличать выгорание конкретного человека от системной проблемы (хронически недоукомплектованная линия) — решения для этих случаев разные.</li>\n      </ul>"},{"a":"ОН-КОЛЛ (ON-CALL)","t":"Он-колл (on-call) — как выстраиваю регламент","tags":[],"b":"<ul><li><b>График дежурств</b> — ротация (обычно неделя или сутки на человека), с чётким временем передачи смены и обязательным чек-листом \"что сейчас в работе, на что обратить внимание\" при передаче.</li><li><b>Матрица эскалации</b> — если дежурный не отреагировал за N минут (например, 15) — алерт автоматически эскалируется на следующего по списку, а затем на руководителя. Это прописывается в самой системе алертинга (PagerDuty escalation policy), а не полагается на \"надеюсь, кто-то заметит\".</li><li><b>Компенсация за дежурства</b> — обязательно проговариваю на собеседовании, что справедливая доплата за ночные/выходные дежурства — это не бонус, а необходимое условие, чтобы люди не выгорали и не увольнялись именно с этой ротации.</li><li><b>Разбор инцидентов после дежурства (post-mortem)</b> — особенно если дежурство было \"тяжёлым\" — что сработало, что нет, нужно ли донастроить алерты, чтобы конкретно этот сценарий не повторялся с тем же уровнем стресса.</li><li><b>Runbook/базы знаний под конкретные алерты</b> — у дежурного при получении алерта должна быть ссылка на конкретную инструкц, что проверить и как решить типовую проблему, а не \"разбираться с нуля в 3 часа ночи\". Веду и поддерживаю эту базу как часть онбординга новых дежурных.</li></ul>"},{"a":"ТАБЛИЦА ДЛЯ","t":"Таблица для оценки «на глаз» (Baseline) о нагрузке","tags":[],"b":"<table><thead><tr><th><b>Параметр</b></th><th><b>Описание</b></th></tr></thead><tbody><tr><td><b>Продуктивность</b></td><td>1 инженер обрабатывает $X$ тикетов в день (с учетом AHT).</td></tr><tr><td><b>Запас на пики</b></td><td>Добавьте +20-30% к базовой цифре для покрытия сезонности.</td></tr><tr><td><b>Отказоустойчивость</b></td><td>Минимальная команда (не меньше 3 человек) для покрытия смен/отпусков.</td></tr></tbody></table>"}],"qa":[{"q":"Что делать, если один инженер знает всё?","b":"- Документация - сделать так, чтобы система была понятна без участия автора.\n- Shadowing (Теневое обучение) - Менее опытный инженер буквально «ходит хвостом» за ключевым инженером, смотрит, как тот решает задачи, правит баги или настраивает инфраструктуру.\n- Обучение - Ключевой инженер готовит презентацию по определенному узлу системы и проводит обучение для всей команды, записывая его на видео для новых сотрудников.\n- Дежурства -Внедрение графика, при котором другие инженеры (не только главный эксперт) по очереди отвечают за стабильность системы и реагируют на инциденты. Столкнувшись с реальной проблемой в 2 часа ночи, инженер вынужден разобраться в том, как всё устроено, чтобы починить систему.\n- Распределение знаний - Запретить эксперту всегда ревьюить свой код. Назначать ответственным за проверку того, кто не знает систему глубоко, чтобы он был вынужден в неё вникнуть. Распределять приоритетные задачи так, чтобы разные люди работали над разными модулями системы."},{"q":"Как определить оптимальную численность команды?","b":"Я бы посмотрел статистику обращений, сезонность, среднее время обработки, целевые SLA, распределение по категориям, автоматизацию — и только потом рассчитывал необходимый штат.\n\n**Главный совет: «Правило двух»**\nЕсли расчетная численность команды получается меньше 3–4 человек, такая команда крайне уязвима. Если один заболел, а другой в отпуске, сервис встает. Поэтому при расчете всегда закладывайте **минимум 3-4 человека** как базовую единицу для любой круглосуточной или критически важной функции.\n\n**Что делать дальше:**\n\n1. Выгрузите отчет из системы (Jira/Zendesk/HelpDesk) за последние 3 месяца.\n2. Найдите средний AHT и количество заявок в час.\n3. Посчитайте «чистую» потребность, а затем примените коэффициент $1.3$ (стандартный Shrinkage).\n\nДля того чтобы я мог помочь вам точнее рассчитать штат, есть ли у вас данные по среднему количеству обращений в день и среднему времени, которое уходит на закрытие одного такого обращения?"},{"q":"Как мотивируете команду?","b":"- Индивидуальные планы развития.\n- Обучение.\n- Матрица компетенций.\n- Прозрачные KPI."},{"q":"Как доказать руководству необходимость ещё одного сотрудника?","b":"Показал бы статистику роста обращений, влияние на SLA, стоимость простоев бизнеса и сравнил бы её со стоимостью найма."},{"q":"Как вы понимаете, что отдел перегружен?","b":"- Растёт backlog.\n- Увеличивается MTTR.\n- Падает FCR.\n- Увеличивается количество переработок.\n- Сотрудники начинают нарушать SLA.\n- Растёт количество ошибок."},{"q":"Как оцениваете эффективность поддержки?","b":"- SLA\n- OLA\n- MTTR\n- MTTA\n- CSAT\n- FCR\n- Escalation Rate\n- Reopen Rate\n- Backlog\n- Количество повторных обращений\n- Problem Rate"},{"q":"Один сотрудник сильнее остальных, но токсичный","b":"Сначала разбираюсь в причинах поведения. Даю обратную связь один на один, фиксирую ожидания. Если поведение не меняется и начинает вредить команде, для меня важнее здоровье команды, чем высокий уровень одного специалиста."},{"q":"Как работаете с конфликтом между L1 и L2?","b":"Чаще всего конфликт возникает не между людьми, а из-за плохо определённых зон ответственности. Я бы сначала посмотрел статистику эскалаций, затем разобрал несколько кейсов, обновил критерии передачи обращений и договорился о единых правилах. Если после этого остаются личные разногласия, решал бы их уже индивидуально."},{"q":"Как распределяете задачи между L1 и L2?","b":"**L1:**\n\n- Типовые обращения.\n- Первичная диагностика.\n- Сбор информации.\n- Выполнение регламентов.\n\n**L2:**\n\n- Анализ.\n- Инфраструктура.\n- Интеграции.\n- Нестандартные проблемы.\n- Взаимодействие с разработкой."},{"q":"Представьте, что завтра вам нужно сократить штат поддержки на одного человека. Как будете выбирать?","b":"Я бы не начинал с выбора человека. Сначала посмотрел бы, какие функции можно автоматизировать, какие процессы упростить и как перераспределить нагрузку. Если сокращение неизбежно, решение должно опираться на объективные критерии: компетенции, производительность, универсальность сотрудника и потребности команды, а не на субъективные симпатии."},{"q":"Как мотивировать людей, если денег нет?","b":"- Прозрачные цели.\n- Обучение.\n- Развитие.\n- Интересные задачи.\n- Признание результатов.\n- Участие в улучшении процессов.\n- Понятные карьерные перспективы."},{"q":"Как понять, что сотрудник выгорает?","b":"- Начинает ошибаться.\n- Раздражается.\n- Падает качество.\n- Перестаёт предлагать улучшения.\n- Избегает сложных задач."},{"q":"Что будете делать, если L2 постоянно перегружена?","b":"Последовательность:\n\n- Посмотреть категории обращений.\n- Проверить корректность эскалаций.\n- Проверить знания L1.\n- Посмотреть автоматизацию.\n- Проверить staffing.\n- Проверить качество документации.\n- Проверить повторяемость инцидентов."},{"q":"Как будете развивать L1?","b":"- Матрица компетенций.\n- База знаний.\n- Shadowing.\n- Регулярные техразборы.\n- Ротация.\n- Индивидуальные планы развития."},{"q":"Расскажите про самый сложный конфликт в команде","b":"Подготовь STAR (Situation — Task — Action — Result) заранее, на реальном примере из своего опыта."},{"q":"Вы пришли и увидели, что сотрудники работают «по памяти»","b":"Надо сделать wiki, но учесть:\n\n- Не переписывать сразу все инструкции.\n- Посмотреть самые частые обращения.\n- Начать с топ-20 сценариев.\n- Постепенно расширять базу знаний."},{"q":"Как понять, что поддержка приносит бизнесу ценность?","b":"- Меньше простоев бизнеса.\n- Меньше повторных инцидентов.\n- Выше удовлетворённость пользователей.\n- Быстрее внедряются изменения.\n- Продукт становится стабильнее благодаря обратной связи поддержки."},{"q":"как понять, что дежурства организованы плохо?","b":"Признаки — растущая текучка именно среди тех, кто попадает в ротацию, частые пропущенные эскалации (никто не отреагировал вовремя), большое количество ложных алертов за смену (значит, система не донастроена, и люди либо выгорают от шума, либо начинают их игнорировать). Если вижу это на новом месте — это одна из первых вещей, которую пересматриваю в первый месяц работы"},{"q":"Как считаете ROI/эффективность поддержки перед руководством","b":"**Ключевая мысль:** руководство не хочет слышать «мы решили Х тикетов» — им нужна связь с деньгами/бизнес-результатом.\n\n**Ответ:**\n\n> «Строю аргументацию в трёх слоях:\n> \n> \n> **Операционная эффективность (для контроля):**\n> \n> - Стоимость обращения (cost per ticket) — считаю через (ФОТ команды + доля инфраструктуры) / количество обработанных тикетов, и слежу за трендом\n> - FCR и automation rate — прямой показатель, сколько мы «экономим» за счёт того, что не эскалируем и не привлекаем более дорогой ресурс (L2/разработку)\n> \n> **Влияние на бизнес (для CFO/COO):**\n> \n> - Например: снижение оттока клиентов за счёт снижения времени решения критичных инцидентов — если можем показать корреляцию между CSAT/времени решения и retention, это самый сильный аргумент\n> - Экономия за счёт устранения повторяющихся проблем (RCA) — например, «устранение бага X убрало ~200 обращений в месяц, что эквивалентно экономии Y человеко-часов = Z рублей»\n> \n> **Стратегическая ценность (для CEO/акционеров):**\n> \n> - Поддержка как источник продуктовой обратной связи — сколько инициатив по改善 продукта родилось именно из паттернов обращений\n> - Снижение репутационных рисков — скорость реакции на массовые инциденты\n> \n> Конкретно я готовлю квартальный «Support Business Review» — 1 страница, где вижу: стоимость поддержки, тренд по SLA/CSAT, топ-3 инициативы по снижению нагрузки с посчитанным эффектом в деньгах или часах. Это перевод «операционки» на язык, понятный бизнесу».\n>"},{"q":"Как поймете через полгода, что команда стала лучше?","b":"Для меня есть три уровня оценки.\n\nПервый — цифры. SLA, MTTR, количество повторных обращений, backlog, CSAT.\n\nВторой — зрелость команды. Насколько сотрудники самостоятельно принимают решения, помогают друг другу, делятся знаниями.\n\nТретий — отношение бизнеса.\n\nЧерез полгода я хотел бы услышать от внутренних заказчиков не \"поддержка быстро закрывает тикеты\", а \"с поддержкой стало проще работать\"."},{"q":"Если бы вы могли изменить только один процесс в поддержке, какой бы выбрали и почему?","b":"**Я бы выбрал Problem Management.**\n\nВо многих компаниях поддержка превращается в конвейер: сотрудники качественно тушат пожары, но одинаковые инциденты продолжают возникать. В результате команда постоянно занята, а бизнес не чувствует улучшений.\n\nДля меня зрелая поддержка — это не та, которая быстро закрывает тикеты, а та, которая постепенно делает себя менее востребованной за счет устранения первопричин.\n\nВ одном из проектов мы связали поддержку с разработкой через Jira и Git, начали системно разбирать повторяющиеся обращения и передавать их в продуктовую команду. В результате количество повторных обращений заметно снизилось. Именно такой подход я считаю самым ценным."},{"q":"Вы ошиблись. Что будете делать?","b":"Признаю ошибку, устраняю последствия, разбираю причины и меняю процесс так, чтобы подобное не повторилось"},{"q":"Как даете негативную обратную связь?","b":"- факты;\n- влияние;\n- ожидания;\n- совместный план действий."},{"q":"Как бы вы использовали AI в поддержке?","b":"Не рассматриваю AI как замену инженеров первой линии. Скорее как инструмент повышения эффективности. Например, классификация тикетов, предложение готовых решений оператору, поиск по базе знаний, генерация ответов пользователям и автоматическая маршрутизация обращений."}]},{"id":"sla-metrics","u":"U3","short":"SLA и метрики","full":"SLA и метрики","title":"SLA и метрики","eyebrow":"Измерение качества поддержки","desc":"SLA/OLA/SLO, отчётность, KPI для L1/L2, распределение нагрузки, контроль качества, онбординг и работа с приоритетами и эскалацией.","cards":[{"a":"SLADEF","t":"Что такое SLA для техподдержки, как считается","tags":["ok"],"b":"\n      <p>Service Level Agreement — соглашение между ИТ/поддержкой и заказчиком (бизнесом или внешним клиентом), фиксирующее измеримые обязательства по качеству обслуживания.</p>\n      <ul>\n        <li><b>Время реакции (Response time)</b> — от регистрации обращения до первого ответа специалиста. Считается как <code>время первого ответа − время создания заявки</code>, обычно раздельно по приоритетам.</li>\n        <li><b>Время решения (Resolution time)</b> — от регистрации до фактического закрытия/подтверждения пользователем, тоже разное по приоритетам (Critical/High/Medium/Low).</li>\n        <li><b>Доступность сервиса (Availability)</b> — <code>(общее время − время простоя) / общее время × 100%</code> за отчётный период.</li>\n        <li><b>% выполнения SLA</b> — <code>число обращений, уложившихся в срок / общее число обращений × 100%</code> — главная итоговая цифра, которую видит заказчик.</li>\n        <li>Из расчёта времени реакции/решения обычно исключаются согласованные паузы (например «ожидание ответа от пользователя» — Pending/On Hold статус не должен «съедать» SLA специалиста).</li>\n      </ul>"},{"a":"OLA","t":"Что такое OLA, как формируется","tags":["ok"],"b":"\n      <p>Operational Level Agreement — внутреннее соглашение <b>между подразделениями самой ИТ-организации</b> (например, L1 и L2, Service Desk и сетевой командой), которое обеспечивает выполнение внешнего SLA.</p>\n      <ul>\n        <li>Формируется «от SLA назад»: сначала фиксируется внешнее обязательство (например «решить критичный инцидент за 4 часа»), затем оно разбивается на internal-этапы — сколько времени на диагностику у L1, сколько на передачу в L2, сколько на устранение у L2/L3.</li>\n        <li>Пример цепочки: SLA перед бизнесом — 4 часа на решение → OLA: L1 диагностирует и эскалирует за 30 минут, L2 берёт в работу за 15 минут, устраняет за оставшееся время.</li>\n        <li>Нарушение OLA не видно напрямую заказчику, но именно из суммы OLA складывается способность уложиться в SLA — поэтому OLA мониторят внутри команды поддержки отдельно.</li>\n      </ul>"},{"a":"SLO","t":"Что такое SLO, как формируется","tags":["ok"],"b":"\n      <p>Service Level Objective — конкретная измеримая <b>цель</b> по метрике, которая лежит в основе SLA. Если SLA — это договор с обязательствами (часто с санкциями за нарушение), то SLO — это внутренний целевой показатель, на который ориентируется команда, чтобы SLA гарантированно выполнялся.</p>\n      <ul>\n        <li>Формируется с запасом относительно SLA: например, SLA перед бизнесом — 95% обращений в срок, тогда внутренний SLO ставится строже — 98%, чтобы был буфер на форс-мажоры.</li>\n        <li>SLO может существовать и без формального SLA — как внутренний ориентир качества (например «время ответа L1 в чате — не более 2 минут»).</li>\n        <li>Практическое соотношение трёх понятий: <b>SLO</b> — внутренняя цель («хотим X») → <b>SLA</b> — договор с заказчиком на основе SLO, обычно чуть мягче («обещаем Y ≤ X») → <b>OLA</b> — как именно внутренние команды организуют работу, чтобы SLO/SLA выполнялись.</li>\n      </ul>"},{"a":"REPORTS","t":"Какие отчётности делают по техподдержке","tags":[],"b":"\n      <ul>\n        <li><b>Оперативная сводка (ежедневная/еженедельная)</b> — открытые/закрытые обращения, текущий backlog, критичные инциденты в работе.</li>\n        <li><b>Отчёт по выполнению SLA</b> — % обращений в срок по приоритетам, обычно за месяц/квартал, отправляется заказчику/руководству.</li>\n        <li><b>Отчёт по инцидентам (Incident report / Post-mortem)</b> — для крупных инцидентов: хронология, влияние, первопричина (RCA), принятые меры, чтобы не повторилось.</li>\n        <li><b>Отчёт по нагрузке и производительности команды</b> — количество обращений на специалиста, среднее время обработки, загрузка по сменам.</li>\n        <li><b>Отчёт по проблемам (Problem management report)</b> — топ повторяющихся инцидентов, статус их первопричин, план устранения.</li>\n        <li><b>Отчёт по удовлетворённости (CSAT)</b> — динамика оценок пользователей за период.</li>\n        <li><b>Capacity-отчёт</b> — прогноз роста нагрузки (тикетов, ресурсов инфраструктуры), нужен ли доп. персонал/оборудование.</li>\n      </ul>"},{"a":"KPI-L","t":"KPI для специалистов L1 и L2","tags":["warn"],"b":"\n      <p>KPI для разных линий отличаются, потому что у линий разная роль: L1 — скорость и объём первичной обработки, L2 — глубина и качество решения сложных задач.</p>\n      <p><b>L1 (первая линия):</b></p>\n      <ul>\n        <li>Время реакции на обращение (обычно самый жёсткий KPI именно у L1).</li>\n        <li>FCR — доля обращений, закрытых силами L1 без эскалации.</li>\n        <li>Количество обработанных обращений за смену/день.</li>\n        <li>% корректно классифицированных и приоритизированных заявок при регистрации.</li>\n        <li>CSAT по своим обращениям.</li>\n      </ul>\n      <p><b>L2 (вторая линия):</b></p>\n      <ul>\n        <li>MTTR по переданным от L1 инцидентам.</li>\n        <li>% решений, потребовавших повторного обращения (Reopen rate) — показатель качества, а не только скорости.</li>\n        <li>Соблюдение OLA по времени взятия эскалации в работу.</li>\n        <li>Вклад в базу знаний — количество задокументированных решений/статей для L1 (снижает нагрузку в будущем).</li>\n        <li>Число инцидентов, доведённых до Problem Management (найдена и устранена первопричина, а не просто обходной путь).</li>\n      </ul>"},{"a":"MONIT","t":"Что мониторят команды L1 и L2","tags":[],"b":"\n      <ul>\n        <li><b>L1</b> — как правило верхнеуровневые сигналы: очередь обращений (Service Desk/тикет-система), базовая доступность сервисов на дашбордах (например статусы «зелёный/красный» из Zabbix/Grafana), заметные алерты, почтовые ящики/чаты поддержки.</li>\n        <li><b>L2</b> — более глубокий уровень: производительность и логи конкретных систем (Windows Server, сеть, 1С, виртуализация), детальные метрики в Zabbix/Grafana (нагрузка CPU/RAM/диск, задержки сети, репликация AD/Exchange), корреляция инцидентов между собой для выявления проблем.</li>\n        <li>Разделение логично строится по принципу: L1 замечает «что-то не так» на верхнем уровне и по чек-листу/базе знаний, L2 — разбирается «почему» на уровне конкретной технологии.</li>\n      </ul>"},{"a":"ESCAL","t":"Приоритизация и эскалация на L1/L2","tags":["warn"],"b":"\n      <p>Приоритет обращения обычно определяется матрицей <code>Impact × Urgency</code>: сколько пользователей/бизнес-процессов затронуто и насколько это критично прямо сейчас.</p>\n      <ul>\n        <li><b>Функциональная эскалация</b> — передача обращения на следующую линию (L1 → L2 → L3/вендор), когда не хватает прав доступа или компетенции для решения.</li>\n        <li><b>Иерархическая эскалация</b> — привлечение руководителя (тимлида/руководителя поддержки), когда нарушается или вот-вот будет нарушен SLA, либо инцидент политически чувствителен (VIP-пользователь, топ-менеджмент).</li>\n        <li>Типичные триггеры эскалации: риск нарушения SLA по времени, затронуто больше N пользователей, инцидент относится к критичному сервису из заранее согласованного списка, повторное обращение по нерешённой проблеме.</li>\n        <li>Хорошая практика — эскалация не «перекладывание», а передача с контекстом: что уже проверено, какие логи сняты, что исключено — иначе L2 тратит время на повтор диагностики L1.</li>\n      </ul>"},{"a":"LOAD","t":"Распределение нагрузки","tags":[],"b":"\n      <ul>\n        <li><b>Round-robin / очередь</b> — заявки распределяются по кругу между свободными специалистами линии — просто и прозрачно.</li>\n        <li><b>Skill-based routing</b> — маршрутизация по компетенции (например заявки по 1С — конкретной подгруппе L2, а не любому свободному специалисту).</li>\n        <li><b>Балансировка по сменам/графику</b> — покрытие пиковых часов обращений большим числом специалистов на линии, планирование дежурств (on-call) вне рабочего времени для критичных сервисов.</li>\n        <li><b>Учёт текущей загрузки</b> — не отдавать новую заявку специалисту, у которого уже много открытых в работе (WIP-лимит), чтобы не проседало время решения.</li>\n      </ul>"},{"a":"QC","t":"Контроль качества (QA)","tags":[],"b":"\n      <ul>\n        <li><b>Выборочный аудит обращений (Ticket sampling)</b> — руководитель/QA-специалист выборочно проверяет закрытые заявки: правильность диагностики, полнота комментариев, вежливость общения.</li>\n        <li><b>QA-скоркарта</b> — формализованный чек-лист оценки обращения (например: корректность приоритета, соблюдение регламента, качество решения, коммуникация) с итоговым баллом.</li>\n        <li><b>Калибровочные сессии</b> — регулярные встречи, где несколько проверяющих оценивают одни и те же обращения вместе, чтобы оценки были одинаково строгими у разных проверяющих.</li>\n        <li><b>Анализ Reopen rate</b> — повторные обращения по одной и той же проблеме — главный количественный индикатор того, что решение было формальным, а не по существу.</li>\n        <li><b>Обратная связь по CSAT</b> — низкие оценки разбираются точечно с конкретным специалистом, а не только смотрятся как общая цифра.</li>\n      </ul>"},{"a":"ONBOARD","t":"Онбординг команды L1 и L2","tags":[],"b":"\n      <ul>\n        <li><b>L1 — быстрый старт по чек-листам</b>: доступ к базе знаний и тикет-системе, стандартные скрипты диагностики, обучение классификации и приоритизации заявок, первые недели — работа «в паре» с наставником (shadowing) и разбор реальных обращений постфактум.</li>\n        <li><b>L2 — более глубокое погружение</b>: изучение конкретных систем инфраструктуры компании (AD, сеть, виртуализация, 1С и т.д.), доступ к более чувствительным системам выдаётся поэтапно, разбор прошлых крупных инцидентов и известных проблем (KEDB) как учебный материал.</li>\n        <li><b>Ramp-up период</b> — для нового сотрудника обычно устанавливают смягчённые KPI на первые 1–3 месяца с постепенным выходом на целевые показатели.</li>\n        <li><b>Аттестация/подтверждение готовности</b> — тестовые сценарии или пробные смены под наблюдением наставника перед полностью самостоятельной работой.</li>\n        <li>Хорошая практика — после онбординга новый сотрудник сам дополняет базу знаний тем, что было неочевидно при вхождении: это лучший индикатор пробелов в документации.</li>\n      </ul>"},{"a":"UC (UNDERPINNING","t":"UC (Underpinning Contract)","tags":[],"b":"<p>Соглашение с внешним вендором/поставщиком, если задействован аутсорс</p>"},{"a":"КЛЮЧЕВЫЕ МЕТРИКИ,","t":"Ключевые метрики, которые нужно уметь называть и объяснять","tags":[],"b":"<ul><li><b>MTTR</b> (Mean Time to Resolve) — среднее время решения</li><li><b>MTTA</b> (Mean Time to Acknowledge) — время реакции/принятия в работу</li><li><b>FCR</b> (First Contact Resolution) — доля решённых с первого обращения на L1</li><li><b>Escalation rate</b> — % тикетов, ушедших на L2/L3</li><li><b>Backlog</b> — количество открытых/просроченных тикетов</li><li><b>CSAT / NPS</b> — удовлетворённость пользователей</li><li><b>SLA compliance %</b> — доля тикетов, закрытых в рамках SLA (по приоритетам P1–P4)</li><li><b>Reopen rate</b> — процент повторно открытых тикетов (показатель качества решения)</li><li><b>Utilization rate</b> — загрузка агентов</li></ul>"},{"a":"ДАШБОРДЫ И","t":"дашборды и отчётность","tags":[],"b":"<ul><li>Какие инструменты использовал: Jira Service Management, Grafana, Power BI, ServiceNow reports</li><li>Разделение отчётности по аудиториям:<ul><li><b>Ежедневная/операционная</b> — для тимлидов (backlog, просрочки, нагрузка по сменам)</li><li><b>Еженедельная</b> — для менеджмента поддержки (тренды по MTTR, FCR, эскалациям)</li><li><b>Ежемесячная/квартальная</b> — для бизнеса (SLA compliance, CSAT, инцидент-ревью, root cause анализ повторяющихся проблем)</li></ul></li></ul>"},{"a":"RCA","t":"RCA","tags":[],"b":"<p>RCA (Root Cause Analysis — анализ первопричин) — это процесс глубокого расследования причин инцидента или сбоя, целью которого является устранение самой сути проблемы, а не просто её внешних симптомов.</p>"},{"a":"СВЯЗЬ SLI,","t":"Связь SLI, SLO и SLA","tags":[],"b":"<p>Представим интернет-магазин.</p>\n<p><b>SLI</b> — фактический показатель:</p>\n<blockquote><p>За июнь успешно обработано <b>99.87%</b> запросов.</p></blockquote>\n<p><b>SLO</b> — внутренняя цель команды:</p>\n<blockquote><p>Стремимся поддерживать <b>99.9%</b> успешных запросов.</p></blockquote>\n<p><b>SLA</b> — обязательство перед клиентом:</p>\n<blockquote><p>Гарантируем не менее <b>99.5%</b> доступности сервиса. При нарушении предусмотрены компенсации.</p></blockquote>\n<p>Получается следующая логика:</p>\n<ul><li><b>SLI</b> отвечает на вопрос: <i>«Какой результат мы получили на самом деле?»</i></li><li><b>SLO</b> отвечает: <i>«Какого уровня качества мы хотим достичь?»</i></li><li><b>SLA</b> отвечает: <i>«Что мы официально обещаем клиенту?»</i></li></ul>"},{"a":"SLI","t":"SLI (Service Level Indicator) — Индикатор уровня обслуживания","tags":[],"b":"<p>Это <b>конкретная метрика</b>, которая показывает, как сервис работает прямо сейчас. Отвечает на вопрос: <i>«Что мы измеряем?»</i></p>\n<ul><li><b>Пример:</b> Процент успешных ответов API, время отклика (tail latency), доступность системы в минутах.</li><li><b>Формула (упрощенно):</b>$$\\text{SLI} = \\frac{\\text{Успешные события}}{\\text{Всего событий}} \\times 100\\%$$</li></ul>"},{"a":"KPI","t":"Какие KPI считаете наиболее важными?","tags":[],"b":"<p>Я разделяю KPI на четыре группы Операционные: как работает система Пользовательские: что чувствует клиент Командные: рост и зрелость команды Индивидуальных KPI на агента: - развитие  и справедлоивость оценки</p>"}],"qa":[{"q":"Про дашборды и отчётность — что сказать","b":"Настроил трёхуровневую отчётность: операционный дашборд в реальном времени для тимлидов на смене, еженедельный срез по трендам для внутренней команды, и ежемесячный SLA-отчёт для бизнес-заказчиков с разбивкой по приоритетам P1-P4 и постмортемами по критичным инцидентам. Это позволило перейти от реактивного разбора проблем к проактивному — начали видеть повторяющиеся паттерны и устранять причины, а не симптомы"},{"q":"Случай, когда SLA был под угрозой срыва","b":"**Situation:**\n\n> У нас SLA compliance был 95% по P1-инцидентам (реакция за 15 минут, решение за 4 часа). В мексике Олег решил что нам срочно нужно + 500 сотрудников call центра и именно в нашем офисе. именно наших новых сотрудников. Количество заявок  и  P1-инцидентов выросло в 5 раза, и compliance просел до 60%».\n> \n\n**Task:**\n\n> «Нужно было за 2 недели вернуть показатель к целевому, в шатат набор шел, но медленно, все мошности на эту задачу, нужно как то решить с ограниченным штатом - рост я прогназировал как временный. И вообще был против этой затеи.».\n> \n\n**Action:**\n\n> «Сделал три вещи параллельно:\n> \n> 1. Ввёл временный war-room режим на пиковые часы — выделил 2 L2-специалиста в режим постоянного дежурства только на P1, что бы высвободить L1;\n> 2. Провёл экспресс встречу разобрал топ 10 инцидентов - выделил по сменно 2 через 2 сотрудников L1 только на Onbording приходящих, подготовку техники, без обработки текуших заявок, привлек под их крыло внешних конрагентов, 500 мак мини за 2-3 недели развернуть это оч много, остальная часть комманды работала в штатном режиме, но там их 2 человека оставалось;\n> 3. Договорился с бизнесом о временном пересмотре приоритизации - часть P2 временно обрабатывалась во вторую очередь, чтобы не размывать ресурс».\n\n**Result:**\n\n> «Через 20 дней compliance вернулся к 96%, RCA точнее я бы назвал Problem Statement, инцидент у нас это «Систематическое нарушение SLA по времени обработки заявок на онбординг/офбординг из-за несоответствия пропускной способности отдела поддержки темпам роста численности персонала компании». это привёло к решению закупки Jamf и формированию новой информационной системы, которую мы стали разворачивать и эффективно использовать.  Снизив нагрузку на L1 процентов на 30%\n>"},{"q":"Борьба с текучкой на L1","b":"**лючевая мысль для собеса:** текучка на L1 — это системная проблема (рутина, отсутствие роста, выгорание), а не вопрос «мотивационных речей». Показывай, что работаешь с причинами.\n\n**Ответ:**\n\n> «На L1 текучка обычно связана с тремя вещами: рутинность работы, отсутствие видимого карьерного трека, и выгорание от объёма однотипных обращений. Работал по всем трём направлениям:\n> \n> - **Карьерный трек**: сделал прозрачную грид-систему L1 → L2 → тимлид с понятными критериями перехода (метрики + скиллы), а не «как получится». Люди видели горизонт роста.\n> - **Ротация и разнообразие задач**: часть времени L1-агенты работали над базой знаний, участвовали в разборе повторяющихся кейсов — это снижало ощущение конвейера.\n> - **Снижение рутины через автоматизацию**: внедрил self-service / чат-бота для типовых обращений (сброс пароля, стандартные FAQ), что убрало 20-30% самых нудных тикетов с L1 и оставило более интересные задачи.\n> \n> В результате текучка на испытательном сроке (первые 90 дней) снизилась с ~35% до ~15%, а общая годовая текучка на L1 — с 60% до около 35%, что для L1-поддержки уже close to рыночного бенчмарка».\n>"},{"q":"Баланс между MTTR и Reopen rate","b":"**Ключевая мысль:** это классическая ловушка — «гнать скорость» повышает reopen rate, а «гнать качество» — раздувает MTTR. Нужно показать, что видишь эту связь и управляешь ей осознанно.\n\n**Ответ:**\n\n> «Это две метрики, которые тянут в разные стороны, и если оптимизировать только MTTR, агенты начинают закрывать тикеты формально быстро, а reopen rate растёт — по сути, проблема просто возвращается позже и дороже.\n> \n> \n> Я подхожу к этому так:\n> \n> 1. **Смотрю на них в связке, а не по отдельности** — в дашборде это соседние метрики, и рост MTTR-эффективности при одновременном росте reopen rate — красный флаг, а не успех.\n> 2. **Ввёл критерий качественного закрытия тикета** в чек-лист QA: не просто «закрыт быстро», а «закрыт с подтверждением от пользователя и с корректно указанной причиной». Это часть оценки агента, а не только скорость.\n> 3. **Разделил метрику по сложности кейсов** — сравнивать MTTR простого сброса пароля и сложного технического инцидента некорректно, поэтому считаю MTTR в разрезе категорий и приоритетов, а не общей цифрой.\n> \n> На практике это выглядело так: снизили MTTR на 15%, но не за счёт скорости в ущерб качеству, а за счёт улучшения базы знаний и скриптов — при этом reopen rate не вырос, а даже немного снизился, потому что агенты стали быстрее находить правильное решение с первого раза».\n>"},{"q":"RCA — анализ первопричин и инициация изменений в продукте","b":"**Ключевая мысль:** тут важно показать, что поддержка — не «стена плача», а источник продуктовых инсайтов, и что у тебя есть регулярный процесс, а не разовые разборы.\n\n**Ответ:**\n\n> «Выстроил RCA как регулярный процесс, а не реакцию на отдельные крупные инциденты:\n> \n> \n> **Процесс:**\n> \n> 1. **Категоризация тикетов** — обязательное тегирование по типу проблемы (баг, UX-непонятность, недостаток документации, инфраструктурная проблема) прямо в момент закрытия тикета\n> 2. **Еженедельный топ-обращений** — смотрю не на количество тикетов, а на паттерны: какая тема повторяется, растёт ли она в динамике\n> 3. **Формальный RCA по 5 Why / Ishikawa** для инцидентов P1/P2 — не просто «починили», а разбор, почему это вообще произошло и почему не поймали раньше\n> 4. **Регулярная встреча с продуктом** (раз в 2 недели) — приношу не сырые данные, а готовую гипотезу: «вот тема, которая генерирует Х обращений в месяц, вот наша гипотеза причины, вот предлагаемое решение»\n> \n> **Пример:**\n> Заметили, что ~15% всех обращений за месяц — это один и тот же вопрос по неочевидному шагу в интерфейсе оформления заказа. Сделали RCA, показали продукту тепловую карту обращений плюс скрины, где именно пользователи путаются. Продукт внёс изменение в UX (добавили подсказку на этом шаге). После релиза обращения по этой теме упали на 80% в течение месяца.\n> \n> Это стало кейсом, который я использую, чтобы показать руководству: поддержка — это не cost-center, а источник data-driven продуктовых улучшений, который можно измерить в конкретном снижении нагрузки и затрат».\n>"},{"q":"Поднял SLA с 70% до 98%.","b":"Контекст: до моего прихода в отдел не особо занимались очередью и вообще ресурса не было для этого проекта\n\n- **Situation (Ситуация):** Доля заявок, закрываемых в рамках нормативного времени (SLA), была на уровне 70%. Бизнес в лице супервайзеров регулярно эскалировал проблемы из-за медленной работы IT.\n- **Task (Задача):** Достичь стабильного показателя SLA Resolution > 95% за один квартал.\n- **Action (Действие):** Провел аудит и выявил \"узкие места\". Перестроил свой график под рабочие часы специалистов call-центра, под их пиковые утренние нагрузки. Внедрил многоуровневую систему авто-эскалации (за 20% до истечения SLA тикет подсвечивался красным для всех участиков тикета). Ввел еженедельный отчет с обязательной обратной связью от Лида по всем просроченным заявкам автоматизируя эскалации.\n- **Result (Результат):** За 3 месяца показатель SLA вырос до 98% и стабилизировался. Индекс удовлетворенности пользователей (CSAT) параллельно поднялся с 3.8 до 4.7 из 5."},{"q":"Как именно я сформировал SLA-матрицу","b":"Создание SLA «из головы» не работает — бизнес его не примет, а инженеры не смогут выполнить. Я делал это по классической методологии ITIL, адаптированной под реалии компании.\n\n- **Шаг 1. Категоризация сервисов (Service Tiering)**\nЯ пошел к владельцам бизнес-процессов (финансовый директор, коммерческий директор, склад) и мы вместе разделили все ИТ-сервисы на 3 уровня (Tier) по степени влияния на выручку:\n    - **Tier 1 (Mission-critical):** Остановка ведет к прямым финансовым потерям. (ERP-система, кассовое ПО, основной биллинг, складская WMS).\n    - **Tier 2 (Business-operational):** Работа замедляется, но процессы идут. (Корпоративная почта, 1С:Бухгалтерия в период вне закрытия, телефония бэк-офиса).\n    - **Tier 3 (Supporting):** Внутренние сервисы, не влияющие на клиентов. (Гостевой Wi-Fi, принтеры в переговорках, интранет-портал).\n- **Шаг 2. Внедрение матрицы «Срочность × Влияние = Приоритет»**\nЯ убрал у пользователей возможность самим ставить статус «Критично» (иначе 90% заявок были бы красными). Пользователь выбирал только сервис и масштаб проблемы, а система сама считала приоритет.\n    - **Влияние (Impact):** Массовое (вся компания/склад), Групповое (отдел), Индивидуальное (один человек).\n    - **Срочность (Urgency):** Работа полностью остановлена (Blocker), есть обходной путь (Workaround), не мешает работе (Cosmetic).\n- **Шаг 3. Оцифровка нормативов (Тайминги)**\nНа основе этой матрицы я задал жесткие тайминги в Jira (SLA):\n    - **Critical (P1 — упало ядро, Tier 1, массовое):** Реакция (FRT) — 15 мин. Решение — 2 часа.\n    - **High (P2 — упал Tier 2 у отдела):** Реакция — 30 мин. Решение — 4 часа.\n    - **Medium (P3 — сломался ПК у одного сотрудника):** Реакция — 2 часа. Решение — 8 рабочих часов.\n    - **Low (P4 — выдача прав новому сотруднику):** Реакция — 4 часа. Решение — до 3 рабочих дней.\n- **Шаг 4. Защита перед бизнесом (SLA Sign-off)**\n    \n    Я принес эту матрицу на совет директоров. Главный аргумент: *\"Если вы хотите SLA 2 часа на починку принтера (P3), мне нужно нанять еще 5 эникеев. Это стоит X миллионов в год. Вы готовы за это платить?\"* Бизнес посмотрел на цифры, согласился с предложенной матрицей и официально её подписал. Мы перестали тушить пожары и начали работать по приоритетам бизнеса."},{"q":"Операционные KPI — как работает система","b":"Это метрики самого процесса поддержки, независимо от людей — «здоровье» операции.\n\n| KPI | Что измеряет | Пример целевого значения |\n| --- | --- | --- |\n| **SLA compliance** | % тикетов, закрытых в рамках согласованного времени (по приоритетам P1-P4) | 95%+ для P1, 90%+ для остальных |\n| **FRT** (First Response Time) | Время до первой реакции на обращение | P1 — 15 мин, P2 — 1 час, P3/P4 — 4-8 часов |\n| **MTTR** (Mean Time to Resolve) | Среднее время полного решения | Зависит от сложности, но обычно трекается по категориям отдельно |\n| **FCR** (First Contact Resolution) | % решённых с первого обращения без эскалации | 70-80% для L1 |\n| **Backlog / Aging tickets** | Количество просроченных или зависших тикетов | Стремление к 0 просрочек по P1/P2 |\n| **Reopen rate** | % тикетов, открытых повторно | <5-7% |\n\n**Как обосновать на собесе:**\n\n> «Операционные KPI — это фундамент, они не про людей, а про процесс. Если SLA просел — я в первую очередь смотрю не «кто виноват», а что сломалось в процессе: нехватка ресурса, баг в продукте, проблема с эскалацией».\n>"},{"q":"Пользовательские KPI — что чувствует клиент","b":"Это единственная группа, которая измеряет **субъективное восприятие**, а не внутреннюю механику.\n\n| KPI | Что измеряет |\n| --- | --- |\n| **CSAT** (Customer Satisfaction) | Удовлетворённость конкретным обращением — обычно опрос сразу после закрытия тикета (1-5 или 👍👎) |\n| **NPS** (Net Promoter Score) | Готовность рекомендовать сервис/компанию — более стратегическая метрика, реже измеряется (раз в квартал) |\n| **CES** (Customer Effort Score) — можно добавить | Насколько легко было получить помощь — иногда более показательна, чем CSAT, так как ловит \"решили, но выжали все нервы\" |\n\n**Важный нюанс, который стоит проговорить:**\n\n> «CSAT и SLA могут расходиться — можно закрыть тикет строго в рамках SLA, но грубо или формально, и получить низкий CSAT. Поэтому я никогда не смотрю на операционные метрики в отрыве от пользовательских — это две стороны одной медали».\n>"},{"q":"Командные KPI — рост и зрелость команды","b":"Это уже не про конкретный тикет, а про развитие людей как единого механизма.\n\n- **Выполнение индивидуальных целей** — насколько сотрудники в среднем закрывают личные OKR/цели за период\n- **Прогресс по развитию компетенций** — движение по скилл-матрице (например, % агентов L1, освоивших дополнительный продукт/язык/инструмент)\n- **Уровень самостоятельности** — % решений, принятых без эскалации к тимлиду/супервизору; можно также measure через ratio \"вопросов к руководителю\" на человека в неделю\n\nСюда же можно добавить:\n\n- **Onboarding time-to-productivity** — как быстро новички выходят на плановую производительность\n- **Внутренняя текучка / retention rate** — команда не может считаться зрелой, если состав меняется каждые 3 месяца"},{"q":"Для агента L1/L2:","b":"| KPI | Логика |\n| --- | --- |\n| **Личный FCR** | Свой процент решения с первого раза — показывает глубину экспертизы конкретного человека |\n| **Личное качество (QA score)** | Оценка по чек-листу QA — соответствие регламенту, полнота документации тикета, тон общения |\n| **Личный CSAT** | Средняя оценка от пользователей именно по его тикетам |\n| **Соблюдение SLA лично** | % его тикетов, закрытых в рамках норматива |\n| **Вклад в базу знаний** | Количество написанных/обновлённых статей — это личный вклад в общую эффективность команды |\n| **План развития (ИПР)** | Выполнение индивидуального плана развития — прошёл ли обучение, сдал ли сертификацию, закрыл ли gap в компетенциях |\n\n\nЛичные KPI я никогда не завязываю жёстко на скорость (MTTR) в отрыве от качества — иначе получаю ситуацию, когда агент гонит скорость в ущерб решению проблемы по существу. Обычно личная система мотивации строится как комбинация: 60% — операционные метрики (SLA, FCR), 20% — качество (QA + CSAT), 20% — развитие (компетенции, вклад в базу знаний"}]},{"id":"winsrv","u":"U4","short":"Win Server","full":"Windows Server","title":"Windows Server","eyebrow":"Доменная инфраструктура","desc":"Active Directory, групповые политики, доменные DNS/DHCP, аутентификация Kerberos и роли FSMO.","cards":[{"a":"AD","t":"Active Directory","tags":["ok"],"b":"\n      <p>Служба каталогов Microsoft: централизованное хранилище пользователей, компьютеров, групп и политик.</p>\n      <ul>\n        <li><b>Domain</b> — административная граница; <b>Tree</b> — домены с общим пространством имён; <b>Forest</b> — верхняя граница безопасности, объединяет деревья, общая схема.</li>\n        <li><b>OU</b> (Organizational Unit) — контейнер для делегирования прав и применения GPO.</li>\n        <li><b>DC</b> (Domain Controller) — сервер, хранящий базу AD (NTDS.dit) и обрабатывающий аутентификацию.</li>\n        <li>Репликация между DC — многомастерная (кроме операций FSMO).</li>\n      </ul>"},{"a":"GPO","t":"Group Policy Object","tags":[],"b":"\n      <p>Механизм централизованного управления настройками пользователей и компьютеров в домене.</p>\n      <ul>\n        <li>Порядок применения — <b>LSDOU</b>: Local → Site → Domain → OU (последняя политика имеет приоритет, если не задано Enforced/Block Inheritance).</li>\n        <li>Инструменты: <code>gpupdate /force</code> — принудительное обновление; <code>gpresult /r</code> — какие политики применились.</li>\n      </ul>"},{"a":"DNS","t":"DNS в домене","tags":[],"b":"\n      <p>В инфраструктуре AD DNS обычно интегрирован с каталогом.</p>\n      <ul>\n        <li><b>AD-интегрированная зона</b> — данные зоны реплицируются вместе с AD, а не через зонные передачи.</li>\n        <li><b>SRV-записи</b> критичны — по ним клиенты и другие DC находят Domain Controller (<code>_ldap._tcp</code>, <code>_kerberos._tcp</code>).</li>\n        <li><b>Forwarders</b> — куда DNS-сервер пересылает запросы на внешние домены.</li>\n      </ul>"},{"a":"DHCP","t":"DHCP в домене","tags":[],"b":"\n      <ul>\n        <li>Сервер DHCP должен быть <b>авторизован</b> в AD, иначе не будет раздавать адреса.</li>\n        <li><b>Scope</b> — диапазон адресов; <b>Reservation</b> — закреплённый IP за MAC-адресом.</li>\n        <li><b>DHCP Failover / Split-scope</b> — отказоустойчивость: два сервера синхронизируют аренды или делят диапазон.</li>\n      </ul>"},{"a":"KRB5","t":"Kerberos","tags":["ok"],"b":"\n      <p>Протокол сетевой аутентификации на основе билетов, используется по умолчанию в AD (вместо устаревшего NTLM).</p>\n      <ul>\n        <li><b>KDC</b> (Key Distribution Center) — служба на DC, включает <b>AS</b> (Authentication Service) и <b>TGS</b> (Ticket Granting Service).</li>\n        <li>Процесс: клиент получает <b>TGT</b> (Ticket Granting Ticket) от AS → предъявляет TGT в TGS → получает сервисный билет для доступа к ресурсу.</li>\n        <li><b>SPN</b> (Service Principal Name) — уникальный идентификатор сервиса, к которому запрашивается билет.</li>\n        <li>Критично: <b>синхронизация времени</b> между клиентом и DC — при расхождении более 5 минут аутентификация не проходит.</li>\n      </ul>"},{"a":"FSMO","t":"Flexible Single Master Operations","tags":["warn"],"b":"\n      <p>5 ролей, которые (в отличие от обычной многомастерной репликации) выполняются только одним DC за раз.</p>\n      <p><b>Уровень леса (1 на весь лес):</b></p>\n      <ul>\n        <li><b>Schema Master</b> — единственный, кто может менять схему AD.</li>\n        <li><b>Domain Naming Master</b> — контролирует добавление/удаление доменов в лесу.</li>\n      </ul>\n      <p><b>Уровень домена (1 на каждый домен):</b></p>\n      <ul>\n        <li><b>RID Master</b> — выдаёт пулы RID для создания уникальных SID объектов.</li>\n        <li><b>PDC Emulator</b> — эмулирует первичный DC: время в домене, обработка смены паролей, совместимость с legacy-клиентами.</li>\n        <li><b>Infrastructure Master</b> — обновляет ссылки на объекты из других доменов (актуально при нескольких доменах в лесу).</li>\n      </ul>"},{"a":"FTD","t":"Домен, дерево, лес — иерархия AD","tags":["ok"],"b":"\n      <div class=\"diagram\">Forest (лес) — общая схема, общий Global Catalog, доверие между всеми\n   │\n   ├─ Tree 1: contoso.com  (общее пространство имён)\n   │     ├─ Domain: contoso.com          (сам корневой домен)\n   │     ├─ Domain: eu.contoso.com       (дочерний домен)\n   │     └─ Domain: asia.contoso.com     (дочерний домен)\n   │\n   └─ Tree 2: fabrikam.com  (другое пространство имён,\n                             но всё ещё один лес и доверие)</div>\n      <ul>\n        <li><b>Домен (Domain)</b> — базовая административная и репликационная единица: собственная база учётных записей, собственные политики паролей по умолчанию.</li>\n        <li><b>Дерево (Tree)</b> — один или несколько доменов, связанных непрерывным пространством имён DNS (например <code>contoso.com</code> и <code>eu.contoso.com</code>) и автоматическим двусторонним транзитивным доверием.</li>\n        <li><b>Лес (Forest)</b> — верхняя граница безопасности AD: объединяет одно или несколько деревьев (даже с разными именами DNS), у которых общая схема, общий каталог конфигурации и общий <b>Global Catalog</b>. Доверие между всеми доменами леса устанавливается автоматически.</li>\n        <li>Практический вывод для собеседования: границей безопасности является именно <b>лес</b>, а не домен — администратор леса (Enterprise Admin) фактически имеет контроль над всеми доменами внутри него.</li>\n      </ul>"},{"a":"GROUPS","t":"Группы безопасности (Security Groups)","tags":["ok"],"b":"\n      <p>Группы в AD бывают двух типов по назначению и трёх типов по области действия (scope) — это отдельно спрашивают на собеседовании.</p>\n      <p><b>По типу:</b></p>\n      <ul>\n        <li><b>Security group</b> — используется для назначения прав доступа к ресурсам (папки, принтеры, приложения) и применения GPO. Может использоваться и для рассылки.</li>\n        <li><b>Distribution group</b> — только для списков рассылки почты (например, в Exchange), у неё нет SID и её нельзя использовать для прав доступа.</li>\n      </ul>\n      <p><b>По области действия (scope):</b></p>\n      <ul>\n        <li><b>Domain Local</b> — может включать участников из любого домена леса (и доверенных лесов), но использовать её для прав доступа можно только в пределах своего домена. Обычно сюда назначают права на конкретные ресурсы.</li>\n        <li><b>Global</b> — может включать только участников своего домена, но использоваться (быть добавленной в другую группу или получить права) в любом домене леса. Обычно сюда собирают пользователей по логическому признаку (отдел, роль).</li>\n        <li><b>Universal</b> — может включать участников из любых доменов леса и использоваться в любом домене леса; хранится в Global Catalog, поэтому изменения в её составе реплицируются шире — злоупотреблять частыми изменениями не стоит.</li>\n      </ul>\n      <p><b>Формирование прав — практика AGDLP (AGUDLP):</b></p>\n      <ul>\n        <li><code>A</code>ccounts (учётки пользователей) → добавляются в <code>G</code>lobal-группы (по ролям/отделам) → которые добавляются в <code>[U</code>niversal — если несколько лесов/доменов<code>]</code> → которые добавляются в <code>DL</code> (Domain Local) группу, привязанную к конкретному ресурсу → которой выдаются <code>P</code>ermissions (права) на ресурс.</li>\n        <li>Такая схема упрощает аудит и смену прав: чтобы поменять доступ пользователя, достаточно перекинуть его между Global-группами, не трогая права на самих ресурсах.</li>\n      </ul>\n      <p><b>Встроенн
