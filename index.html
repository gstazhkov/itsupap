ые группы, которые часто спрашивают:</b></p>\n      <ul>\n        <li><b>Domain Admins</b> — полные права в пределах своего домена (на всех DC и рабочих станциях домена по умолчанию).</li>\n        <li><b>Enterprise Admins</b> — полные права на весь лес, существует только в корневом домене леса.</li>\n        <li><b>Schema Admins</b> — единственные, кто может менять схему AD (используется редко, обычно пусто).</li>\n        <li><b>Domain Users</b> — все учётные записи пользователей домена по умолчанию входят сюда.</li>\n      </ul>"},{"a":"LDAP","t":"LDAP","tags":[],"b":"<p><b>Lightweight Directory Access Protocol</b> — протокол доступа к каталоговым службам (не только AD — тот же протокол используют OpenLDAP и другие каталоги). AD — это реализация LDAP-каталога с расширениями Microsoft.</p>\n<p><b>Ключевые понятия:</b></p>\n<ul><li><b>DN (Distinguished Name)</b> — полный уникальный путь к объекту, например <code>CN=Ivan Ivanov,OU=Sales,DC=contoso,DC=local</code>.</li><li><b>RDN (Relative Distinguished Name)</b> — часть DN, уникальная в рамках родительского контейнера (<code>CN=Ivan Ivanov</code>).</li><li>Операции: <b>Bind</b> (аутентификация), <b>Search</b>, <b>Add</b>, <b>Modify</b>, <b>Delete</b>, <b>Compare</b>.</li><li>Порты: <b>389 (LDAP, plaintext или с STARTTLS)</b> и <b>636 (LDAPS, LDAP over SSL/TLS)</b>. Для Global Catalog — <b>3268 (GC)</b> и <b>3269 (GC over SSL)</b>.</li></ul>"},{"a":"SPN (Service Principal Name)","t":"SPN (Service Principal Name)","tags":[],"b":"<p>идентификатор сервиса, привязанный к аккаунту (например, HTTP/mail.contoso.com), нужен, чтобы KDC знал, каким ключом шифровать Service Ticket для конкретного URL/сервиса. Дублирующиеся или неправильные SPN — частая причина, что Kerberos \"не работает\" и происходит fallback на NTLM.</p>"},{"a":"DELEGATION (ДЕЛЕГИРОВАНИЕ)","t":"Delegation (делегирование)","tags":[],"b":"<p>сервис может от имени пользователя обратиться к другому сервису (например, веб-сервер → SQL от имени залогиненного юзера) — Unconstrained (небезопасно, полный TGT пересылается), Constrained (KCD, ограничен списком сервисов), Resource-Based Constrained Delegation (RBCD, современный подход, настраивается на стороне ресурса, а не источника).</p>"},{"a":"KRBTGT АККАУНТ","t":"krbtgt аккаунт","tags":[],"b":"<p>критичный служебный аккаунт, его пароль нужно периодически менять (дважды, с интервалом) — при компрометации хэша krbtgt возможна атака Golden Ticket (подделка TGT с произвольными правами, \"вечный\" доступ).</p>"},{"a":"ЧАСТЫЕ ЗАДАЧИ,","t":"Частые задачи, решаемые GPO","tags":[],"b":"<h6>Безопасность и контроль доступа</h6>\n<ul><li><b>Управление паролями:</b> Настройка требований к сложности пароля, частоте его смены и блокировке учетной записи после N неудачных попыток (Default Domain Policy).</li><li><b>Блокировка экрана:</b> Принудительное завершение сеанса или блокировка компьютера после 5–15 минут бездействия.</li><li><b>Ограничение прав:</b> Запрет на доступ к панели управления, «Редактору реестра» или командной строке (для обычных пользователей).</li><li><b>Настройка брандмауэра:</b> Открытие необходимых портов или полное отключение возможности изменения правил файрвола пользователем.</li></ul>\n<h6>2. Оптимизация рабочего места (Desktop Management)</h6>\n<ul><li><b>Маппинг сетевых дисков:</b> Автоматическое подключение общих папок отдела или личного диска пользователя при входе в систему.</li><li><b>Установка принтеров:</b> Автоматическое добавление принтеров по отделам или по IP-адресу.</li><li><b>Браузеры:</b> Установка корпоративной стартовой страницы, импорт закладок, настройка прокси-сервера или запрет на установку расширений.</li><li><b>Очистка рабочего стола:</b> Принудительная установка корпоративных обоев или удаление лишних ярлыков.</li></ul>\n<h6>3. Обслуживание ПО</h6>\n<ul><li><b>Автозапуск скриптов:</b> Скрипты для сбора инвентаризации, установки специфических обновлений или очистки временных папок.</li><li><b>Установка ПО:</b> Использование GPO для развертывания MSI-пакетов (хотя для сложных задач сейчас чаще используют SCCM/Intune/Ansible).</li></ul>"},{"a":"КАК ПРАВИЛЬНО","t":"Как правильно формировать GPO (Best Practices)","tags":[],"b":"<ol><li><b>Принцип «Один GPO — одна цель»:</b> Не создавайте «монстров» вроде <i>«Все настройки для всех»</i>. Разделяйте политики по смыслу: например, <code>GPO_Browser_Chrome_Settings</code>, <code>GPO_Printers_HR</code>, <code>GPO_Security_Workstations</code>.</li><li><b>Структура OU (Organizational Units):</b> Вкладывайте объекты в правильные подразделения (OU). Политика должна наследоваться от родительского контейнера. Не стоит пытаться применить всё на уровне домена (кроме самых базовых настроек безопасности).</li><li><b>Именуйте логично:</b> Используйте префиксы. Например, разделяйте политики для компьютеров (буква <b>C</b> или <b>Comp_</b>) и пользователей (буква <b>U</b> или <b>User_</b>). Это упростит поиск в консоли GPMC.</li><li><b>Разделяйте Computer и User настройки:</b> Старайтесь не смешивать в одном GPO настройки конфигурации компьютера и пользователя. Это ускоряет обработку политик при загрузке системы.</li><li><b>Тестирование (Staging):</b><ul><li>Создайте OU «Testing».</li><li>Примените туда новую политику.</li><li>Проверьте результат на тестовых машинах командой <code>gpresult /h report.html</code> (генерирует отчет, где видно, какие политики применились и почему).</li></ul></li><li><b>Комментарии:</b> В свойствах каждого GPO есть поле «Комментарии». Пишите там, кто создал политику, зачем и когда вносились последние изменения. Через год вы скажете себе спасибо.</li><li><b>Не используйте «Block Inheritance» и «Enforced» без крайней нужды:</b> Это «тяжелые» инструменты, которые создают непредсказуемые конфликты и очень усложняют поиск причин, почему что-то не работает.</li></ol>"},{"a":"РЕЗЕРВНОЕ КОПИРОВАНИЕ","t":"Резервное копирование (Backup)","tags":[],"b":"<p>Что разворачивают: Veeam Backup, Windows Server Backup, или облачное решение. Правило 3-2-1, которое стоит упомянуть на собесе:</p>\n<p>3 копии данных 2 разных носителя 1 копия вне офиса (облако или другая площадка)</p>\n<p>«Настроил Veeam с ежедневным бэкапом виртуальных машин на локальное хранилище и еженедельной репликацией в облако. Регулярно (раз в квартал) проводили тестовое восстановление — не просто «бэкап есть», а проверка, что из него реально можно восстановиться, потому что бэкап без проверки восстановления — это иллюзия защищённости».</p>"}],"qa":[{"q":"Чем GPO отличается от локальной политики?","b":"Оба инструмента используют одни и те же механизмы настройки ОС, но принципиально различаются **масштабом и местом применения**:\n\n- **Локальная политика (Local Group Policy / `gpedit.msc`):**\n    - Настраивается и хранится **локально** на конкретном компьютере.\n    - Действует только на этот компьютер и пользователей, которые за него садятся.\n    - Применяется в последнюю очередь (ее настройки могут быть перезаписаны доменными политиками).\n- **Групповая политика домена (GPO - Group Policy Object):**\n    - Создается на контроллере домена **Active Directory**.\n    - Применяется сразу к тысячам компьютеров или пользователей в зависимости от их расположения в организационных подразделениях (OU).\n    - Позволяет централизованно обновлять настройки, устанавливать ПО и применять правила безопасности по всей компании."},{"q":"Что делает Active Directory?","b":"**Active Directory (AD)** от Microsoft — это служба каталогов, которая централизует управление всей ИТ-инфраструктурой компании. Она решает три главные задачи:\n\n- **Аутентификация (Кто ты?):** Проверка логина и пароля пользователя при входе в систему (в основном через Kerberos).\n- **Авторизация (Что тебе можно?):** Управление правами доступа к ресурсам (сетевым папкам, принтерам, базам данных) на основе групп безопасности.\n- **Централизованное управление:** Единая база данных всех пользователей, компьютеров, серверов и политик безопасности. Администратору не нужно настраивать каждый компьютер отдельно."},{"q":"FSMO роли","b":"**Роли уровня леса (Forest-wide, по одной на весь лес):**\n\n- **Schema Master** — единственный DC, на котором можно вносить изменения в схему AD (добавление новых классов/атрибутов — например, именно это делает `/PrepareSchema` при установке Exchange). Остальные DC схему только реплицируют.\n- **Domain Naming Master** — контролирует добавление/удаление доменов в лесу, следит за уникальностью имён доменов при создании нового домена/дерева в лесу.\n\n**Роли уровня домена (по одной в каждом домене):**\n\n- **PDC Emulator** — самая \"нагруженная\" роль. Отвечает за: приоритетную обработку смены паролей (чтобы не было задержки репликации при быстром логине после смены пароля), источник времени для домена (все DC и клиенты синхронизируют время по цепочке к PDC Emulator корневого домена — критично для Kerberos, который не работает при рассинхроне времени больше 5 минут), обработку блокировок аккаунтов, совместимость с legacy Windows NT BDC (сейчас не актуально), точку отсчёта для GPO (Group Policy Management Console по умолчанию редактирует политики именно через PDC Emulator во избежание конфликтов).\n- **RID Master** — выдаёт пулы RID (Relative Identifier) другим DC домена. Каждый объект AD имеет SID = domain SID + RID, RID должен быть уникален в пределах домена — RID Master распределяет блоки RID (обычно по 500) каждому DC, чтобы те могли создавать новые объекты (пользователей, компьютеры) без конфликтов номеров.\n- **Infrastructure Master** — отвечает за обновление ссылок на объекты из других доменов (например, если пользователь из домена A состоит в группе домена B и его переименовали — Infrastructure Master следит, чтобы ссылка (phantom) в домене B обновилась). Важный нюанс: **не должен находиться на Global Catalog сервере** (кроме случая, когда все DC в домене — GC, тогда это не имеет значения), иначе роль не будет работать корректно, так как GC уже знает про все объекты леса и не создаёт phantom-записи для отслеживания."},{"q":"Практическая команда для собеса:","b":"netdom query fsmo (просмотр текущих держателей ролей), перенос — Move-ADDirectoryServerOperationMasterRole, аварийный захват (seize) при недоступном DC — ntdsutil или тот же cmdlet с -Force."},{"q":"Репликация AD","b":"AD — распределённая multi-master база (на движке **ESE**, тот же движок, что у Exchange). Изменения на любом DC реплицируются на остальные через **KCC (Knowledge Consistency Checker)**, который автоматически строит топологию репликации.\n\n**Ключевые механизмы:**\n\n- **USN (Update Sequence Number)** — у каждого DC свой счётчик, увеличивается на каждое изменение. Репликация идёт через сравнение USN, а не через время — DC запрашивает у партнёра \"дай всё, что выше моего последнего known USN от тебя\".\n- **High-watermark vector** и **Up-to-dateness vector (UTD)** — таблицы, которые DC использует, чтобы не запрашивать уже полученные (в том числе транзитивно, через другого партнёра) изменения — экономия трафика.\n- **Внутри сайта (Intra-site)** — репликация частая, по умолчанию через 15 сек после изменения (уведомление партнёрам), топология — кольцо + доп. связи от KCC для отказоустойчивости, без сжатия трафика (сеть быстрая).\n- **Между сайтами (Inter-site)** — по расписанию (Site Links, по умолчанию каждые 180 минут, настраивается), с компрессией трафика, через **ISTG (Inter-Site Topology Generator)** — выбирает \"мосты\" (bridgehead servers) между сайтами, чтобы не гонять полный mesh.\n- **Конфликты** — разрешаются через версии атрибутов + timestamp + серверный GUID как tie-breaker (детерминированно, чтобы все DC пришли к одному результату).\n- **Linked-Value Replication (LVR)** — с Windows Server 2003 репликация членства в группах идёт по каждому участнику отдельно, а не всей группой целиком (раньше при одновременном добавлении разных пользователей в группу с двух DC мог \"потеряться\" один — LVR это решило)."},{"q":"Проблема, которую часто спрашивают — Lingering Objects / USN Rollback:","b":"если DC долго был offline дольше tombstone lifetime (по умолчанию 180 дней) — при возврате в сеть он может реплицировать удалённые объекты обратно (lingering objects), или при неправильном восстановлении из старого бэкапа/snapshot без USN rollback protection получить рассинхрон номеров USN — именно поэтому нельзя откатывать DC через Hyper-V checkpoint без VM-Generation ID поддержки (в современных Hyper-V это частично защищено через **VM-GenerationID**, который заставляет DC инвалидировать RID-пул и invocationID при обнаружении отката).\n\n**Команды:** `repadmin /replsummary`, `repadmin /showrepl`, `repadmin /syncall`."},{"q":"DNS зоны","b":"DNS в Windows Server (обычно интегрирован с AD) хранит записи, необходимые для работы домена (SRV-записи для поиска DC, LDAP, Kerberos — например `_ldap._tcp.dc._msdcs.domain.com`).\n\n**Типы зон по хранению:**\n\n- **Primary zone** — основная читаемая/записываемая копия зоны. Может быть **AD-интегрированной** (хранится в самой AD как объекты, реплицируется через AD replication вместе со всем остальным — предпочтительный вариант, multi-master, любой DNS-сервер на DC может писать) или **файловой (Standard Primary)** — хранится в текстовом файле на диске, только один сервер может писать (single-master, легаси-подход).\n- **Secondary zone** — read-only копия, получает данные через **зонный трансфер (AXFR — полный, IXFR — инкрементальный)** от primary. Используется, когда нужен DNS-сервер вне AD (например, у провайдера, или non-Windows DNS).\n- **Stub zone** — хранит только NS-записи + минимум для делегирования (SOA, glue-записи) — знает, \"куда спросить\", но не хранит полную зону. Используется для оптимизации делегирования между доменами/лесами без полного зонного трансфера.\n\n**Типы зон по направлению:**\n\n- **Forward Lookup Zone** — обычное разрешение имя → IP.\n- **Reverse Lookup Zone** — обратное разрешение IP → имя (зона `in-addr.arpa`), нужно для многих проверок (например, некоторые SMTP-серверы проверяют reverse DNS отправителя, PTR-запись).\n\n**Область репликации AD-интегрированной зоны (важный практический нюанс):** можно настроить — реплицировать на все DC леса, все DC домена, только на DNS-серверы домена, или на конкретный кастомный application partition (`DomainDnsZones`, `ForestDnsZones` — стандартные partition, куда по умолчанию льётся именно AD-интегрированная DNS с Windows 2003+)."},{"q":"DHCP scope","b":"**Scope** — диапазон IP-адресов, который DHCP-сервер может выдавать клиентам в определённой подсети, плюс набор параметров (опций), которые раздаются вместе с адресом.\n\n**Из чего состоит:**\n\n- Диапазон адресов (start/end IP), маска подсети.\n- **Exclusions** — адреса внутри диапазона, которые сервер не должен выдавать (например, зарезервированы под сервера со статикой).\n- **Reservations** — привязка конкретного MAC-адреса к конкретному IP (клиент всегда получает один и тот же адрес через DHCP, но администрируется централизованно, а не руками на клиенте).\n- **Lease duration** — время аренды адреса (по умолчанию 8 дней), по истечении половины срока клиент пытается продлить (renew) у того же сервера.\n- **DHCP Options** — параметры, раздаваемые вместе с адресом: Option 3 (Router/шлюз), Option 6 (DNS-серверы), Option 15 (DNS suffix), Option 66/67 (для PXE-загрузки — актуально при развёртывании тех же Windows Server через сеть) и т.д.\n\n**Отказоустойчивость DHCP (могут спросить \"как сделать HA\"):**\n\n- **DHCP Failover** (с 2012 R2) — два сервера в режиме Load Balance или Hot Standby, синхронизируют базу lease через прямое соединение — современный стандартный подход.\n- Устаревший подход — **правило 80/20** (сплит скоупа на 2 сервера в разных долях диапазона вручную) — сейчас практически не используется, есть Failover.\n\n**Взаимодействие с AD:** DHCP-сервер должен быть **авторизован в AD** (`Authorize` через DHCP-консоль или `Add-DhcpServerInDC`), иначे неавторизованный Windows DHCP-сервер сам себя отключит, обнаружив, что он в домене, но не авторизован (защита от \"случайных\" DHCP-серверов в сети)."},{"q":"GPO","b":"Механизм централизованного управления настройками компьютеров и пользователей в домене — от политик паролей до установки ПО, ограничений реестра, скриптов входа/выхода.\n\n**Структура:**\n\n- GPO хранится в двух частях: **GPC (Group Policy Container)** в AD (объект с базовыми атрибутами, ссылками, версией) и **GPT (Group Policy Template)** — файлы на SYSVOL (реальное содержимое политики: реестровые настройки, скрипты, шаблоны).\n- **Область применения (linking)** — GPO привязывается (link) к **сайту, домену или OU (организационная единица)** — именно через эту привязку определяется, на какие объекты она действует, сам GPO как объект существует отдельно от места привязки (можно один GPO привязать к нескольким OU)."},{"q":"Порядок применения  GPO (важно знать порядок — часто спрашивают LSDOU):","b":"**L**ocal → **S**ite → **D**omain → **O**U (от родительской к дочерней, с накоплением) — каждый следующий уровень может переопределить предыдущий, последний \"выигрывает\" при конфликте (кроме случая **Enforced/No Override** — принудительная политика родительского уровня не может быть переопределена дочерней; и **Block Inheritance** на OU — блокирует наследование сверху, но не блокирует Enforced-политики).\n\n**Практика применения:**\n\n- Обновление на клиентах — фоновое, каждые 90 минут ± случайное смещение до 30 минут (чтобы не было \"стада\" запросов одновременно ко всем DC), на DC — каждые 5 минут. Принудительно — `gpupdate /force`.\n- **WMI-фильтры и Security Filtering** — тонкая настройка, на какие именно компьютеры/пользователей внутри OU реально распространяется GPO (например, только на определённую модель ОС или членов конкретной группы безопасности).\n- Диагностика — `gpresult /r` или `/h` (HTML-отчёт), Group Policy Modeling (RSoP — Resultant Set of Policy) в GPMC для планирования \"что получится, если применить\"."},{"q":"Kerberos","b":"Основной протокол аутентификации в домене Windows с 2000-х (пришёл на смену NTLM как основной, NTLM остался как fallback). Билетная система, основана на **симметричном шифровании** и участии доверенной третьей стороны — **KDC (Key Distribution Center)**, которая живёт на каждом контроллере домена.\n\n**Упрощённый порядок работы (важно знать шаги для собеса):**\n\n1. **AS-REQ / AS-REP** — клиент обращается к **AS (Authentication Service, часть KDC)**, доказывает, что знает пароль (зашифровывает timestamp своим хэшем пароля), в ответ получает **TGT (Ticket Granting Ticket)** — зашифрован ключом самого KDC (krbtgt-аккаунта), клиент его содержимое прочитать не может, просто хранит и предъявляет далее.\n2. **TGS-REQ / TGS-REP** — когда клиенту нужен доступ к конкретному сервису (файловый сервер, Exchange, SQL), он предъявляет TGT в **TGS (Ticket Granting Service)**, получает **Service Ticket** — зашифрован ключом (хэшем пароля) именно **сервисного аккаунта** этого сервиса (или машинного аккаунта, если сервис работает под Local System/Network Service).\n3. **AP-REQ** — клиент предъявляет Service Ticket непосредственно сервису, тот расшифровывает своим ключом, проверяет timestamp (защита от replay-атак — поэтому критична синхронизация времени, допуск обычно 5 минут — это то, за что отвечает PDC Emulator как источник времени)."},{"q":"Почему не работает Kerberos?","b":"Kerberos — протокол взаимной аутентификации, крайне чувствительный к деталям. Если он «ломается» (и система часто откатывается на более старый NTLM), причин обычно несколько:\n\n- **Рассинхронизация времени:** Это топ-1 причина. Разница во времени между клиентом, сервером ресурсов и контроллером домена (KDC) не должна превышать **5 минут** (по умолчанию). Если время «убежало», билеты Kerberos признаются недействительными.\n- **Проблемы с SPN (Service Principal Name):** Если для учетной записи службы не настроен, настроен с ошибкой или дублируется SPN, Kerberos не сможет выдать билет на подключение к этому сервису.\n- **Проблемы с DNS:** Kerberos полностью полагается на DNS. Если клиент не может разрешить имя контроллера домена или сервера ресурсов по FQDN (например, обращается просто по IP-адресу), Kerberos работать не будет.\n- **Просроченные или поврежденные пароли учетных записей компьютеров:** Если учетная запись компьютера в домене потеряла доверие (расхождение пароля компьютера с AD), аутентификация не пройдет."},{"q":"Что такое DHCP relay?","b":"**DHCP relay (агент передачи DHCP)** — это функция, которая позволяет пересылать DHCP-запросы от клиентов к DHCP-серверу, если они находятся **в разных подсетях (VLAN)**.\n\n- По умолчанию DHCP работает на основе **широковещательных запросов (broadcast)**, которые не проходят через маршрутизатор в другие сети.\n- Если DHCP-сервер стоит в отдельной технологической сети, устройства из пользовательской сети не смогут получить IP-адрес напрямую.\n- **DHCP Relay** настраивается на маршрутизаторе (шлюзе) пользовательской сети. Он перехватывает широковещательный запрос клиента, превращает его в адресный (**unicast**) запрос и отправляет напрямую DHCP-серверу. Получив ответ, он передает его обратно клиенту."}]},{"id":"linux","u":"U5","short":"Linux CLI","full":"Команды Linux","title":"Команды Linux","eyebrow":"Командная строка","desc":"Базовый набор команд, который спрашивают на любом техническом собеседовании: файлы, права, процессы, сеть, пакеты, поиск.","cards":[{"a":"FILES","t":"Файлы и навигация","tags":[],"b":"\n      <ul>\n        <li><code>ls -la</code> — список файлов с правами и скрытыми; <code>cd</code>, <code>pwd</code> — переход/текущая директория.</li>\n        <li><code>cp -r</code>, <code>mv</code>, <code>rm -rf</code>, <code>mkdir -p</code>, <code>touch</code> — копирование, перемещение, удаление, создание.</li>\n        <li><code>cat</code> — вывод файла целиком; <code>less</code> — постраничный просмотр; <code>head -n</code> / <code>tail -n</code> — начало/конец; <code>tail -f</code> — «хвост» в реальном времени (для логов).</li>\n      </ul>"},{"a":"PERM","t":"Права доступа","tags":["ok"],"b":"\n      <p>Права <code>rwx</code> для трёх категорий: владелец / группа / остальные, в октальном виде (например <code>755</code> = rwxr-xr-x).</p>\n      <ul>\n        <li><code>chmod 755 file</code> — изменить права; <code>chown user:group file</code> — сменить владельца/группу; <code>umask</code> — маска прав по умолчанию для новых файлов.</li>\n        <li><b>SUID</b> — файл выполняется с правами владельца, а не запускающего; <b>SGID</b> — аналогично для группы (на каталогах — новые файлы наследуют группу); <b>Sticky bit</b> (например на <code>/tmp</code>) — удалять файл может только его владелец.</li>\n      </ul>"},{"a":"PROC","t":"Процессы и сервисы","tags":[],"b":"\n      <ul>\n        <li><code>ps aux</code>, <code>top</code> / <code>htop</code> — список и мониторинг процессов; <code>kill -9 PID</code>, <code>killall name</code> — завершение процесса.</li>\n        <li><code>nice</code> / <code>renice</code> — приоритет процесса; <code>&</code>, <code>jobs</code>, <code>bg</code>, <code>fg</code>, <code>nohup</code> — фоновые задачи.</li>\n        <li><code>systemctl start/stop/restart/status/enable</code> <b>service</b> — управление сервисами через systemd.</li>\n      </ul>"},{"a":"NET","t":"Сеть","tags":[],"b":"\n      <ul>\n        <li><code>ip a</code> (современный) / <code>ifconfig</code> (устаревший) — сетевые интерфейсы; <code>ip route</code> — таблица маршрутизации.</li>\n        <li><code>ss -tulnp</code> (современный) / <code>netstat -tulnp</code> — открытые порты и соединения.</li>\n        <li><code>ping</code>, <code>traceroute</code>/<code>mtr</code>, <code>curl</code>/<code>wget</code>, <code>nslookup</code>/<code>dig</code> — диагностика доступности и DNS.</li>\n        <li><code>iptables</code> / <code>firewalld</code> / <code>ufw</code> — управление межсетевым экраном.</li>\n      </ul>"},{"a":"PKG","t":"Пакетные менеджеры","tags":[],"b":"\n      <ul>\n        <li><b>Debian/Ubuntu</b>: <code>apt update && apt upgrade</code>, <code>apt install</code>, низкоуровневый <code>dpkg -i</code>.</li>\n        <li><b>RHEL/CentOS</b>: <code>dnf</code> (современный) / <code>yum</code>, низкоуровневый <code>rpm -ivh</code>.</li>\n      </ul>"},{"a":"FIND","t":"Поиск и обработка текста","tags":[],"b":"\n      <ul>\n        <li><code>find /path -name \"*.log\" -mtime -7</code> — поиск файлов по имени/дате/размеру.</li>\n        <li><code>grep -i -r \"error\" /var/log</code> — поиск текста в файлах, <code>-v</code> инвертирует, <code>-c</code> считает совпадения.</li>\n        <li><code>awk</code> — обработка колонок текста; <code>sed</code> — потоковая замена (<code>sed 's/old/new/g'</code>).</li>\n        <li><code>|</code> (pipe) и <code>xargs</code> — передача вывода одной команды на вход другой.</li>\n      </ul>"},{"a":"ARCH","t":"Архивация","tags":[],"b":"\n      <ul>\n        <li><code>tar -czvf archive.tar.gz folder/</code> — упаковка с gzip-сжатием; <code>tar -xzvf</code> — распаковка.</li>\n        <li><code>zip -r archive.zip folder/</code> / <code>unzip archive.zip</code>.</li>\n      </ul>"},{"a":"USR","t":"Пользователи и планировщик","tags":[],"b":"\n      <ul>\n        <li><code>useradd</code>/<code>usermod</code>/<code>passwd</code>/<code>userdel</code> — управление учётными записями; <code>su</code>/<code>sudo</code> — повышение прав.</li>\n        <li><code>/etc/passwd</code> — список пользователей; <code>/etc/shadow</code> — хеши паролей (только root); <code>/etc/group</code> — группы.</li>\n        <li><code>crontab -e</code> — редактирование расписания задач текущего пользователя (формат: минута час день месяц день-недели команда).</li>\n      </ul>"}]},{"id":"virt","u":"U6","short":"Hyper-V/Proxmox","full":"Hyper-V и Proxmox","title":"Hyper-V и Proxmox","eyebrow":"Виртуализация","desc":"Архитектура гипервизоров, стратегии резервного копирования, живая миграция и работа со снапшотами.","cards":[{"a":"ARCH","t":"Архитектура","tags":[],"b":"\n      <ul>\n        <li><b>Hyper-V</b> — гипервизор 1-го типа от Microsoft. <b>Родительский раздел</b> (Parent Partition, обычная ОС Windows) управляет оборудованием и создаёт <b>дочерние разделы</b> (Child Partitions) для ВМ через <b>VMBus</b>. Есть отдельный продукт Hyper-V Server (без GUI).</li>\n        <li><b>Proxmox VE</b> — платформа на базе Debian Linux, объединяет <b>KVM</b> (полная аппаратная виртуализация — «настоящие» ВМ) и <b>LXC</b> (контейнеры уровня ОС — легче, но общее ядро с хостом). Управление — веб-интерфейс + кластеризация «из коробки» (corosync).</li>\n        <li>Оба используют виртуальные коммутаторы (Hyper-V Virtual Switch / Linux bridge в Proxmox) для сети ВМ.</li>\n      </ul>"},{"a":"BKP","t":"Резервное копирование","tags":["warn"],"b":"\n      <ul>\n        <li><b>Hyper-V</b> — консистентные бэкапы «на горячую» через <b>VSS</b> (Volume Shadow Copy Service), который координирует приложения (AD, SQL) перед снятием копии. Часто используется Windows Server Backup или сторонние решения (Veeam Backup & Replication).</li>\n        <li><b>Proxmox</b> — встроенный <b>vzdump</b>: режимы <code>snapshot</code> (без остановки, минимальный простой), <code>suspend</code> (пауза ВМ на момент бэкапа) и <code>stop</code> (полная остановка — самый консистентный).</li>\n        <li><b>PBS</b> (Proxmox Backup Server) — отдельный сервер для инкрементальных бэкапов с дедупликацией и сжатием — де-факто стандарт для Proxmox.</li>\n        <li>Важно на собеседовании: снапшот ≠ бэкап (см. ниже).</li>\n      </ul>"},{"a":"MIGR","t":"Миграции","tags":[],"b":"\n      <ul>\n        <li><b>Live Migration</b> (Hyper-V/Proxmox) — перенос работающей ВМ на другой хост без остановки сервиса; требует общего хранилища (SAN/NFS/Ceph) или технологии Shared Nothing Live Migration в Hyper-V.</li>\n        <li><b>Quick Migration</b> (Hyper-V, устаревающий подход) — ВМ ставится на паузу, состояние сохраняется на диск, переносится, возобновляется — короткий, но заметный простой.</li>\n        <li><b>Storage Migration</b> — перенос дисков ВМ между хранилищами без переноса самой ВМ (или вместе с Live Migration).</li>\n        <li>Proxmox поддерживает миграцию как с общим хранилищем, так и offline-миграцию локальных дисков.</li>\n      </ul>"},{"a":"SNAP","t":"Снапшоты / чекпоинты","tags":["warn"],"b":"\n      <ul>\n        <li><b>Hyper-V Checkpoints</b>: <i>Standard</i> — сохраняет состояние памяти и диска (дерево дифференциальных .avhdx), не всегда безопасно для БД/AD; <i>Production Checkpoints</i> — используют VSS внутри гостя, консистентны для приложений.</li>\n        <li><b>Proxmox Snapshot</b> — для ВМ (KVM) может включать состояние оперативной памяти (если ВМ включена), для контейнеров (LXC) — только состояние диска.</li>\n        <li><b>Важно объяснить на собеседовании:</b> снапшот хранится на том же хранилище, что и диск, накопление снапшотов деградирует производительность и не защищает от отказа диска/хранилища — это не замена полноценному бэкапу.</li>\n      </ul>"},{"a":"VM","t":"VM (KVM)","tags":[],"b":"<p>VM — полноценная виртуальная машина.</p>\n<p>Используется технология <b>KVM</b>.</p>\n<p>Внутри можно запускать:</p>\n<ul><li>Windows Server</li><li>Linux</li><li>FreeBSD</li></ul>\n<p>VM получает:</p>\n<ul><li>CPU</li><li>RAM</li><li>виртуальный диск</li><li>сеть</li></ul>\n<p>Преимущества</p>\n<p>✔ полная изоляция</p>\n<p>✔ любое ядро ОС</p>\n<p>✔ можно запускать Windows</p>\n<p>Минус</p>\n<p>Потребляет больше ресурсов.</p>\n<hr>\n<p>На собеседовании можно сказать</p>\n<blockquote><p>VM используется для приложений, требующих полной изоляции, собственного ядра или Windows Server.</p></blockquote>"},{"a":"LXC","t":"LXC","tags":[],"b":"<p>XC — Linux Containers.</p>\n<p>Это контейнеры уровня ОС.</p>\n<p>Все контейнеры используют одно ядро Linux.</p>\n<p>Например</p>\n<pre><code>Host Kernel\n\n ├── LXC1 Ubuntu\n ├── LXC2 Debian\n ├── LXC3 Alpine</code></pre>\n<p>Контейнер стартует буквально за секунды.</p>\n<p>Плюсы</p>\n<ul><li>очень быстрый запуск</li><li>меньше RAM</li><li>меньше CPU</li><li>выше плотность размещения</li></ul>\n<p>Минусы</p>\n<p>Нельзя запускать Windows.</p>\n<hr>\n<p>Когда использовать</p>\n<p>Для:</p>\n<ul><li>GitLab Runner</li><li>Nginx</li><li>DNS</li><li>Zabbix Proxy</li><li>VPN</li><li>Jenkins</li></ul>"},{"a":"ШАБЛОНЫ","t":"Шаблоны  Proxmox","tags":[],"b":"<ul><li><b>VM Template</b> — беру уже настроенную, обновлённую ВМ (обычно с cloud-init для автоконфигурации hostname/сети/SSH-ключей при первом запуске), конвертирую в шаблон (<code>qm template &lt;id&gt;</code>) — из него дальше клонирую новые ВМ.</li><li>Два типа клонирования:<ul><li><b>Full Clone</b> — полностью независимая копия дисков, дольше создаётся, но ВМ полностью автономна.</li><li><b>Linked Clone</b> — использует диски шаблона как read-only базовый слой, хранит только разницу — быстро создаётся и экономит место, но такие клоны зависят от исходного шаблона (нельзя удалить шаблон, пока есть linked clone от него).</li></ul></li><li><b>LXC Template</b> — готовые образы контейнерных ОС из встроенного репозитория Proxmox (<code>pveam available</code>, <code>pveam download</code>), не нужно самому собирать базовый образ.</li></ul>\n<p>На практике держу «золотой образ» — обновлённая ОС + необходимые агенты (qemu-guest-agent обязательно, для корректного shutdown/backup) + базовые настройки безопасности — и разворачиваю новые серверы из него, а не настраиваю каждый вручную с нуля</p>"},{"a":"PROXMOX BACKUP","t":"Proxmox Backup Server","tags":[],"b":"<p><b>Proxmox Backup Server (PBS)</b> — отдельное приложение (ВМ или выделенный сервер) для централизованного управления бэкапами ВМ/LXC из кластера Proxmox VE.</p><ul><li><b>Инкрементальные бэкапы:</b> выгружаются только изменённые блоки данных, экономит пространство и трафик (в отличие от полной выгрузки .tar.gz).</li><li><b>Дедупликация:</b> одинаковые блоки хранятся один раз (актуально когда много контейнеров на одном шаблоне).</li><li><b>Сжатие:</b> zstd или другие алгоритмы снижают размер бэкапов на диске.</li><li><b>Восстановление:</b> через веб-интерфейс Proxmox — выбрать бэкап, дату, нажать restore.</li><li>Требует отдельную лицензию, но есть free версия. Является де-факто стандартом для боевых Proxmox-систем.</li></ul>"},{"a":"ZFS/CEPH","t":"ZFS/Ceph","tags":[],"b":"<p><b>ZFS</b> — продвинутая файловая система + менеджер томов (как LVM + mdadm в одном). <b>Copy-on-Write</b> снапшоты (мгновенные и почти бесплатные), встроенный RAID (mirror/raidz1/z2), контрольные суммы для защиты от «тихого» повреждения.</p><ul><li>ZFS в Proxmox: локальное хранилище для ВМ с хорошей производительностью и надёжностью. Требует много памяти (ARC-кэш).</li><li><b>Ceph</b> — распределённое хранилище, объединяет локальные диски нескольких узлов Proxmox в один отказоустойчивый пул. Обязателен для live migration ВМ между узлами кластера.</li><li>Ceph требует минимум 3 узла, каждый с отдельным диском для OSD (Object Storage Daemon). Мониторится через Dashboard.</li></ul>"},{"a":"PROXMOX VE","t":"Proxmox VE","tags":[],"b":"<p><b>Proxmox VE (Virtual Environment)</b> — это open-source платформа виртуализации.</p>\n<p>По сути это:</p>\n<ul><li>Debian Linux</li><li>KVM (виртуальные машины)</li><li>LXC (контейнеры)</li><li>Web UI</li><li>Кластеризация</li><li>HA</li><li>Backup</li><li>ZFS</li><li>Ceph</li></ul>\n<p>То есть аналог VMware vSphere + vCenter, только бесплатный.</p>\n<p>Архитектура</p>\n<pre><code>                WEB UI\n                   │\n        -----------------------\n        │          │         │\n     Node1      Node2     Node3\n       │           │         │\n   VM + LXC    VM + LXC   VM + LXC</code></pre>\n<p>Каждый сервер называется <b>Node</b>.</p>\n<p>Несколько Node образуют Cluster.</p>"},{"a":"КЛАСТЕРИЗАЦИЯ PROXMOX","t":"Кластеризация Proxmox","tags":[],"b":"<p>Обычно ставят 3-5 узлов.</p>\n<pre><code>+-----------+\n| Node1     |\n+-----------+\n\n+-----------+\n| Node2     |\n+-----------+\n\n+-----------+\n| Node3     |\n+-----------+\n\n       │\n   Cluster</code></pre>\n<p>Кластер позволяет</p>\n<ul><li>единый Web UI</li><li>миграция VM</li><li>HA</li><li>общее хранилище</li><li>единое управление</li></ul>"},{"a":"КЛАСТЕР PROXMOX","t":"Кластер Proxmox строится на corosync","tags":[],"b":"<p>Кластер Proxmox строится на <b>corosync</b> — это то, что обеспечивает связь между узлами и кворум. Практически:</p>\n<ul><li>Для полноценного HA нужен <b>нечётный минимум 3 узла</b> — при 2 узлах в случае разрыва связи между ними невозможно однозначно определить, какой узел «главный» (split-brain), поэтому либо третий полноценный узел, либо QDevice (лёгкий кворум-узел без ресурсов ВМ, часто разворачиваю просто как VM/контейнер вне основного кластера, например в облаке или на отдельном сервере).</li><li>Требования к сети — рекомендую отдельную (желательно выделенную, не общую с трафиком ВМ) сеть для corosync-трафика, потому что задержки в этой сети напрямую влияют на стабильность кворума. При Ceph — тем более отдельная быстрая сеть (10G+) под репликацию.</li><li>Кластер даёт: единый интерфейс управления всеми узлами, централизованное распределение ресурсов, миграцию ВМ между узлами и, собственно, основу для HA.</li></ul>"},{"a":"HA (HIGH","t":"HA (High Availability)","tags":[],"b":"<p>HA в Proxmox работает так: назначаю конкретные ВМ/контейнеры в <b>HA Group</b> — группу узлов, между которыми они могут «путешествовать». Если узел, на котором работает ВМ, выходит из строя (не отвечает по кворуму дольше заданного таймаута), Proxmox автоматически перезапускает эту ВМ на другом доступном узле группы.</p>\n<p>Важные нюансы, которые обязательно проговариваю, потому что это частый вопрос «на подвох»:</p>\n<ul><li><b>HA — это не Live Migration и не Fault Tolerance</b> — при отказе узла ВМ не «переезжает» бесшовно, она <b>перезапускается</b> на другом узле, то есть будет кратковременный простой (время на детекцию отказа + время загрузки ВМ). Это принципиально отличается от плановой Live Migration, где простоя почти нет.</li><li>Для HA обязательно нужно <b>общее хранилище</b> (Ceph, NFS, iSCSI) — если диски ВМ лежат локально на упавшем узле, восстанавливать физически нечего, другой узел просто не увидит эти диски.</li><li>Настраиваю политику приоритетов и ограничений — например, какие узлы предпочтительны для конкретной ВМ (<code>ha-manager add</code> с параметрами group/priority), чтобы критичные сервисы восстанавливались в первую очередь при массовом отказе.</li><li>Важно тестировать HA заранее (плановое отключение узла), а не полагаться на то, что «настроил и работает» — характерная ошибка, аналогичная непроверенным бэкапам.</li></ul>"}],"qa":[{"q":"Когда предпочитают LXC","b":"Для сервисов Linux без необходимости собственного ядра предпочитаю LXC из-за высокой производительности и меньшего потребления ресурсов."},{"q":"Резервное копирование (Proxmox Backup Server)","b":"Разделяю на встроенный **vzdump** и отдельный **PBS**:\n\n- **vzdump** — встроенный инструмент, три режима: `snapshot` (без остановки ВМ, минимальный простой, зависит от поддержки снапшотов используемым storage), `suspend` (кратковременная пауза ВМ на момент снятия копии) и `stop` (полная остановка — самый консистентный вариант, но с даунтаймом). Для критичных сервисов стараюсь использовать `snapshot` при хранилище, которое его поддерживает (ZFS/Ceph/qcow2), чтобы избежать простоя.\n- **Proxmox Backup Server** — это то, что я разворачиваю отдельно (физически отдельный сервер или хотя бы отдельный диск/хранилище) именно потому, что бэкапы не должны лежать там же, где рабочие данные:\n    - Инкрементальные бэкапы на уровне блоков с дедупликацией — после первого полного бэкапа последующие переносят только изменившиеся чанки данных, экономия места и времени существенная.\n    - **Verify Jobs** — регулярная автоматическая проверка целостности бэкапов (не просто «файл лежит», а реально читаемый и восстанавливаемый).\n    - Политика хранения (retention): keep-last / keep-daily / keep-weekly / keep-monthly / keep-yearly — настраиваю по требованиям бизнеса (например, ежедневные копии за неделю, еженедельные за месяц, ежемесячные за год).\n    - **Remote Sync** — синхронизация между двумя PBS (например, основной ЦОД и резервная площадка) — это и есть моя off-site копия по правилу 3-2-1.\n    - File Restore — можно восстановить не всю ВМ, а один файл прямо из бэкапа, не разворачивая всю машину — экономит время в большинстве обращений («верните мне этот файл, который я случайно удалил»).\n\nОбязательно провожу **тестовые восстановления** на регулярной основе (не реже раза в квартал) — бэкап без проверенного восстановления это просто файл, а не гарантия. Многие компании узнают о проблеме с бэкапами именно в момент реальной аварии, когда уже поздно"},{"q":"ZFS/Ceph","b":"Это выбор хранилища, и я всегда объясняю его как компромисс между простотой и отказоустойчивостью на уровне узла:\n\n**ZFS** — использую как локальное хранилище на каждом отдельном узле (или паре узлов без Ceph):\n\n- Комбинация файловой системы и менеджера томов «в одном» (аналог LVM+mdadm).\n- Copy-on-Write — снапшоты и клоны создаются мгновенно и почти бесплатно по месту.\n- Встроенные контрольные суммы каждого блока — защита от silent corruption (тихого повреждения данных), которую RAID сам по себе не даёт.\n- Требователен к RAM (ARC-кэш) — при планировании сервера с ZFS всегда закладываю дополнительную память сверх потребностей самих ВМ.\n- Минус — не переживает выход из строя целого сервера, это чисто локальная отказоустойчивость (на уровне дисков, не узла).\n\n**Ceph** — разворачиваю, когда нужна отказоустойчивость на уровне целого узла и полноценная Live Migration без простоя между любыми серверами кластера:\n\n- Распределённое хранилище — несколько узлов объединяют локальные диски в единый пул, данные реплицируются между узлами (обычно 3 копии).\n- Компоненты: **OSD** (демон на каждый физический диск), **Monitor** (карта кластера, кворум), **Manager** (метрики/веб-панель).\n- Требует минимум 3 узла для разумной репликации и отдельную быструю сеть (рекомендую 10G+) — иначе репликация между узлами станет узким местом производительности.\n- Именно общий Ceph-пул делает возможной беспрепятственную Live Migration ВМ между любыми узлами кластера, так как хранилище физически общее, а не привязано к конкретному серверу.\n\n**Как формулирую выбор на собеседовании**: для небольшой инсталляции (1-2 узла, ограниченный бюджет) — ZFS локально плюс регулярный бэкап на PBS. Для кластера от 3 узлов с требованием реальной отказоустойчивости и бесшовной миграции — Ceph, при условии, что есть бюджет на нормальную сеть под репликацию. Комбинировать оба подхода в одном кластере тоже нормально — часть узлов с ZFS для локальных некритичных ВМ, часть ресурсов на Ceph для критичных сервисов, требующих HA"},{"q":"Как устроена сеть ВМ?","b":"виртуальные коммутаторы (Linux bridge, vmbr0 и т.д.), VLAN-aware bridge позволяет тегировать VLAN прямо на уровне бриджа без создания отдельного интерфейса на каждый VLAN"},{"q":"Что такое SDN в Proxmox?","b":"относительно новая фича (Software-Defined Networking), позволяет управлять VLAN/VXLAN зонами централизованно через веб-интерфейс кластера, а не руками на каждом узле"},{"q":"Как разграничиваете права?","b":"Proxmox использует ролевую модель (Datacenter → Permissions): Realm (PAM/PVE/LDAP/AD), User, Group, Role (набор привилегий), Pool (группировка ресурсов для делегирования прав конкретной команде на конкретные ВМ)."},{"q":"Как настраивали 2FA?","b":"встроенная поддержка TOTP на уровне пользователя, полезно продемонстрировать понимание, что веб-интерфейс — не единственная точка входа (есть ещё SSH на сами узлы, который тоже нужно защищать отдельно)"},{"q":"Как обновляете кластер?","b":"по одному узлу за раз (rolling update), сначала мигрирую ВМ с обновляемого узла на другие (или полагаюсь на HA/Live Migration), затем apt update && apt dist-upgrade, проверяю, что узел вернулся в кворум, только потом следующий узел."},{"q":"Что такое no-subscription репозиторий и чем отличается от enterprise?","b":"enterprise требует платной подписки, но даёт более консервативный, протестированный поток обновлений; no-subscription бесплатный, но обновления идут быстрее и менее «выдержаны» — для продакшна многие всё равно используют no-subscription, но осознанно, с тестированием на некритичных узлах сначала."},{"q":"Как мониторите Proxmox?","b":"строенные метрики можно отдавать во внешние системы (Zabbix через агент или SNMP, Prometheus через pve-exporter), плюс встроенные email-уведомления о статусе backup job'ов и HA-событиях"},{"q":"Как переносите ВМ между разными кластерами (не внутри одного)?","b":"qm remote-migration (появилось в поздних версиях) либо экспорт/импорт через backup (vzdump → restore на другом кластере), либо ручной перенос дисков."},{"q":"Что делать при полном отказе узла без HA?","b":"восстановление ВМ из PBS-бэкапа на другом узле — поэтому тестовые восстановления и регулярные бэкапы критичны даже при наличии HA."},{"q":"В чём разница между снапшотом и клоном?","b":"снапшот фиксирует состояние существующей ВМ во времени (для отката), клон создаёт новую независимую (или связанную) ВМ на основе существующей. Снапшот — не бэкап (хранится на том же диске/хранилище)."},{"q":"Что делать если VM не запускается?","b":"- Шаг 1: Анализ ошибки в панели управления\n    \n    Первым делом смотрим на конкретный текст ошибки, который выдает гипервизор (vCenter, Proxmox GUI и т.д.) при попытке запуска. Часто там прямо написана причина.\n    \n- Шаг 2: Проверка ресурсов хоста\n    - **Свободное место на СХД:** Самая частая причина. Если на хранилище, где лежат диски ВМ, осталось 0 байт, машина не запустится (ей банально негде создать файл подкачки `.vswp` или файлы логов).\n    - **Оперативная память (RAM):** Хватает ли физической памяти на хосте для выделения под ВМ? Если включена жесткая резервация памяти, а хост перегружен, запуск заблокируется.\n    - **Процессор:** Не превышены ли лимиты, или, возможно, ВМ была перенесена с хоста с более новой архитектурой процессора на старый, и CPU не поддерживает нужные инструкции.\n- Шаг 3: Проверка файлов конфигурации и блокировок\n    - **Заблокированные файлы (Locks):** Если ВМ некорректно завершила работу или «отвалилась» от бэкапа, файлы её дисков могут остаться заблокированными (например, файлы `.lck` в VMware). Нужно снять блокировку или перезапустить менеджмент-службы хоста.\n    - **Целостность дисков:** Не поврежден ли конфигурационный файл ВМ (например, `.vmx` или `.xml`) или дескриптор виртуального диска.\n- Шаг 4: Чтение логов (Святая святых)\n    \n    Если интерфейс выдает общую ошибку вроде *«An error occurred»*, нужно подключаться к хосту по SSH и смотреть логи самого гипервизора (например, `vmware.log` в папке с ВМ или `/var/log/pve/tasks/` в Proxmox). Логи всегда говорят правду."},{"q":"Что такое live migration?","b":"**Живая миграция)** — это технология, которая позволяет переместить включенную виртуальную машину с одного физического сервера (хоста) на другой **без остановки её работы** и незаметно для пользователей.\n\nВ разных гипервизорах она называется по-разному: **vMotion** в VMware, **Live Migration** в Hyper-V / Proxmox.\n\n- Как это работает (на пальцах):\n    - **Синхронизация памяти:** Гипервизор начинает копировать оперативную память ВМ с исходного хоста на целевой. Так как ВМ в этот момент работает, память постоянно меняется. Изменившиеся блоки (грязные страницы / dirty pages) копируются повторно.\n    - **Финальный перенос:** Когда непереданной памяти остается совсем мало, гипервизор на доли секунды «замораживает» ВМ на первом хосте, переносит последние измененные байты и регистры процессора, и тут же «размораживает» её на втором хосте.\n    - **Переключение сети:** Целевой хост отправляет в физическую сеть специальный пакет (GARP), чтобы сетевые коммутаторы узнали, что этот MAC-адрес теперь находится на другом порту. Пользователи замечают это максимум как потерю одного пакета (`ping`)."}],"scripts":[{"t":"Массовый backup с уведомлением в Telegram","code":"#!/bin/bash\n# /usr/local/bin/pve-backup-notify.sh\n# Запускать после штатного vzdump job'а или по cron\n\nBOT_TOKEN=\"ВАШ_ТОКЕН\"\nCHAT_ID=\"ВАШ_CHAT_ID\"\nLOG=$(tail -n 50 /var/log/vzdump/*.log 2>/dev/null | grep -E \"ERROR|Failed\")\n\nif [ -n \"$LOG\" ]; then\n    MSG=\"⚠️ Ошибки в бэкапе Proxmox:%0A${LOG}\"\nelse\n    MSG=\"✅ Бэкапы Proxmox завершены без ошибок ($(date '+%Y-%m-%d %H:%M'))\"\nfi\n\ncurl -s -X POST \"https://api.telegram.org/bot${BOT_TOKEN}/sendMessage\" \\\n    -d chat_id=\"${CHAT_ID}\" \\\n    -d text=\"${MSG}\""},{"t":"Проверка статуса кластера и кворума (для мониторинга/cron)","code":"#!/bin/bash\n# /usr/local/bin/pve-cluster-check.sh\n\nQUORUM=$(pvecm status | grep \"Quorate\" | awk '{print $2}')\nNODES_ONLINE=$(pvecm nodes | grep -c \"1   \")\nNODES_TOTAL=$(pvecm nodes | tail -n +3 | wc -l)\n\necho \"Кворум: ${QUORUM}\"\necho \"Узлов онлайн: ${NODES_ONLINE}/${NODES_TOTAL}\"\n\nif [ \"$QUORUM\" != \"Yes\" ]; then\n    echo \"КРИТИЧНО: кластер потерял кворум!\"\n    exit 2\nfi\n\nif [ \"$NODES_ONLINE\" -lt \"$NODES_TOTAL\" ]; then\n    echo \"ПРЕДУПРЕЖДЕНИЕ: не все узлы онлайн\"\n    exit 1\nfi\n\nexit 0"},{"t":"Массовое создание LXC-контейнеров из шаблона (bootstrap для тестового стенда)","code":"#!/bin/bash\n# /usr/local/bin/pve-mass-lxc.sh\n# Использование: ./pve-mass-lxc.sh 3   (создаст 3 контейнера)\n\nTEMPLATE=\"local:vztmpl/debian-12-standard_12.7-1_amd64.tar.zst\"\nSTORAGE=\"local-lvm\"\nBRIDGE=\"vmbr0\"\nSTART_ID=200\nCOUNT=${1:-1}\n\nfor i in $(seq 1 \"$COUNT\"); do\n    CTID=$((START_ID + i))\n    HOSTNAME=\"test-ct-${CTID}\"\n    pct create \"$CTID\" \"$TEMPLATE\" \\\n        --hostname \"$HOSTNAME\" \\\n        --storage \"$STORAGE\" \\\n        --memory 512 \\\n        --cores 1 \\\n        --net0 name=eth0,bridge=${BRIDGE},ip=dhcp \\\n        --unprivileged 1 \\\n        --onboot 0\n    pct start \"$CTID\"\n    echo \"Создан и запущен контейнер ${CTID} (${HOSTNAME})\"\ndone"},{"t":"Проверка места на ZFS-пуле с алертом","code":"#!/bin/bash\n# /usr/local/bin/pve-zfs-check.sh\n\nTHRESHOLD=80   # процент заполнения, при котором алертить\n\nzpool list -H -o name,capacity | while read -r POOL CAP; do\n    USAGE=${CAP%\\%}\n    if [ \"$USAGE\" -ge \"$THRESHOLD\" ]; then\n        echo \"ВНИМАНИЕ: пул ${POOL} заполнен на ${USAGE}% (порог ${THRESHOLD}%)\"\n        # тут можно добавить отправку в Zabbix/Telegram\n    fi\ndone\n\n# Также проверка на ошибки/деградацию массива\nzpool status | grep -E \"DEGRADED|FAULTED|UNAVAIL\" && \\\n    echo \"КРИТИЧНО: обнаружены проблемы с дисками в пуле!\""},{"t":"Автоматическая остановка/запуск ВМ по расписанию (например, тестовый стенд ночью выключать)","code":"#!/bin/bash\n# /usr/local/bin/pve-schedule-shutdown.sh\n# Пример: остановить группу тестовых ВМ по списку ID\n\nVM_LIST=\"201 202 203 204\"\n\nfor VMID in $VM_LIST; do\n    STATUS=$(qm status \"$VMID\" | awk '{print $2}')\n    if [ \"$STATUS\" == \"running\" ]; then\n        echo \"Останавливаю VM ${VMID}...\"\n        qm shutdown \"$VMID\" --timeout 60\n    else\n        echo \"VM ${VMID} уже остановлена (статус: ${STATUS})\"\n    fi\ndone"},{"t":"Экспорт списка всех ВМ/контейнеров кластера с ключевыми параметрами (инвентаризация для отчёта)","code":"#!/bin/bash\n# /usr/local/bin/pve-inventory.sh\n# Выгружает CSV: ID, имя, тип, узел, статус, память, диск\n\necho \"VMID;Name;Type;Node;Status;Memory(MB);Disk\"\n\nfor NODE in $(pvecm nodes | tail -n +3 | awk '{print $3}'); do\n    ssh \"$NODE\" \"qm list\" 2>/dev/null | tail -n +2 | while read -r VMID NAME STATUS MEM DISK PID; do\n        echo \"${VMID};${NAME};VM;${NODE};${STATUS};${MEM};${DISK}\"\n    done\n    ssh \"$NODE\" \"pct list\" 2>/dev/null | tail -n +2 | while read -r CTID STATUS LOCK NAME; do\n        echo \"${CTID};${NAME};LXC;${NODE};${STATUS};;\"\n    done\ndone > /tmp/pve-inventory-$(date +%F).csv\n\necho \"Готово: /tmp/pve-inventory-$(date +%F).csv\""},{"t":"Тестовое восстановление из PBS с автоматической проверкой (важно для практики \"тестовые восстановления\")","code":"#!/bin/bash\n# /usr/local/bin/pve-test-restore.sh\n# Восстанавливает последний бэкап ВМ во временный VMID для проверки\n\nSOURCE_VMID=100\nTEST_VMID=999\nPBS_STORAGE=\"pbs-backup\"\n\n# Найти последний снапшот бэкапа\nLATEST=$(pvesm list \"$PBS_STORAGE\" | grep \"vm/${SOURCE_VMID}\" | tail -n 1 | awk '{print $1}')\n\nif [ -z \"$LATEST\" ]; then\n    echo \"Бэкап для VM ${SOURCE_VMID} не найден!\"\n    exit 1\nfi\n\necho \"Восстанавливаю ${LATEST} во временную VM ${TEST_VMID}...\"\nqmrestore \"$LATEST\" \"$TEST_VMID\" --storage local-lvm\n\necho \"Запускаю тестовую VM...\"\nqm start \"$TEST_VMID\"\nsleep 30\n\n# Простая проверка, что ВМ реально поднялась (пингуется)\nTEST_IP=$(qm guest cmd \"$TEST_VMID\" network-get-interfaces 2>/dev/null | grep -oP '(?<=\"ip-address\":\")[0-9.]+' | head -n 1)\nif [ -n \"$TEST_IP\" ] && ping -c 2 \"$TEST_IP\" &>/dev/null; then\n    echo \"✅ Тестовое восстановление успешно, VM отвечает на ${TEST_IP}\"\nelse\n    echo \"⚠️ VM запущена, но не отвечает на пинг — требуется ручная проверка\"\nfi\n\necho \"Не забудьте удалить тестовую VM: qm stop ${TEST_VMID} && qm destroy ${TEST_VMID}\""}]},{"id":"vpn","u":"U7","short":"VPN и туннели","full":"VPN и туннелирование","title":"VPN и туннелирование","eyebrow":"Защищённая связность сетей","desc":"Типы VPN, топологии (звезда/mesh), детально IPsec Site-to-Site, базовые принципы туннелирования и аутентификации.","extra":"<div class=\"subhead\">Топология «звезда» (Hub-and-Spoke)</div>\n  <div class=\"diagram\">                 ┌───────────────┐\n                 │   Офис-ХАБ    │\n                 │ (центральный  │\n                 │   маршрутизатор)\n                 └───────┬───────┘\n        IPsec-туннель ┌──┼──┐ IPsec-туннель\n                       │  │  │\n                 ┌─────┘  │  └─────┐\n                 ▼        ▼        ▼\n             Филиал 1  Филиал 2  Филиал 3\n\nФилиалы не видят друг друга напрямую — весь трафик\nмежду ними идёт через ХАБ. Просто добавлять новые\nточки, но ХАБ — единая точка отказа и узкое место.</div>","cards":[{"a":"TYPES","t":"Типы VPN — классификация","tags":["ok"],"b":"\n      <p>Удобно делить VPN по двум независимым осям: <b>что соединяем</b> и <b>каким протоколом</b>.</p>\n      <ul>\n        <li><b>По архитектуре:</b> <i>Site-to-Site</i> — постоянное соединение двух и более офисов/датацентров через шлюзы; <i>Remote Access (Client-to-Site)</i> — подключение отдельного удалённого сотрудника к сети офиса.</li>\n        <li><b>По протоколу:</b> <b>IPsec</b> (стандарт для Site-to-Site, работает на сетевом уровне), <b>SSL/TLS VPN</b> (OpenVPN, AnyConnect — удобен для удалённых пользователей, проходит почти через любой файрвол по 443 порту), <b>WireGuard</b> (современный, лёгкий, минималистичный код), устаревшие <b>PPTP/L2TP без IPsec</b> (небезопасны, применять не стоит).</li>\n      </ul>"},{"a":"TOPO","t":"Топологии сетей поверх VPN","tags":[],"b":"\n      <ul>\n        <li><b>Звезда (Hub-and-Spoke)</b> — все филиалы туннелируются в один центральный узел (ХАБ, обычно ЦОД/головной офис). Просто масштабировать, централизованный контроль трафика и политик, но ХАБ — единая точка отказа, а трафик между двумя филиалами делает «крюк» через хаб.</li>\n        <li><b>Полная сетка (Full Mesh)</b> — каждый узел соединён с каждым напрямую. Минимальные задержки между любой парой точек, но количество туннелей растёт квадратично (N×(N-1)/2) — сложно администрировать при большом числе площадок.</li>\n        <li><b>Частичная сетка (Partial/Hybrid Mesh)</b> — прямые туннели только между самыми «горячими» по трафику парами точек, остальное — через хаб. Компромисс, который реально чаще всего встречается в проде.</li>\n      </ul>"},{"a":"IPSEC","t":"IPsec Site-to-Site — как это реализуется","tags":["warn"],"b":"\n      <p>IPsec — не один протокол, а набор протоколов, работающих на сетевом уровне (L3), обычно реализуется на пограничных маршрутизаторах/файрволах офисов.</p>\n      <ul>\n        <li><b>Фаза IKE1 (Internet Key Exchange, фаза 1)</b> — стороны аутентифицируют друг друга (по <i>Pre-Shared Key</i> или сертификатам) и договариваются об алгоритмах шифрования/хеширования, создают защищённый управляющий канал — <b>IKE SA</b>.</li>\n        <li><b>Фаза IKE2 (фаза 2)</b> — внутри уже защищённого канала фазы 1 согласуются параметры для передачи реальных данных — создаются <b>IPsec SA</b> (Security Association), по одной в каждую сторону.</li>\n        <li><b>ESP</b> (Encapsulating Security Payload) — протокол, который реально шифрует и проверяет целостность пользовательских данных (используется почти всегда). <b>AH</b> (Authentication Header) — только проверка целостности/подлинности без шифрования, на практике почти не используется.</li>\n        <li><b>Tunnel mode</b> (для Site-to-Site) — шифруется весь исходный IP-пакет целиком и оборачивается в новый заголовок с адресами шлюзов. <b>Transport mode</b> — шифруется только полезная нагрузка, IP-заголовок исходный (чаще для host-to-host, не для межофисных туннелей).</li>\n        <li><b>Interesting traffic / ACL</b> — на каждом шлюзе задаётся список подсетей, трафик между которыми должен уходить в туннель, а не в открытый интернет.</li>\n        <li><b>NAT-T</b> (NAT Traversal) — если один из шлюзов находится за NAT, IPsec-пакеты дополнительно оборачиваются в UDP (порт 4500), иначе NAT ломает ESP.</li>\n      </ul>"},{"a":"TUNNEL","t":"Базовые принципы туннелирования","tags":[],"b":"\n      <p>Туннелирование — это инкапсуляция одного пакета внутрь другого, чтобы протащить трафик через сеть, которая сама по себе его бы не пропустила или не защитила.</p>\n      <ul>\n        <li><b>Инкапсуляция</b> — исходный пакет целиком становится «полезной нагрузкой» нового пакета с новыми заголовками (адреса шлюзов вместо адресов реальных хостов).</li>\n        <li><b>Шифрование (confidentiality)</b> — содержимое нельзя прочитать при перехвате (AES — типичный алгоритм в современных IPsec/OpenVPN/WireGuard конфигурациях).</li>\n        <li><b>Целостность (integrity)</b> — гарантия, что пакет не был изменён в пути (HMAC на основе SHA-256 и т.п.).</li>\n        <li>Туннель не обязан быть зашифрованным (например, простой <b>GRE</b>-туннель — только инкапсуляция без защиты), поэтому GRE часто оборачивают дополнительно в IPsec (<i>GRE over IPsec</i>), чтобы получить и произвольную маршрутизацию (GRE поддерживает multicast/динамические протоколы), и шифрование.</li>\n      </ul>"},{"a":"SSLVPN","t":"SSL/TLS VPN и WireGuard — коротко","tags":[],"b":"\n      <ul>\n        <li><b>OpenVPN</b> — работает поверх UDP/TCP (часто 443 порт, что удобно проходит через большинство файрволов), использует виртуальные интерфейсы <code>TUN</code> (уровень L3, маршрутизация) или <code>TAP</code> (уровень L2, как будто общий Ethernet-сегмент).</li>\n        <li><b>WireGuard</b> — современный VPN с минимальным, легко аудируемым кодом ядра, использует современную криптографию по умолчанию (без выбора «слабых» алгоритмов), очень быстрый и простой в конфигурации (по сути один конфиг-файл на каждую сторону).</li>\n        <li>Оба чаще применяются для Remote Access и небольших Site-to-Site, тогда как «тяжёлый» межофисный IPsec остаётся стандартом на промышленном сетевом оборудовании (Cisco, MikroTik, FortiGate и т.п.).</li>\n      </ul>"},{"a":"AUTH","t":"Аутентификация в VPN","tags":[],"b":"\n      <ul>\n        <li><b>Pre-Shared Key (PSK)</b> — общий секретный ключ, заранее настроенный на обеих сторонах туннеля. Просто, но плохо масштабируется (при компрометации нужно менять на всех точках) — типично для небольших Site-to-Site.</li>\n        <li><b>Сертификаты (PKI)</b> — каждая сторона имеет свой сертификат, подписанный общим доверенным центром (CA); масштабируется лучше, проще отозвать доступ одной точке без пересборки всех остальных.</li>\n        <li><b>Для Remote Access</b> — дополнительно часто используется связка с <b>RADIUS/LDAP/AD</b> (проверка логина-пароля пользователя) и <b>MFA</b> (одноразовый код/push) поверх базовой аутентификации туннеля.</li>\n        <li><b>EAP</b> (Extensible Authentication Protocol) — гибкий фреймворк аутентификации, часто используется в связке с IEEE 802.1X и Remote Access VPN для интеграции с корпоративным каталогом пользователей.</li>\n      </ul>"},{"a":"РАБОТА С","t":"работа с pfSense","tags":[],"b":"<p><b>pfSense/OPNsense</b> — маршрутизатор и файрвол на базе FreeBSD для граничной защиты сети. Основная конфигурация: WAN (интернет), LAN (внутренняя сеть), NAT, firewall rules, VPN, DHCP, DNS.</p><ul><li>Для Asterisk за NAT: port forward 5060 (SIP) и 16000-32000 (RTP) на внутренний IP АТС.</li><li>Для Exchange: port forward 25, 465, 587 (SMTP), 143, 993 (IMAP).</li><li>Для 1С: port forward 1540 (кластер), 1433 (SQL).</li><li>Для любого сервиса: правильно настроить NAT + ACL, убедиться что обратный трафик работает.</li></ul>"},{"a":"OPNSENSE","t":"OPNsense","tags":[],"b":"<p><b>OPNsense</b> — форк pfSense на базе того же кода FreeBSD, но с более частыми обновлениями, лучшей поддержкой сообщества и современным UI. Функционально идентичен pfSense, выбирается по предпочтениям команды.</p><ul><li>Преимущества: быстрее патчится, активнее развивается, лучше документирован.</li><li>Конфигурация идентична pfSense: web UI, SSH CLI, API, Winbox-like интерфейс.</li><li>Backup/Restore конфигурации через XML-файл.</li></ul>"},{"a":"НАСТРОЙКА ACL","t":"настройка ACL","tags":[],"b":"<p><b>ACL (Access Control List)</b> — список правил на маршрутизаторе/файрволе для фильтрации трафика по IP-адресам, портам, протоколам. Имеют приоритет: правила проверяются сверху вниз, первый match выполняется.</p><ul><li><b>Стандартная ACL</b> — фильтрует только по source IP.</li><li><b>Extended ACL</b> — фильтрует по source/dest IP, портам, протоколам, флагам TCP.</li><li><b>Named ACL</b> — удобнее управлять: вместо номеров используются имена (network_office, servers_group и т.п.).</li><li>Применяется на интерфейсах (inbound/outbound) или как правило firewall между сетевыми сегментами.</li></ul>"},{"a":"WIREGUARD","t":"WireGuard","tags":[],"b":"<ul><li>современный VPN-протокол, разработанный существенно позже IPsec/OpenVPN с целью радикально упростить и то, и другое. Ключевые отличия, которые я всегда проговариваю::<ul><li><b>Минимализм кода</b> — весь протокол уместился примерно в 4000 строк кода (для сравнения, у IPsec-стека и OpenVPN — десятки тысяч строк) — меньше поверхность для уязвимостей и проще независимый аудит.</li><li><b>Нет выбора алгоритмов</b> — в отличие от IPsec, где нужно вручную согласовывать шифры/хеши/DH-группы (и легко ошибиться), WireGuard использует фиксированный, современный набор криптографии \"по умолчанию\" (Curve25519 для обмена ключами, ChaCha20 для шифрования, Poly1305 для целостности, BLAKE2s для хеширования) — меньше пространство для ошибки конфигурации.</li><li><b>Модель конфигурации похожа на SSH</b> — каждый пир идентифицируется парой публичный/приватный ключ, а не сложными политиками IKE. Конфиг буквально: свой приватный ключ + список пиров с их публичными ключами и разрешёнными подсетями (AllowedIPs).</li><li><b>Работает поверх UDP</b>, встроен в ядро Linux начиная с 5.6 — за счёт этого показывает более высокую производительность, чем userspace-реализации OpenVPN.</li><li><b>Ограничение</b>, которое всегда упоминаю: у него нет \"из коробки\" road-warrior механизма вроде DHCP — каждому клиенту IP-адрес прописывается статически в конфиге, плюс нет встроенной интеграции с корпоративными каталогами (AD/LDAP/RADIUS) — если нужна такая интеграция, обычно добавляют внешнюю обвязку (например, через веб-панель типа WireGuard Easy или Netbird/Tailscale поверх него).</li></ul></li></ul>"}],"scripts":[{"t":"IPsec Site-to-Site (MikroTik RouterOS)   Сценарий: Офис А (192.168.10.0/24, внешний IP 203.0.113.1) ↔ Офис Б (192.168.20.0/24, внешний IP 198.51.100.1).","code":"# --- Phase 1 (IKE) profile ---\n/ip ipsec profile\nadd name=office-b-profile \\\n    dh-group=modp2048 \\\n    enc-algorithm=aes-256 \\\n    hash-algorithm=sha256 \\\n    lifetime=1d\n\n# --- Peer (адрес второй стороны + аутентификация) ---\n/ip ipsec peer\nadd name=office-b \\\n    address=198.51.100.1/32 \\\n    profile=office-b-profile \\\n    exchange-mode=ike2\n\n/ip ipsec identity\nadd peer=office-b \\\n    auth-method=pre-shared-key \\\n    secret=\"ОченьДлинныйСложныйКлюч123!\" \\\n    generate-policy=no\n\n# --- Phase 2 (proposal) ---\n/ip ipsec proposal\nadd name=office-b-proposal \\\n    auth-algorithms=sha256 \\\n    enc-algorithms=aes-256-cbc \\\n    pfs-group=modp2048 \\\n    lifetime=8h\n\n# --- Policy: какой трафик шифруем (interesting traffic) ---\n/ip ipsec policy\nadd peer=office-b \\\n    src-address=192.168.10.0/24 \\\n    dst-address=192.168.20.0/24 \\\n    proposal=office-b-proposal \\\n    tunnel=yes\n\n# --- Firewall: пропустить IKE и ESP на внешнем интерфейсе ---\n/ip firewall filter\nadd chain=input protocol=udp dst-port=500,4500 action=accept comment=\"IPsec IKE/NAT-T\"\nadd chain=input protocol=ipsec-esp action=accept comment=\"IPsec ESP\""},{"t":"Офис Б — зеркальная конфигурация (address/secret одинаковый, src/dst подсети меняются местами):","code":"/ip ipsec peer\nadd name=office-a address=203.0.113.1/32 profile=office-a-profile exchange-mode=ike2\n\n/ip ipsec identity\nadd peer=office-a auth-method=pre-shared-key secret=\"ОченьДлинныйСложныйКлюч123!\" generate-policy=no\n\n/ip ipsec policy\nadd peer=office-a src-address=192.168.20.0/24 dst-address=192.168.10.0/24 proposal=office-a-proposal tunnel=yes"},{"t":"Проверка:","code":"/ip ipsec active-peers print     # должен быть established\n/ip ipsec policy print stats     # растут ли счётчики байт\n/ping 192.168.20.1 src-address=192.168.10.1   # пинг между внутренними хостами, не шлюзами"},{"t":"WireGuard (Linux, сервер + клиент) Сервер (/etc/wireguard/wg0.conf):","code":"[Interface]\nAddress = 10.10.0.1/24\nListenPort = 51820\nPrivateKey = <приватный_ключ_сервера>\n# NAT для клиентов, выходящих в интернет через сервер\nPostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE\nPostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE\n\n[Peer]\n# Клиент 1 (ноутбук сотрудника)\nPublicKey = <публичный_ключ_клиента1>\nAllowedIPs = 10.10.0.2/32\n\n[Peer]\n# Site-to-Site с офисом Б — сюда пускаем всю их подсеть\nPublicKey = <публичный_ключ_офиса_Б>\nAllowedIPs = 10.10.0.3/32, 192.168.20.0/24"},{"t":"Клиент (/etc/wireguard/wg0.conf на клиентской машине):","code":"[Interface]\nAddress = 10.10.0.2/24\nPrivateKey = <приватный_ключ_клиента1>\nDNS = 192.168.10.1\n\n[Peer]\nPublicKey = <публичный_ключ_сервера>\nEndpoint = 203.0.113.1:51820\nAllowedIPs = 0.0.0.0/0    # весь трафик через VPN (full tunnel)\n# AllowedIPs = 192.168.10.0/24   # только доступ к офису (split tunnel)\nPersistentKeepalive = 25   # важно, если клиент за NAT"},{"t":"Генерация ключей и запуск:","code":"wg genkey | tee privatekey | wg pubkey > publickey\nsudo apt install wireguard\nsudo wg-quick up wg0\nsudo systemctl enable wg-quick@wg0   # автозапуск\n\n# Проверка\nsudo wg show"},{"t":"OpenVPN (Linux, сервер + клиент) Генерация PKI (easy-rsa):","code":"sudo apt install easy-rsa\nmake-cadir ~/easy-rsa && cd ~/easy-rsa\n./easyrsa init-pki\n./easyrsa build-ca nopass\n./easyrsa gen-req server nopass\n./easyrsa sign-req server server\n./easyrsa gen-dh\nopenvpn --genkey secret ta.key   # доп. защита от DoS/TLS-flood"},{"t":"Сервер (/etc/openvpn/server.conf):","code":"port 1194\nproto udp\ndev tun\n\nca ca.crt\ncert server.crt\nkey server.key\ndh dh.pem\ntls-auth ta.key 0\n\ntopology subnet\nserver 10.20.0.0 255.255.255.0\npush \"route 192.168.10.0 255.255.255.0\"\npush \"dhcp-option DNS 192.168.10.1\"\n\nkeepalive 10 120\ncipher AES-256-GCM\nauth SHA256\npersist-key\npersist-tun\n\nuser nobody\ngroup nogroup\nstatus /var/log/openvpn-status.log\nverb 3"},{"t":"Клиентский сертификат:","code":"./easyrsa gen-req client1 nopass\n./easyrsa sign-req client client1"},{"t":"Клиент (client1.ovpn):","code":"client\ndev tun\nproto udp\nremote 203.0.113.1 1194\n\nca ca.crt\ncert client1.crt\nkey client1.key\ntls-auth ta.key 1\n\ncipher AES-256-GCM\nauth SHA256\nresolv-retry infinite\nnobind\npersist-key\npersist-tun\nverb 3"}]},{"id":"exch","u":"U8","short":"Exchange","full":"Exchange 2019","title":"Exchange Server 2019","eyebrow":"Почтовая инфраструктура","desc":"Упрощённая по сравнению с предыдущими версиями архитектура ролей и ключевые сервисы.","cards":[{"a":"MBX","t":"Mailbox role","tags":["ok"],"b":"\n      <p>В Exchange 2019 архитектура ролей максимально упрощена: осталась фактически одна основная роль — <b>Mailbox</b>, которая объединяет то, что раньше было отдельными ролями CAS (Client Access Server), Transport и Mailbox.</p>\n      <ul>\n        <li>На каждом Mailbox-сервере локально работают: службы клиентского доступа, транспортные службы и почтовые базы данных.</li>\n        <li>Unified Messaging как отдельная роль <b>удалена</b> — голосовая почта интегрирована по-другому (через сторонние UM/Teams-решения или отключена).</li>\n      </ul>"},{"a":"CAS","t":"Client Access services","tags":[],"b":"\n      <p>Не отдельный сервер, а набор служб на каждом Mailbox-сервере, обслуживающих клиентские протоколы:</p>\n      <ul>\n        <li><b>OWA</b> (Outlook Web App), <b>EAS</b> (ActiveSync — мобильные клиенты), <b>EWS</b> (Exchange Web Services), <b>MAPI/HTTP</b> — текущий протокол Outlook (замена устаревшему RPC/HTTP).</li>\n        <li>Если почтовый ящик пользователя физически находится на другом сервере — CAS-служба проксирует запрос туда.</li>\n      </ul>"},{"a":"TRANS","t":"Transport service","tags":[],"b":"\n      <ul>\n        <li><b>Front End Transport</b> — приём/отправка SMTP на границе Mailbox-сервера.</li>\n        <li><b>Hub Transport</b> — внутренняя маршрутизация почты, применение правил транспорта (transport rules), антиспам-агенты.</li>\n        <li><b>Mailbox Transport</b> — финальная доставка сообщения в базу данных почтового ящика.</li>\n        <li><b>Edge Transport</b> (опциональная отдельная роль) — размещается в périметровой сети (DMZ), не входит в домен AD, фильтрует почту до попадания во внутреннюю сеть.</li>\n      </ul>"},{"a":"DAG","t":"Database Availability Group","tags":["warn"],"b":"\n      <p>Технология высокой доступности почтовых баз: группа Mailbox-серверов, между которыми реплицируются журналы транзакций почтовых баз.</p>\n      <ul>\n        <li>При отказе активной копии базы происходит автоматический <b>failover</b> на пассивную копию на другом сервере.</li>\n        <li>Требует отдельной сети для репликации и кворумного ресурса (witness server) при чётном числе узлов.</li>\n      </ul>"},{"a":"MISC","t":"Прочие важные термины","tags":[],"b":"\n      <ul>\n        <li><b>Autodiscover</b> — автоматическая настройка профиля Outlook/мобильного клиента по email-адресу.</li>\n        <li><b>EAC</b> (Exchange Admin Center) — веб-консоль администрирования.</li>\n        <li>Сертификаты нужны как минимум для IIS (OWA/EWS) и SMTP (TLS для внешней почты) — частая причина предупреждений в Outlook при истечении.</li>\n      </ul>"},{"a":"AUTODISCOVER","t":"Autodiscover","tags":[],"b":"<p><b>Что это:</b> сервис, который автоматически конфигурирует Outlook/мобильные клиенты — отдаёт настройки сервера, EWS URL, OOF, Free/Busy и т.д. без ручного ввода настроек пользователем.</p>\n<p><b>Механизм обнаружения (важно знать порядок для Outlook, домен-joined ПК):</b></p>\n<ol><li>Через AD (SCP — Service Connection Point) — если ПК в домене.</li><li>Через <code>https://autodiscover.&lt;domain&gt;/autodiscover/autodiscover.xml</code></li><li>Через <code>https://&lt;domain&gt;/autodiscover/autodiscover.xml</code></li><li>Через DNS SRV-запись <code>_autodiscover._tcp.&lt;domain&gt;</code></li><li>Локальный XML (для Outlook Anywhere в некоторых сценариях), либо резервный сайт autodiscover.outlook.com (для гибрида с O365).</li></ol>\n<p><b>Что настраивал:</b></p>\n<ul><li>Регистрация SCP в AD автоматом при установке Exchange (проверка: <code>Get-ClientAccessService | fl AutoDiscoverServiceInternalUri</code>).</li><li>Внешний DNS: A-запись <code>autodiscover.domain.com</code> → внешний IP, или CNAME.</li><li>SSL-сертификат — обязательно должен покрывать имя <code>autodiscover.domain.com</code> (либо через SAN, либо wildcard).</li><li>Проверка: <code>Test-OutlookConnectivity</code>, <code>Test-OutlookWebServices</code>, встроенный Microsoft Remote Connectivity Analyzer (testconnectivity.microsoft.com — для старых версий) или <b>Exchange Server Health Checker / HCW</b>.</li></ul>"},{"a":"OWA","t":"OWA","tags":[],"b":"<p><b>Что это:</b> веб-интерфейс почты, виртуальный каталог IIS <code>/owa</code> на Exchange-сервере, работает через ASP.NET / IIS.</p>\n<p><b>Настройка:</b></p>\n<ul><li>Виртуальный каталог создаётся автоматически при установке (<code>Get-OwaVirtualDirectory</code>).</li><li>Настройка внешнего/внутреннего URL: <code>Set-OwaVirtualDirectory -Identity \"EX01\\owa (Default Web Site)\" -ExternalUrl https://mail.domain.com/owa</code></li><li>Аутентификация: Forms-Based Authentication (FBA) по умолчанию, можно переключить на Basic/Windows Integrated.</li><li>Сегментация функционала (OWA Mailbox Policy) — можно ограничивать доступ к вложениям, календарю, контактам и т.д. через <code>New-OWAMailboxPolicy</code>.</li><li>SSL-офлоад/публикация наружу — обычно через reverse proxy (ARR, KEMP, F5, Azure App Proxy) или напрямую с NAT/сертификатом на самом Exchange.</li></ul>"},{"a":"ECP","t":"ECP","tags":[],"b":"<p><b>Что это:</b> веб-консоль администрирования Exchange (в 2019 URL <code>/ecp</code>, называется Exchange Admin Center — EAC), плюс через тот же виртуальный каталог обычные пользователи меняют часть личных настроек (подписи, правила пересылки, delegation) — это разные scope доступа в рамках одного <code>/ecp</code>.</p>\n<p><b>Настройка:</b></p>\n<ul><li>Виртуальный каталог <code>Get-EcpVirtualDirectory</code> / <code>Set-EcpVirtualDirectory</code>.</li><li>Ролевая модель доступа — <b>RBAC (Role Based Access Control)</b>: Management Role Groups (Organization Management, Recipient Management и т.д.), Role Assignment Policies — регулируют, что видит обычный юзер в ECP (например, может ли настраивать правила инбокса).</li><li>ECP всегда требует Forms-Based Auth или интегрированную аутентификацию, доступен и внутри, и (обычно ограниченно/только для админов) снаружи.</li></ul>"}],"qa":[{"q":"В отличие от 2013/2016, в Exchange 2019 осталось только 2 роли","b":"- **Mailbox Server role** — включает в себя все сервисы: Client Access (протоколы), Transport, Mailbox Database, Unified Messaging (интегрирован).\n- **Edge Transport role** — отдельная роль, ставится в DMZ, не требует членства в домене, работает через ADAM/AD LDS."},{"q":"Как разворачивал (для собеса):","b":"- Минимум 2 mailbox-сервера, домен-членство, отдельная сеть/сети для реплики (MAPI network + Replication network — рекомендуется разделять трафик клиент/репликация).\n- `New-DatabaseAvailabilityGroup -Name DAG01 -WitnessServer FS01 -WitnessDirectory C:\\DAGFileShareWitnesses\\DAG01`\n- `Add-DatabaseAvailabilityGroupServer -Identity DAG01 -MailboxServer EX01`\n- Добавить сети: `Get-DatabaseAvailabilityGroupNetwork`, при необходимости `Set-DatabaseAvailabilityGroupNetwork` (реплика/MAPI, включить/выключить репликацию по сети).\n- Создать копии баз: `Add-MailboxDatabaseCopy -Identity DB01 -MailboxServer EX02 -ActivationPreference 2`\n- Проверка: `Get-MailboxDatabaseCopyStatus -Identity DB01`, статусы Healthy/Mounted/Failed.\n- Настройка **DAC mode (Datacenter Activation Coordination)** — обязательно для multi-site DAG, защита от split-brain: `Set-DatabaseAvailabilityGroup -DatacenterActivationMode DagOnly`."},{"q":"Очереди: у каждого Transport Service своя очередь (Mail.que — на базе ESE). Смотрится через Get-Queue, Get-Message.","b":"- Send Connector — для исходящей почты, привязан к серверам-источникам, Smart Host или DNS MX-роутинг.\n- Receive Connector — для входящей, разные скоупы (Default Frontend, Client Frontend для аутентифицированных submission на 587, Default для внутреннего relay между серверами).\n- Transport Rules — аналог правил транспорта (дисклеймеры, DLP, редиректы).\n- Accepted Domains + Email Address Policies."},{"q":"Как в целом разворачивал Exchange 2019 (порядок для собеса)","b":"- **Подготовка:** Windows Server 2019 (ядро сервер тоже поддерживается частично, но лучше Desktop Experience для UI-компонентов), .NET Framework, Visual C++ Redistributable, UCMA — всё это ставится Prerequisites скриптом.\n- **AD Preparation:** `Setup.exe /PrepareSchema /IAcceptExchangeServerLicenseTerms`, `/PrepareAD`, `/PrepareDomain` (расширение схемы AD, создание контейнеров Exchange, групп типа Organization Management).\n- **Установка ролей:** `Setup.exe /mode:Install /roles:Mailbox /IAcceptExchangeServerLicenseTerms` (GUI или unattended).\n- **Пост-установочная настройка:**\n    - Выпуск/импорт SSL-сертификата (`New-ExchangeCertificate`, `Import-ExchangeCertificate`, привязка к IIS/SMTP/POP/IMAP через `Services`).\n    - Настройка внутренних/внешних URL для OWA, ECP, ActiveSync, EWS, OAB, Autodiscover.\n    - Настройка Send/Receive коннекторов, Accepted Domains, Email Address Policy.\n    - Создание Mailbox Database(s), перенос системных ящиков (Arbitration mailboxes) при апгрейде.\n    - Настройка DAG (если HA нужен) — см. выше.\n    - DNS-записи (MX, autodiscover, mail).\n    - Настройка firewall/reverse proxy для публикации наружу.\n    - Миграция почтовых ящиков (если апгрейд с предыдущей версии) — через `New-MoveRequest`.\n- **Проверка:** Exchange Health Checker скрипт (от Microsoft, PowerShell), Test-ServiceHealth, Test-MailFlow, проверка Autodiscover через Outlook (Ctrl+клик правой кнопкой по иконке Outlook в трее → Test E-mail AutoConfiguration)."}]},{"id":"mikrotik","u":"U9","short":"Mikrotik","full":"Mikrotik RouterOS","title":"Mikrotik RouterOS","eyebrow":"Сети / оборудование","desc":"Базовые сущности RouterOS: интерфейсы и bridge, firewall и NAT, VPN, очереди и Wi-Fi — то, что обычно спрашивают на позициях с сетевой составляющей.","cards":[{"a":"ARCH","t":"RouterOS и RouterBOARD","tags":[],"b":"\n      <ul>\n        <li><b>RouterOS</b> — операционная система Mikrotik на базе Linux-ядра; управляется через <b>Winbox</b> (десктоп-утилита), веб-интерфейс, SSH/CLI или API.</li>\n        <li><b>RouterBOARD</b> — аппаратная платформа устройств Mikrotik; лицензия RouterOS привязана к конкретному устройству.</li>\n        <li>Конфигурация хранится как единая база; удобно снимать её через <code>export</code> — текстовый файл с командами для восстановления/переноса настроек.</li>\n      </ul>"},{"a":"IFACE","t":"Интерфейсы и Bridge","tags":[],"b":"\n      <ul>\n        <li><b>Bridge</b> — программный аналог коммутатора: объединяет несколько физических портов в один L2-сегмент.</li>\n        <li><b>VLAN-интерфейс</b> — привязывается к физическому/bridge-интерфейсу, добавляет тег 802.1Q; порт может быть <i>tagged</i> (несколько VLAN) или <i>untagged/access</i> (один VLAN).</li>\n        <li><b>Bonding</b> — объединение нескольких физических интерфейсов для отказоустойчивости/увеличения пропускной способности.</li>\n        <li>Практика — в небольших сетях часто весь коммутируемый сегмент собирают в один bridge и уже на нём поднимают VLAN-интерфейсы.</li>\n      </ul>"},{"a":"FW","t":"Firewall — цепочки (chains)","tags":["warn"],"b":"\n      <p>Firewall в RouterOS построен на таблицах <code>filter</code>, <code>nat</code>, <code>mangle</code>, внутри которых трафик проходит через встроенные цепочки.</p>\n      <ul>\n        <li><b>input</b> — трафик, предназначенный самому роутеру (например, доступ к Winbox/SSH).</li>\n        <li><b>forward</b> — транзитный трафик через роутер (между клиентами и интернетом) — сюда идёт основная часть правил безопасности для сети.</li>\n        <li><b>output</b> — трафик, инициированный самим роутером наружу.</li>\n        <li>Правила обрабатываются по порядку сверху вниз до первого совпадения (если не задано иное) — порядок правил критичен, как и в большинстве firewall.</li>\n        <li>Хорошая практика — правило <code>drop invalid</code> и разрешение <code>established/related</code> в начале цепочки, затем точечные разрешения, в конце — общий <code>drop</code>.</li>\n      </ul>"},{"a":"NAT","t":"NAT: masquerade и dst-nat","tags":["ok"],"b":"\n      <ul>\n        <li><b>srcnat / masquerade</b> — подмена адреса источника на адрес роутера при выходе локальной сети в интернет; типовая настройка для выхода клиентов наружу через один внешний IP.</li>\n        <li><b>dstnat (port forwarding)</b> — проброс обращений на внешнем адресе/порту роутера к конкретному устройству и порту внутри локальной сети (публикация внутреннего сервиса наружу).</li>\n        <li>NAT-правила выполняются в таблице <code>nat</code> и обрабатываются до попадания трафика в основную фильтрацию <code>forward</code>.</li>\n      </ul>"},{"a":"VPN","t":"VPN-технологии в RouterOS","tags":[],"b":"\n      <ul>\n        <li><b>PPTP/L2TP</b> — простые в настройке, но PPTP считается устаревшим и небезопасным для новых внедрений.</li>\n        <li><b>IPsec (IKEv2)</b> — стандартный протокол для site-to-site и удалённого доступа, требует более тщательной настройки политик шифрования.</li>\n        <li><b>WireGuard</b> — современный, лёгкий протокол, поддерживается в актуальных версиях RouterOS, проще в настройке и быстрее IPsec.</li>\n        <li><b>EoIP</b> — туннелирование Ethernet-кадров поверх IP, часто используется вместе с другим VPN для объединения L2-сегментов между площадками.</li>\n      </ul>"},{"a":"QOS","t":"Очереди и ограничение скорости (QoS)","tags":[],"b":"\n      <ul>\n        <li><b>Simple Queue</b> — быстрый способ ограничить скорость для конкретного адреса/подсети без сложной иерархии.</li>\n        <li><b>Queue Tree</b> — более гибкая иерархическая система очередей с приоритетами (например, приоритет VoIP-тр
