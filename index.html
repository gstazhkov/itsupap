афика над обычным веб-серфингом), требует маркировки трафика через <code>mangle</code>.</li>\n        <li>Маркировка трафика (<b>mangle: mark-connection / mark-packet</b>) — обязательный шаг перед использованием Queue Tree, чтобы очереди понимали, какой трафик к какому классу относится.</li>\n      </ul>"},{"a":"WIFI","t":"Wireless и CAPsMAN","tags":[],"b":"\n      <ul>\n        <li>Одиночная точка доступа настраивается напрямую в разделе Wireless конкретного устройства.</li>\n        <li><b>CAPsMAN</b> (Controller Access Point system Manager) — централизованное управление несколькими точками доступа Mikrotik: единые SSID, профили безопасности, роуминг между точками без ручной настройки каждой отдельно.</li>\n        <li>Практический плюс CAPsMAN — при большом количестве точек доступа изменения (пароль Wi-Fi, канал) вносятся один раз на контроллере, а не на каждом устройстве.</li>\n      </ul>"},{"a":"TOOLS","t":"Диагностика и обслуживание","tags":[],"b":"\n      <ul>\n        <li><code>/export</code> — выгрузка текущей конфигурации в виде команд, удобно для бэкапа и переноса на другое устройство.</li>\n        <li><code>/system backup</code> — бинарный бэкап конфигурации устройства (в отличие от текстового export).</li>\n        <li><b>Torch</b> — встроенный инструмент реального времени для просмотра трафика по интерфейсу (аналог top для сетевого трафика).</li>\n        <li><b>Winbox → Tools → Ping/Traceroute/Bandwidth Test</b> — базовая диагностика доступности и пропускной способности каналов между площадками.</li>\n        <li>Обновление RouterOS — рекомендуется через отдельный канал (stable), с предварительным бэкапом конфигурации на случай отката.</li>\n      </ul>"},{"a":"BRIDGE","t":"Bridge","tags":[],"b":"<p>программный аналог коммутатора внутри RouterOS: объединяет несколько физических портов в один L2-сегмент. Типичный кейс, который настраивал многократно — в небольшом офисе беру все LAN-порты роутера, объединяю в один bridge (vmbr-lan условно), и дальше все они работают как единый коммутируемый сегмент, а не как отдельные независимые интерфейсы.</p>"},{"a":"VLAN-ИНТЕРФЕЙС","t":"VLAN-интерфейс","tags":[],"b":"<p>создаётся поверх физического или bridge-интерфейса, добавляет тег 802.1Q. Порт на коммутаторе/роутере может быть:</p>\n<ul><li><b>Access (untagged)</b> — принадлежит одному VLAN, для конечных устройств (рабочие станции, принтеры).</li><li><b>Trunk (tagged)</b> — пропускает несколько VLAN между устройствами (между коммутаторами, между роутером и управляемым коммутатором) — кадры внутри trunk несут тег VLAN ID.</li></ul>\n<p>Практическая ошибка, на которую всегда обращаю внимание при аудите чужой конфигурации — рассинхронизация <b>native VLAN</b> на двух концах trunk-линка: если на одной стороне native VLAN 1, а на другой — VLAN 10, кадры без тега \"утекают\" не туда, куда должны, и это создаёт трудноуловимые проблемы (часть трафика вроде бы ходит, часть — нет, и непонятно почему).</p>"}],"qa":[{"q":"Способы управления, которыми реально пользуюсь:","b":"- **Winbox** — десктоп-утилита, мой основной инструмент для повседневной настройки — быстрее веб-интерфейса, показывает больше деталей, удобнее для массовых правок (например, drag-and-drop правил firewall).\n- **Веб-интерфейс** — когда нет возможности поставить Winbox (например, настройка с чужого компьютера/планшета).\n- **SSH/CLI** — для автоматизации и когда нужно быстро выполнить команду без GUI, плюс единственный вариант при работе через some автоматизированные скрипты/Ansible.\n- **API** — для интеграции с внешними системами мониторинга или автоматизации массовых изменений."},{"q":"Firewall — цепочки (chains)","b":"Firewall в RouterOS построен на таблицах — `filter` (собственно фильтрация трафика), `nat` (подмена адресов), `mangle` (маркировка пакетов, используется для QoS и сложной маршрутизации). Внутри таблицы `filter` трафик проходит через три встроенные цепочки:\n\n- **input** — трафик, предназначенный самому роутеру (доступ к Winbox/SSH/веб-интерфейсу управления). Здесь я всегда явно ограничиваю доступ к management-портам только с доверенных IP/VLAN — открытый доступ к Winbox из интернета это классическая дыра, через которую ломают Mikrotik-роутеры массово.\n- **forward** — транзитный трафик через роутер (между клиентами и интернетом, между VLAN). Сюда идёт основная часть правил безопасности — межсетевые ограничения, доступ из гостевого Wi-Fi, ограничения между сегментами.\n- **output** — трафик, инициированный самим роутером наружу (например, если роутер сам делает DNS-запросы или NTP-синхронизацию).\n\n**Порядок правил критичен** — обрабатываются сверху вниз до первого совпадения, поэтому моя стандартная структура правил такая:\n\n1. `accept established,related` — сразу разрешить обратный трафик уже установленных соединений (иначе всё остальное приходится дублировать в обе стороны).\n2. `drop invalid` — отбросить некорректные пакеты (защита от part of DoS/сканирования).\n3. Точечные разрешения (конкретные порты/сервисы, которые реально нужны).\n4. `drop all` в самом конце как явный финальный запрет — не полагаюсь на implicit deny, всегда прописываю правило руками, чтобы было видно в конфиге и в логах, что именно сработало.\n\nОтдельно всегда включаю логирование на финальном drop-правиле — это первое место, куда смотрю при диагностике \"почему не работает\" (видно, что конкретно блокируется) и при расследовании подозрительной активности (видно попытки сканирования).»"},{"q":"NAT: masquerade и dst-nat","b":"«Два базовых сценария, с которыми работаю каждый день:\n\n**srcnat / masquerade** — подмена адреса источника при выходе локальной сети в интернет через один внешний IP. Стандартная настройка для любого офиса:\n\n```\n/ip firewall nat\nadd chain=srcnat out-interface=WAN action=masquerade\n```\n\n**dstnat (port forwarding)** — публикация внутреннего сервиса наружу: обращение на внешний IP/порт роутера перенаправляется на конкретное устройство внутри локальной сети. Использовал, например, для публикации веб-портала 1С или RDP-доступа к терминальному серверу (хотя RDP наружу без VPN — это то, от чего я обычно отговариваю, если только не закрыто дополнительно по IP или не заведено через VPN).\n\nВажный момент, который проговариваю: NAT-правила обрабатываются в таблице `nat` **до** попадания трафика в основную фильтрацию `forward` — то есть при диагностике \"проброс порта не работает\" сначала проверяю, доходит ли пакет до NAT-правила вообще, и только потом смотрю в forward-цепочку, не блокируется ли он там уже после подмены адреса.»"},{"q":"VPN-технологии в RouterOS","b":"«Кратко резюмирую то, что уже подробно разбирал по VPN в целом, применительно конкретно к Mikrotik:\n\n- **PPTP/L2TP** — исторически были самыми простыми в настройке, но PPTP считается небезопасным (устаревшее шифрование), для новых внедрений не использую вообще, встречаю только в legacy-инфраструктуре, которую планирую к замене.\n- **IPsec (IKEv2)** — мой стандартный выбор для Site-to-Site между офисами на Mikrotik, требует более тщательной настройки (Phase 1/Phase 2, policy, proposal — разбирал детально в отдельном ответе про IPsec).\n- **WireGuard** — с появлением нативной поддержки в RouterOS (актуальные версии) стал моим предпочтительным вариантом для Remote Access и лёгких Site-to-Site — проще в настройке, быстрее по производительности, чем IPsec.\n- **EoIP** (Ethernet over IP) — туннелирование Ethernet-кадров поверх IP, использую, когда нужна L2-связность между площадками (например, растянуть один VLAN между двумя офисами) — сам по себе EoIP без шифрования, поэтому часто оборачиваю его в IPsec (EoIP over IPsec) для получения и гибкой L2-маршрутизации, и защиты трафика.\n\nНа собеседовании обычно уточняю: выбор конкретной VPN-технологии на Mikrotik — это тот же принцип, что и в целом по VPN — WireGuard для скорости разворачивания и производительности, IPsec там, где важна максимальная совместимость с другим оборудованием (не только Mikrotik на другом конце).»"},{"q":"Очереди и ограничение скорости (QoS)","b":"«Две модели, которые предлагает RouterOS, и я выбираю в зависимости от сложности задачи:\n\n**Simple Queue** — использую, когда нужно быстро ограничить скорость конкретному адресу/подсети без сложной логики приоритезации. Например, ограничить гостевой Wi-Fi определённой полосой, чтобы не \"съедал\" канал у основного офиса.\n\n**Queue Tree** — беру, когда нужна более гибкая иерархия с приоритетами — например, приоритизация VoIP-трафика (IP-телефония) над обычным веб-сёрфингом, чтобы при насыщении канала звонки не \"резались\" в первую очередь. Queue Tree требует предварительной **маркировки трафика через mangle** (`mark-connection` → `mark-packet`) — то есть сначала помечаю, какой трафик к какому классу относится, и только потом Queue Tree работает с этими метками.\n\nПрактический пример, который рассказываю: в офисе с IP-телефонией на Asterisk настраивал mangle-правила, помечающие RTP-трафик (голос) отдельной меткой, и в Queue Tree давал этой метке наивысший приоритет — при перегрузке канала (например, кто-то качает большой файл) голосовой трафик не начинает \"резаться\" и заикаться, потому что физически обрабатывается в первую очередь.»"},{"q":"Wireless и CAPsMAN","b":"**Одиночная точка доступа** — настраивается напрямую в разделе Wireless конкретного устройства, для небольшого офиса с одной AP этого достаточно.\n\n**CAPsMAN** (Controller Access Point system Manager) — беру, когда точек доступа несколько (например, растянутый по этажам офис или несколько зданий). Даёт централизованное управление: единые SSID и профили безопасности настраиваются один раз на контроллере, а не на каждой точке отдельно, плюс поддержка роуминга между точками, чтобы клиент не \"отваливался\" при переходе из зоны действия одной AP в другую.\n\nПрактический плюс, который всегда подчёркиваю на собеседовании: при большом количестве точек доступа изменение пароля Wi-Fi или канала вносится один раз на контроллере — без CAPsMAN пришлось бы руками обходить каждую точку, что и медленно, и чревато ошибками (забыл одну точку — она осталась со старым паролем).»"},{"q":"Диагностика и обслуживание  Mikrotik","b":"«Инструменты, которыми пользуюсь ежедневно для troubleshooting:\n\n- **`/export`** — уже упоминал, выгрузка текущей конфигурации в виде команд, использую и для бэкапа, и как способ быстро \"прочитать\" всю логику настройки устройства текстом, не кликая по вкладкам Winbox.\n- **`/system backup`** — бинарный полный бэкап устройства, для быстрого восстановления той же железки.\n- **Torch** — встроенный инструмент реального времени, показывает трафик по интерфейсу прямо сейчас (аналог `top`, но для сетевого трафика) — первое, что открываю, когда нужно понять \"что вообще происходит на канале прямо сейчас\" — например, при подозрении на аномальную нагрузку или DDoS.\n- **Winbox → Tools → Ping/Traceroute/Bandwidth Test** — базовая диагностика доступности и реальной пропускной способности между площадками, особенно полезно при разборе жалоб \"интернет медленный\" — сразу видно, где реально узкое место.\n\n**Обновление RouterOS** — практика, которой всегда придерживаюсь: обновляю через канал **stable** (не bugfix/testing на продакшн-оборудовании), обязательно снимаю `/system backup` перед обновлением на случай необходимости отката, и стараюсь не обновлять всё оборудование разом — сначала на менее критичном устройстве, потом на остальных, если всё прошло гладко.»"},{"q":"Как защищаете сам Mikrotik от взлома?","b":"Отключаю неиспользуемые сервисы (/ip service), ограничиваю доступ к management-портам по IP через firewall input-цепочку, меняю дефолтные учётные данные сразу при разворачивании, отключаю Winbox/API доступ из внешней сети полностью (только через VPN)"},{"q":"Разница между RouterOS v6 и v7?","b":"v7 принёс новый WireGuard \"из коробки\", улучшенную поддержку контейнеров внутри RouterOS, обновлённый движок firewall (nftables вместо iptables под капотом) — но у части старых пакетов/скриптов есть проблемы совместимости при миграции, поэтому обновляю осторожно и тестирую заранее."},{"q":"Как бы вы построили резервирование интернет-канала на Mikrotik?","b":"два провайдера, check-gateway=ping на маршрутах для автоматического failover, либо более гибко — через Netwatch скрипты, отслеживающие доступность и переключающие маршруты/действия при недоступности основного канала."}],"scripts":[{"t":"Базовая настройка нового устройства (с нуля)","code":"# Сброс к заводским настройкам (если нужно начать с чистого листа)\n/system reset-configuration no-defaults=yes skip-backup=yes\n\n# Задать имя устройства\n/system identity set name=\"OFFICE-GW-01\"\n\n# Сменить пароль администратора сразу же (первое, что делаю на новом устройстве)\n/user set admin password=\"СложныйПароль123!\"\n\n# Часовой пояс и NTP\n/system clock set time-zone-name=Europe/Moscow\n/system ntp client set enabled=yes\n/system ntp client servers add address=pool.ntp.org"},{"t":"Интерфейсы, Bridge, VLAN","code":"# Создать bridge и объединить LAN-порты\n/interface bridge\nadd name=bridge-lan\n\n/interface bridge port\nadd bridge=bridge-lan interface=ether2\nadd bridge=bridge-lan interface=ether3\nadd bridge=bridge-lan interface=ether4\n\n# IP-адрес на bridge (шлюз локальной сети)\n/ip address\nadd address=192.168.10.1/24 interface=bridge-lan\n\n# --- VLAN на bridge (современный способ, VLAN-filtering) ---\n/interface bridge\nset bridge-lan vlan-filtering=yes\n\n/interface bridge vlan\nadd bridge=bridge-lan vlan-ids=10 tagged=bridge-lan,ether5 untagged=ether2,ether3\nadd bridge=bridge-lan vlan-ids=20 tagged=bridge-lan,ether5 comment=\"Guest WiFi\"\n\n# VLAN-интерфейс для маршрутизации между VLAN\n/interface vlan\nadd name=vlan10-users interface=bridge-lan vlan-id=10\nadd name=vlan20-guest interface=bridge-lan vlan-id=20\n\n/ip address\nadd address=192.168.10.1/24 interface=vlan10-users\nadd address=192.168.20.1/24 interface=vlan20-guest\n\n# Trunk-порт к управляемому коммутатору (ether5 несёт несколько VLAN)\n/interface bridge port\nadd bridge=bridge-lan interface=ether5 pvid=1"},{"t":"Firewall — базовый безопасный набор правил","code":"/ip firewall filter\n\n# --- INPUT: защита самого роутера ---\nadd chain=input connection-state=established,related action=accept comment=\"Allow established/related\"\nadd chain=input connection-state=invalid action=drop comment=\"Drop invalid\"\nadd chain=input protocol=icmp action=accept comment=\"Allow ICMP (ping)\"\nadd chain=input src-address=192.168.10.0/24 protocol=tcp dst-port=8291 action=accept comment=\"Winbox from LAN only\"\nadd chain=input src-address=192.168.10.0/24 protocol=tcp dst-port=22 action=accept comment=\"SSH from LAN only\"\nadd chain=input in-interface=WAN action=drop comment=\"Drop everything else from WAN to router\"\nadd chain=input action=accept comment=\"Allow rest from LAN/VLAN\"\n\n# --- FORWARD: трафик между сетями ---\nadd chain=forward connection-state=established,related action=accept\nadd chain=forward connection-state=invalid action=drop\nadd chain=forward src-address=192.168.20.0/24 dst-address=192.168.10.0/24 action=drop comment=\"Guest cannot reach internal LAN\"\nadd chain=forward src-address=192.168.20.0/24 action=accept comment=\"Guest -> internet only\"\nadd chain=forward action=accept comment=\"Allow LAN -> WAN\"\n\n# Логирование финального drop (полезно для диагностики)\nadd chain=forward action=log log-prefix=\"FORWARD-DROP: \"\nadd chain=forward action=drop comment=\"Default deny\""},{"t":"NAT","code":"/ip firewall nat\n\n# Masquerade — выход в интернет\nadd chain=srcnat out-interface=WAN action=masquerade comment=\"NAT to internet\"\n\n# Port forwarding — публикация внутреннего веб-сервера (1С-портал)\nadd chain=dstnat protocol=tcp dst-port=8080 action=dst-nat to-addresses=192.168.10.50 to-ports=8080 comment=\"1C web portal\"\n\n# Проброс RDP только с конкретного внешнего IP (пример ограничения по источнику)\nadd chain=dstnat src-address=203.0.113.50 protocol=tcp dst-port=33389 action=dst-nat to-addresses=192.168.10.20 to-ports=3389 comment=\"RDP - только с известного IP\""},{"t":"DHCP и DNS","code":"/ip pool\nadd name=dhcp-pool-lan ranges=192.168.10.100-192.168.10.200\n\n/ip dhcp-server\nadd name=dhcp-lan interface=vlan10-users address-pool=dhcp-pool-lan lease-time=1d disabled=no\n\n/ip dhcp-server network\nadd address=192.168.10.0/24 gateway=192.168.10.1 dns-server=192.168.10.1,8.8.8.8\n\n# Резервирование IP за MAC-адресом (например, для сервера/принтера)\n/ip dhcp-server lease\nadd address=192.168.10.10 mac-address=AA:BB:CC:DD:EE:FF server=dhcp-lan comment=\"Файловый сервер\"\n\n# DNS-сервер роутера (кэширующий + forwarders)\n/ip dns\nset servers=8.8.8.8,1.1.1.1 allow-remote-requests=yes cache-size=2048"},{"t":"IPsec Site-to-Site","code":"/ip ipsec profile\nadd name=to-branch dh-group=modp2048 enc-algorithm=aes-256 hash-algorithm=sha256 lifetime=1d\n\n/ip ipsec peer\nadd name=branch-office address=198.51.100.1/32 profile=to-branch exchange-mode=ike2\n\n/ip ipsec identity\nadd peer=branch-office auth-method=pre-shared-key secret=\"ОченьСложныйКлюч!2026\" generate-policy=no\n\n/ip ipsec proposal\nadd name=branch-proposal auth-algorithms=sha256 enc-algorithms=aes-256-cbc pfs-group=modp2048 lifetime=8h\n\n/ip ipsec policy\nadd peer=branch-office src-address=192.168.10.0/24 dst-address=192.168.30.0/24 proposal=branch-proposal tunnel=yes\n\n/ip firewall filter\nadd chain=input protocol=udp dst-port=500,4500 action=accept comment=\"IPsec IKE/NAT-T\"\nadd chain=input protocol=ipsec-esp action=accept comment=\"IPsec ESP\""},{"t":"WireGuard (RouterOS v7+)","code":"# Создать интерфейс WireGuard на сервере\n/interface wireguard\nadd name=wg0 listen-port=51820\n\n/ip address\nadd address=10.10.0.1/24 interface=wg0\n\n# Сгенерировать ключи (или посмотреть уже сгенерированный public key)\n/interface wireguard print\n\n# Добавить пира (клиента)\n/interface wireguard peers\nadd interface=wg0 public-key=\"КлючКлиента=\" allowed-address=10.10.0.2/32 comment=\"Ноутбук сотрудника\"\n\n# Пир для Site-to-Site — пускаем всю подсеть офиса Б\n/interface wireguard peers\nadd interface=wg0 public-key=\"КлючОфисаБ=\" allowed-address=10.10.0.3/32,192.168.30.0/24 endpoint-address=198.51.100.1 endpoint-port=51820\n\n/ip firewall filter\nadd chain=input protocol=udp dst-port=51820 action=accept comment=\"WireGuard\"\n\n# Роутинг трафика в туннель\n/ip route\nadd dst-address=192.168.30.0/24 gateway=wg0"},{"t":"QoS — Simple Queue и приоритизация VoIP","code":"# Simple Queue — ограничение гостевого Wi-Fi\n/queue simple\nadd name=guest-limit target=192.168.20.0/24 max-limit=20M/20M\n\n# --- Приоритизация VoIP через mangle + Queue Tree ---\n/ip firewall mangle\nadd chain=forward src-address=192.168.10.0/24 protocol=udp dst-port=10000-20000 action=mark-packet new-packet-mark=voip-traffic passthrough=no comment=\"RTP voice traffic\"\n\n/queue tree\nadd name=voip-priority parent=WAN packet-mark=voip-traffic priority=1 max-limit=10M\nadd name=other-traffic parent=WAN packet-mark=no-mark priority=8 max-limit=90M"},{"t":"Wireless и CAPsMAN","code":"# --- Настройка CAPsMAN на контроллере ---\n/caps-man manager\nset enabled=yes\n\n/caps-man configuration\nadd name=cfg-office ssid=\"Office-WiFi\" mode=ap datapath=datapath1 security=security1\n\n/caps-man security\nadd name=security1 authentication-types=wpa2-psk passphrase=\"СложныйПарольWiFi123\"\n\n/caps-man datapath\nadd name=datapath1 bridge=bridge-lan vlan-id=10\n\n/caps-man provisioning\nadd master-configuration=cfg-office action=create-dynamic-enabled\n\n# Гостевой SSID с изоляцией клиентов\n/caps-man configuration\nadd name=cfg-guest ssid=\"Guest-WiFi\" mode=ap datapath=datapath-guest security=security-guest\n\n/caps-man datapath\nadd name=datapath-guest bridge=bridge-lan vlan-id=20 client-to-client-forwarding=no"},{"t":"Резервирование канала (2 провайдера) + Netwatch","code":"# Два маршрута по умолчанию с разным distance и check-gateway\n/ip route\nadd dst-address=0.0.0.0/0 gateway=203.0.113.1 distance=1 check-gateway=ping comment=\"Primary ISP\"\nadd dst-address=0.0.0.0/0 gateway=198.51.100.1 distance=2 check-gateway=ping comment=\"Backup ISP\"\n\n# Netwatch со скриптом уведомления при падении основного канала\n/tool netwatch\nadd host=8.8.8.8 interval=10s \\\n  up-script=\":log info \\\"Primary ISP is UP\\\"\" \\\n  down-script=\":log warning \\\"Primary ISP is DOWN - switching to backup\\\"\""},{"t":"Скрипт автоматического бэкапа с отправкой на email/FTP","code":"# /system script\nadd name=daily-backup source={\n  :local date [/system clock get date];\n  :local time [/system clock get time];\n  :local fname (\"backup-\" . $date . \"-\" . $time);\n  /system backup save name=$fname;\n  /export file=($fname . \".rsc\");\n  :delay 3s;\n  /tool e-mail send to=\"it@company.local\" subject=(\"Mikrotik backup: \" . [/system identity get name]) body=\"Автоматический бэкап во вложении\" file=($fname . \".backup\");\n}\n\n# Планировщик — ежедневно в 02:00\n/system scheduler\nadd name=backup-scheduler start-time=02:00:00 interval=1d on-event=daily-backup"},{"t":"Скрипт мониторинга свободного места и температуры (для отправки в Zabbix через trapper или лог)","code":"/system script\nadd name=health-check source={\n  :local diskFree [/system resource get free-hdd-space];\n  :local diskTotal [/system resource get total-hdd-space];\n  :local cpuLoad [/system resource get cpu-load];\n  :local temp [/system health get value [find name=\"temperature\"]];\n  \n  :log info (\"CPU: \" . $cpuLoad . \"% | Disk free: \" . $diskFree . \"/\" . $diskTotal . \" | Temp: \" . $temp);\n  \n  :if ($cpuLoad > 85) do={\n    /tool e-mail send to=\"it@company.local\" subject=\"ALERT: High CPU on router\" body=(\"CPU load: \" . $cpuLoad . \"%\")\n  }\n}\n\n/system scheduler\nadd name=health-check-scheduler interval=5m on-event=health-check"},{"t":"Массовая настройка через SSH-скрипт (bash) на несколько устройств сразу","code":"#!/bin/bash\n# mikrotik-mass-config.sh\n# Применяет один и тот же набор команд на список Mikrotik-устройств\n\nROUTERS=(\"10.0.1.1\" \"10.0.2.1\" \"10.0.3.1\")\nUSER=\"admin\"\n\nCOMMANDS='\n/ip firewall filter add chain=input protocol=tcp dst-port=8291 src-address=10.0.0.5 action=accept comment=\"Mgmt from monitoring\"\n/system clock set time-zone-name=Europe/Moscow\n'\n\nfor ROUTER in \"${ROUTERS[@]}\"; do\n    echo \"Настраиваю ${ROUTER}...\"\n    ssh \"${USER}@${ROUTER}\" \"$COMMANDS\"\n    if [ $? -eq 0 ]; then\n        echo \"✅ ${ROUTER} — успешно\"\n    else\n        echo \"❌ ${ROUTER} — ошибка подключения\"\n    fi\ndone"},{"t":"Отключение неиспользуемых сервисов (security hardening)","code":"/ip service\nset telnet disabled=yes\nset ftp disabled=yes\nset www disabled=yes\nset api disabled=yes\nset api-ssl disabled=yes\nset ssh port=2222\nset winbox address=192.168.10.0/24\n\n/tool mac-server\nset allowed-interface-list=none\n\n/tool mac-server mac-winbox\nset allowed-interface-list=none"}]},{"id":"zabbix-2","u":"U10","short":"Zabbix","full":"Zabbix","title":"Zabbix","eyebrow":"Настройка Работа","desc":"","cards":[{"a":"ZABBIX","t":"Zabbix","tags":[],"b":"<p>основная система мониторинга инфраструктуры в компаниях, где я работал, особенно в средах с преобладанием \"классической\" инфраструктуры (Windows Server, сетевое оборудование, виртуализация), а не микросервисов <b>Архитектура, которую разворачиваю:</b></p>\n<pre><code>Zabbix Agent / SNMP / IPMI  (источники данных на хостах)\n         │\n         ▼\nZabbix Proxy (для удалённых площадок/филиалов)\n         │\n         ▼\nZabbix Server ──► БД (PostgreSQL/MySQL)\n         │\n         ▼\n   Web-интерфейс</code></pre>"},{"a":"Zabbix","t":"Архитектура","tags":[],"b":"<ul><li><b>Zabbix Proxy</b> обязательно ставлю в каждом филиале, если он подключён по VPN с ограниченной полосой — Proxy собирает данные локально и передаёт на центральный сервер одним каналом, а не гоняет трафик каждого агента индивидуально через VPN.</li><li><b>Passive vs Active агент</b> — для хостов за NAT или с нестабильным каналом использую active-режим (агент сам инициирует отправку данных на сервер), для остальных — passive (сервер сам опрашивает) — это снижает нагрузку на сервер при большом количестве хостов.</li><li><b>Templates</b> — обязательно использую готовые/свои шаблоны при подключении нового типа оборудования (например, \"Template Cisco Switch SNMP\"), чтобы не настраивать 50 одинаковых items вручную на каждом хосте одного типа.</li><li><b>Trigger dependencies</b> — настраиваю зависимости триггеров, чтобы при падении коммутатора не прилетал \"шторм\" из сотни алертов по всем хостам за ним — только один алерт про сам коммутатор.</li></ul>"},{"a":"PromQL","t":"PromQL","tags":[],"b":"<p>язык запросов, который использую и в самом Prometheus, и в панелях Grafana — например, простой запрос на процент использования CPU:</p>\n<pre><code>100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)</code></pre>"},{"a":"ALERTMANAGER","t":"Alertmanager","tags":[],"b":"<p>отдельный компонент, который забирает алерты от Prometheus и занимается тем, что в Zabbix встроено в сам сервер: группировка похожих алертов, подавление дублей (silence), маршрутизация в разные каналы по лейблам.</p>"},{"a":"EFK/ELK — сбор и анализ логов","t":"EFK/ELK — сбор и анализ логов","tags":[],"b":"<p>«Метрики (Zabbix/Grafana/Prometheus) отвечают на вопрос \"что не так\", логи отвечают на вопрос \"почему\" — поэтому держу их как отдельный, но связанный контур.</p>\n<p><b>Стек, который использую:</b></p>\n<pre><code>Filebeat / Fluent Bit (агент на каждом хосте, читает логи)\n         │\n         ▼\nLogstash / Fluentd (парсинг, обогащение, трансформация)\n         │\n         ▼\n   Elasticsearch (индексация, полнотекстовый поиск)\n         │\n         ▼\n      Kibana (визуализация, поиск, дашборды)</code></pre>\n<p><b>ELK vs EFK</b> — разница в среднем звене: Logstash тяжелее по ресурсам (JVM), но мощнее по трансформациям \"из коробки\"; Fluentd/Fluent Bit — легче, лучше подходит для Kubernetes (обычно ставится как DaemonSet — по одному экземпляру на каждую ноду).</p>"},{"a":"ИНСТРУМЕНТЫ ДЛЯ","t":"Инструменты для маршрутизации по дежурствам","tags":[],"b":"<p>PagerDuty, Opsgenie, либо встроенные Notification Policy в Grafana/Zabbix, если бюджета на отдельный сервис нет — маршрутизация по лейблам (team=network → отдельный чат сетевой команды, severity=critical → звонок дежурному).»</p>"},{"a":"UserParameter","t":"Нестандартные метрики — UserParameter","tags":[],"b":"<p>Стандартных items хватает не всегда — например, нужно замониторить количество файлов в конкретной директории, статус кастомного бизнес-процесса, специфичную метрику 1С. Для этого использую UserParameter — собственную команду, результат которой агент отдаёт как обычную метрику.</p>"},{"a":"UserParameter","t":"количество файлов в очереди (например, папка обмена 1С)","tags":[],"b":"<h6>Пример 1: количество файлов в очереди (например, папка обмена 1С)</h6>\n<pre><code># /etc/zabbix/zabbix_agent2.d/custom-queue.conf\nUserParameter=queue.count[*],find $1 -type f | wc -l</code></pre>\n<pre><code># Проверка на самом хосте перед тем, как полагаться на неё в Zabbix\nzabbix_agent2 -t queue.count[/opt/1c/exchange/incoming]</code></pre>\n<p>В Zabbix создаю Item с ключом <code>queue.count[/opt/1c/exchange/incoming]</code>, тип \"Zabbix agent (active)\".</p>"},{"a":"UserParameter","t":"проверка успешности последнего бэкапа (по коду возврата/логу)","tags":[],"b":"<h6>Пример 2: проверка успешности последнего бэкапа (по коду возврата/логу)</h6>\n<pre><code># /etc/zabbix/zabbix_agent2.d/backup-check.conf\nUserParameter=backup.status,tail -n 1 /var/log/backup/last_status.log | grep -q \"SUCCESS\" &amp;&amp; echo 1 || echo 0</code></pre>"},{"a":"UserParameter","t":"отправка данных через Zabbix Trapper","tags":[],"b":"<h6>Пример 4: отправка данных через Zabbix Trapper (когда хост сам \"проталкивает\" метрику по расписанию)</h6>\n<p>Полезно, если метрика считается долго (например, тяжёлый SQL-запрос раз в час) — не держим агента занятым постоянным опросом.</p>\n<pre><code>#!/bin/bash\n# /usr/local/bin/report-order-queue.sh — cron раз в 5 минут\nVALUE=$(psql -U app -d orders -t -c \"SELECT count(*) FROM orders WHERE status='pending';\")\nzabbix_sender -z 10.0.0.5 -s \"$(hostname)\" -k orders.pending.count -o \"$VALUE\"</code></pre>\n<pre><code>*/5 * * * * /usr/local/bin/report-order-queue.sh</code></pre>\n<p>Item создаю с типом <b>\"Zabbix trapper\"</b>, ключ <code>orders.pending.count</code> — Zabbix просто ждёт, пока хост сам пришлёт значение.</p>"},{"a":"SNMP","t":"Мониторинг сетевых устройств (SNMP)","tags":[],"b":"<p>«Коммутаторы, маршрутизаторы, ИБП, принтеры — почти всегда через SNMP, потому что нативного Zabbix-агента там нет.»</p>\n<h6>Настройка на MikroTik (включить SNMP)</h6>\n<pre><code>/snmp\nset enabled=yes contact=\"it@company.local\" location=\"Офис, стойка 2\" trap-community=public\n\n/snmp community\nset [find default=yes] name=zabbix-ro addresses=10.0.0.5/32</code></pre>\n<h6>Создание хоста-коммутатора в Zabbix</h6>\n<ul><li>Interface type: <b>SNMP</b>, порт 161, SNMP версия — <b>v2</b> (community-based, проще) или <b>v3</b> (с аутентификацией/шифрованием — предпочтительнее для продакшна).</li><li>Шаблон: <code>Template Net Network Generic Device SNMP</code> или специфичный (<code>Template Net MikroTik SNMP</code>, <code>Template Net Cisco IOS SNMP</code>) — сразу дают интерфейсы, загрузку, температуру и т.д.</li><li><b>Discovery правило по интерфейсам</b> — Zabbix через LLD (Low-Level Discovery) сам находит все физические интерфейсы устройства и создаёт items/триггеры на каждый (трафик in/out, статус up/down) без ручной настройки на каждый порт.</li></ul>"},{"a":"АРХИТЕКТУРА","t":"Архитектура","tags":[],"b":"<p>Ссылка доступна только для нас с Вами, поэтому можете накануне подключиться и проверить работу. Прошу подтвердить ответным письмом получение приглашения и участие во встрече.</p>\n<p>https://vcs.petrogastech.ru/Interview_IT_StazhkovGeorgy »</p>"},{"a":"TEMPLATES —","t":"Templates — шаблоны","tags":[],"b":"<p>Готовый набор Items, Triggers, графиков и правил обнаружения, который можно применить сразу ко многим хостам одного типа (например «Linux server» или «Cisco switch»), не настраивая каждый хост вручную.</p>"},{"a":"СПОСОБЫ СБОРА","t":"Способы сбора данных","tags":[],"b":"<p>Zabbix Agent(passive/active) — самый частый способ для серверов SNMP — для сетевого оборудования, принтеров, ИБП. IPM — аппаратные датчики серверов (температура, вентиляторы) на уровне контроллера, независимо от ОС. Zabbix Trapper — данные, которые сам хост «проталкивает» в Zabbix произвольным скриптом (&lt;code&gt;zabbix_sender&lt;/code&gt;). JMX — метрики Java-приложений.</p>"},{"a":"ACTIONS И","t":"Actions и Escalations","tags":[],"b":"<p>В Zabbix «Действия» (Actions) — это комбинация условий (когда срабатывать?) и операций (что сделать?).</p>\n<p>Условия (Conditions): Вы можете фильтровать события по триггерам, хостам, группам хостов или важности (Severity), например: «Срабатывать, только если это сервер из группы Production и важность Disaster».</p>\n<p>Операции (Operations): Это то, что происходит в рамках Action. Это может быть отправка сообщения (Media) или выполнение команды на удаленном сервере (Remote Command).</p>"}],"qa":[{"q":"Хост показывает unreachable, ваши действия?","b":"Первое, что проверяю — не сам ли хост \"упал\", а доступность агента: порты 10050/10051, файрвол между Zabbix-сервером/proxy и хостом, актуальность конфигурации агента. В 80% случаев проблема именно в сети/файрволе, а не в реальной недоступности сервиса"},{"q":"History и trends растут быстро при большом числе items с частым опросом","b":"Решаю через настройку периодов хранения (не храню детальную history дольше, чем реально нужно — например, 7-14 дней детально, дальше только trends), партиционирование БД, и пересмотр интервалов опроса для метрик, где секундная точность не нужна.»"},{"q":"Prometheus + Grafana — где и почему выбираю эту связку","b":"Prometheus беру там, где инфраструктура тяготеет к контейнерам/Kubernetes/микросервисам — это де-факто стандарт в облачно-нативном мире, и большинство готовых Helm-чартов уже включают Prometheus-совместимые метрики \"из коробки\".\n\nКлючевое архитектурное отличие от Zabbix, которое всегда проговариваю: **модель pull vs push**. Prometheus сам периодически опрашивает (`scrape`) эндпоинты `/metrics` на сервисах через HTTP — то есть источник должен либо сам отдавать метрики в формате Prometheus, либо перед ним ставится **exporter** (node_exporter для метрик ОС, mysqld_exporter для MySQL и т.д.), который транслирует нативные метрики в понятный Prometheus формат"},{"q":"ELK vs EFK","b":"разница в среднем звене: Logstash тяжелее по ресурсам (JVM), но мощнее по трансформациям \"из коробки\"; Fluentd/Fluent Bit — легче, лучше подходит для Kubernetes (обычно ставится как DaemonSet — по одному экземпляру на каждую ноду).\n\nПрактические решения:\n\n- Настраиваю **индекс-паттерны с ротацией по дате** (например, `logs-2026.07.07`) и **ILM (Index Lifecycle Management)** — автоматический перевод старых индексов в холодное хранилище или удаление после N дней, иначе Elasticsearch со временем съедает весь диск.\n- Структурирую логи в JSON на уровне приложения там, где могу повлиять на разработку — неструктурированный текстовый лог парсить через grok-паттерны в Logstash сложнее и менее надёжно, чем сразу получать структурированные поля.\n- Для менее ресурсоёмкого варианта в связке с Grafana иногда выбираю **Loki** вместо полного ELK — он индексирует только метаданные (лейблы), а не полный текст, что существенно дешевле по ресурсам, если не нужен сложный полнотекстовый поиск по всему объёму логов.\n\n**Типичный кейс, который рассказываю как пример использования**: расследование инцидента — метрика в Grafana показала скачок latency на сервисе в 14:32, иду в Kibana, фильтрую логи этого сервиса за это время, ищу ошибки/исключения — обычно там сразу видна причина (например, начались таймауты к БД), которую метрика сама по себе не покажет.»"},{"q":"Настройка алертов — принципы, а не только техника","b":"1. **Алертить на симптомы, важные для бизнеса, а не на каждую техническую аномалию** — не \"CPU 85%\" (это может быть нормально), а \"сервис не отвечает\" или \"растёт латентность выше SLA\".\n2. **Не будить дежурного по некритичным алертам ночью** — критичные (сервис недоступен для пользователей) идут через звонок/push, некритичные — в общий канал команды, разбираются утром.\n3. **Группировка и подавление дублей** — если упал коммутатор, не должно прилететь 50 алертов по всем хостам за ним (trigger dependencies в Zabbix, group_by в Alertmanager).\n4. **Maintenance/Silence window** — обязательно отключаю алерты на время плановых работ, иначе команда быстро приучается игнорировать уведомления вообще, включая настоящие инциденты.\n5. **После каждого ложного или \"шумного\" алерта** — донастройка порога/правила, а не просто \"ну ладно, бывает\" — иначе накопление шума убивает доверие к системе алертинга целиком."},{"q":"работа со скриптами в Zabbix","b":"Хороший вопрос — в предыдущих ответах были разные типы скриптов, и они идут в разные места. Разложу по каждому.\n\n## 1. Ansible playbook и Jinja2-шаблон — НЕ в Zabbix вообще\n\n`install-zabbix-agent.yml` и `zabbix_agent2.conf.j2` — это инструменты **развёртывания**, они не имеют отношения к самому Zabbix как продукту. Они лежат:\n- На вашей рабочей машине/сервере автоматизации, откуда вы запускаете Ansible (например, `~/ansible/playbooks/install-zabbix-agent.yml`).\n- Результат их работы — обычный файл `/etc/zabbix/zabbix_agent2.conf`, который появляется на **целевом сервере** (том, где ставится агент), а не на Zabbix-сервере.\n\n## 2. UserParameter-конфиги — на КАЖДОМ хосте, который мониторится\n\nЭто ключевой момент, который часто путают: `UserParameter` пишется не на Zabbix-сервере, а **на том хосте, где стоит Zabbix Agent** и с которого нужно снимать нестандартную метрику.\n\n```bash\n# Путь на мониторимом сервере (не на Zabbix Server!):\n/etc/zabbix/zabbix_agent2.d/custom-queue.conf\n/etc/zabbix/zabbix_agent2.d/backup-check.conf\n/etc/zabbix/zabbix_agent2.d/cert-check.conf\n```\n\nПосле создания файла **обязательно перезапустить агента** на этом хосте:\n```bash\nsystemctl restart zabbix-agent2\n```\nИначе новый UserParameter не подхватится — частая причина, почему «я добавил item, а данных нет».\n\nОтдельные скрипты, на которые ссылается UserParameter (например, `check-cert-expiry.sh`), кладутся туда же, куда указан путь:\n```bash\n/usr/local/bin/check-cert-expiry.sh   # на том же мониторимом хосте\n```\n\n**После этого** — item с соответствующим ключом (`queue.count[/opt/1c/exchange/incoming]`, `cert.expiry.days[...]`) создаётся уже в **веб-интерфейсе Zabbix**: `Data collection → Hosts → [нужный хост] → Items → Create item`.\n\n## 3. Zabbix Trapper скрипт — тоже на мониторимом хосте\n\n```bash\n/usr/local/bin/report-order-queue.sh\n```\nЭто тоже лежит на хосте, где считается метрика, и запускается там же по cron. Он сам «стучится» на Zabbix Server через `zabbix_sender`. В веб-интерфейсе для него точно так же создаётся Item, но с типом **«Zabbix trapper»** — сервер просто пассивно ждёт, пока хост пришлёт значение.\n\n## 4. Webhook-скрипт для Telegram — ВНУТРИ веб-интерфейса Zabbix (на сервере)\n\nЭто единственный скрипт, который физически вводится **прямо в UI Zabbix Server**, а не в отдельный файл на диске:\n\n```\nВеб-интерфейс Zabbix → Administration → Media types \n→ создать/открыть Webhook → вкладка \"Script\"\n```\n\nТуда вставляется тот самый JavaScript-код с `Telegram.send(...)`. Он выполняется движком Zabbix Server (у Zabbix есть встроенный JS-движок для webhook'ов), физически хранится в базе данных Zabbix, а не в текстовом файле.\n\n## 5. Python-скрипты (register-host-zabbix.py, weekly-availability-report.py) — отдельно, вне Zabbix\n\nЭто внешние утилиты, которые обращаются к **Zabbix API** (`api_jsonrpc.php`) снаружи. Кладу их:\n- На сервере автоматизации/CI или на самом Zabbix-сервере (если удобнее) — просто как обычный скрипт.\n- Запускаю вручную или по cron:\n```bash\n0 9 * * 1 /usr/local/bin/weekly-availability-report.py >> /var/log/reports/sla.log\n```\nZabbix никак не «знает» об этом скрипте — он просто как клиент дёргает API снаружи.\n\n## Итоговая шпаргалка «куда что класть»\n\n| Скрипт/файл | Где физически лежит |\n|---|---|\n| Ansible playbook + Jinja2-шаблон | На машине автоматизации; результат — конфиг на **целевом хосте** |\n| `UserParameter=...` конфиги | `/etc/zabbix/zabbix_agent2.d/*.conf` на **мониторимом хосте** |\n| Скрипты, вызываемые UserParameter | Путь, указанный в самом UserParameter, на **мониторимом хосте** |\n| Trapper-скрипт (`zabbix_sender`) | На **мониторимом хосте**, вызывается по cron |\n| Webhook JS для алертов | **Веб-интерфейс Zabbix** → Media types → Script (хранится в БД) |\n| Python-скрипты через API | Где угодно снаружи (сервер автоматизации), обращаются к API удалённо |\n\nГлавное правило, которое стоит запомнить и проговорить на собеседовании: **агент собирает метрику там, где физически находится источник данных** (на мониторимом хосте), а **Zabbix Server/веб-интерфейс** — это только про то, куда данные приходят и как на них реагировать (items, триггеры, actions)."},{"q":"Настройка Items и Triggers в Zabbix для мониторинга бэкапов","b":"# Настройка Items и Triggers в Zabbix для мониторинга бэкапов\n\nПосле установки `backup.conf` (UserParameter'ы) на хост-агент, в Zabbix\nServer создаём Items и Triggers. Ниже — готовые к использованию\nконфигурации (через Data collection → Hosts → Items, либо через Zabbix API).\n\n## Item 1: возраст off-site бэкапа\n\n- **Name**: Off-site backup age\n- **Key**: `backup.age.offsite`\n- **Type**: Zabbix agent\n- **Type of information**: Numeric (unsigned)\n- **Units**: `s` (Zabbix сам отформатирует в удобный вид: \"5h 12m\")\n- **Update interval**: 10m\n\n### Trigger\n\n- **Name**: Off-site backup is overdue (RPO violated) on {HOST.NAME}\n- **Severity**: High\n- **Expression**:\n```\nlast(/{HOST.NAME}/backup.age.offsite) > 90000\n```\n(90000 секунд = 25 часов — RPO 24 часа + запас на длительность самого job'а.\n Подставьте реальный RPO, согласованный с бизнесом.)\n\n- **Отдельный триггер на \"бэкап никогда не запускался\"**:\n```\nlast(/{HOST.NAME}/backup.age.offsite) = -1\n```\nSeverity: Disaster — это значит мониторинг сам не настроен или маркер-файл\nне создаётся, что хуже, чем просто просроченный бэкап.\n\n## Item 2: статус тестового восстановления (per VMID)\n\nИспользуем **Item prototype** через LLD (Low-Level Discovery), либо\nотдельные Items на каждый критичный VMID вручную для небольшого числа\nTier-1 систем:\n\n- **Name**: Test restore status for VMID {#VMID}\n- **Key**: `backup.restore_status[{#VMID}]`\n- **Type of information**: Numeric (unsigned)\n- **Update interval**: 1h (обычно тестовое восстановление гоняется раз в\n  сутки/неделю по cron, чаще опрашивать смысла нет)\n\n### Trigger\n\n- **Name**: Test restore failed for VMID {#VMID}\n- **Severity**: High\n- **Expression**:\n```\nlast(/{HOST.NAME}/backup.restore_status[{#VMID}])=0\n```\n\n- **Trigger на отсутствие тестирования вообще** (это отдельная и важная\n  проблема — бэкап может годами идти \"успешно\", но ни разу не проверяться):\n```\nlast(/{HOST.NAME}/backup.restore_status[{#VMID}])=-1\n```\n\n## Item 3: заполненность PBS datastore\n\n- **Name**: PBS datastore usage %\n- **Key**: `backup.pbs.datastore_usage`\n- **Units**: `%`\n- **Update interval**: 30m\n\n### Triggers (эскалация по уровням, чтобы не пропустить \"тихое\" заполнение)\n```\nlast(/{HOST.NAME}/backup.pbs.datastore_usage) > 80   -> Warning\nlast(/{HOST.NAME}/backup.pbs.datastore_usage) > 90   -> High\nlast(/{HOST.NAME}/backup.pbs.datastore_usage) > 97   -> Disaster\n```\n\n## Дашборд для руководства\n\nРекомендуемые виджеты на отдельном Zabbix-дашборде \"Backup Health\":\n- Graph: возраст бэкапов по всем хостам (наглядно видно \"залипшие\" job'ы)\n- Problems widget: отфильтрован по tag `backup` — показывает только\n  проблемы бэкапов, не мешая общим алертам инфраструктуры\n- Data overview: статус тестовых восстановлений по всем Tier-1 VMID —\n  это как раз метрика \"% бэкапов с подтверждённым восстановлением\",\n  которую стоит показывать на еженедельном отчёте.\n\n## Тегирование алертов (важно для эскалации)\n\nПри создании triggers добавляйте тег `component: backup` — это позволяет\nнастроить отдельный Action (уведомление) с более высоким приоритетом\nэскалации, чем обычные infra-алерты: просроченный бэкап — это не \"снизилась\nпроизводительность\", это \"мы теряем возможность восстановиться\", и\nпо-хорошему эскалация должна идти быстрее."}],"scripts":[{"t":"установка на Linux через Ansible  Zabbix Agent","code":"# playbook: install-zabbix-agent.yml\n---\n- name: Установка Zabbix Agent 2 на Linux-хосты\n  hosts: linux_servers\n  become: yes\n  vars:\n    zabbix_server_ip: \"10.0.0.5\"\n    zabbix_server_active: \"10.0.0.5\"\n\n  tasks:\n    - name: Добавить репозиторий Zabbix (Debian/Ubuntu)\n      apt:\n        deb: \"https://repo.zabbix.com/zabbix/6.4/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.4-1+ubuntu22.04_all.deb\"\n      when: ansible_os_family == \"Debian\"\n\n    - name: Установить Zabbix Agent 2\n      package:\n        name: zabbix-agent2\n        state: present\n        update_cache: yes\n\n    - name: Настроить конфиг агента\n      template:\n        src: zabbix_agent2.conf.j2\n        dest: /etc/zabbix/zabbix_agent2.conf\n      notify: restart zabbix-agent2\n\n    - name: Запустить и включить автозапуск\n      systemd:\n        name: zabbix-agent2\n        state: started\n        enabled: yes\n\n    - name: Открыть порт агента в firewall\n      ufw:\n        rule: allow\n        port: '10050'\n        proto: tcp\n        src: \"{{ zabbix_server_ip }}\"\n\n  handlers:\n    - name: restart zabbix-agent2\n      systemd:\n        name: zabbix-agent2\n        state: restarted"},{"t":"Это Jinja2-шаблон, который использует Ansible для автоматической генерации конфигурационного файла Zabbix-агента на каждом удалённом сервере.","code":"{# templates/zabbix_agent2.conf.j2 #}\nServer={{ zabbix_server_ip }}\nServerActive={{ zabbix_server_active }}\nHostname={{ ansible_hostname }}\nLogFile=/var/log/zabbix/zabbix_agent2.log\nInclude=/etc/zabbix/zabbix_agent2.d/*.conf"},{"t":"Запуск на весь парк серверов сразу:","code":"ansible-playbook -i inventory.ini install-zabbix-agent.yml"},{"t":"Массовая установка на Windows через PowerShell (WinRM/GPO)","code":"# deploy-zabbix-agent-windows.ps1\nparam(\n    [string]$ZabbixServer = \"10.0.0.5\",\n    [string]$AgentVersion = \"6.4.10\"\n)\n\n$msiUrl = \"https://cdn.zabbix.com/zabbix/binaries/stable/6.4/$AgentVersion/zabbix_agent2-$AgentVersion-windows-amd64.msi\"\n$msiPath = \"$env:TEMP\\zabbix_agent2.msi\"\n\nInvoke-WebRequest -Uri $msiUrl -OutFile $msiPath\n\nStart-Process msiexec.exe -ArgumentList \"/i `\"$msiPath`\" /qn SERVER=$ZabbixServer SERVERACTIVE=$ZabbixServer HOSTNAME=$env:COMPUTERNAME\" -Wait\n\nNew-NetFirewallRule -DisplayName \"Zabbix Agent\" -Direction Inbound -Protocol TCP -LocalPort 10050 -RemoteAddress $ZabbixServer -Action Allow\n\nSet-Service -Name \"Zabbix Agent 2\" -StartupType Automatic\nStart-Service -Name \"Zabbix Agent 2\"\n\nWrite-Output \"Zabbix Agent установлен и запущен на $env:COMPUTERNAME\""},{"t":"Массовый запуск на список серверов через WinRM:","code":"$servers = Get-Content \"servers.txt\"\nforeach ($server in $servers) {\n    Invoke-Command -ComputerName $server -FilePath \".\\deploy-zabbix-agent-windows.ps1\"\n}"},{"t":"Автоматическая регистрация хоста через Zabbix API после установки агента","code":"#!/usr/bin/env python3\n# register-host-zabbix.py\nimport requests\nimport sys\n\nZABBIX_URL = \"http://zabbix.local/api_jsonrpc.php\"\nUSER = \"Admin\"\nPASSWORD = \"ВашПароль\"\n\ndef zabbix_call(method, params, auth=None):\n    payload = {\n        \"jsonrpc\": \"2.0\",\n        \"method\": method,\n        \"params\": params,\n        \"id\": 1\n    }\n    if auth:\n        payload[\"auth\"] = auth\n    r = requests.post(ZABBIX_URL, json=payload)\n    return r.json()\n\ndef main():\n    hostname = sys.argv[1]\n    ip = sys.argv[2]\n    template_name = sys.argv[3] if len(sys.argv) > 3 else \"Linux by Zabbix agent\"\n\n    auth = zabbix_call(\"user.login\", {\"username\": USER, \"password\": PASSWORD})[\"result\"]\n\n    templates = zabbix_call(\"template.get\", {\"filter\": {\"host\": [template_name]}}, auth)\n    template_id = templates[\"result\"][0][\"templateid\"]\n\n    groups = zabbix_call(\"hostgroup.get\", {\"filter\": {\"name\": [\"Linux servers\"]}}, auth)\n    group_id = groups[\"result\"][0][\"groupid\"]\n\n    result = zabbix_call(\"host.create\", {\n        \"host\": hostname,\n        \"interfaces\": [{\n            \"type\": 1, \"main\": 1, \"useip\": 1,\n            \"ip\": ip, \"dns\": \"\", \"port\": \"10050\"\n        }],\n        \"groups\": [{\"groupid\": group_id}],\n        \"templates\": [{\"templateid\": template_id}]\n    }, auth)\n\n    print(f\"Хост {hostname} зарегистрирован: {result}\")\n\nif __name__ == \"__main__\":\n    main()\n\n\npython3 register-host-zabbix.py new-server01 10.0.5.20 \"Linux by Zabbix agent\""},{"t":"Проверка SNMP вручную перед добавлением в Zabbix","code":"snmpwalk -v2c -c zabbix-ro 10.0.0.1 .1.3.6.1.2.1.1.1.0    # sysDescr — базовая проверка доступности\nsnmpwalk -v2c -c zabbix-ro 10.0.0.1 .1.3.6.1.2.1.2.2.1.2  # список интерфейсов"},{"t":"Мониторинг ИБП (APC) через SNMP","code":"# Ключевые OID для батареи и статуса\nUPS Battery Capacity: .1.3.6.1.4.1.318.1.1.1.2.2.1.0\nUPS Status:           .1.3.6.1.4.1.318.1.1.1.4.1.1.0"},{"t":"Maintenance period — плановые работы без ложных алертов","code":"Data collection → Maintenance periods → Create maintenance period\n\nName: Обновление ядра сети — суббота\nActive since/till: 07.07.2026 02:00 - 05:00\nHost groups: Network Devices\nMaintenance type: No data collection (или \"With data collection\" если метрики важны, но алерты не нужны)"},{"t":"Более практичный пример — webhook в Telegram (то, что реально настраиваю на большинстве проектов)","code":"Administration → Media types → создать Webhook\n\nScript (JavaScript в Zabbix):\n\nvar Telegram = {\n    token: '{$TELEGRAM.BOT.TOKEN}',\n    chat_id: '{$TELEGRAM.CHAT.ID}',\n    send: function(message) {\n        var response = HttpRequest.post(\n            'https://api.telegram.org/bot' + this.token + '/sendMessage',\n            JSON.stringify({chat_id: this.chat_id, text: message, parse_mode: 'HTML'}),\n            {'Content-Type': 'application/json'}\n        );\n        return response;\n    }\n};\n\ntry {\n    var params = JSON.parse(value);\n    Telegram.send('🔴 <b>' + params.subject + '</b>\\n' + params.message);\n    return 'OK';\n} catch (error) {\n    Zabbix.log(3, 'Telegram notification failed: ' + error);\n    throw 'Sending failed';\n}"},{"t":"Дашборд в Grafana поверх Zabbix (для более гибкой визуализации)","code":"{\n  \"title\": \"Инфраструктура — обзор\",\n  \"panels\": [\n    {\n      \"title\": \"CPU Load по серверам\",\n      \"type\": \"timeseries\",\n      \"datasource\": \"Zabbix\",\n      \"targets\": [{\n        \"group\": \"Linux servers\",\n        \"host\": \"/.*/\",\n        \"item\": \"CPU load\"\n      }]\n    },\n    {\n      \"title\": \"Активные проблемы\",\n      \"type\": \"table\",\n      \"datasource\": \"Zabbix\",\n      \"targets\": [{\n        \"queryType\": \"Problems\",\n        \"options\": {\"minSeverity\": 3}\n      }]\n    }\n  ]\n}"},{"t":"Полезный скрипт — недельный отчёт по SLA/доступности через API","code":"#!/usr/bin/env python3\n# weekly-availability-report.py\nimport requests\nfrom datetime import datetime, timedelta\n\nZABBIX_URL = \"http://zabbix.local/api_jsonrpc.php\"\n\ndef zabbix_call(method, params, auth=None):\n    payload = {\"jsonrpc\": \"2.0\", \"method\": method, \"params\": params, \"id\": 1}\n    if auth:\n        payload[\"auth\"] = auth\n    return requests.post(ZABBIX_URL, json=payload).json()\n\nauth = zabbix_call(\"user.login\", {\"username\": \"Admin\", \"password\": \"пароль\"})[\"result\"]\n\ntime_from = int((datetime.now() - timedelta(days=7)).timestamp())\ntime_till = int(datetime.now().timestamp())\n\nservices = zabbix_call(\"service.get\", {\"output\": \"extend\"}, auth)[\"result\"]\n\nprint(f\"Отчёт по доступности за неделю ({datetime.now().strftime('%Y-%m-%d')}):\\n\")\nfor svc in services:\n    sla = zabbix_call(\"service.getsla\", {\n        \"serviceids\": [svc[\"serviceid\"]],\n        \"intervals\": [{\"from\": time_from, \"to\": time_till}]\n    }, auth)\n    problem_time = sla[\"result\"].get(svc[\"serviceid\"], {}).get(\"problemTime\", 0)\n    availability = 100 - (problem_time / (time_till - time_from) * 100)\n    print(f\"  {svc['name']}: {availability:.2f}% доступности\")"},{"t":"Создание дашборда для дежурной смены (пример структуры)","code":"Monitoring → Dashboards → Create dashboard\n\nWidget 1: Problems — виджет со списком активных проблем,\n  фильтр: severity >= Average, sort by time\n\nWidget 2: Graph (Item value) — загрузка каналов интернет-провайдеров\n  Items: WAN1 Traffic In/Out, WAN2 Traffic In/Out\n\nWidget 3: Host availability — виджет-карта статуса всех критичных хостов\n  (зелёный/красный, как \"светофор\")\n\nWidget 4: SLA report — если настроены Services (SLA) в Zabbix,\n  показывает % доступности по сервисам за период"}]},{"id":"docker-podman","u":"U11","short":"Docker/Podman","full":"Docker/Podman","title":"Docker/Podman","eyebrow":"Новый раздел","desc":"","cards":[{"a":"НАСТРОЙКА РЕЕСТРА","t":"Настройка реестра образов","tags":[],"b":"<p><b>Container Registry</b> — хранилище Docker/Podman-образов. Может быть публичный (Docker Hub, Quay.io) или приватный.</p><ul><li><b>Docker Registry v2</b> — простой приватный реестр: <code>docker run -d -p 5000:5000 registry</code></li><li><b>Harbor</b> — enterprise registry с сканированием уязвимостей, управлением доступом, репликацией.</li><li><b>Nexus</b> — универсальный artifact manager (Docker, Maven, npm).</li><li>Все требуют HTTPS, аутентификации, регулярного резервного копирования образов.</li></ul>"},{"a":"HELM/COMPOSE","t":"Helm/Compose","tags":[],"b":"<p><b>Docker Compose</b> — инструмент для описания и запуска multi-container приложений через YAML (docker-compose.yml). Запуск: <code>docker-compose up</code></p><ul><li><b>Helm</b> — package manager для Kubernetes. Оборачивает K8s-манифесты в переиспользуемые чарты с переменными (values) для разных окружений.</li><li>Helm-чарты публикуются в репозиториях (Helm Hub, artifacthub.io), можно использовать community-чарты.</li></ul>"},{"a":"NGINX","t":"Nginx","tags":[],"b":"<p><b>Nginx</b> — легковесный высокопроизводительный веб-сервер и reverse proxy (альтернатива Apache). Использование: веб-сервер для статики, reverse proxy перед приложениями, load balancer, SSL termination.</p><ul><li>Конфиг: /etc/nginx/nginx.conf, /etc/nginx/sites-available/, reload без перезагрузки через <code>nginx -s reload</code></li><li>В контейнерах часто используется как sidecar для exposing приложений наружу.</li></ul>"},{"a":"HAPROXY","t":"HAProxy","tags":[],"b":"<p><b>HAProxy</b> — высокопроизводительный open-source load balancer и proxy. Часто используется перед кластерами серверов для распределения трафика.</p><ul><li><b>Возможности:</b> stick-сессии, health check, dynamic reconfiguration, обработка миллионов соединений.</li><li>Конфиг: /etc/haproxy/haproxy.cfg, фронтенд (где слушать) и бэкенды (куда маршрутить).</li></ul>"},{"a":"TRAEFIK","t":"Traefik","tags":[],"b":"<p><b>Traefik</b> — современный edge router/reverse proxy для микросервисов и контейнеров. Автоматически обнаруживает сервисы и настраивает маршруты без перезагрузки.</p><ul><li>Поддержка Docker/K8s labels, автоматический LetsEncrypt для HTTPS.</li><li>Dashboard для мониторинга маршрутов в real-time.</li></ul>"},{"a":"TLS/PKI","t":"TLS/PKI","tags":[],"b":"<p><b>TLS (Transport Layer Security)</b> — протокол шифрования трафика. <b>PKI (Public Key Infrastructure)</b> — управление сертификатами через CA (Certificate Authority).</p><ul><li><b>Self-signed:</b> сертификат выдан самому себе, для тестирования (браузеры выдадут warning).</li><li><b>LetsEncrypt:</b> бесплатный CA для публичных доменов, часто автоматизируется (certbot, Traefik).</li><li><b>Управление:</b> регулярное обновление перед expiration, отзыв скомпрометированных через CRL/OCSP.</li></ul>"},{"a":"ANSIBLE","t":"Ansible","tags":[],"b":"<p><b>Ansible</b> — Infrastructure as Code без установки агентов (работает через SSH). Playbooks описывают tasks в YAML: команды, установка пакетов, копирование файлов.</p><ul><li>Roles — переиспользуемые наборы tasks, handlers, templates, идеально для инкапсуляции функциональности.</li><li>Идемпотентность — повторное выполнение playbook безопасно, не повредит если состояние уже правильное.</li></ul>"},{"a":"INVENTORY","t":"Inventory","tags":[],"b":"<p><b>Inventory в Ansible</b> — описание хостов для управления (INI или YAML формат). Группирование: [webservers], [databases] и т.п., переменные на уровне хоста или группы.</p><ul><li>Динамический inventory — из облачных провайдеров (AWS EC2, Azure) автоматически.</li><li>Проверка: <code>ansible-inventory -i inventory.ini --list</code></li></ul>"},{"a":"CI/CD","t":"CI/CD","tags":[],"b":"<p><b>CI (Continuous Integration)</b> — при каждом push в Git автоматически запускаются тесты, сборка, анализ кода. <b>CD (Continuous Deployment)</b> — если всё прошло, автоматически деплоится на staging/production.</p><ul><li><b>Инструменты:</b> Jenkins, GitLab CI, GitHub Actions, CircleCI, Bamboo.</li><li><b>Pipeline:</b> код → unit тесты → build → integration тесты → deployment → smoke тесты.</li></ul>"},{"a":"GIT","t":"Git","tags":[],"b":"<p><b>Git</b> — распределённая система контроля версий. Основные команды: clone, add, commit, push, pull. Ветви (branches): main, develop, feature/xxx для разных направлений работы.</p><ul><li>Pull Request — способ code review перед слиянием веток (GitHub/GitLab).</li><li>.gitignore — файл с паттернами для игнорирования (логи, артефакты, зависимости).</li></ul>"},{"a":"GITLAB","t":"GitLab","tags":[],"b":"<p><b>Git</b> — распределённая система контроля версий. Основные команды: clone, add, commit, push, pull. Ветви (branches): main, develop, feature/xxx для разных направлений работы.</p><ul><li>Pull Request — способ code review перед слиянием веток (GitHub/GitLab).</li><li>.gitignore — файл с паттернами для игнорирования (логи, артефакты, зависимости).</li></ul>"},{"a":"JENKINS","t":"Jenkins","tags":[],"b":"<p><b>Jenkins</b> — сервер автоматизации, проверенный временем, мощный и гибкий через plugins. Jobs запускаются по расписанию или webhook от Git.</p><ul><li>Pipeline as Code — описание в Jenkinsfile (Groovy), хранится в репозитории вместе с кодом.</li><li>Большой ecosystem: Docker, K8s, облачные сервисы, уведомления.</li></ul>"},{"a":"УПРАВЛЕНИЕ КОНФИГУРАЦИЯМИ","t":"Управление конфигурациями","tags":[],"b":"<p><b>Configuration Management</b> — поддержание инфраструктуры в желаемом состоянии через код. Инструменты: Ansible (push, простой), Chef (pull, complex), Puppet (declarative), Terraform (provisioning).</p><ul><li>Идея: описать состояние в коде, инструмент приведёт реальное состояние к желаемому.</li><li>Версионирование в Git, code review, rollback возможен.</li></ul>"},{"a":"KUBERNETES /","t":"Kubernetes / k3s — архитектура","tags":[],"b":"<p>Kubernetes решает задачу, которую голый Docker не решает — оркестрацию множества контейнеров на множестве серверов: куда планировать под, что делать при отказе, как масштабировать.</p>\n<p>Базовые сущности, которые обязательно проговариваю:</p>\n<ul><li><b>Pod</b> — минимальная единица развёртывания, один или несколько тесно связанных контейнеров с общей сетью и хранилищем.</li><li><b>Deployment</b> — управляет репликами подов, обновлениями (rolling update) и откатом (rollback) при проблемах.</li><li><b>Service</b> — стабильная точка доступа к подам (у подов IP меняются при пересоздании, Service даёт постоянный endpoint и балансировку между репликами).</li><li><b>Node</b> — рабочий сервер кластера, на котором реально выполняются поды; управляется <b>kubelet</b>.</li><li><b>ConfigMap/Secret</b> — конфигурация и чувствительные данные (пароли, токены), передаваемые в поды без хардкода в образе.</li><li><b>Ingress</b> — маршрутизация внешнего HTTP(S)-трафика к сервисам внутри кластера (по сути, аналог reverse-proxy на уровне кластера — часто реализован через Nginx Ingress Controller или Traefik).</li></ul>"},{"a":"DOCKER COMPOSE","t":"Docker Compose","tags":[],"b":"<p>Docker Compose — это инструмент для определения и запуска многоконтейнерных приложений. Вы описываете все свои сервисы (например, веб-сервер, базу данных, кэш) в одном файле docker-compose.yaml.</p>\n<p>Для чего: Идеален для локальной разработки, тестирования и запуска небольших проектов на одном сервере.</p>\n<p>Как работает: Одной командой (docker-compose up) он создает сети, монтирует тома (хранилища) и запускает все контейнеры в нужном порядке.</p>\n<p>Ограничение: Он работает в рамках одного хоста (одного компьютера/сервера). Масштабировать его на кластер из 100 серверов практически невозможно.</p>"},{"a":"HELM: «МЕНЕДЖЕР","t":"Helm: «Менеджер пакетов для Kubernetes»","tags":[],"b":"<p>Helm — это пакетный менеджер для Kubernetes (K8s). Если Docker Compose — это «скрипт запуска», то Helm — это способ упаковывать, версионировать и настраивать сложные приложения, которые работают в кластере.</p>\n<p>Для чего: Используется в Production (промышленной среде). Позволяет развертывать огромные системы на десятки или сотни узлов.</p>\n<p>Как работает: Он оперирует «чартами» (Charts). Чарт — это шаблон, содержащий все инструкции для Kubernetes. Helm позволяет легко менять параметры (например, количество реплик, пароли к БД, версии образов) через один конфигурационный файл values.yaml, не переписывая исходные манифесты.</p>\n<p>Сильная сторона: Повторное использование. Вы можете найти готовый чарт для PostgreSQL, WordPress или Redis и установить их в свой кластер одной командой (helm install).</p>"},{"a":"KUBERNETES (K8S)","t":"Kubernetes (K8s)","tags":[],"b":"<p>K8s — индустриальный стандарт, самый сложный, но и самый функциональный вариант. Архитектура делится на <b>control plane</b> и <b>worker-ноды</b>:</p>\n<p><b>Control plane (управляющий уровень):</b></p>\n<ul><li><b>kube-apiserver</b> — единая точка входа, через которую всё общается с кластером (CLI <code>kubectl</code>, другие компоненты, внешние системы) — по сути REST API поверх etcd.</li><li><b>etcd</b> — распределённое key-value хранилище, где хранится всё состояние кластера (что должно быть развёрнуто, в каком количестве). Критичный компонент — если etcd потерян без бэкапа, кластер теряет всю конфигурацию.</li><li><b>kube-scheduler</b> — решает, на какую ноду поставить новый под, исходя из доступных ресурсов, ограничений (affinity/anti-affinity, taints/tolerations).</li><li><b>kube-controller-manager</b> — следит, чтобы фактическое состояние соответствовало желаемому (например, если под упал — Deployment controller создаст новый).</li></ul>\n<p><b>Worker-нода:</b></p>\n<ul><li><b>kubelet</b> — агент на каждой ноде, который реально запускает контейнеры через container runtime (containerd/CRI-O) по указаниям control plane.</li><li><b>kube-proxy</b> — обеспечивает сетевую связность для Service (правила iptables/IPVS).</li></ul>\n<p><b>Ключевые объекты, которые обязательно знать:</b></p>\n<ul><li><b>Pod</b> — минимальная единица развёртывания.</li><li><b>Deployment</b> — управление репликами и rolling update/rollback.</li><li><b>StatefulSet</b> — для приложений с состоянием (БД), где важен постоянный идентификатор и порядок запуска/остановки подов.</li><li><b>Service</b> — стабильная точка доступа + балансировка между подами.</li><li><b>Ingress</b> — маршрутизация внешнего HTTP(S) трафика внутрь кластера.</li><li><b>Namespace</b> — логическая изоляция ресурсов (например, отдельные namespace под dev/staging/prod в одном кластере).</li></ul>"},{"a":"NOMAD","t":"Nomad","tags":[],"b":"<p>Nomad от HashiCorp — принципиально проще устроен, и это его главное преимущество в определённых сценариях:</p>\n<ul><li>Единый бинарник, единый агент (может работать в режиме server или client), без разделения на десяток микросервисов control plane, как в K8s.</li><li><b>Ключевое отличие</b> — Nomad умеет оркестрировать не только контейнеры, но и обычные процессы, Java-приложения (JAR), виртуальные машины, batch-задачи — через систему <b>task drivers</b>. K8s заточен именно под контейнеры.</li><li>Более простая модель развёртывания (<b>Job</b> → <b>Task Group</b> → <b>Task</b>), декларативный HCL-файл вместо десятков YAML-манифестов.</li><li>Хорошо интегрируется с остальным стеком HashiCorp — <b>Consul</b> (service discovery, service mesh) и <b>Vault</b> (управление секретами) — если компания уже использует эти инструменты, Nomad ложится органично.</li></ul>\n<p><b>Когда выбираю Nomad</b>: смешанная инфраструктура (часть сервисов в контейнерах, часть — legacy-приложения на голых процессах или VM, которые не хочется/не можется контейнеризировать), команда уже использует Consul/Vault, не нужна вся экосистема K8s (Operators, CRD, service mesh уровня Istio) и важна простота эксплуатации меньшей командой.»</p>"},{"a":"ЧТО ТАКОЕ","t":"Что такое Ansible?","tags":[],"b":"<p><b>Ansible</b> — это инструмент для <b>автоматизации IT-операций</b> (Infrastructure as Code):</p>\n<ul><li><b>Агентless</b> — не требует установки на управляемые серверы</li><li><b>SSH-based</b> — работает через обычный SSH</li><li><b>Декларативный</b> — описываешь желаемое состояние, Ansible сам достигает его</li><li><b>Простой</b> — синтаксис YAML, доступен новичкам</li></ul>"},{"a":"ОСНОВНЫЕ КОМПОНЕНТЫ","t":"Основные компоненты Ansible","tags":[],"b":"<p>Inventory — список хостов Playbook — набор инструкций Roles — переиспользуемые блоки Modules — встроенные функции Ansible</p>"}],"qa":[{"q":"Контейнеризация","b":"то виртуализация на уровне операционной системы: в отличие от полноценных ВМ, контейнеры используют общее ядро хоста, но изолированы друг от друга через механизмы Linux — namespaces (что процесс видит: PID, сеть, точки монтирования, пользователей) и cgroups (сколько ресурсов CPU/RAM/IO ему разрешено использовать). Это даёт быстрый старт (секунды, а не минуты как у ВМ) и минимальные накладные расходы."},{"q":"Docker vs Podman — вопрос, который прямо любят задавать, чтобы проверить, работали ли вы руками с обоими:","b":"- **Docker** — классическая архитектура: демон **dockerd**, работающий с правами root, и клиент, который с ним общается через сокет. Все контейнеры — дочерние процессы демона.\n- **Podman** — daemonless: нет фонового процесса с root-правами, каждый контейнер — прямой потомок процесса пользователя, который его запустил. Это даёт два практических плюса: (1) можно полноценно работать **rootless** (контейнеры от непривилегированного пользователя — меньше риск при компрометации), (2) нет единой точки отказа в виде демона — если что-то падает, это падает конкретный контейнер, а не весь Docker.\n- CLI у Podman почти полностью совместим с Docker (`alias docker=podman` реально работает для большинства команд) — миграция обычно безболезненная.\n- На практике для продакшн Kubernetes-нод Podman/containerd чаще предпочтительнее именно из-за rootless-модели и меньшей поверхности атаки, Docker остаётся стандартом для локальной разработки за счёт экосистемы (Docker Desktop, Docker Compose).»"},{"q":"k3s","b":"я бы выбирал вместо полного k8s, когда: небольшой кластер (edge-локации, тестовый стенд, небольшая компания без выделенной DevOps-команды), ограниченные ресурсы сервера (k3s — один бинарник, меньше потребление памяти, встроенный containerd и локальная база вместо etcd по умолчанию), нужен быстрый старт без длительной настройки control-plane. Полный k8s беру, когда нужна вся гибкость экосистемы (сложные CNI-плагины, множество нод, интеграция с облачными провайдерами) и есть команда, готовая его поддерживать — k8s требователен к экспертизе на постоянной основе"},{"q":"Настройка реестра образов","b":"Registry — сервис хранения и раздачи собранных образов, обязательный компонент CI/CD для собственных приложений (публичные Docker Hub/GHCR подходят не всегда — политика безопасности часто требует, чтобы образы не покидали периметр компании).\n\nПрактическая настройка приватного реестра (`registry:2` от Docker или **Harbor** для более серьёзных требований):\n\n**Простой self-hosted registry:**\n\n```bash\ndocker run -d \\\n  --name registry \\\n  --restart=always \\\n  -p 5000:5000 \\\n  -v /opt/registry/data:/var/lib/registry \\\n  -v /opt/registry/certs:/certs \\\n  -e REGISTRY_HTTP_TLS_CERTIFICATE=/certs/domain.crt \\\n  -e REGISTRY_HTTP_TLS_KEY=/certs/domain.key \\\n  registry:2\n```\n\nВажные моменты, которые всегда проговариваю:\n\n- Без TLS Docker откажется работать с реестром — нужно либо валидный сертификат (Let's Encrypt), либо явно добавлять `insecure-registries` в конфиг демона на каждом клиенте (плохая практика для продакшна, только для лабораторных стендов).\n- Аутентификация — базовая через htpasswd или интеграция с внешним identity-провайдером для более серьёзных инсталляций.\n- **Garbage collection** — реестр не удаляет старые слои автоматически при перезаписи тегов, нужно периодически запускать `registry garbage-collect` — иначе диск забивается годами накопленных неиспользуемых слоёв.\n\n**Harbor** беру вместо голого registry, когда нужны: встроенный UI, RBAC (кто из команд что может пушить/тянуть), встроенное сканирование уязвимостей (Trivy встроен), репликация между несколькими Harbor-инстансами (для multi-region), подпись образов (Notary/Cosign integration)"},{"q":"Docker Compose и Helm","b":"| **Характеристика** | **Docker Compose** | **Helm (Kubernetes)** |\n| --- | --- | --- |\n| **Сфера применения** | Локальная разработка, dev-окружение | Production, большие кластеры |\n| **Область работы** | Один сервер (один хост) | Кластер (множество узлов) |\n| **Сложность** | Низкая | Высокая |\n| **Отказоустойчивость** | Базовая | Высокая (автоматическое восстановление) |\n| **Единица работы** | `docker-compose.yaml` | Helm Chart (`values.yaml` + шаблоны) |"},{"q":"Политика по уязвимостям (Vulnerability Management)","b":"«Это то, что чаще спрашивают именно у Teamlead/Head — не «как просканировать», а «как выстроен процесс»:\n\n1. **Сканирование образов при сборке (CI)** — обязательный шаг pipeline перед push в реестр: Trivy, Grype или встроенный сканер Harbor. Если находятся критичные уязвимости (CVE с высоким CVSS) — пайплайн должен **блокировать** публикацию образа, а не просто предупреждать (иначе предупреждения игнорируются годами).\n\n```bash\n# Пример: сканирование образа перед push в CI\ntrivy image --severity CRITICAL,HIGH --exit-code 1 myregistry.local/myapp:1.4.0\n```\n\n1. **Базовые образы (base images)** — политика использовать минимальные официальные образы (distroless, alpine) вместо полных дистрибутивов — меньше пакетов, меньше потенциальных уязвимостей, меньше площадь атаки.\n2. **Регулярное пересканирование уже опубликованных образов** — уязвимости находят и в уже развёрнутых образах постфактум (новый CVE в библиотеке, которая была «чистой» на момент публикации), поэтому Harbor/сканер должен периодически перепроверять весь реестр, а не только новые пуши.\n3. **Подпись образов** (Cosign/Notary) — гарантия, что в продакшн разворачивается именно тот образ, который прошёл CI и сканирование, а не подменённый кем-то вручную.\n4. **Политика на уровне кластера** — admission-контроллеры в Kubernetes (например, через OPA/Gatekeeper или встроенный Pod Security Admission), которые физически не дают запустить под из образа, не прошедшего сканирование или из неразрешённого реестра.\n5. **Процесс реагирования на найденную уязвимость** — приоритизация по CVSS + фактической эксплуатируемости (не любая High-уязвимость требует экстренного патча ночью), понятный SLA на патчинг по критичности (Critical — часы/сутки, High — неделя, Medium — плановый цикл обновлений), и обязательное тестирование обновлённого образа перед раскаткой в прод, чтобы патч сам не сломал сервис.\n\nОбщий вывод, который проговариваю: уязвимости в образах — это не разовая проверка, а непрерывный процесс на всех этапах — от сборки до уже работающего в проде контейнера, и он должен быть встроен в CI/CD, а не жить отдельным ручным чек-листом «раз в квартал».»"},{"q":"Как они связаны в работе Docker Compose и Helm?","b":"Представьте жизненный цикл проекта:\n\nРазработка: Вы пишете код и используете Docker Compose, чтобы быстро запустить приложение и базу данных на своем ноутбуке.\n\nДеплой (Deployment): Когда приложение готово, вы упаковываете его в Docker-образы.\n\nProduction: Вы переходите в Kubernetes, чтобы обеспечить стабильность. Чтобы не создавать тысячи мелких файлов конфигурации вручную, вы создаете Helm-чарт. Он берет ваши образы и разворачивает их в кластере с нужными настройками.\n\nКоротко: Docker Compose — это способ быстро «собрать конструктор» на столе, а Helm — это способ управлять «фабрикой» в Kubernetes.\n\nНужно ли вам углубиться в структуру Helm-чартов или посмотреть пример файла docker-compose.yaml для типового проекта?"},{"q":"Как отвечаю на прямое сравнение «K8s vs Nomad vs k3s»","b":"«Формулирую это так: k3s — это не альтернатива K8s, а его облегчённая форма для тех же задач, но с меньшими ресурсами. А вот выбор между **полным K8s и Nomad** — это уже архитектурное решение:\n\n| Критерий | Kubernetes | Nomad |\n| --- | --- | --- |\n| Сложность внедрения | Высокая | Низкая |\n| Экосистема (Helm, Operators, CRD) | Огромная | Меньше, но растёт |\n| Гибкость типов workload | Только контейнеры (в чистом виде) | Контейнеры + процессы + VM + batch |\n| Порог входа для команды | Высокий | Средний/низкий |\n| Community/industry adoption | Стандарт де-факто | Ниша, но стабильная |\n\nНа практике для новой инфраструктуры с нуля и с расчётом на рост чаще рекомендую K8s (или k3s для старта) именно из-за экосистемы — большинство готовых Helm-чартов, мониторинг-стеков (kube-prometheus-stack), CI/CD-интеграций рассчитаны именно на Kubernetes API. Nomad предлагаю там, где инфраструктура смешанная и не вся движется в контейнеры разом, либо где важна простота — команде из 2-3 инженеров поддерживать полноценный K8s-кластер тяжелее, чем Nomad.»"},{"q":"Как обновляете приложение без простоя?","b":"Rolling Update в Deployment (K8s) — постепенная замена старых подов новыми с проверкой readiness-проб перед переключением трафика; в Nomad — аналогичный механизм через update stanza (max_parallel, canary-деплойменты)."},{"q":"Что если под падает?","b":"controller-manager (K8s) видит расхождение желаемого/фактического состояния и пересоздаёт под автоматически; аналогично в Nomad через реconciliation loop."},{"q":"Как мониторите кластер?","b":"kube-state-metrics + Prometheus + Grafana — стандартный стек для K8s; для Nomad — встроенные метрики Nomad + Prometheus, плюс Consul для service health checks."},{"q":"Что такое CNI/CSI?","b":"CNI (Container Network Interface) — плагин, отвечающий за сеть подов (Calico, Flannel, Cilium); CSI (Container Storage Interface) — плагин для подключения внешнего хранилища к подам (например, Ceph RBD через ceph-csi)."}],"scripts":[{"t":"Docker Compose (docker-compose.yml) — для single-host сценариев (локальная разработка, небольшие продакшн-развёртывания без кластера):","code":"version: '3.8'\nservices:\n  web:\n    image: myregistry.local/myapp:1.4.0\n    ports:\n      - \"80:8080\"\n    environment:\n      - DB_HOST=db\n    depends_on:\n      - db\n    restart: unless-stopped\n\n  db:\n    image: postgres:16\n    volumes:\n      - db_data:/var/lib/postgresql/data\n    environment:\n      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password\n    secrets:\n      - db_password\n\nvolumes:\n  db_data:\nsecrets:\n  db_password:\n    file: ./db_password.txt"},{"t":"Helm — для Kubernetes: Chart — шаблонизированный набор манифестов с параметрами (values.yaml), позволяющий одной командой развернуть сложное приложение и управлять релизами:","code":"# Установка приложения из чарта\nhelm install myapp ./mychart -f values-prod.yaml\n\n# Обновление с новыми параметрами\nhelm upgrade myapp ./mychart -f values-prod.yaml --set image.tag=1.5.0\n\n# Откат при проблемах — то, чего у Compose просто нет\nhelm rollback myapp 1"}]},{"id":"net","u":"U12","short":"Сети","full":"Сети","title":"Сети","eyebrow":"Инфраструктура передачи данных","desc":"OSI/TCP-IP модели, базовые сервисы (DNS, DHCP), сегментация (VLAN, ACL) и удалённый доступ (VPN, маршрутизация).","cards":[{"a":"OSI","t":"Модель OSI (7 уровней)","tags":[],"b":"\n      <div class=\"diagram\">7 <i>Application</i>   — HTTP, DNS, SMTP, FTP\n6 <i>Presentation</i>  — шифрование, кодировки, SSL/TLS (частично)\n5 <i>Session</i>       — установление/удержание сессии (NetBIOS, RPC)\n4 <i>Transport</i>     — TCP / UDP, порты, сегменты\n3 <i>Network</i>       — IP-адресация, маршрутизация, пакеты\n2 <i>Data Link</i>     — MAC-адреса, коммутаторы, кадры (Ethernet)\n1 <i>Physical</i>      — кабели, сигналы, разъёмы, биты</div>\n      <p>Мнемоника: <code>Please Do Not Throw Sausage Pizza Away</code>.</p>"},{"a":"TCP/IP","t":"Модель TCP/IP (4 уровня)","tags":[],"b":"\n      <p>Практическая модель, которая реально используется в интернете. Уровни OSI 5-6-7 объединены в один <b>Application</b>.</p>\n      <ul>\n        <li><b>Application</b> — HTTP, DNS, SMTP, SSH.</li>\n        <li><b>Transport</b> — TCP (с гарантией доставки), UDP (без гарантии, быстрее).</li>\n        <li><b>Internet</b> — IP, ICMP, маршрутизация.</li>\n        <li><b>Network Access (Link)</b> — Ethernet, Wi-Fi, ARP.</li>\n      </ul>"},{"a":"DNS","t":"Domain Name System","tags":["ok"],"b":"\n      <p>Иерархическая система преобразования доменных имён в IP-адреса. Порт <code>53</code> (UDP — обычные запросы, TCP — зонные переносы и большие ответы).</p>\n      <ul>\n        <li><b>A</b> — имя → IPv4; <b>AAAA</b> — имя → IPv6.</li>\n        <li><b>CNAME</b> — псевдоним на другое имя.</li>\n        <li><b>MX</b> — почтовый сервер домена.</li>\n        <li><b>TXT</b> — произвольный текст (SPF/DKIM/подтверждение владения).</li>\n        <li><b>NS</b> — сервер имён для зоны; <b>SOA</b> — метаданные зоны; <b>PTR</b> — обратная зона (IP → имя); <b>SRV</b> — сервис + порт (используется AD).</li>\n        <li>Рекурсивный запрос (клиент → резолвер, который сам «бегает» по интернету) vs итеративный (между серверами имён).</li>\n      </ul>"},{"a":"DHCP","t":"Dynamic Host Configuration Protocol","tags":["ok"],"b":"\n      <p>Автоматическая выдача IP-адресов и сетевых настроек. Порты <code>67</code> (сервер) / <code>68</code> (клиент).</p>\n      <p>Процесс <b>DORA</b>: <code>Discover</code> (клиент ищет DHCP) → <code>Offer</code> (сервер предлагает адрес) → <code>Request</code> (клиент запрашивает именно его) → <code>Acknowledge</code> (сервер подтверждает).</p>\n      <ul>\n        <li>Выдаёт: IP, маску, шлюз, DNS, срок аренды (lease).</li>\n        <li><b>DHCP relay / IP helper</b> — пересылка запросов между VLAN, если сервер в другой подсети.</li>\n      </ul>"},{"a":"VLAN","t":"Virtual LAN","tags":[],"b":"\n      <p>Логическое разделение одной физической сети L2 на несколько изолированных широковещательных доменов.</p>\n      <ul>\n        <li>Тегирование <b>802.1Q</b> — добавляет VLAN ID в заголовок кадра Ethernet.</li>\n        <li><b>Access port</b> — принадлежит одному VLAN (для конечных устройств).</li>\n        <li><b>Trunk port</b> — пропускает несколько VLAN между коммутаторами (используется тегирование).</li>\n        <li><b>Native VLAN</b> — VLAN на trunk-порту, кадры которого идут без тега.</li>\n      </ul>"},{"a":"ACL","t":"Access Control List","tags":[],"b":"\n      <p>Список правил, разрешающих или запрещающих трафик по критериям: source/destination IP, порт, протокол.</p>\n      <ul>\n        <li><b>Standard ACL</b> — фильтрация только по source IP.</li>\n        <li><b>Extended ACL</b> — фильтрация по src/dst IP, порту, протоколу (TCP/UDP/ICMP).</li>\n        <li>Правила читаются сверху вниз, в конце неявный <code>deny all</code>.</li>\n      </ul>"},{"a":"VPN","t":"Virtual Private Network","tags":[],"b":"\n      <p>Технология создания зашифрованного «туннеля» поверх публичной сети.</p>\n      <ul>\n        <li><b>IPsec Site-to-Site</b> — постоянное соединение между офисами/датацентрами.</li>\n        <li><b>SSL/TLS VPN (Remote Access)</b> — удалённый доступ сотрудника (OpenVPN, AnyConnect, FortiClient).</li>\n        <li>Ключевые понятия: туннелирование, шифрование, IKE (обмен ключами), сертификаты/PSK.</li>\n      </ul>"},{"a":"ROUTE","t":"Маршрутизация","tags":[],"b":"\n      <p>Определение пути пакета между сетями на основе таблицы маршрутизации.</p>\n      <ul>\n        <li><b>Статическая</b> — маршруты прописаны вручную, просто и предсказуемо, не масштабируется.</li>\n        <li><b>Динамическая</b> — протоколы обмениваются маршрутами автоматически: <code>RIP</code> (устаревший, по числу хопов), <code>OSPF</code> (внутри организации, по «стоимости» линка), <code>BGP</code> (между операторами/интернет).</li>\n        <li><b>Default gateway</b> — маршрут «по умолчанию», если конкретного правила нет.</li>\n        <li><b>NAT/PAT</b> — подмена адресов для выхода локальной сети в интернет через один внешний IP.</li>\n      </ul>"},{"a":"NAT","t":"NAT","tags":[],"b":"<p>SNAT/Masquerade — выход локальной сети в интернет через один внешний IP, стандартная настройка на любом пограничном роутере. DNAT/Port forwarding — публикация внутреннего сервиса наружу (например, веб-портал 1С или почтовый сервер) — конкретный внешний порт пробрасывается на внутренний адрес и порт. NAT-T — обязательно учитываю при настройке IPsec, если одна из сторон за NAT — иначе ESP-пакеты просто теряются.</p>"},{"a":"VRRP","t":"VRRP","tags":
