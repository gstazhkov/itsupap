=============\""},{"t":"02 enable https","code":"#!/usr/bin/env bash\n#\n# Включение HTTPS для GitLab через встроенный Let's Encrypt (certbot встроен в Omnibus)\n# Требуется: домен должен реально резолвиться на этот сервер (для внутреннего IP не подойдёт,\n# в этом случае используйте самоподписанный сертификат или внутренний CA).\n#\n# Запуск: sudo bash 02_enable_https.sh <домен>\n\nset -euo pipefail\n\nDOMAIN=\"${1:-}\"\nif [[ -z \"$DOMAIN\" ]]; then\n  echo \"Использование: $0 <домен>\"\n  exit 1\nfi\n\nCONFIG_FILE=\"/etc/gitlab/gitlab.rb\"\n\necho \"=== Обновляем external_url на https ===\"\nsed -i \"s|^external_url.*|external_url 'https://${DOMAIN}'|\" \"$CONFIG_FILE\"\n\necho \"=== Включаем Let's Encrypt ===\"\ncat >> \"$CONFIG_FILE\" <<EOF\n\n# --- Добавлено скриптом 02_enable_https.sh ---\nletsencrypt['enable'] = true\nletsencrypt['contact_emails'] = ['devops@yourcompany.com']\nletsencrypt['auto_renew'] = true\nletsencrypt['auto_renew_hour'] = \"12\"\nletsencrypt['auto_renew_minute'] = \"30\"\nletsencrypt['auto_renew_day_of_month'] = \"*/7\"\nEOF\n\necho \"=== Применяем конфигурацию ===\"\ngitlab-ctl reconfigure\n\necho \"\"\necho \"HTTPS включён: https://${DOMAIN}\"\necho \"Сертификат будет автоматически продлеваться каждые 7 дней (проверка).\""},{"t":"03 install zabbix agent ·","code":"#!/usr/bin/env bash\n#\n# Установка Zabbix Agent 2 на сервере с GitLab (Ubuntu/Debian)\n# Zabbix Agent 2 выбран вместо classic agent — поддерживает плагины,\n# более производителен и активно поддерживается.\n#\n# Запуск: sudo bash 03_install_zabbix_agent.sh <IP_или_домен_Zabbix_Server> <имя_этого_хоста>\n#\n# Пример: sudo bash 03_install_zabbix_agent.sh 10.0.0.5 gitlab-prod-01\n\nset -euo pipefail\n\nif [[ \"$EUID\" -ne 0 ]]; then\n  echo \"Запускать от root (sudo).\" >&2\n  exit 1\nfi\n\nZABBIX_SERVER_IP=\"${1:-}\"\nHOSTNAME_IN_ZABBIX=\"${2:-}\"\n\nif [[ -z \"$ZABBIX_SERVER_IP\" || -z \"$HOSTNAME_IN_ZABBIX\" ]]; then\n  echo \"Использование: $0 <IP_Zabbix_Server> <имя_хоста_в_Zabbix>\"\n  exit 1\nfi\n\n# Определяем версию Ubuntu/Debian для корректного репозитория\n. /etc/os-release\nDISTRO_ID=\"${ID}\"\nDISTRO_VER=\"${VERSION_ID}\"\n\necho \"=== 1. Добавление репозитория Zabbix (актуальная LTS 6.4/7.0) ===\"\nZBX_REPO_DEB=\"https://repo.zabbix.com/zabbix/6.4/${DISTRO_ID}/pool/main/z/zabbix-release/zabbix-release_6.4-1+${DISTRO_ID}${DISTRO_VER}_all.deb\"\n\nwget -q \"$ZBX_REPO_DEB\" -O /tmp/zabbix-release.deb || {\n  echo \"Не удалось скачать напрямую по версии, проверьте актуальную ссылку на repo.zabbix.com\"\n  exit 1\n}\ndpkg -i /tmp/zabbix-release.deb\napt-get update -y\n\necho \"=== 2. Установка Zabbix Agent 2 ===\"\napt-get install -y zabbix-agent2 zabbix-agent2-plugin-*\n\necho \"=== 3. Конфигурация агента ===\"\nCONF=\"/etc/zabbix/zabbix_agent2.conf\"\n\nsed -i \"s/^Server=.*/Server=${ZABBIX_SERVER_IP}/\" \"$CONF\"\nsed -i \"s/^ServerActive=.*/ServerActive=${ZABBIX_SERVER_IP}/\" \"$CONF\"\nsed -i \"s/^Hostname=.*/Hostname=${HOSTNAME_IN_ZABBIX}/\" \"$CONF\"\n\n# Разрешаем подключать кастомные параметры мониторинга GitLab\nmkdir -p /etc/zabbix/zabbix_agent2.d\nif ! grep -q \"Include=/etc/zabbix/zabbix_agent2.d/\\*.conf\" \"$CONF\"; then\n  echo \"Include=/etc/zabbix/zabbix_agent2.d/*.conf\" >> \"$CONF\"\nfi\n\necho \"=== 4. Запуск и автозагрузка ===\"\nsystemctl enable zabbix-agent2\nsystemctl restart zabbix-agent2\nsystemctl status zabbix-agent2 --no-pager\n\necho \"\"\necho \"=== 5. Не забудьте открыть порт 10050 (агент) в firewall ===\"\nufw allow from \"${ZABBIX_SERVER_IP}\" to any port 10050 proto tcp 2>/dev/null || \\\n  echo \"ufw не активен или не установлен — настройте firewall вручную (порт 10050/tcp от Zabbix Server).\"\n\necho \"\"\necho \"Готово. Теперь на Zabbix Server добавьте хост '${HOSTNAME_IN_ZABBIX}' с IP этого сервера.\"\necho \"Далее выполните 04_setup_gitlab_userparameters.sh для GitLab-специфичных метрик.\""},{"t":"04 setup gitlab userparameters","code":"#!/usr/bin/env bash\n#\n# Настройка кастомных UserParameter для мониторинга GitLab через Zabbix Agent 2\n#\n# Что мониторим специфично для GitLab (не просто CPU/RAM хоста):\n#   1. Статус всех сервисов GitLab (gitlab-ctl status)\n#   2. Health-check эндпоинты GitLab (readiness/liveness)\n#   3. Свободное место в /var/opt/gitlab (там живут репозитории и артефакты)\n#   4. Количество \"зависших\" Sidekiq-джобов (очередь фоновых задач)\n#   5. Доступность PostgreSQL внутри GitLab-стека\n#\n# Запуск: sudo bash 04_setup_gitlab_userparameters.sh\n\nset -euo pipefail\n\nif [[ \"$EUID\" -ne 0 ]]; then\n  echo \"Запускать от root (sudo).\" >&2\n  exit 1\nfi\n\nUSERPARAM_DIR=\"/etc/zabbix/zabbix_agent2.d\"\nUSERPARAM_FILE=\"${USERPARAM_DIR}/gitlab_userparams.conf\"\n\nmkdir -p \"$USERPARAM_DIR\"\n\ncat > \"$USERPARAM_FILE\" <<'EOF'\n# =====================================================================\n# Кастомные метрики GitLab для Zabbix Agent 2\n# =====================================================================\n\n# --- 1. Общий статус: сколько сервисов GitLab упали (0 = всё ок) ---\nUserParameter=gitlab.services.down.count,gitlab-ctl status 2>/dev/null | grep -vc '^run:'\n\n# --- 2. Детальный статус конкретных критичных сервисов (1=работает, 0=упал) ---\nUserParameter=gitlab.service.status[*],gitlab-ctl status $1 2>/dev/null | grep -q '^run:' && echo 1 || echo 0\n\n# --- 3. Health-check readiness (проверяет, готов ли GitLab принимать трафик) ---\n# Возвращает HTTP-код: 200 = ок\nUserParameter=gitlab.health.readiness,curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1/-/readiness\n\n# --- 4. Health-check liveness ---\nUserParameter=gitlab.health.liveness,curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1/-/liveness\n\n# --- 5. Свободное место под репозитории и данные (в процентах) ---\nUserParameter=gitlab.disk.free.percent,df --output=pcent /var/opt/gitlab | tail -1 | tr -dc '0-9'\n\n# --- 6. Размер очереди Sidekiq (фоновые задачи: CI, вебхуки, письма) ---\n# Если очередь растёт бесконтрольно - признак перегрузки или упавшего воркера\nUserParameter=gitlab.sidekiq.queue.size,gitlab-rails runner 'puts Sidekiq::Queue.new.size' 2>/dev/null || echo -1\n\n# --- 7. Количество \"мёртвых\" (retry) джобов Sidekiq ---\nUserParameter=gitlab.sidekiq.retry.size,gitlab-rails runner 'puts Sidekiq::RetrySet.new.size' 2>/dev/null || echo -1\n\n# --- 8. Доступность встроенного PostgreSQL ---\nUserParameter=gitlab.postgres.alive,gitlab-ctl status postgresql 2>/dev/null | grep -q '^run:' && echo 1 || echo 0\n\n# --- 9. Версия GitLab (полезно для инвентаризации, не для алертов) ---\nUserParameter=gitlab.version,cat /opt/gitlab/version-manifest.txt 2>/dev/null | head -1\n\n# --- 10. Количество активных Runner'ов CI, зарегистрированных на этом инстансе ---\nUserParameter=gitlab.runners.online,gitlab-rails runner 'puts Ci::Runner.online.count' 2>/dev/null || echo -1\n\nEOF\n\nchmod 644 \"$USERPARAM_FILE\"\n\necho \"=== Файл с UserParameter создан: $USERPARAM_FILE ===\"\n\necho \"=== Проверка синтаксиса конфигурации агента ===\"\nzabbix_agent2 -c /etc/zabbix/zabbix_agent2.conf -t gitlab.disk.free.percent || true\n\necho \"=== Перезапуск агента для применения новых метрик ===\"\nsystemctl restart zabbix-agent2\n\necho \"\"\necho \"Готово. Ключи метрик, которые появятся на Zabbix Server (Latest Data):\"\necho \"  gitlab.services.down.count\"\necho \"  gitlab.service.status[sidekiq]  (пример - подставьте нужный сервис)\"\necho \"  gitlab.health.readiness\"\necho \"  gitlab.health.liveness\"\necho \"  gitlab.disk.free.percent\"\necho \"  gitlab.sidekiq.queue.size\"\necho \"  gitlab.sidekiq.retry.size\"\necho \"  gitlab.postgres.alive\"\necho \"  gitlab.version\"\necho \"  gitlab.runners.online\"\necho \"\"\necho \"Далее: на Zabbix Server создайте Template с этими Items + Triggers (см. README.md).\""},{"t":"Readme","code":"# Настройка алертов в Zabbix для GitLab\n\nСкрипты `01`-`04` ставят GitLab и настраивают сбор метрик агентом.\nЭта часть — что нужно сделать **на самом Zabbix Server** (через Web UI),\nчтобы метрики превратились в реальные уведомления (Slack/Telegram/Email).\n\n## Порядок действий\n\n### 1. Добавить хост в Zabbix Server\n`Data collection → Hosts → Create host`\n- Host name: как в скрипте `03_install_zabbix_agent.sh` (второй аргумент)\n- Templates: добавить `Linux by Zabbix agent` (стандартный, для CPU/RAM/Disk/Network)\n- Отдельно создать кастомный template для GitLab (см. шаг 2)\n- Interfaces: Agent, IP этого сервера, порт 10050\n\n### 2. Создать кастомный Template \"GitLab Health\"\n`Data collection → Templates → Create template`\n\nДобавить Items (тип: **Zabbix agent**, ключи — из `gitlab_userparams.conf`):\n\n| Item name | Key | Type of information | Update interval |\n|---|---|---|---|\n| GitLab services down | `gitlab.services.down.count` | Numeric (unsigned) | 1m |\n| GitLab readiness | `gitlab.health.readiness` | Numeric (unsigned) | 1m |\n| GitLab liveness | `gitlab.health.liveness` | Numeric (unsigned) | 1m |\n| GitLab disk free % | `gitlab.disk.free.percent` | Numeric (unsigned) | 5m |\n| Sidekiq queue size | `gitlab.sidekiq.queue.size` | Numeric (unsigned) | 2m |\n| Sidekiq retry size | `gitlab.sidekiq.retry.size` | Numeric (unsigned) | 5m |\n| PostgreSQL alive | `gitlab.postgres.alive` | Numeric (unsigned) | 1m |\n| Online CI runners | `gitlab.runners.online` | Numeric (unsigned) | 5m |\n\n### 3. Создать Triggers (условия срабатывания)\n\n`Data collection → Templates → [GitLab Health] → Triggers → Create trigger`\n\n**Критичные (Severity: Disaster/High):**\n\n```\nName: GitLab has services down\nExpression: last(/GitLab Health/gitlab.services.down.count)>0\nSeverity: High\n\nName: GitLab readiness check failed\nExpression: last(/GitLab Health/gitlab.health.readiness)<>200\nSeverity: Disaster\n\nName: PostgreSQL is down on GitLab host\nExpression: last(/GitLab Health/gitlab.postgres.alive)=0\nSeverity: Disaster\n```\n\n**Warning-уровень (предупреждение до того, как всё упало):**\n\n```\nName: GitLab disk space low\nExpression: last(/GitLab Health/gitlab.disk.free.percent)<15\nSeverity: Warning\n\nName: Sidekiq queue is growing abnormally\nExpression: min(/GitLab Health/gitlab.sidekiq.queue.size,10m)>500\nSeverity: Warning\n\nName: No CI runners online\nExpression: last(/GitLab Health/gitlab.runners.online)=0\nSeverity: Average\n```\n\n> Совет: используй функцию `min(...,10m)` вместо `last()` там, где важно не\n> реагировать на кратковременный всплеск (например, очередь Sidekiq может\n> подскочить на 30 секунд и это нормально — а вот держится 10 минут — уже проблема).\n\n### 4. Настроить Media Type (куда слать алерт)\n\n`Alerts → Media types`\n\n**Вариант A — Telegram (самый быстрый способ для команды):**\n1. Создать бота через `@BotFather`, получить `bot token`\n2. `Media types → Create media type`:\n   - Type: `Webhook`\n   - Использовать готовый шаблон Zabbix для Telegram (есть в стандартной поставке —\n     `Media types → Telegram`, просто указать токен)\n3. В своём Zabbix-пользователе (`Users → [твой юзер] → Media`) добавить Telegram,\n   указав `chat_id` (получить, написав боту `/start` и посмотрев через\n   `https://api.telegram.org/bot<TOKEN>/getUpdates`)\n\n**Вариант B — Email:**\n`Alerts → Media types → Email` → указать SMTP relay (host, port, from-address)\n\n**Вариант C — Slack:**\nАналогично Telegram — `Media types → Slack`, указать Webhook URL из Slack App.\n\n### 5. Создать Action (правило \"триггер → кому слать\")\n\n`Alerts → Actions → Trigger actions → Create action`\n\n```\nName: GitLab Critical Alerts\n\nConditions:\n  - Host groups equals \"GitLab Servers\"\n  - Trigger severity >= High\n\nOperations:\n  - Send message to: [группа дежурных / конкретный пользователь]\n  - Send to media type: Telegram\n  - Step 1, default message\n\nOperations for Recovery:\n  - Send message: \"RESOLVED: {TRIGGER.NAME}\"\n```\n\nОтдельное правило для Warning с меньшей частотой эскалации (например,\nслать в почту, а не будить дежурного в Telegram/SMS ночью).\n\n### 6. (Опционально) Escalation — если 15 минут никто не отреагировал\n\nВ том же Action добавляем `Step 2` с задержкой (`Step duration: 15m`)\nи другим получателем (например, эскалация на IT Head / дежурного инженера\nпо телефону через Zabbix + Twilio-интеграцию).\n\n---\n\n## Проверка что всё работает\n\n```bash\n# На сервере с GitLab — проверить, что агент видит метрики\nzabbix_agent2 -t gitlab.health.readiness\nzabbix_agent2 -t gitlab.services.down.count\n\n# На Zabbix Server — Latest Data\nMonitoring → Latest data → фильтр по хосту \"gitlab-prod-01\"\n```\n\nИскусственно вызвать алерт для проверки цепочки (не на проде!):\n```bash\nsudo gitlab-ctl stop sidekiq\n# подождать 1-2 интервала опроса, должен прилетов алерт \"services down\"\nsudo gitlab-ctl start sidekiq\n```"}]},{"id":"ansible","u":"U24","short":"Ansible","full":"Ansible","title":"Ansible","eyebrow":"Новый раздел","desc":"Ansible — это инструмент для автоматизации IT-операций (Infrastructure as Code):","cards":[{"a":"ЧТО ТАКОЕ","t":"Что такое Ansible?","tags":[],"b":"<p><b>Ansible</b> — это инструмент для <b>автоматизации IT-операций</b> (Infrastructure as Code):</p>\n<ul><li><b>Агентless</b> — не требует установки на управляемые серверы</li><li><b>SSH-based</b> — работает через обычный SSH</li><li><b>Декларативный</b> — описываешь желаемое состояние, Ansible сам достигает его</li><li><b>Простой</b> — синтаксис YAML, доступен новичкам</li></ul>"},{"a":"КОМАНДЫ ДЛЯ","t":"Команды для запуска","tags":[],"b":"<h4>Просмотреть что будет выполнено (DRY RUN)</h4>\n<p>ansible-playbook playbooks/site.yaml --check</p>\n<h4>Запустить с подробным выводом</h4>\n<p>ansible-playbook playbooks/site.yaml -v</p>\n<h4>Запустить только определённый тег</h4>\n<p>ansible-playbook playbooks/site.yaml --tags \"deploy\"</p>\n<h4>Запустить на конкретном хосте</h4>\n<p>ansible-playbook playbooks/site.yaml -l web1.example.com</p>\n<h4>Задать переменную из командной строки</h4>\n<p>ansible-playbook playbooks/site.yaml -e \"app_version=2.0.0\"</p>\n<h4>Проверить синтаксис</h4>\n<p>ansible-playbook playbooks/site.yaml --syntax-check</p>\n<h4>Вывести зарегистрированные факты</h4>\n<p>ansible all -m setup -i inventories/production/hosts.yaml</p>\n<h4>Ad-hoc команда (без playbook)</h4>\n<p>ansible webservers -m apt -a \"name=nginx state=present\" -b</p>"},{"a":"ВАЖНЫЕ MODULES","t":"Важные modules","tags":[],"b":"<table><thead><tr><th>Module</th><th>Назначение</th></tr></thead><tbody><tr><td><code>apt</code>, <code>yum</code></td><td>Установка пакетов</td></tr><tr><td><code>systemd</code></td><td>Управление сервисами</td></tr><tr><td><code>template</code></td><td>Копирование с подстановкой переменных</td></tr><tr><td><code>copy</code></td><td>Копирование файлов</td></tr><tr><td><code>command</code>, <code>shell</code></td><td>Запуск команд</td></tr><tr><td><code>git</code></td><td>Клонирование репозиториев</td></tr><tr><td><code>docker_container</code></td><td>Управление Docker контейнерами</td></tr><tr><td><code>lineinfile</code></td><td>Редактирование конфигов</td></tr><tr><td><code>user</code>, <code>group</code></td><td>Управление пользователями</td></tr><tr><td><code>wait_for</code></td><td>Ожидание событий</td></tr></tbody></table>"},{"a":"ТИПОВЫЕ ВОПРОСЫ","t":"Типовые вопросы на собесе","tags":[],"b":"<p><b>Q: В чём отличие Playbook от Role?</b> A: Playbook — главный оркестр, Role — переиспользуемый блок функциональности.</p>\n<p><b>Q: Как передать переменную в Playbook?</b> A: Через <code>-e</code> флаг, vars, group_vars, host_vars, facts.</p>\n<p><b>Q: Что означает <code>become: true</code>?</b> A: Выполнить задачу с sudo правами.</p>\n<p><b>Q: Как проверить синтаксис без выполнения?</b> A: <code>ansible-playbook site.yaml --check</code></p>\n<p><b>Q: Что такое Jinja2?</b> A: Язык шаблонизации, позволяет подставлять переменные в файлы.</p>"}],"qa":[{"q":"Основные компоненты Ansible","b":"## Основные компоненты Ansible\n\n```\n┌─────────────────────────────────────┐\n│     Control Node (локально)         │\n│  - Где установлен Ansible           │\n│  - Откуда запускаются плейбуки      │\n└────────────┬────────────────────────┘\n             │ SSH\n    ┌────────┴────────┬────────────┐\n    ▼                 ▼            ▼\n  Сервер 1        Сервер 2     Сервер 3\n(Managed Nodes)\n```\n\n### 1️⃣ **Inventory** — список хостов\n\n```\n# inventories/production/hosts.ini\n[webservers]\nweb1.example.com\nweb2.example.com\n\n[databases]\ndb1.example.com\n\n[all:vars]\nansible_user=ubuntu\nansible_ssh_private_key_file=~/.ssh/id_rsa\n```\n\nИли в YAML:\n\n```yaml\n# inventories/production/hosts.yaml\nall:\n  children:\n    webservers:\n      hosts:\n        web1.example.com:\n        web2.example.com:\n    databases:\n      hosts:\n        db1.example.com:\n  vars:\n    ansible_user: ubuntu\n    ansible_ssh_private_key_file: ~/.ssh/id_rsa\n```\n\n### 2️⃣ **Playbook** — набор инструкций\n\nЭто YAML файл с описанием, что нужно сделать.\n\n### 3️⃣ **Roles** — переиспользуемые блоки\n\n### 4️⃣ **Modules** — встроенные функции Ansible"},{"q":"Что такое Playbook?","b":"**Playbook** — это текстовый файл на YAML, содержащий:\n\n- **Plays** (пьесы) — на каких хостах что делать\n- **Tasks** (задачи) — конкретные действия\n- **Handlers** — действия при изменениях\n- **Variables** — переменные\n\n### Структура Playbook:\n\n```yaml\n---\n- name: \"Deploy Web Application\"           # Название play\n  hosts: webservers                        # На какие хосты применить\n  become: true                             # Запустить с sudo\n  gather_facts: yes                        # Собрать информацию о серверах\n\n  vars:                                    # Переменные\n    app_name: \"myapp\"\n    app_version: \"1.5.0\"\n    app_path: \"/opt/{{ app_name }}\"\n\n  pre_tasks:                               # Задачи ДО основных\n    - name: Update apt cache\n      apt:\n        update_cache: yes\n      when: ansible_os_family == \"Debian\"\n\n  tasks:                                   # Основные задачи\n    - name: Install dependencies\n      apt:\n        name:\n          - python3\n          - python3-pip\n          - git\n        state: present\n      tags: [\"install\", \"dependencies\"]   # Теги для фильтрации\n\n    - name: Clone application repository\n      git:\n        repo: \"https://github.com/user/{{ app_name }}.git\"\n        dest: \"{{ app_path }}\"\n        version: \"{{ app_version }}\"\n      notify: \"Restart application\"        # Триггер handler\n\n    - name: Install Python dependencies\n      pip:\n        requirements: \"{{ app_path }}/requirements.txt\"\n        virtualenv: \"{{ app_path }}/venv\"\n\n    - name: Copy configuration file\n      template:\n        src: config.j2                     # Jinja2 template\n        dest: \"{{ app_path }}/config.yml\"\n        mode: '0644'\n      notify: \"Restart application\"\n\n  handlers:                                # Срабатывают при notify\n    - name: Restart application\n      systemd:\n        name: \"{{ app_name }}\"\n        state: restarted\n\n  post_tasks:                              # Задачи ПОСЛЕ основных\n    - name: Check application health\n      uri:\n        url: \"http://localhost:8080/health\"\n        status_code: 200\n      retries: 3\n      delay: 5\n```\n\n---\n\n## 🔄 Как Ansible выполняет Playbook?\n\n1. **Читает** inventory и playbook\n2. **Собирает факты** о целевых хостах (ОС, IP, память и т.д.)\n3. **Подключается через SSH** к каждому хосту\n4. **Выполняет задачи** последовательно\n5. **Отправляет результаты** обратно\n6. **Выполняет handlers**, если были изменения\n\n### Жизненный цикл одной задачи:\n\n```\nTask: Install nginx\n    ↓\nЯвляется ли это идемпотентным?\n    ↓\nПроверить текущее состояние\n    ↓\nСостояние соответствует желаемому?\n    ├─ ДА → Результат: OK (не менялось)\n    └─ НЕТ → Выполнить действие → Результат: CHANGED\n    ↓\nВыполнить handler? (если указан)\n```\n\n---"},{"q":"Типичная структура проекта Ansimble","b":"```\nansible-project/\n├── ansible.cfg                 # Конфиг Ansible\n├── inventories/\n│   ├── production/\n│   │   ├── hosts.yaml\n│   │   ├── group_vars/\n│   │   │   ├── webservers.yaml\n│   │   │   └── databases.yaml\n│   │   └── host_vars/\n│   │       └── web1.example.com.yaml\n│   └── staging/\n├── roles/                      # Переиспользуемые блоки\n│   ├── common/\n│   │   ├── tasks/\n│   │   │   └── main.yaml\n│   │   ├── handlers/\n│   │   │   └── main.yaml\n│   │   ├── files/\n│   │   ├── templates/\n│   │   └── vars/\n│   ├── nginx/\n│   └── postgresql/\n├── playbooks/\n│   ├── site.yaml              # Главный playbook\n│   ├── deploy.yaml\n│   └── monitoring.yaml\n├── files/                      # Статические файлы\n├── templates/                  # Jinja2 шаблоны\n├── group_vars/\n├── host_vars/\n└── README.md\n```"},{"q":"Полный пример: Развертывание Nginx + приложение","b":"### Playbook:\n\n```yaml\n---\n- name: Setup web infrastructure\n  hosts: webservers\n  become: true\n\n  vars:\n    nginx_port: 80\n    app_port: 8080\n\n  roles:\n    - role: common\n    - role: nginx\n      vars:\n        nginx_sites:\n          - name: myapp\n            port: \"{{ nginx_port }}\"\n            backend_port: \"{{ app_port }}\"\n    - role: app_deploy\n```\n\n### Role: `roles/nginx/tasks/main.yaml`\n\n```yaml\n---\n- name: Install Nginx\n  apt:\n    name: nginx\n    state: present\n\n- name: Copy Nginx configuration\n  template:\n    src: nginx.conf.j2\n    dest: /etc/nginx/sites-available/default\n    backup: yes\n  notify: restart nginx\n\n- name: Enable Nginx\n  systemd:\n    name: nginx\n    enabled: yes\n    state: started\n```\n\n### Role: `roles/nginx/handlers/main.yaml`\n\n```yaml\n---\n- name: restart nginx\n  systemd:\n    name: nginx\n    state: restarted\n```\n\n### Role: `roles/nginx/templates/nginx.conf.j2`"}]}]</script>
<script>
let DATA = JSON.parse(document.getElementById('data-store').textContent);

const rack = document.getElementById('rack');
const sections = document.getElementById('sections');

function slugify(str){
  const map = {а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'e',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'c',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya'};
  return str.toLowerCase().split('').map(ch=>map[ch]!==undefined?map[ch]:ch).join('')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').replace(/-{2,}/g,'-') || 'block';
}

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str){
  return escapeHtml(str).replace(/"/g,'&quot;');
}

/* Инлайн-разметка: **жирный**, курсив через * или _, `код`, [текст](ссылка) */
function inlineFormat(str){
  let s = escapeHtml(str);
  const codeStash = [];
  s = s.replace(/`([^`\n]+?)`/g, (m, code)=>{
    codeStash.push(code);
    return '\u0000'+(codeStash.length-1)+'\u0000';
  });
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g, (m, text, url)=>{
    return '<a href="'+escapeAttr(url)+'" target="_blank" rel="noopener noreferrer">'+text+'</a>';
  });
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<b>$1</b>');
  s = s.replace(/\*([^*\n]+?)\*/g, '<i>$1</i>');
  s = s.replace(/(^|[^\w])_([^_\n]+?)_(?!\w)/g, '$1<i>$2</i>');
  s = s.replace(/\u0000(\d+)\u0000/g, (m, idx)=>'<code>'+codeStash[+idx]+'</code>');
  return s;
}

function buildListTree(items, level, idxRef){
  const nodes = [];
  while(idxRef.i < items.length && items[idxRef.i].level === level){
    const item = items[idxRef.i];
    idxRef.i++;
    let children = [];
    if(idxRef.i < items.length && items[idxRef.i].level > level){
      children = buildListTree(items, items[idxRef.i].level, idxRef);
    }
    nodes.push({type:item.type, text:item.text, children});
  }
  return nodes;
}
function renderListTree(nodes){
  if(!nodes || !nodes.length) return '';
  const type = nodes[0].type === 'ol' ? 'ol' : 'ul';
  let html = '<'+type+'>';
  nodes.forEach(n=>{ html += '<li>'+inlineFormat(n.text)+renderListTree(n.children)+'</li>'; });
  html += '</'+type+'>';
  return html;
}

const RE_BULLET = /^(\s*)([-*])\s+(.*)$/;
const RE_ORDER  = /^(\s*)(\d+)\.\s+(.*)$/;
const RE_HEAD   = /^(#{1,6})\s+(.*)$/;
const RE_HR     = /^(-{3,}|\*{3,})$/;
const RE_QUOTE  = /^\s*>\s?/;

/* Блочная разметка: заголовки, списки (в т.ч. вложенные), цитаты, таблицы,
   блоки кода, горизонтальные линии, колонки — плюс обычные абзацы. */
function textToHtml(raw){
  const lines = raw.replace(/\r\n/g,'\n').replace(/\t/g,'  ').split('\n');
  const out = [];
  let i = 0;
  const isBlank = l => l.trim()==='';

  while(i < lines.length){
    const line = lines[i];
    const trimmed = line.trim();

    if(isBlank(line)){ i++; continue; }

    if(/^```/.test(trimmed)){
      i++;
      const codeLines = [];
      while(i < lines.length && lines[i].trim() !== '```'){ codeLines.push(lines[i]); i++; }
      i++;
      out.push('<pre><code>'+escapeHtml(codeLines.join('\n'))+'</code></pre>');
      continue;
    }

    if(trimmed === ':::columns'){
      i++;
      const groups = [[]];
      while(i < lines.length && lines[i].trim() !== ':::'){
        if(lines[i].trim() === ':::col') groups.push([]);
        else groups[groups.length-1].push(lines[i]);
        i++;
      }
      i++;
      const colsHtml = groups.map(g=>'<div class="col">'+textToHtml(g.join('\n'))+'</div>').join('');
      out.push('<div class="columns">'+colsHtml+'</div>');
      continue;
    }

    if(RE_HR.test(trimmed)){ out.push('<hr>'); i++; continue; }

    const hm = trimmed.match(RE_HEAD);
    if(hm){
      const level = hm[1].length;
      const tag = level<=1 ? 'h4' : (level===2 ? 'h5' : 'h6');
      out.push('<'+tag+'>'+inlineFormat(hm[2])+'</'+tag+'>');
      i++; continue;
    }

    if(RE_QUOTE.test(line)){
      const qLines = [];
      while(i < lines.length && (RE_QUOTE.test(lines[i]) || isBlank(lines[i]))){
        qLines.push(lines[i].replace(RE_QUOTE,''));
        i++;
      }
      out.push('<blockquote>'+textToHtml(qLines.join('\n'))+'</blockquote>');
      continue;
    }

    const nextIsSep = i+1<lines.length && /^[\s:|-]+$/.test(lines[i+1].trim()) && lines[i+1].indexOf('-')!==-1;
    if(trimmed.indexOf('|')!==-1 && nextIsSep){
      const headCells = trimmed.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      i += 2;
      const rows = [];
      while(i < lines.length && !isBlank(lines[i]) && lines[i].indexOf('|')!==-1){
        rows.push(lines[i].trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim()));
        i++;
      }
      let tbl = '<table><thead><tr>'+headCells.map(c=>'<th>'+inlineFormat(c)+'</th>').join('')+'</tr></thead><tbody>';
      rows.forEach(r=>{ tbl += '<tr>'+r.map(c=>'<td>'+inlineFormat(c)+'</td>').join('')+'</tr>'; });
      tbl += '</tbody></table>';
      out.push(tbl);
      continue;
    }

    if(RE_BULLET.test(line) || RE_ORDER.test(line)){
      const items = [];
      while(i < lines.length){
        const bm = lines[i].match(RE_BULLET);
        const om = lines[i].match(RE_ORDER);
        if(bm){ items.push({level:Math.floor(bm[1].length/2), type:'ul', text:bm[3]}); i++; }
        else if(om){ items.push({level:Math.floor(om[1].length/2), type:'ol', text:om[3]}); i++; }
        else if(isBlank(lines[i]) && i+1<lines.length && items.length && (
            (items[items.length-1].type==='ul' && RE_BULLET.test(lines[i+1])) ||
            (items[items.length-1].type==='ol' && RE_ORDER.test(lines[i+1]))
          )){ i++; }
        else break;
      }
      const tree = buildListTree(items, items[0].level, {i:0});
      out.push(renderListTree(tree));
      continue;
    }

    const paraLines = [];
    while(i < lines.length && !isBlank(lines[i]) &&
      !/^```/.test(lines[i].trim()) && lines[i].trim() !== ':::columns' &&
      !RE_HR.test(lines[i].trim()) && !RE_HEAD.test(lines[i].trim()) &&
      !RE_QUOTE.test(lines[i]) && !RE_BULLET.test(lines[i]) && !RE_ORDER.test(lines[i]) &&
      !(lines[i].indexOf('|')!==-1 && i+1<lines.length && /^[\s:|-]+$/.test(lines[i+1].trim()) && lines[i+1].indexOf('-')!==-1)
    ){ paraLines.push(lines[i]); i++; }

    if(paraLines.length){
      out.push('<p>'+paraLines.map((l,idx)=>{
        const br = /\\\s*$/.test(l);
        return inlineFormat(l.replace(/\\\s*$/,'')) + (idx<paraLines.length-1 ? (br?'<br>':' ') : '');
      }).join('')+'</p>');
    } else { i++; }
  }
  return out.join('\n');
}

rack.addEventListener('click', e=>{
  const editBtn = e.target.closest('[data-edit-block]');
  if(editBtn){
    e.preventDefault();
    e.stopPropagation();
    const id = editBtn.dataset.editBlock;
    const sec = DATA.find(s=>s.id===id);
    if(sec){
      document.getElementById('editBlockId').value = sec.id;
      document.getElementById('editBlockTitle').value = sec.title;
      document.getElementById('editBlockShort').value = sec.short;
      document.getElementById('editBlockEyebrow').value = sec.eyebrow;
      document.getElementById('editBlockDesc').value = sec.desc || '';
      document.getElementById('editBlockForm').classList.remove('hidden');
      document.getElementById('editBlockOverlay').classList.add('visible');
    }
    return;
  }
  const delBtn = e.target.closest('[data-del-block]');
  if(delBtn){
    e.preventDefault();
    e.stopPropagation();
    const id = delBtn.dataset.delBlock;
    const sec = DATA.find(s=>s.id===id);
    if(!confirm('Удалить блок «'+(sec?sec.full:id)+'» вместе со всеми карточками и вопросами?')) return;
    const idx = DATA.findIndex(s=>s.id===id);
    if(idx>-1) DATA.splice(idx,1);
    const slotEl = delBtn.closest('.slot');
    const wasActive = slotEl.classList.contains('active');
    slotEl.remove();
    const secEl = document.getElementById('sec-'+id);
    if(secEl) secEl.remove();
    renumberUnits();
    syncDataStore();
    updateCounts();
    if(wasActive && DATA[0]) selectSection(DATA[0].id);
    return;
  }
  const slot = e.target.closest('.slot');
  if(slot) selectSection(slot.dataset.id);
});

const input = document.getElementById('searchInput');
input.addEventListener('input',()=>{
  const q = input.value.trim().toLowerCase();
  document.querySelectorAll('.section').forEach(sec=>{
    let visibleCount = 0;
    sec.querySelectorAll('.card').forEach(card=>{
      const match = !q || card.dataset.search.includes(q);
      card.classList.toggle('hidden', !match);
      if(match){ visibleCount++; if(q) card.open = true; else card.open=false; }
    });
    const nr = sec.querySelector('[data-noresults]');
    if(nr) nr.classList.toggle('hidden', visibleCount!==0 || !q);
  });
  if(q){
    document.querySelectorAll('.section').forEach(el=>el.classList.add('active'));
    document.querySelectorAll('.section').forEach(el=>{
      const anyVisible = [...el.querySelectorAll('.card')].some(c=>!c.classList.contains('hidden'));
      el.classList.toggle('active', anyVisible);
    });
  } else {
    const activeId = document.querySelector('.slot.active')?.dataset.id || DATA[0].id;
    selectSection(activeId);
  }
});

    e.stopPropagation();
    const cardEl = editCardBtn.closest('.card');

    const index = Array.from(grid.children).indexOf(cardEl);

    if(sec && index>-1 && sec.cards && sec.cards[index]){
      const card = sec.cards[index];
      const form = document.querySelector('[data-card-form="'+sectionId+'"]');
      if(form){
        form.querySelector('[data-field="a"]').value = card.a || '';
        form.querySelector('[data-field="t"]').value = card.t;
        form.querySelector('[data-field="b"]').value = card.b;
        const tagSelect = form.querySelector('[data-field="tag"]');
        if(tagSelect){
          tagSelect.value = (card.tags && card.tags[0]) ? card.tags[0] : '';
        }
        form.dataset.editCardIndex = index;
        form.classList.toggle('hidden');
        const submitBtn = form.querySelector('[data-card-submit]');
        if(submitBtn) submitBtn.textContent = 'Сохранить';
      }
    }
    return;
  }
  const delCardBtn = e.target.closest('[data-del-card]');
  if(delCardBtn){
    e.preventDefault();
    e.stopPropagation();
    const cardEl = delCardBtn.closest('.card');
    const grid = cardEl.closest('[data-grid]');
    const sectionId = grid.dataset.grid;
    const sec = DATA.find(s=>s.id===sectionId);
    const index = Array.from(grid.children).indexOf(cardEl);
    if(!confirm('Удалить эту карточку?')) return;
    if(sec && index>-1) sec.cards.splice(index,1);
    cardEl.remove();
    syncDataStore();
    return;
  }
  const addBtn = e.target.closest('[data-add-card]');
  if(addBtn){
    const form = document.querySelector('[data-card-form="'+addBtn.dataset.addCard+'"]');
    if(form) form.classList.toggle('hidden');
    return;
  }
  const cancelBtn = e.target.closest('[data-card-cancel]');
  if(cancelBtn){
    const form = cancelBtn.closest('.card-form');
    form.querySelectorAll('input,textarea').forEach(el=>el.value='');
    const sel = form.querySelector('select');
    if(sel) sel.selectedIndex = 0;
    delete form.dataset.editCardIndex;
    const submitBtn = form.querySelector('[data-card-submit]');
    if(submitBtn) submitBtn.textContent = 'Добавить';
    form.classList.add('hidden');
    return;
  }
  const submitBtn = e.target.closest('[data-card-submit]');
  if(submitBtn){
    const sectionId = submitBtn.dataset.cardSubmit;
    const form = submitBtn.closest('.card-form');
    const t = form.querySelector('[data-field="t"]').value.trim();
    const aRaw = form.querySelector('[data-field="a"]').value.trim();
    const tag = form.querySelector('[data-field="tag"]').value;
    const bodyRaw = form.querySelector('[data-field="b"]').value.trim();
    if(!t || !bodyRaw){ alert('Заполните заголовок и текст ответа'); return; }
    const a = aRaw || t.split(' ').slice(0,2).join(' ').toUpperCase();
    const card = { a, t, tags: tag ? [tag] : [], b: textToHtml(bodyRaw) };
    const sec = DATA.find(s=>s.id===sectionId);
    const editIndex = form.dataset.editCardIndex;
    const grid = document.querySelector('[data-grid="'+sectionId+'"]');
    
    if(editIndex !== undefined && editIndex !== ''){
      // Редактирование существующей карточки
      sec.cards[+editIndex] = card;
      const cardEls = grid.querySelectorAll('.card');
      if(cardEls[editIndex]){
        cardEls[editIndex].dataset.search = (card.a+' '+card.t+' '+card.b).toLowerCase();
        cardEls[editIndex].innerHTML = '<summary><span class="abbr">'+card.a+'</span><span class="term-name">'+card.t+'</span><button type="button" class="card-del" data-edit-card title="Редактировать">✎</button><button type="button" class="card-del" data-del-card title="Удалить карточку">✕</button><svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></summary><div class="card-body">'+card.b+'</div>';
      }
      delete form.dataset.editCardIndex;
      submitBtn.textContent = 'Добавить';
    } else {
      // Добавление новой карточки
      sec.cards.push(card);
      renderCard(grid, card);
    }
    syncDataStore();
    form.querySelectorAll('input,textarea').forEach(el=>el.value='');
    form.classList.add('hidden');
    return;
  }

  /* ---- Вопрос-ответ: добавление / редактирование / удаление ---- */
  const addQaBtn = e.target.closest('[data-add-qa]');
  if(addQaBtn){
    const form = document.querySelector('[data-qa-form="'+addQaBtn.dataset.addQa+'"]');
    if(form){
      const wasHidden = form.classList.contains('hidden');
      if(wasHidden){
        resetQaForm(form);
        form.classList.remove('hidden');
      } else {
        form.classList.add('hidden');
      }
    }
    return;
  }
  const qaCancelBtn = e.target.closest('[data-qa-cancel]');
  if(qaCancelBtn){
    resetQaForm(qaCancelBtn.closest('.card-form'));
    return;
  }
  const qaEditBtn = e.target.closest('[data-qa-edit]');
  if(qaEditBtn){
    e.preventDefault();
    e.stopPropagation();
    const item = qaEditBtn.closest('.qa-item');
    const list = item.closest('[data-qa-list]');
    const sectionId = list.dataset.qaList;
    const index = Array.from(list.children).indexOf(item);
    const sec = DATA.find(s=>s.id===sectionId);
    const data = sec.qa[index];
    const form = document.querySelector('[data-qa-form="'+sectionId+'"]');
    form.querySelector('[data-field="q"]').value = data.q;
    form.querySelector('[data-field="qa-a"]').value = data.b;
    form.dataset.editIndex = index;
    form.querySelector('[data-qa-submit]').textContent = 'Сохранить';
    form.classList.remove('hidden');
    return;
  }
  const qaDelBtn = e.target.closest('[data-qa-del]');
  if(qaDelBtn){
    e.preventDefault();
    e.stopPropagation();
    if(!confirm('Удалить этот вопрос-ответ?')) return;
    const item = qaDelBtn.closest('.qa-item');
    const list = item.closest('[data-qa-list]');
    const sectionId = list.dataset.qaList;
    const index = Array.from(list.children).indexOf(item);
    const sec = DATA.find(s=>s.id===sectionId);
    if(sec && sec.qa && index>-1) sec.qa.splice(index,1);
    item.remove();
    const form = document.querySelector('[data-qa-form="'+sectionId+'"]');
    if(form) resetQaForm(form);
    syncDataStore();
    return;
  }
  const qaSubmitBtn = e.target.closest('[data-qa-submit]');
  if(qaSubmitBtn){
    const sectionId = qaSubmitBtn.dataset.qaSubmit;
    const form = qaSubmitBtn.closest('.card-form');
    const q = form.querySelector('[data-field="q"]').value.trim();
    const bodyRaw = form.querySelector('[data-field="qa-a"]').value.trim();
    if(!q || !bodyRaw){ alert('Заполните вопрос и ответ'); return; }
    const sec = DATA.find(s=>s.id===sectionId);
    if(!sec.qa) sec.qa = [];
    const editIndex = form.dataset.editIndex;
    if(editIndex !== undefined && editIndex !== ''){
      sec.qa[+editIndex] = { q, b: bodyRaw };
    } else {
      sec.qa.push({ q, b: bodyRaw });
    }
    const list = document.querySelector('[data-qa-list="'+sectionId+'"]');
    list.innerHTML = '';
    sec.qa.forEach(item=>renderQaItem(list, item));
    syncDataStore();
    resetQaForm(form);
  }

  /* ---- Скрипты: добавление / редактирование / удаление ---- */
  const addScriptBtn = e.target.closest('[data-add-script]');
  if(addScriptBtn){
    const form = document.querySelector('[data-script-form="'+addScriptBtn.dataset.addScript+'"]');
    if(form){
      const wasHidden = form.classList.contains('hidden');
      if(wasHidden){
        resetScriptForm(form);
        form.classList.remove('hidden');
      } else {
        form.classList.add('hidden');
      }
    }
    return;
  }
  const scriptCancelBtn = e.target.closest('[data-script-cancel]');
  if(scriptCancelBtn){
    resetScriptForm(scriptCancelBtn.closest('.card-form'));
    return;
  }
  const scriptEditBtn = e.target.closest('[data-script-edit]');
  if(scriptEditBtn){
    e.preventDefault();
    e.stopPropagation();
    const item = scriptEditBtn.closest('.script-item');
    const list = item.closest('[data-script-list]');
    const sectionId = list.dataset.scriptList;
    const index = Array.from(list.children).indexOf(item);
    const sec = DATA.find(s=>s.id===sectionId);
    const data = sec.scripts[index];
    const form = document.querySelector('[data-script-form="'+sectionId+'"]');
    form.querySelector('[data-field="st"]').value = data.t;
    form.querySelector('[data-field="script-code"]').value = data.code;
    form.dataset.editIndex = index;
    form.querySelector('[data-script-submit]').textContent = 'Сохранить';
    form.classList.remove('hidden');
    return;
  }
  const scriptDelBtn = e.target.closest('[data-script-del]');
  if(scriptDelBtn){
    e.preventDefault();
    e.stopPropagation();
    if(!confirm('Удалить этот скрипт?')) return;
    const item = scriptDelBtn.closest('.script-item');
    const list = item.closest('[data-script-list]');
    const sectionId = list.dataset.scriptList;
    const index = Array.from(list.children).indexOf(item);
    const sec = DATA.find(s=>s.id===sectionId);
    if(sec && sec.scripts && index>-1) sec.scripts.splice(index,1);
    item.remove();
    const form = document.querySelector('[data-script-form="'+sectionId+'"]');
    if(form) resetScriptForm(form);
    syncDataStore();
    return;
  }
  const scriptSubmitBtn = e.target.closest('[data-script-submit]');
  if(scriptSubmitBtn){
    const sectionId = scriptSubmitBtn.dataset.scriptSubmit;
    const form = scriptSubmitBtn.closest('.card-form');
    const st = form.querySelector('[data-field="st"]').value.trim();
    const codeRaw = form.querySelector('[data-field="script-code"]').value.trim();
    if(!st || !codeRaw){ alert('Заполните название и код скрипта'); return; }
    const sec = DATA.find(s=>s.id===sectionId);
    if(!sec.scripts) sec.scripts = [];
    const editIndex = form.dataset.editIndex;
    if(editIndex !== undefined && editIndex !== ''){
      sec.scripts[+editIndex] = { t: st, code: codeRaw };
    } else {
      sec.scripts.push({ t: st, code: codeRaw });
    }
    const list = document.querySelector('[data-script-list="'+sectionId+'"]');
    list.innerHTML = '';
    sec.scripts.forEach(item=>renderScriptItem(list, item));
    syncDataStore();
    resetScriptForm(form);
  }
});

/* ---- Drag and drop для SLOTS и CARDS ---- */
let draggedSlot = null;
let draggedCard = null;

document.addEventListener('dragstart', (e)=>{
  if(e.target.classList.contains('slot')){
    draggedSlot = e.target;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  } else {
    const card = e.target.closest('.card');
    if(card){
      draggedCard = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
  }
});

document.addEventListener('dragend', (e)=>{
  draggedSlot = null;
  draggedCard = null;
  document.querySelectorAll('.slot.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.slot.drag-over').forEach(el=>el.classList.remove('drag-over'));
  document.querySelectorAll('.card.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.card.drag-over').forEach(el=>el.classList.remove('drag-over'));
});

document.addEventListener('dragover', (e)=>{
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  const slotOver = e.target.closest('.slot');
  document.querySelectorAll('.slot.drag-over').forEach(el=>{ if(el!==slotOver) el.classList.remove('drag-over'); });
  if(slotOver && draggedSlot && draggedSlot !== slotOver){
    slotOver.classList.add('drag-over');
  }

  const card = e.target.closest('.card');
  document.querySelectorAll('.card.drag-over').forEach(el=>{ if(el!==card) el.classList.remove('drag-over'); });
  if(card && draggedCard && card !== draggedCard && e.target.closest('[data-grid]')){
    card.classList.add('drag-over');
  }
});

document.addEventListener('dragleave', (e)=>{
  const slot = e.target.closest('.slot');
  if(slot && !slot.contains(e.relatedTarget)){
    slot.classList.remove('drag-over');
  }
  const card = e.target.closest('.card');
  if(card && !card.contains(e.relatedTarget)){
    card.classList.remove('drag-over');
  }
});

document.addEventListener('drop', (e)=>{
  e.preventDefault();

  // Swap slots
  const slotTarget = e.target.closest('.slot');
  if(slotTarget && draggedSlot && draggedSlot !== slotTarget){
    const rack = document.querySelector('.rack');
    if(rack.contains(slotTarget)){
      swapSlots(draggedSlot, slotTarget);
      syncDataStore();
    }
  }

  // Swap cards
  const targetCard = e.target.closest('.card');
  if(targetCard && draggedCard && targetCard !== draggedCard){
    const gridTarget = targetCard.closest('[data-grid]');
    const gridDragged = draggedCard.closest('[data-grid]');
    if(gridTarget && gridTarget === gridDragged){
      swapCards(draggedCard, targetCard, gridTarget);
      syncDataStore();
    }
  }
});

function swapSlots(slot1, slot2){
  // Индексы нужно взять ДО замены outerHTML — после неё slot1/slot2
  // становятся отсоединёнными от DOM узлами, и indexOf их не найдёт.
  const slotsBefore = Array.from(document.querySelectorAll('.rack .slot'));
  const idx1 = slotsBefore.indexOf(slot1);
  const idx2 = slotsBefore.indexOf(slot2);

  const html1 = slot1.outerHTML;
  const html2 = slot2.outerHTML;
  slot1.outerHTML = html2;
  slot2.outerHTML = html1;

  if(idx1 > -1 && idx2 > -1 && idx1 !== idx2){
    const temp = DATA[idx1];
    DATA[idx1] = DATA[idx2];
    DATA[idx2] = temp;
  }

  renumberUnits();
}

function renumberUnits(){
  // Номер "U" отражает позицию слота в стойке, а не привязан к блоку —
  // пересчитываем его после любой перестановки или удаления.
  const slots = Array.from(document.querySelectorAll('.rack .slot'));
  slots.forEach((slotEl, i)=>{
    const label = 'U' + (i+1);
    const uSpan = slotEl.querySelector('.u');
    if(uSpan) uSpan.textContent = label;
    const sec = DATA.find(s=>s.id===slotEl.dataset.id);
    if(sec) sec.u = label;
  });
}

function swapCards(card1, card2, grid){
  // Swap card contents
  const temp = card1.innerHTML;
  card1.innerHTML = card2.innerHTML;
  
  const tempDataSearch = card1.dataset.search;
  card1.dataset.search = card2.dataset.search;
  
  card2.innerHTML = temp;
  card2.dataset.search = tempDataSearch;
  
  // Swap in DATA structure
  const sectionId = grid.dataset.grid;
  const sec = DATA.find(s=>s.id===sectionId);
  if(sec && sec.cards){
    const cards = grid.querySelectorAll('.card');
    const idx1 = Array.from(cards).indexOf(card1);
    const idx2 = Array.from(cards).indexOf(card2);
    if(idx1 > -1 && idx2 > -1 && sec.cards[idx1] && sec.cards[idx2]){
      const temp = sec.cards[idx1];
      sec.cards[idx1] = sec.cards[idx2];
      sec.cards[idx2] = temp;
    }
  }
}

/* ---- Экспорт файла с изменениями ---- */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  syncDataStore();
  const clone = document.documentElement.cloneNode(true);
  clone.querySelectorAll('#rack .slot').forEach(el=>el.remove());
  clone.querySelector('#sections').innerHTML = '';
  const cloneBlockForm = clone.querySelector('#addBlockForm');
  if(cloneBlockForm){
    cloneBlockForm.classList.add('hidden');
    cloneBlockForm.querySelectorAll('input,textarea').forEach(el=>el.removeAttribute('value'));
  }
  const html = '<!DOCTYPE html>\n' + clone.outerHTML;
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'it-support-head-cheatsheet.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
