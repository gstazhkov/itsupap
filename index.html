b> — максимальная совместимость (флешки, встраиваемые системы), но лимит файла <b>4 ГБ</b> и раздела 8 ТБ.</li>\n        <li><b>exFAT</b> — развитие FAT без лимита 4 ГБ, тоже кросс-платформенная, но без журналирования.</li>\n      </ul>"},{"a":"LVM","t":"LVM — Logical Volume Manager","tags":["warn"],"b":"\n      <p>Слой абстракции между физическими дисками и файловой системой в Linux, который даёт гибкость в управлении дисковым пространством.</p>\n      <ul>\n        <li><b>PV</b> (Physical Volume) — физический диск/раздел; <b>VG</b> (Volume Group) — объединение PV в общий пул; <b>LV</b> (Logical Volume) — «виртуальный раздел», который форматируется в ФС.</li>\n        <li>Позволяет увеличивать разделы «на лету» без остановки сервиса и делать LVM-снапшоты.</li>\n      </ul>"},{"a":"RAID","t":"RAID — избыточный массив дисков","tags":[],"b":"\n      <ul>\n        <li><b>RAID 0</b> — чередование (striping), прирост скорости, нет отказоустойчивости.</li>\n        <li><b>RAID 1</b> — зеркалирование, отказоустойчивость ценой половины объёма.</li>\n        <li><b>RAID 5</b> — чередование с одним диском контроля чётности, переживает отказ 1 диска.</li>\n        <li><b>RAID 6</b> — как RAID 5, но с двойной чётностью, переживает отказ 2 дисков.</li>\n        <li><b>RAID 10</b> — зеркалирование + чередование, быстро и надёжно, но дорого по объёму.</li>\n      </ul>"},{"a":"MOUNT","t":"Точки монтирования и fstab","tags":[],"b":"\n      <ul>\n        <li><code>mount</code>/<code>umount</code> — подключить/отключить ФС к каталогу (точке монтирования).</li>\n        <li><code>/etc/fstab</code> — таблица автоматического монтирования при загрузке (устройство, точка монтирования, тип ФС, опции).</li>\n        <li><code>df -h</code> — занятое место по разделам; <code>lsblk</code> — список блочных устройств и их разделов.</li>\n      </ul>"},{"a":"ZFS","t":"ZFS (любимая ФС Proxmox)","tags":["ok"],"b":"\n      <p>Комбинированная файловая система + менеджер томов (аналог LVM и mdadm «в одном»), которую Proxmox VE поддерживает «из коробки» как локальное хранилище для ВМ.</p>\n      <ul>\n        <li><b>Pool (zpool)</b> — объединение дисков, аналог Volume Group; можно собрать сразу с избыточностью (mirror, RAID-Z1/Z2/Z3 — программные аналоги RAID 1/5/6).</li>\n        <li>Встроенные контрольные суммы каждого блока данных — обнаруживает и (при избыточности) исправляет «тихое» повреждение данных (silent corruption).</li>\n        <li><b>Copy-on-Write</b> — снапшоты и клоны создаются мгновенно и почти бесплатно по месту.</li>\n        <li>Требователен к памяти (ARC-кэш) — на собеседовании часто спрашивают про рекомендацию RAM для ZFS-хранилища.</li>\n      </ul>"},{"a":"CEPH","t":"Ceph (распределённое хранилище Proxmox)","tags":["warn"],"b":"\n      <p>Программно-определяемое распределённое хранилище, которое Proxmox VE умеет разворачивать внутри своего же кластера — несколько узлов объединяют локальные диски в единый отказоустойчивый пул.</p>\n      <ul>\n        <li><b>OSD</b> (Object Storage Daemon) — процесс, обслуживающий один физический диск; <b>Monitor (MON)</b> — хранит карту кластера и обеспечивает кворум; <b>Manager (MGR)</b> — метрики и веб-панель.</li>\n        <li>Данные реплицируются между узлами (обычно 3 копии) — кластер переживает выход из строя целого сервера, а не только диска.</li>\n        <li>Даёт возможность безостановочной Live Migration ВМ между любыми узлами кластера, так как хранилище общее.</li>\n      </ul>"},{"a":"PVESTOR","t":"Типы хранилищ в Proxmox","tags":[],"b":"\n      <ul>\n        <li><b>Directory / LVM / LVM-thin</b> — локальное хранилище на одном узле, самое простое, без отказоустойчивости при падении узла.</li>\n        <li><b>ZFS (local)</b> — локальное, с защитой от повреждения данных и снапшотами.</li>\n        <li><b>Ceph RBD, NFS, iSCSI</b> — общее (shared) хранилище, доступное всем узлам кластера — обязательное условие для «горячей» Live Migration без общего Ceph/SAN.</li>\n      </ul>"},{"a":"VMFS","t":"VMFS (VMware)","tags":["ok"],"b":"\n      <p><b>Virtual Machine File System</b> — собственная кластерная файловая система VMware для блочных хранилищ (Fibre Channel, iSCSI, локальные диски хоста).</p>\n      <ul>\n        <li>Кластерная — несколько хостов ESXi могут одновременно монтировать один и тот же LUN и безопасно писать в него благодаря механизму блокировок на уровне метаданных (raньше SCSI reservations, сейчас ATS — Atomic Test and Set).</li>\n        <li>Именно общий VMFS-датастор — основа для <b>vMotion</b> (живая миграция ВМ) и <b>HA/DRS</b> в vSphere.</li>\n        <li>Хранит файлы ВМ: <code>.vmdk</code> (диск), <code>.vmx</code> (конфигурация), <code>.vmsn</code> (снапшоты).</li>\n      </ul>"},{"a":"VSAN","t":"vSAN и NFS-датасторы (VMware)","tags":[],"b":"\n      <ul>\n        <li><b>vSAN</b> — программно-определяемое распределённое хранилище VMware, аналог Ceph по идее: объединяет локальные диски хостов ESXi кластера в единый отказоустойчивый пул с политиками репликации по ВМ.</li>\n        <li><b>NFS-датастор</b> — вместо блочного VMFS датастор может быть примонтирован по NFS с внешнего стораджа — проще в администрировании, но зависит от сети и NFS-сервера.</li>\n      </ul>"}]},{"id":"sistem-hraneniya-dannyh","u":"U18","short":"СХД","full":"Систем Хранения Данных","title":"Систем Хранения Данных","eyebrow":"Новый раздел","desc":"","cards":[{"a":"DAS","t":"DAS","tags":[],"b":"<p>Direct Attached Storage</p>\n<p>Диски подключены непосредственно к серверу.</p>\n<pre><code>Server\n |\n HDD\n SSD</code></pre>\n<p>Плюсы</p>\n<ul><li>дешево</li></ul>\n<p>Минусы</p>\n<ul><li>нельзя подключить второй сервер</li></ul>"},{"a":"NAS","t":"NAS","tags":[],"b":"<p>Network Attached Storage</p>\n<p>Файловое хранилище.</p>\n<p>Работает через Ethernet.</p>\n<p>Использует</p>\n<ul><li>SMB</li><li>CIFS</li><li>NFS</li></ul>\n<p>Пример</p>\n<p>Synology</p>\n<p>QNAP</p>\n<p>TrueNAS</p>"},{"a":"SAN","t":"SAN","tags":[],"b":"<p>Storage Area Network</p>\n<p>Самый распространенный вариант в компаниях.</p>\n<p>Сервер видит СХД как локальный диск.</p>\n<p>Работает через</p>\n<ul><li>Fibre Channel</li><li>iSCSI</li></ul>"},{"a":"ОТЛИЧИЕ NAS","t":"Отличие NAS от SAN","tags":[],"b":"<p>NAS</p>\n<pre><code>Сервер\n   |\n Ethernet\n   |\n NAS</code></pre>\n<p>Работает с файлами.</p>\n<hr>\n<p>SAN</p>\n<pre><code>Сервер\n   |\nFC / iSCSI\n   |\nСХД</code></pre>\n<p>Работает с блоками.</p>"},{"a":"BLOCK STORAGE","t":"Block Storage","tags":[],"b":"<p>Блочное хранение.</p>\n<p>Сервер получает \"сырой диск\".</p>\n<p>Потом сам создает файловую систему.</p>\n<p>Например</p>\n<pre><code>Disk\n\n↓\n\nNTFS\n\n↓\n\nФайлы</code></pre>"},{"a":"FILE STORAGE","t":"File Storage","tags":[],"b":"<p>Файловое хранение.</p>\n<p>СХД сама хранит файлы.</p>\n<p>Например</p>\n<pre><code>Folder\n\n↓\n\nDocuments\n\n↓\n\nfile.docx</code></pre>"},{"a":"ОСНОВНЫЕ ИНТЕРФЕЙСЫ","t":"Основные интерфейсы подключения","tags":[],"b":"<h5>SATA</h5>\n<p>До 600 MB/s</p>\n<p>Самый дешевый.</p>\n<hr>\n<h5>SAS</h5>\n<p>Быстрее SATA.</p>\n<p>Используется в серверах.</p>\n<hr>\n<h5>NVMe</h5>\n<p>Самый быстрый.</p>\n<p>Работает через PCIe.</p>\n<hr>\n<h4>Fibre Channel</h4>\n<p>Самый быстрый способ подключения СХД.</p>\n<p>Скорости</p>\n<ul><li>8 Gb</li><li>16 Gb</li><li>32 Gb</li><li>64 Gb</li></ul>\n<p>Используются</p>\n<p>HBA-карты.</p>\n<hr>\n<h4>iSCSI</h4>\n<p>Передача SCSI через Ethernet.</p>\n<p>Использует TCP/IP.</p>\n<p>Работает через обычную сеть.</p>\n<p>Порт</p>\n<pre><code>3260</code></pre>\n<hr>\n<h4>HBA</h4>\n<p>Host Bus Adapter</p>\n<p>Специальная карта для подключения сервера к Fibre Channel.</p>"},{"a":"OFF-SITE КОПИИ","t":"off-site копии","tags":[],"b":"<p><b>Off-site (Offsite) резервные копии</b> — бэкапы, хранящиеся вне основного местоположения компании (облако, другой датацентр, сейф). Критически важны для защиты от катастроф (пожар, наводнение, крупный сбой).</p><ul><li><b>Требования:</b> шифрование в пути и на хранилище, надёжное соединение для отправки, быстрое восстановление если нужно срочно.</li><li><b>Примеры:</b> AWS Glacier (долгосрочное хранение, дешево), Azure Backup (интегрирован с Microsoft), Veeam с external repo в другом ДЦ, собственный сервер резервных копий в филиале.</li><li><b>Сроки:</b> RPO (Recovery Point Objective) = макс потеря данных, RTO (Recovery Time Objective) = макс время восстановления. Для critical систем часто RPO=4 часа, RTO=1 час.</li></ul>"},{"a":"ТЕСТОВЫЕ ВОССТАНОВЛЕНИЯ","t":"тестовые восстановления","tags":[],"b":"<p><b>Тестовое восстановление (Restore Testing)</b> — периодическая практика восстановления данных из бэкапов, чтобы убедиться что бэкапы реально работают и можно полагаться на них при инциденте.</p><ul><li><b>Частая ошибка:</b> бэкапы делаются по расписанию, но никто не проверяет можно ли их восстановить. В реальном инциденте — беда.</li><li><b>Регламент:</b> минимум раз в квартал для critical систем, раз в год для остального. Восстанавливать на отдельный тестовый сервер, не на production.</li><li><b>Проверка:</b> целостность данных (checksums), функциональные тесты приложения, время восстановления, документирование результатов.</li><li>Результаты документируются: «10 Апреля восстановлена DB из бэкапа от 10 Апреля, время восстановления 15 минут, целостность OK».</li></ul>"},{"a":"ПРАВИЛО 3-2-1(-1-0)","t":"Правило 3-2-1(-1-0)","tags":[],"b":"<ul><li><b>3</b> копии данных (продакшн + минимум 2 бэкапа).</li><li><b>2</b> разных типа носителей/хранилищ (не два бэкапа на одном СХД — это не резерв, а иллюзия).</li><li><b>1</b> копия off-site (другой датацентр/облако/физически удалённая площадка).</li><li>Современное расширение — <b>3-2-1-1-0</b>: ещё <b>1</b> immutable/air-gapped копия (защита от ransomware, который целенаправленно шифрует и бэкапы тоже), и <b>0</b> ошибок при последней проверке восстановления.</li></ul>"},{"a":"RPO","t":"RPO (Recovery Point Objective)","tags":[],"b":"<p>Cколько данных мы готовы потерять (интервал между бэкапами). Определяется бизнесом, не ИТ.</p>"},{"a":"RTO","t":"(Recovery Time Objective)","tags":[],"b":"<p>за какое время сервис должен быть восстановлен. Определяет выбор технологии (holodный бэкап vs репликация vs standby-кластер).</p>"},{"a":"ТИПЫ БЭКАПОВ","t":"Типы бэкапов","tags":[],"b":"<ul><li><b>Full</b> — полная копия, самая надёжная точка восстановления, но дорого по месту/времени.</li><li><b>Incremental</b> — только изменения с последнего бэкапа (full или incremental). Быстро, компактно, но восстановление требует всей цепочки.</li><li><b>Differential</b> — изменения с последнего full. Восстановление проще (full + 1 differential), но растёт в размере со временем.</li><li><b>Forever incremental</b> (Veeam, PBS) — один full + бесконечная цепочка инкрементов с синтетической консолидацией — стандарт в современных решениях.</li></ul>"},{"a":"ИНСТРУМЕНТЫ","t":"Инструменты","tags":[],"b":"<table><thead><tr><th>Инструмент</th><th>Роль</th></tr></thead><tbody><tr><td><b>Proxmox Backup Server (PBS)</b></td><td>Нативный бэкап VM/LXC для Proxmox: дедупликация на блочном уровне, инкрементальный форевер, встроенная проверка целостности (<code>verify</code>), поддержка S3/Object Lock как datastore</td></tr><tr><td><b>Veeam Backup &amp; Replication</b></td><td>Enterprise-грейд для гетерогенной среды (VMware/Hyper-V/физика/облака), SureBackup для автоматической проверки восстановления, immutable-репозитории</td></tr><tr><td><b>rsync</b></td><td>Не полноценный backup-инструмент сам по себе — используется для <b>off-site репликации файлов/дампов/конфигов</b> на удалённую площадку, либо как транспорт поверх которого строится GFS-ротация (rsnapshot)</td></tr><tr><td><b>Zabbix</b></td><td>Не делает бэкапы — <b>мониторит</b> их: успешность job'ов, возраст последнего бэкапа, свободное место на репозитории, алерты при просрочке RPO</td></tr></tbody></table>"},{"a":"ТЕСТОВЫЕ ВОССТАНОВЛЕНИЯ","t":"Тестовые восстановления","tags":[],"b":"<p>Непроверенный бэкап — это просто файл, о работоспособности которого вы ничего не знаете. Статистика по индустрии стабильно показывает, что значимая доля \"успешных\" бэкапов не восстанавливается при реальной попытке.</p>\n<ul><li><b>Периодичность</b> — минимум ежеквартально для критичных систем (Tier 1), но лучше автоматизировать так, чтобы проверка шла после каждого job'а (Veeam SureBackup именно так и работает — раз в сутки).</li><li><b>Полный DR-drill</b> — не только \"файл восстановился\", а весь сценарий: время восстановления (сверка с RTO), корректность данных на уровне приложения (не только \"диск примонтировался\", а \"приложение стартовало и прошло health check\").</li><li><b>Автоматизация</b> — восстановление в изолированный sandbox, автоматический health-check, автоматическое уничтожение sandbox — это должно быть job'ом, а не ручной задачей, которую откладывают.</li><li>Метрика для отчёта руководству: <b>\"% бэкапов с подтверждённым тестовым восстановлением за последний квартал\"</b> — гораздо честнее метрики \"% успешных job'ов бэкапа\".</li></ul>"},{"a":"VEEAM BACKUP","t":"Veeam Backup & Replication","tags":[],"b":"<p>универсальное решение, покрывающее почти всю инфраструктуру:</p>\n<ul><li><b>Виртуальные машины</b> — VMware vSphere и Microsoft Hyper-V (безагентно, через снепшоты гипервизора)</li><li><b>Физические серверы и ПК</b> — через Veeam Agent (Windows, Linux, Mac)</li><li><b>Приложения и БД</b> — резервное копирование и восстановление отдельных баз данных Oracle, MS SQL, PostgreSQL на уровне таблиц и транзакций, а также Active Directory, Exchange</li><li><b>NAS/файловые хранилища</b></li><li><b>Облачные workloads</b> — AWS, Azure, Google Cloud (нативный бекап)</li><li><b>SaaS</b> — Microsoft 365 (почта, SharePoint, Teams, OneDrive)</li><li><b>Kubernetes</b> (включая OpenShift)</li></ul>\n<p>Типы копирования: полное, дифференциальное и инкрементное резервное копирование, с поддержкой Changed Block Tracking (для VMware) и Hyper‑V RCT для инкрементальных бэкапов, которые сохраняют только изменившиеся блоки данных.</p>"}],"qa":[{"q":"Что такое СХД","b":"**СХД (Storage Area / Система хранения данных)** — специализированное устройство или комплекс устройств, предназначенный для централизованного хранения данных.\n\nПростыми словами:\n\n> Сервер выполняет вычисления, а СХД хранит данные.\n> \n\nНапример\n\n```\nПользователь\n      |\n VMware\n      |\n  Сервер ESXi\n      |\n Fibre Channel / iSCSI\n      |\n     СХД\n      |\n SSD / HDD\n```"},{"q":"Зачем нужна СХД","b":"Она обеспечивает\n\n- большое пространство хранения\n- отказоустойчивость\n- высокую скорость\n- резервирование\n- централизованное управление\n- возможность подключать несколько серверов одновременно"},{"q":"Основные производители","b":"- Dell EMC\n- HPE MSA\n- NetApp\n- IBM Storage\n- Huawei OceanStor\n- Pure Storage\n- Hitachi Vantara"},{"q":"Snapshot ≠ Backup","b":"Snapshot\n\nвнутри СХД\n\nBackup\n\nотдельная копия\n\nЕсли СХД сгорит —\n\nSnapshot исчезнет.\n\nBackup останется."},{"q":"RPO/RTO","b":"не технический, а бизнес-параметр. Моя задача как IT Head — добиться, чтобы SLA был формализован с бизнес-заказчиком, а не придуман ИТ-отделом задним числом после инцидента\"."},{"q":"Как бекапить 1С","b":"1С — это обычно связка «база данных + сервер приложений», поэтому бекапить нужно грамотно, а не просто копировать файлы:\n\n**Вариант 1 — через СУБД (правильный способ)**\n\n- Если 1С работает на **MS SQL Server**: Veeam умеет делать application-aware бекап через VSS-снепшот виртуальной машины с последующим **truncate transaction log** и поддержкой Log Backup для MS SQL — это даёт точку восстановления вплоть до нужного момента (не только на момент снепшота).\n- Настраивается в свойствах задания: **Guest Processing → Enable application-aware processing**. Там указываются учётные данные для входа в гостевую ОС, и Veeam координирует VSS-writer SQL Server.\n\n**Вариант 2 — файловая база 1С**\n\n- Если это простая файловая база (.1CD), достаточно бекапить саму ВМ целиком (образ) — но для гарантии целостности базы рекомендуется предварительно выгружать базу средствами самой 1С (`dt`файл через конфигуратор) по расписанию, а Veeam уже бекапит эту выгрузку как файл на диске.\n\n**Вариант 3 — сервер 1С на PostgreSQL**\n\n- Аналогично MS SQL: приложение-осведомлённая обработка не такая глубокая, как для MS SQL, поэтому чаще используют скрипт `pg_dump` по расписанию + Veeam бекапит получившийся дамп как обычный файл/папку.\n\n**Практическая рекомендация:** для критичных баз 1С — комбинировать: (а) регулярный дамп/выгрузку средствами 1С или СУБД, (б) образный бекап всей ВМ через Veeam с приложение-осведомлённой обработкой. Так вы получаете и гранулярное восстановление, и полный откат системы."},{"q":"Как бекапить VM в Hyper-V","b":"Для защиты виртуальных машин Hyper-V применяется безагентное бэкапирование на уровне гипервизора — Veeam напрямую взаимодействует с Hyper-V хостами, выполняя создание контрольных точек и резервных копий виртуальных машин без установки агентов внутри ВМ.\n\nПошагово:\n\n1. **Добавьте Hyper-V хост (или SCVMM)** в Veeam Backup & Replication:\n`Backup Infrastructure → Managed Servers → Add Server → Microsoft Hyper-V`\n2. **Настройте прокси-сервер.** Hyper-V сервер может сам работать как backup-прокси в режиме on-host — Veeam использует сам хост для чтения данных ВМ, но есть лимит параллельных задач (обычно 2–4 в зависимости от ресурсов хоста).\n3. **Создайте Backup Job:**`Home → Backup Job → Virtual Machine → Hyper-V`\n    - Выберите нужные ВМ\n    - Настройте репозиторий для хранения бекапов\n    - Задайте retention policy (сколько точек восстановления хранить)\n4. **Guest Processing** (для application-aware):\n    - Включите **VSS quiescence** — Veeam инициирует создание контрольной точки Hyper-V с координацией через VSS внутри гостевой ОС, что критично для баз данных (SQL, Exchange, 1С на MS SQL)\n5. **Расписание** — daily/еженедельно, плюс можно настроить GFS (Grandfather-Father-Son) retention для долгосрочного хранения.\n6. **Инкременты через RCT** — Hyper‑V RCT (Resilient Change Tracking) отслеживает изменившиеся блоки данных, что сокращает окна бэкапов и требования к хранилищу.\n\n**Восстановление** доступно на нескольких уровнях: полный instant recovery ВМ, отдельные файлы гостевой ОС, объекты приложений (например, отдельные письма Exchange или таблицы SQL)."},{"q":"Как это комбинируют на практике  Veeam и rsync","b":"- **Veeam** — для образов ВМ Hyper-V/VMware и приложение-осведомлённого бекапа (VSS, SQL log truncation).\n- **rsync** — для Linux-хостов без Hyper-V/VMware, для копирования уже готовых дампов 1С/БД между площадками, или как дешёвый второй уровень защиты (3-2-1 правило: копия в другое место помимо Veeam-репозитория)."}],"scripts":[{"t":"PowerShell-скрипт для запуска и проверки задания Veeam","code":"Использует модуль Veeam.Backup.PowerShell, который ставится вместе с Veeam Backup & Replication.\n\n# backup-veeam-job.ps1\n# Запуск задания Veeam и логирование результата\n\nImport-Module Veeam.Backup.PowerShell -ErrorAction Stop\n\n$jobName   = \"Backup 1C-Server\"          # имя задания в Veeam\n$logFile   = \"C:\\Scripts\\Logs\\veeam_backup.log\"\n$mailTo    = \"admin@example.com\"\n\nfunction Write-Log {\n    param($msg)\n    $ts = Get-Date -Format \"yyyy-MM-dd HH:mm:ss\"\n    \"$ts  $msg\" | Out-File -FilePath $logFile -Append -Encoding UTF8\n}\n\n$job = Get-VBRJob -Name $jobName\nif (-not $job) {\n    Write-Log \"ОШИБКА: задание '$jobName' не найдено\"\n    exit 1\n}\n\nWrite-Log \"Запуск задания: $jobName\"\nStart-VBRJob -Job $job -RunAsync:$false   # синхронный запуск, ждём завершения\n\n# Проверяем результат последней сессии\n$session = Get-VBRBackupSession | Where-Object { $_.JobId -eq $job.Id } | Sort-Object EndTime -Descending | Select-Object -First 1\n\nif ($session.Result -eq \"Success\") {\n    Write-Log \"УСПЕХ: задание '$jobName' завершено успешно. Длительность: $($session.WorkDetails)\"\n} else {\n    Write-Log \"ОШИБКА: задание '$jobName' завершилось со статусом $($session.Result)\"\n    # Опционально: отправка письма\n    Send-MailMessage -To $mailTo -From \"veeam@example.com\" -Subject \"Veeam Job Failed: $jobName\" `\n        -Body \"Статус: $($session.Result)\" -SmtpServer \"smtp.example.com\"\n    exit 1\n}\n\n\n##Полезные дополнительные команды:\nGet-VBRJob                          # список всех заданий\nGet-VBRJob -Name \"...\" | Enable-VBRJob   # включить отключённое задание\nStop-VBRJob -Job $job               # остановить выполняющееся\nGet-VBRJobOptions -Job $job         # посмотреть настройки задания"},{"t":"Bash-скрипт с rsync (для Linux-серверов, NAS, дампов БД/1С)","code":"#!/bin/bash\n# backup-rsync.sh\n# Копирование каталога/дампов на резервное хранилище с логом и ротацией\n\nSRC=\"/var/backups/1c_dumps/\"\nDEST_HOST=\"backup-storage.local\"\nDEST_USER=\"backupuser\"\nDEST_DIR=\"/mnt/backup/1c/\"\nLOG=\"/var/log/rsync_backup.log\"\nDATE=$(date +\"%Y-%m-%d %H:%M:%S\")\n\necho \"[$DATE] Старт бэкапа: $SRC -> $DEST_USER@$DEST_HOST:$DEST_DIR\" >> \"$LOG\"\n\nrsync -avz --delete \\\n      -e \"ssh -i /root/.ssh/backup_key\" \\\n      \"$SRC\" \"$DEST_USER@$DEST_HOST:$DEST_DIR\" \\\n      >> \"$LOG\" 2>&1\n\nif [ $? -eq 0 ]; then\n    echo \"[$DATE] УСПЕХ: синхронизация завершена\" >> \"$LOG\"\nelse\n    echo \"[$DATE] ОШИБКА: код завершения $?\" >> \"$LOG\"\n    # уведомление на почту\n    echo \"Rsync backup failed, см. $LOG\" | mail -s \"Rsync Backup FAILED\" admin@example.com\n    exit 1\nfi"}]},{"id":"ast","u":"U19","short":"Asterisk","full":"Asterisk (IP-телефония)","title":"Asterisk","eyebrow":"IP-АТС","desc":"SIP-сигнализация, внутренние номера, план набора и типовые проблемы с NAT.","cards":[{"a":"SIP","t":"Session Initiation Protocol","tags":["ok"],"b":"\n      <p>Протокол сигнализации для установления, изменения и завершения голосовых/видео-сессий. Сам голос передаётся отдельно по <b>RTP</b>.</p>\n      <ul>\n        <li>Порты: <code>5060</code> (UDP/TCP, обычно), <code>5061</code> (TLS).</li>\n        <li>Основные методы: <code>REGISTER</code> (регистрация клиента/транка), <code>INVITE</code> (приглашение к звонку), <code>ACK</code>, <code>BYE</code> (завершение), <code>CANCEL</code>.</li>\n      </ul>"},{"a":"EXT","t":"Внутренние номера (extensions)","tags":[],"b":"\n      <ul>\n        <li>Учётные записи SIP настраиваются в <code>pjsip.conf</code> (современный модуль, заменил устаревший <code>sip.conf</code>) — логин/пароль/кодеки для регистрации телефона.</li>\n        <li>Куда именно направлять звонок с/на этот номер, описывается отдельно в плане набора (dialplan).</li>\n      </ul>"},{"a":"TRUNK","t":"SIP-транк","tags":[],"b":"\n      <p>Соединение с внешним провайдером телефонии (или другой АТС) для звонков за пределы внутренней сети.</p>\n      <ul>\n        <li>Настраивается похоже на обычный SIP-аккаунт, но со стороны провайдера, часто с привязкой по IP вместо логина/пароля.</li>\n      </ul>"},{"a":"DIAL","t":"Dialplan и маршрутизация вызовов","tags":[],"b":"\n      <ul>\n        <li><b>extensions.conf</b> — «мозг» АТС: контексты (<code>context</code>), приоритеты выполнения шагов, шаблоны номеров (например <code>_8XXXXXXXXXX</code>).</li>\n        <li>Ключевые команды: <code>Dial()</code>, <code>Answer()</code>, <code>Hangup()</code>, <code>Voicemail()</code>, <code>Queue()</code>.</li>\n        <li><b>Входящие</b>: DID-номер от провайдера → контекст → IVR/очередь/конкретный внутренний.</li>\n        <li><b>Исходящие</b>: выбор транка по префиксу набора или правилу маршрутизации.</li>\n        <li><b>IVR</b> — голосовое меню; <b>Ring Group</b> — группа одновременного/последовательного дозвона; <b>Queue</b> — очередь с ожиданием и агентами.</li>\n      </ul>"},{"a":"CODEC","t":"Кодеки","tags":[],"b":"\n      <ul>\n        <li><b>G.711</b> — без сжатия, лучшее качество, требует больше полосы (~64 кбит/с на канал).</li>\n        <li><b>G.729</b> — сжатие до ~8 кбит/с, экономит канал, но лицензируется и чуть хуже качество.</li>\n      </ul>"},{"a":"NAT","t":"NAT — частая головная боль","tags":["warn"],"b":"\n      <p>Классическая проблема при удалённых сотрудниках/провайдерах за NAT: звонок устанавливается, но нет звука в одну сторону.</p>\n      <ul>\n        <li>Настройки <code>externip</code>/<code>externaddr</code> (внешний адрес АТС) и <code>localnet</code> (какие сети считать локальными) в pjsip.conf.</li>\n        <li>Для клиентов за симметричным NAT может потребоваться <b>STUN</b>.</li>\n      </ul>"}]},{"id":"crypto","u":"U20","short":"КриптоПро/ЭДО","full":"КриптоПро и ЭДО","title":"КриптоПро и ЭДО","eyebrow":"Электронная подпись и документооборот","desc":"Сертификаты, контейнеры ключей, форматы подписи документов и типичные проблемы поддержки.","cards":[{"a":"CERT","t":"Сертификат электронной подписи","tags":["ok"],"b":"\n      <p>Электронный документ, подтверждающий, что открытый ключ принадлежит конкретному владельцу (человеку/организации).</p>\n      <ul>\n        <li><b>Простая ЭП</b> — коды/пароли, юридическая сила ограничена соглашением сторон.</li>\n        <li><b>Усиленная неквалифицированная (НЭП)</b> — создаётся криптографически, но сертификат может быть выдан любым УЦ, не всегда юридически равнозначна собственноручной.</li>\n        <li><b>Усиленная квалифицированная (КЭП)</b> — выдаётся только аккредитованным Минцифры удостоверяющим центром, юридически равнозначна собственноручной подписи без доп. соглашений.</li>\n      </ul>"},{"a":"TOKEN","t":"Контейнер закрытого ключа","tags":[],"b":"\n      <ul>\n        <li><b>Защищённые токены</b> (Рутокен, JaCarta) — закрытый ключ создаётся и хранится внутри устройства и <b>никогда не покидает его</b> — наиболее безопасный вариант.</li>\n        <li><b>Реестр Windows</b> — контейнер хранится в профиле пользователя/компьютера, удобно, но менее безопасно и привязано к конкретному ПК.</li>\n        <li><b>Файловый контейнер</b> (флешка/папка) — самый уязвимый вариант, легко скопировать.</li>\n      </ul>"},{"a":"CSP","t":"КриптоПро CSP","tags":[],"b":"\n      <p>Криптопровайдер — программная реализация российских криптоалгоритмов (ГОСТ), которая интегрируется в Windows и даёт возможность работать с сертификатами, подписывать и шифровать данные.</p>\n      <ul>\n        <li>Требует лицензии (пробный период ограничен) — частая причина внезапной остановки работы у пользователей.</li>\n        <li>Дополнение — <b>КриптоПро ЭЦП Browser plug-in / КриптоПро Extension</b> — позволяет подписывать документы прямо в браузере на порталах ЭДО/госуслуг.</li>\n      </ul>"},{"a":"EDO","t":"ЭДО — электронный документооборот","tags":[],"b":"\n      <ul>\n        <li>Операторы ЭДО (Диадок, СБИС, Такском и др.) обеспечивают юридически значимый обмен документами между организациями с применением ЭП.</li>\n        <li><b>Присоединённая подпись</b> — подпись хранится в одном файле вместе с документом.</li>\n        <li><b>Отсоединённая подпись</b> — подпись в отдельном файле (<code>.sig</code>/<code>.p7s</code>), сам документ не изменяется.</li>\n      </ul>"},{"a":"FAQ","t":"Типичные проблемы (то, с чем реально приходят)","tags":["warn"],"b":"\n      <ul>\n        <li>Истёк срок действия сертификата — самая частая заявка, требует переоформления в УЦ.</li>\n        <li>Не установлен корневой/промежуточный сертификат УЦ на компьютере — подпись «не проверяется».</li>\n        <li>Несовместимость браузера — Chrome/Edge отключили NPAPI, нужен отдельный плагин/расширение КриптоПро.</li>\n        <li>Ошибка проверки <b>CRL/OCSP</b> — нет доступа в интернет к спискам отзыва сертификатов в момент проверки.</li>\n        <li>Истекла лицензия КриптоПро CSP или конфликт версий после обновления Windows.</li>\n        <li>Расхождение системного времени на ПК — приводит к ошибке валидности подписи/сертификата.</li>\n        <li>Утеря/поломка токена — требует перевыпуска сертификата на новом носителе.</li>\n      </ul>"}]},{"id":"nginx-haproxy-traefik","u":"U21","short":"Nginx/HAProxy/Traefik","full":"Nginx/HAProxy/Traefik","title":"Nginx/HAProxy/Traefik","eyebrow":"Балансировка и публикация сервисов","desc":"","cards":[{"a":"Reverse Proxy","t":"Reverse Proxy — зачем это вообще нужно","tags":[],"b":"<p>Reverse proxy — сервер, который принимает запросы от клиентов <b>от имени</b> бэкендов и перенаправляет их внутрь инфраструктуры. Клиент не знает, сколько реальных серверов за ним стоит.</p>\n<p>Зачем нужен (это ключевой блок ответа на собесе — обычно спрашивают \"зачем\", а не \"что\"):</p>\n<ul><li><b>Балансировка нагрузки</b> — распределение трафика между несколькими инстансами приложения.</li><li><b>TLS termination</b> — сертификаты и шифрование обрабатываются в одном месте, бэкенды общаются по HTTP внутри доверенной сети.</li><li><b>Единая точка входа</b> — маршрутизация по домену/пути (<code>api.company.com</code>, <code>/v1/</code>, <code>/admin/</code>) на разные сервисы (актуально для микросервисов).</li><li><b>Безопасность</b> — скрывает внутреннюю топологию, IP бэкендов, версии ПО; можно повесить WAF, rate limiting, IP-фильтрацию.</li><li><b>Кэширование</b> статики, сжатие (gzip/brotli).</li><li><b>Отказоустойчивость</b> — health checks, автоматическое исключение упавших бэкендов.</li><li><b>SSL offloading</b> снижает нагрузку CPU на приложения.</li></ul>\n<p>Отличие от <b>forward proxy</b>: forward proxy защищает и представляет клиента (например, корпоративный прокси для выхода в интернет), reverse proxy — представляет сервер.</p>"},{"a":"L4 vs L7","t":"Балансировка нагрузки — уровни и алгоритмы","tags":[],"b":"<ul><li><b>L4 (транспортный уровень)</b> — балансировка на основе TCP/UDP, IP+порт. Не смотрит внутрь пакета (в HTTP не заглядывает). Быстрее, ниже задержки, но нет маршрутизации по URL/заголовкам. Пример: HAProxy в режиме <code>tcp</code>, L4 в LVS/IPVS.</li><li><b>L7 (прикладной уровень)</b> — понимает HTTP/HTTPS, может маршрутизировать по домену, пути, заголовкам, cookie. Дороже по ресурсам, но гибче. Пример: Nginx, HAProxy в режиме <code>http</code>, Traefik.</li></ul>\n<p>На собесе хорошо звучит: <i>\"Для API Gateway и микросервисов нужен L7, для баз данных или высоконагруженных TCP-сервисов часто достаточно и предпочтительнее L4 — меньше накладных расходов\"</i>.</p>\n<h6>Алгоритмы балансировки</h6>\n<ul><li><b>Round Robin</b> — по кругу, самый простой.</li><li><b>Weighted Round Robin</b> — с учётом весов (если сервера разной мощности).</li><li><b>Least Connections</b> — на сервер с наименьшим числом активных соединений (хорошо для долгоживущих соединений — websockets, long-polling).</li><li><b>IP Hash / Source Hash</b> — привязка клиента к серверу по хэшу IP (для sticky-сессий без явных cookie).</li><li><b>Random with two choices</b> — статистически эффективный алгоритм (использует HAProxy).</li><li><b>Consistent Hashing</b> — для кэшей/шардированных систем, минимизирует переброс ключей при добавлении/удалении узла.</li></ul>"},{"a":"STICKY SESSIONS","t":"Sticky sessions (session persistence)","tags":[],"b":"<p>Нужны, если приложение хранит состояние в памяти инстанса (не рекомендуется для cloud-native, но встречается в legacy). Реализуется через cookie (HAProxy cookie, Nginx sticky в Plus/ upstream hash), либо IP hash.</p>"},{"a":"HEALTH CHECKS","t":"Health checks","tags":[],"b":"<ul><li><b>Active</b> — прокси сам периодически стучится на <code>/health</code> бэкенда.</li><li><b>Passive</b> — прокси анализирует реальные запросы (таймауты, 5xx) и на основании этого исключает узел.</li></ul>\n<p>Хороший ответ на собесе: <i>\"Active health checks дают более быструю и предсказуемую реакцию, но создают дополнительную нагрузку; passive — дешевле, но реагируют только постфактум, после реальных ошибок пользователей\"</i>.</p>"},{"a":"NGINX","t":"Nginx","tags":[],"b":"<ul><li>Изначально — веб-сервер + reverse proxy, событийная (event-driven) асинхронная модель, очень эффективна по памяти/CPU для большого числа соединений.</li><li>Конфигурация <b>статическая</b> — изменения требуют reload (<code>nginx -s reload</code>), процесс перечитывает конфиг без разрыва существующих соединений (graceful reload).</li><li>Балансировка через <code>upstream</code> блоки, алгоритмы: round-robin (по умолчанию), <code>least_conn</code>, <code>ip_hash</code>, <code>hash</code> (consistent), <code>random</code>.</li><li>Отлично справляется с TLS termination, кэшированием, отдачей статики, gzip/brotli.</li><li>Nginx Plus (платная версия) добавляет active health checks, более гибкий sticky, API для динамической реконфигурации.</li><li>Есть <b>nginx.conf</b> vs <b>дополнительные модули</b> (nginx umbrella — OpenResty с Lua для сложной логики).</li></ul>\n<p>Слабое место: нет \"из коробки\" service discovery — не умеет сам подхватывать новые бэкенды в Kubernetes/Docker без ingress-controller или внешнего механизма генерации конфигов (например, <code>consul-template</code>, <code>confd</code>).</p>"},{"a":"HAProxy","t":"HAProxy","tags":[],"b":"<ul><li>Специализированный балансировщик (не веб-сервер), считается эталоном по производительности и надёжности в L4/L7 балансировке.</li><li>Очень подробная статистика (встроенная stats-страница), детальные health checks, богатые ACL для маршрутизации.</li><li>Конфигурация тоже статическая, но есть <b>Runtime API</b> (через unix socket) для изменения весов серверов, добавления/удаления backend'ов \"на лету\" без reload — важно для DevOps-автоматизации и blue/green деплоев.</li><li>Отлично работает и как L4, и как L7 балансировщик — переключается режимами <code>mode tcp</code> / <code>mode http</code>.</li><li>Часто используется в связке с <b>Keepalived</b> (VRRP) для отказоустойчивости самого балансировщика (виртуальный IP переключается между активным и резервным HAProxy).</li></ul>\n<p>На собесе полезно сравнение: <i>\"Если задача — чистая балансировка с максимальной производительностью и гибкими ACL, беру HAProxy. Если нужен ещё и веб-сервер/кэш/статика — Nginx.\"</i></p>"},{"a":"Traefik","t":"Traefik","tags":[],"b":"<ul><li><b>Cloud-native</b> реверс-прокси, \"заточен\" под динамические окружения: Docker, Kubernetes, Consul, Nomad.</li><li>Ключевое отличие — <b>автоматическое service discovery</b>: сам слушает Docker API/Kubernetes API и перестраивает маршруты без reload и без ручного редактирования конфигов.</li><li>Из коробки — <b>автоматический Let's Encrypt</b> (ACME) для выпуска и обновления TLS-сертификатов.</li><li>Конфигурация через <b>labels</b> на контейнерах (Docker) или <b>CRD/Ingress/IngressRoute</b> в Kubernetes — декларативный, GitOps-дружелюбный подход.</li><li>Есть встроенный дашборд для визуализации маршрутов и middleware.</li><li><b>Middleware chain</b> — гибкая система (rate limiting, basic auth, headers, retry, circuit breaker) применяется декларативно к роутам.</li></ul>\n<p>Минус — по чистой производительности в высоконагруженных сценариях уступает HAProxy/Nginx, но для Kubernetes-инфраструктуры и микросервисов с частыми деплоями удобство и автоматизация часто важнее.</p>"},{"a":"TLS","t":"TLS","tags":[],"b":"<p>TLS — это криптографический протокол, который обеспечивает конфиденциальность и целостность данных при передаче между двумя приложениями (например, между вашим браузером и сервером банка).</p>\n<p>TLS — это наследник устаревшего протокола SSL (многие до сих пор используют термин SSL/TLS по привычке).</p>\n<h6>Базовая механика TLS</h6>\n<ol><li>Клиент инициирует TLS handshake, сервер присылает свой сертификат.</li><li>Сертификат содержит публичный ключ и подписан приватным ключом <b>удостоверяющего центра (CA)</b>.</li><li>Клиент проверяет цепочку доверия (chain of trust) до <b>корневого сертификата (Root CA)</b>, который уже есть в его хранилище доверенных корней (trust store).</li><li>После верификации — обмен ключами (в TLS 1.3 это упрощённый ECDHE handshake, forward secrecy по умолчанию), устанавливается симметричный сессионный ключ, дальше идёт быстрое симметричное шифрование (AES-GCM/ChaCha20).</li></ol>"},{"a":"PKI","t":"PKI (Public Key Infrastructure)","tags":[],"b":"<p>PKI (Инфраструктура открытых ключей) — это набор ролей, политик, аппаратного обеспечения и программного обеспечения, необходимых для управления цифровыми сертификатами и ключами шифрования.</p>\n<p>Проще говоря, это система доверия. Она отвечает на вопрос: «Как убедиться, что сайт или человек — это именно тот, за кого себя выдает?».</p>\n<h6>Цепочка PKI</h6>\n<ul><li><b>Root CA</b> — самоподписанный, максимально защищён (часто offline).</li><li><b>Intermediate CA</b> — подписан Root'ом, реально подписывает конечные сертификаты (снижает риск компрометации Root).</li><li><b>Leaf/Server certificate</b> — сертификат конкретного домена.</li><li>Сервер должен отдавать <b>полную цепочку</b> (leaf + intermediate), иначе часть клиентов (особенно старых) не смогут её достроить.</li></ul>"},{"a":"mTLS (mutual TLS)","t":"mTLS (mutual TLS)","tags":[],"b":"<p>Не только сервер, но и клиент предъявляет сертификат — используется для service-to-service аутентификации в микросервисной архитектуре (например, service mesh — Istio, Linkerd), и для B2B/партнёрских интеграций.</p>"},{"a":"SNI","t":"SNI (Server Name Indication)","tags":[],"b":"<p>Позволяет одному IP:порту обслуживать несколько доменов с разными сертификатами — клиент указывает имя хоста ещё до шифрования handshake, прокси выбирает нужный сертификат. Критично для мультитенантных reverse-proxy.</p>"},{"a":"ОТКАЗОУСТОЙЧИВОСТЬ САМОГО","t":"Отказоустойчивость самого балансировщика","tags":[],"b":"<p>Балансировщик — часто единая точка отказа, поэтому:</p>\n<ul><li><b>Keepalived + VRRP</b> — два (или больше) HAProxy/Nginx с виртуальным IP, при падении активного узла VIP переезжает на резервный.</li><li><b>DNS-based failover / GSLB</b> — на уровне DNS распределение между несколькими дата-центрами.</li><li><b>Anycast</b> — используется в крупных CDN/облаках (Cloudflare и т.п.).</li><li>В Kubernetes — сам Ingress Controller (Nginx Ingress, Traefik) обычно разворачивается в нескольких репликах за облачным L4 Load Balancer'ом (ALB/NLB/GCP LB).</li></ul>"}],"qa":[{"q":"Сравнительная таблица (то, что реально спрашивают)","b":"| Критерий | Nginx | HAProxy | Traefik |\n| --- | --- | --- | --- |\n| Тип | Web-server + proxy | Чистый балансировщик | Cloud-native proxy |\n| Service discovery | Нет (нужен доп. тулинг) | Нет (Runtime API) | Да, встроено |\n| Reload без даунтайма | Graceful reload | Runtime API / reload | Динамически, без reload |\n| Auto TLS (ACME) | Нет из коробки | Нет | Да, встроено |\n| Производительность | Высокая | Очень высокая (эталон L4/L7) | Средняя-высокая |\n| Best fit | Статичная инфраструктура, кэш, статика | Bare-metal HA, финансовые/нагруженные системы | Kubernetes, Docker, микросервисы |"},{"q":"Три модели работы TLS на reverse-proxy","b":"- **TLS Termination** — прокси расшифровывает трафик, дальше к бэкенду идёт обычный HTTP (или TLS с другим, внутренним сертификатом). Самый частый вариант, упрощает управление сертификатами.\n- **TLS Passthrough** — прокси просто перенаправляет зашифрованный поток без расшифровки (работает на L4, по SNI). Используется, когда бэкенд сам должен видеть клиентский сертификат (например, mTLS напрямую с приложением) или по регуляторным причинам.\n- **TLS Re-encryption (bridging)** — прокси расшифровывает внешний TLS и заново шифрует трафик до бэкенда отдельным (обычно внутренним) сертификатом — стандарт в zero-trust инфраструктурах."},{"q":"Управление сертификатами на практике","b":"- **Let's Encrypt / ACME** — автоматический выпуск и продление (Traefik и Certbot делают это нативно).\n- **Внутренний PKI** (например, HashiCorp Vault как CA, или Microsoft AD CS) — для внутренних сервисов и mTLS.\n- Важно на собесе упомянуть: **ротацию ключей**, **мониторинг сроков истечения** (expiry alerting), **OCSP/CRL** для отзыва скомпрометированных сертификатов."},{"q":"Почему TLS termination, а не passthrough?","b":"обычно проще управлять сертификатами централизованно, снижается нагрузка CPU на приложения, можно инспектировать трафик (WAF, логи). Passthrough — когда нужен end-to-end mTLS или регуляторные требования не позволяют расшифровку на прокси."},{"q":"Как обеспечить zero-downtime деплой?","b":"health checks + graceful drain (снять узел из ротации, дождаться завершения активных соединений, потом обновить) + rolling update."},{"q":"Как выбрать между Nginx, HAProxy, Traefik?","b":"контекст инфраструктуры: bare-metal/статичная — HAProxy/Nginx; Kubernetes/динамическая — Traefik или Nginx Ingress с service discovery."},{"q":"Как защититься от DDoS на уровне reverse-proxy?","b":"rate limiting, connection limiting, WAF-правила, geo-blocking, upstream CDN/anti-DDoS (Cloudflare) перед прокси."}]},{"id":"visio-cmdb-instrukcii","u":"U22","short":"Visio CMDB Инструкции","full":"Visio CMDB Инструкции","title":"Visio CMDB Инструкции","eyebrow":"Документирование сетей и сервисов","desc":"","cards":[{"a":"Visio","t":"Уровни диаграмм","tags":[],"b":"<ol><li><b>L1 — физическая топология</b>: стойки, патч-панели, физические порты коммутаторов, кабели, серверные комнаты/датацентры. Важна для инженеров на местах при физическом обслуживании.</li><li><b>L2/L3 — логическая сеть</b>: VLAN'ы, IP-адресация, подсети, маршрутизация, зоны безопасности (DMZ, internal, management network).</li><li><b>Схема потоков данных (data flow diagram)</b>: как трафик идёт между сервисами — критично для security-аудита и понимания attack surface.</li><li><b>Схема отказоустойчивости</b>: где active/passive, где кластеры, где точки единого отказа (SPOF) — то, что обсуждали в балансировке (HAProxy+Keepalived).</li><li><b>WAN/VPN-схема</b>: связи между филиалами, датацентрами, облаками (site-to-site VPN, MPLS, direct connect).</li></ol>"},{"a":"Visio","t":"Стандарты нотации в Visio","tags":[],"b":"<ul><li>Использование единой библиотеки шаблонов (Cisco stencils для сетевого оборудования, AWS/Azure stencils для облака) — не рисовать \"на глаз\" произвольными фигурами.</li><li>Единая цветовая кодировка (например: красный — production critical, жёлтый — staging, зелёный — dev; или по зонам безопасности).</li><li>Легенда на каждой диаграмме — обязательна.</li><li>Версионирование файлов (<code>network-diagram-v3.2-2026-06.vsdx</code>) или, лучше, Visio-файлы в системе контроля версий/SharePoint с историей.</li></ul>"},{"a":"CMDB","t":"(Configuration Management Database)","tags":[],"b":"<p>CMDB — база данных <b>Configuration Items (CI)</b> и связей между ними: серверы, сетевое оборудование, приложения, лицензии, договоры с вендорами, и главное — <b>зависимости</b> между ними (Service Dependency Mapping).</p>\n<p>Ключевая ценность CMDB не в списке активов (это просто инвентарь), а в <b>связях</b>: \"приложение X работает на сервере Y, который зависит от базы данных Z, которая реплицируется на DR-площадку W\". Это и есть <b>Impact Analysis</b> — при инциденте на сервере Y сразу видно, какие бизнес-сервисы пострадают.</p>"},{"a":"МОДЕЛЬ ДАННЫХ","t":"Модель данных CMDB (типовая структура CI)","tags":[],"b":"<ul><li><b>Hardware CI</b>: серверы, сетевое оборудование, СХД.</li><li><b>Software CI</b>: ОС, приложения, версии, лицензии.</li><li><b>Service CI</b>: бизнес-сервисы (например, \"Интернет-банк\"), которые состоят из набора нижестоящих CI.</li><li><b>Relationship types</b>: \"runs on\", \"depends on\", \"connects to\", \"is part of\", \"backed up by\".</li></ul>"},{"a":"ИНСТРУМЕНТЫ CMDB","t":"Инструменты CMDB","tags":[],"b":"<table><thead><tr><th>Класс</th><th>Инструменты</th></tr></thead><tbody><tr><td>Enterprise ITSM</td><td>ServiceNow CMDB, BMC Helix, ivanti</td></tr><tr><td>Open-source / mid-size</td><td>NetBox (отлично для сетевой части + IPAM), iTop, GLPI</td></tr><tr><td>Cloud-native / discovery</td><td>Device42, Lansweeper</td></tr><tr><td>DIY / IaC-driven</td><td>Собственная БД + Terraform state как источник данных, интеграция через API</td></tr></tbody></table>"},{"a":"СВЯЗЬ CMDB","t":"Связь CMDB с процессами ITIL","tags":[],"b":"<p>На собесе для IT Head часто спрашивают, как документация встраивается в операционные процессы:</p>\n<ul><li><b>Incident Management</b> — при инциденте дежурный сразу видит из CMDB связанные CI и затронутые бизнес-сервисы, это ускоряет диагностику и приоритизацию.</li><li><b>Change Management</b> — CAB (Change Advisory Board) оценивает риск изменения именно через граф зависимостей в CMDB (\"что ещё зависит от этого сервера\").</li><li><b>Problem Management</b> — при повторяющихся инцидентах CMDB помогает найти общий корневой CI (например, все инциденты связаны с одним и тем же сетевым коммутатором).</li><li><b>Asset &amp; License Management</b> — финансовая сторона: сколько лицензий, когда истекает поддержка оборудования (EOL/EOS вендора).</li></ul>"}],"qa":[{"q":"Зачем документация","b":"Документация — это не бюрократия ради бюрократии, а инструмент снижения **bus factor** и MTTR (Mean Time To Repair):\n\n- **Bus factor / Key person risk** — если сеть в голове одного инженера, компания заложник его отпуска/увольнения.\n- **MTTR** — при инциденте в 3 часа ночи дежурный инженер должен за 5 минут понять топологию, а не звонить архитектору.\n- **Onboarding** — новый сотрудник выходит на самостоятельную работу за дни, а не месяцы.\n- **Compliance/аудит** — ISO 27001, SOC2, PCI DSS требуют актуальной документации инфраструктуры как обязательный артефакт.\n- **Change Management** — без понимания зависимостей (\"что сломается, если я перезагружу этот сервер\") невозможно оценить риск изменения.\n\nХороший тезис для собеса: *\"Документация — это не проект с датой завершения, а часть DevOps/SRE culture: если изменение не задокументировано, оно не считается завершённым (definition of done включает обновление доков)\"*."},{"q":"Проблема Visio","b":"Visio — статичен и требует ручного обновления, легко устаревает. Поэтому в зрелых компаниях к нему добавляют **автоматически генерируемые диаграммы**:\n\n- **NetBox / Netdisco** — автообнаружение топологии через SNMP/LLDP/CDP.\n- **draw.io / diagrams.net** с интеграцией в Confluence — легче версионировать как код (XML), можно хранить в Git.\n- Тренд — **\"diagram as code\"**: инструменты типа `Diagrams` (Python-библиотека `mingrammer/diagrams`), Structurizr (C4-модель), Terraform-визуализаторы — диаграмма генерируется из фактического состояния инфраструктуры (IaC), а не рисуется вручную и потому не может разойтись с реальностью."},{"q":"Как вы поддерживаете актуальность документации?","b":"Ручной Visio — источник истины только для верхнеуровневой архитектуры, которая меняется редко. Для деталей, которые меняются часто (IP-адреса, порты, VLAN), полагаемся на CMDB с автообнаружением, а Visio генерируем/сверяем с ней периодически, а не наоборот"},{"q":"Как наполнять и поддерживать актуальность (это критичный момент — CMDB почти всегда умирает без автоматизации)","b":"- **Discovery-инструменты** — автоматическое сканирование инфраструктуры (SNMP, WMI, SSH-agents), которые сами обновляют CMDB: например, ServiceNow Discovery, BMC Helix, Device42, NetBox (для сетевой части), либо связка Ansible + CMDB API для конфигураций.\n- **Интеграция с CI/CD и IaC** — если инфраструктура развёртывается через Terraform/Ansible, CMDB обновляется автоматически как часть pipeline, а не руками.\n- **Reconciliation** — регулярная сверка \"что реально есть\" vs \"что записано в CMDB\", с алертами на расхождения (drift detection).\n- Golden rule, которую стоит проговорить: *\"CMDB, которая обновляется вручную, устаревает в течение первого квартала. Единственный устойчивый подход — CMDB как побочный продукт автоматизации (discovery + IaC), а не отдельная ручная задача\"*."},{"q":"Инструкции для службы поддержки (Service Desk) — Runbooks","b":"Это отдельный жанр документации, принципиально отличается от архитектурных диаграмм — она должна работать **под давлением**, когда инженер уровня L1 не эксперт и действует по шагам в 2 часа ночи.\n\n### Структура хорошего runbook\n\n- **Триггер/симптом** — как понять, что это именно эта проблема (конкретные алерты, коды ошибок, логи).\n- **Impact** — какие сервисы/пользователи затронуты, приоритет (P1-P4).\n- **Диагностика** — пошаговые команды для подтверждения диагноза (конкретные, копипастабельные — `systemctl status haproxy`, а не \"проверьте, что сервис работает\").\n- **Действия по восстановлению** — точные шаги, с указанием, когда нужно эскалировать на L2/L3, а не пытаться чинить самостоятельно.\n- **Rollback-процедура** — как откатить, если действие не помогло.\n- **Владелец/эскалация** — контакты ответственного инженера/команды, время реакции по SLA.\n- **Ссылка на связанный CI в CMDB** и на архитектурную диаграмму.\n\n### Принципы (то, что отличает зрелую команду)\n\n- **Runbook пишется исполнителем инцидента сразу после первого разбора нового типа проблемы** — не откладывается \"на потом\" (тогда его никто не напишет).\n- **Тестируется на реальных дежурствах** — если L1 не смог воспользоваться runbook'ом без звонка эксперту, документ плохой, требует переработки.\n- Разделение: **Runbook** (детерминированная последовательность действий для known issue) vs **Playbook** (более общая стратегия реагирования, например для нового типа инцидента, требует suждения).\n- Хранение — не в личных заметках/Word на рабочем столе, а в централизованной базе знаний (Confluence, Notion, ServiceNow KB) с версионированием и владельцем документа (кто отвечает за актуальность)."},{"q":"Документация для разработчиков","b":"Другая аудитория — другой формат:\n\n- **README на уровне репозитория** — как поднять окружение локально, зависимости, переменные окружения.\n- **Архитектурная документация (ADR — Architecture Decision Records)** — фиксирует не только \"как сделано\", но и \"почему выбрали именно так\", с альтернативами, которые рассматривались и были отклонены. Крайне ценно для собеса — мало кто из кандидатов вообще упоминает ADR.\n- **API-документация** — OpenAPI/Swagger, автогенерируемая из кода, чтобы не расходилась с реальностью.\n- **Onboarding-гайд для разработчика** — доступы, какие сервисы к чему обращаются, схема deployment pipeline.\n- **Diagram as code** (см. выше) — особенно ценится разработчиками, потому что диаграмма лежит в том же репозитории, ревьюится в PR вместе с кодом инфраструктуры."},{"q":"Как вы поддерживаете CMDB в актуальном состоянии?","b":"автообнаружение + интеграция с IaC/CI-CD, а не ручной ввод; регулярный reconciliation."},{"q":"Чем Runbook отличается от Playbook?","b":"детерминированные шаги для known issue vs общая стратегия для нестандартной ситуации, требующая суждения."},{"q":"Как вы решаете, что документировать, а что нет — ведь всё не задокументируешь?","b":"приоритет по критичности сервиса (Tier 1/2/3) и по частоте инцидентов; сначала P1-сервисы и топ recurring issues."},{"q":"Какой инструмент CMDB выбрали бы для компании из 200 серверов?","b":"зависит от бюджета и зрелости: NetBox+Ansible для DIY-подхода, ServiceNow при развитом ITSM с бюджетом."},{"q":"Как убедить команду обновлять документацию?","b":"не уговорами, а встраиванием в процесс (Definition of Done, автоматизация, метрики) — люди следуют процессу, а не доброй воле."},{"q":"рабочий шаблон runbook'а","b":"# Runbook: [Название проблемы]\n\n> Шаблон для использования в Confluence/Notion/ServiceNow KB.\n> Владелец документа обязателен — без владельца документ не проходит quarterly review.\n\n| Поле | Значение |\n|---|---|\n| **ID документа** | RB-XXX |\n| **Владелец** | [Имя / команда] |\n| **Дата создания** | ГГГГ-ММ-ДД |\n| **Последний review** | ГГГГ-ММ-ДД |\n| **Связанный CI (CMDB)** | [ссылка на CI в CMDB] |\n| **Связанная диаграмма** | [ссылка на Visio/draw.io] |\n| **Приоритет по умолчанию** | P1 / P2 / P3 / P4 |\n\n---\n\n## 1. Триггер / симптом\n\n- Какой алерт сработал (название алерта в мониторинге, точный текст).\n- Какие коды ошибок / сообщения в логах указывают именно на эту проблему.\n- Как отличить эту проблему от похожих (если есть риск спутать с другим инцидентом).\n\n## 2. Impact (влияние)\n\n- Какие бизнес-сервисы затронуты.\n- Какие пользователи/клиенты видят последствия и как именно (например: \"500 ошибка на checkout\", \"недоступен личный кабинет\").\n- Приоритет инцидента для данного случая (может отличаться от дефолтного в зависимости от масштаба).\n\n## 3. Диагностика\n\nПошаговые, копипастабельные команды. Каждый шаг — с ожидаемым результатом.\n\n1. Шаг диагностики 1 — команда — что означает результат\n2. Шаг диагностики 2 — команда — что означает результат\n3. Точка принятия решения: если результат X → раздел 4a, если Y → раздел 4b\n\n## 4. Действия по восстановлению\n\n### 4a. Сценарий A\n1. Шаг 1\n2. Шаг 2\n3. Проверка, что проблема устранена\n\n### 4b. Сценарий B\n1. Шаг 1\n2. Шаг 2\n\n## 5. Критерий эскалации\n\n- При каких условиях L1 должен остановиться и передать инцидент на L2/L3.\n- Контакт ответственной команды/инженера, время реакции по SLA.\n- Что обязательно сообщить при эскалации (какие данные/логи собрать заранее).\n\n## 6. Rollback\n\n- Как откатить изменения, если действия по восстановлению не помогли или ухудшили ситуацию.\n\n## 7. После инцидента\n\n- Куда занести факт инцидента (тикет-система).\n- Нужно ли создавать Problem-запись при повторении.\n- Обновить ли сам runbook по итогам (что не сработало / что было неточно описано).\n\n---\n---\n\n# ПРИМЕР: Runbook — Backend недоступен за HAProxy (503 от frontend)\n\n| Поле | Значение |\n|---|---|\n| **ID документа** | RB-014 |\n| **Владелец** | Команда Platform/Infra |\n| **Дата создания** | 2026-07-07 |\n| **Последний review** | 2026-07-07 |\n| **Связанный CI (CMDB)** | CI-LB-PROD-01 (haproxy, lb-node1/lb-node2), CI-SVC-APP (app.example.com) |\n| **Связанная диаграмма** | network-diagram-lb-ha-v2.vsdx |\n| **Приоритет по умолчанию** | P2 (P1, если затронуты все backend'ы одновременно) |\n\n## 1. Триггер / симптом\n\n- Алерт мониторинга: `HAProxy backend down` или `503 Service Unavailable rate > 5%` на `app.example.com`.\n- В логах HAProxy (`/var/log/haproxy.log`) записи вида `Server be_app/web1 is DOWN`.\n- Пользователи видят 503-ошибки или крутящийся спиннер без ответа.\n\n## 2. Impact\n\n- Затронут сервис `app.example.com` — уточнить по дашборду, какая доля трафика идёт в down-backend (при 2 backend'ах и 1 упавшем — обычно деградация ~50%, не полный отказ).\n- Приоритет: P2 при частичной деградации, P1 при падении обоих backend'ов одновременно.\n\n## 3. Диагностика\n\n1. Проверить статистику HAProxy:\n   `curl -s -u admin:PASS http://lb-node1:8404/haproxy?stats\\;csv | grep be_app`\n   → смотрим колонку `status`: если `DOWN` — backend не проходит health check.\n2. Проверить сам backend напрямую:\n   `curl -v http://10.0.0.20:8080/health`\n   → если недоступен — проблема на стороне приложения/сервера, не в HAProxy.\n   → если доступен, но HAProxy считает его down — проверить health check конфиг (интервал, путь, ожидаемый код ответа).\n3. Проверить логи приложения на backend-сервере:\n   `pct exec <CTID> -- journalctl -u app -n 100 --no-pager` (если LXC на Proxmox)\n   → искать OOM, panic, unhandled exception.\n4. Точка решения:\n   - Backend физически недоступен (нет ответа на порт) → раздел 4a.\n   - Backend отвечает, но health check не проходит (например, неверный код ответа) → раздел 4b.\n\n## 4. Действия по восстановлению\n\n### 4a. Backend недоступен (сервис упал/завис)\n1. Перезапустить сервис приложения на backend-сервере: `systemctl restart app`\n2. Дождаться 10-15 сек (health check interval из `02-haproxy-lb.sh`: `inter 3s rise 2`)\n3. Проверить статистику HAProxy повторно — статус должен смениться на `UP`\n4. Если не поднимается — эскалация на L2 (владелец приложения), см. раздел 5\n\n### 4b. Backend отвечает, но health check не проходит\n1. Вручную проверить, что возвращает `/health`: `curl -i http://10.0.0.20:8080/health`\n2. Если код ответа не 200 — это может быть намеренная деградация приложения (например, не готова БД) — эскалация на L2, не трогать конфиг HAProxy самостоятельно\n3. Если конфиг health check в HAProxy некорректен (редкий случай после недавнего change) — сверить с последним approved Change Request, не редактировать `haproxy.cfg` вручную без CR\n\n## 5. Критерий эскалации\n\n- Если после перезапуска backend не поднимается за 10 минут — эскалация на L2 (владелец приложения, on-call ротация в PagerDuty).\n- Если недоступны оба backend'а одновременно (P1) — немедленная эскалация, не дожидаясь 10 минут.\n- При эскалации приложить: вывод `haproxy?stats`, вывод `curl` к backend напрямую, последние 100 строк логов приложения.\n\n## 6. Rollback\n\n- Если недавно был Change Request по деплою приложения — откат на предыдущую версию по стандартной процедуре CI/CD (не входит в этот runbook, см. RB-Deploy-Rollback).\n- Если недавно менялся конфиг HAProxy — откат конфига из backup (`/etc/haproxy/haproxy.cfg.bak.<timestamp>`, создаётся автоматически скриптом `02-haproxy-lb.sh`) и `systemctl restart haproxy`.\n\n## 7. После инцидента\n\n- Завершить тикет со ссылкой на этот runbook (подтверждает, что действовали по процедуре).\n- Если это третий подобный инцидент за месяц — завести Problem-запись на разбор корневой причины (возможно, недостаточные ресурсы backend, нужен autoscaling).\n- Если на любом из шагов пришлось звонить эксперту, которого не должно было требоваться — обновить runbook, уточнить шаг."}]},{"id":"ci-cd-git-gitlab-jenkins","u":"U23","short":"Configuration Management","full":"CI/CD (Git, GitLab/Jenkins)","title":"CI/CD (Git, GitLab/Jenkins)","eyebrow":"CI/CD (Git, GitLab/Jenkins)","desc":"","cards":[{"a":"GIT-МОДЕЛИ ВЕТОК","t":"Git-модели веток","tags":[],"b":"<ul><li><b>Git Flow</b> — модель с несколькими долгоживущими ветками: <code>main</code>, <code>develop</code>, <code>feature/*</code>, <code>release/*</code>, <code>hotfix/*</code>. Подходит для продуктов с версионными релизами (например, десктоп-софт, где нужно поддерживать несколько версий одновременно).</li><li><b>GitHub Flow</b> — упрощённая модель: одна <code>main</code> ветка + короткоживущие <code>feature</code>ветки, которые сразу мержатся после ревью. Подходит для SaaS с непрерывным деплоем.</li><li><b>Trunk-Based Development (TBD)</b> — все коммитят прямо в <code>main</code> (или очень короткие ветки на часы), часто с feature flags для скрытия неготового функционала. Требует зрелого CI и высокой дисциплины тестирования.</li></ul>"},{"a":"ПРОЦЕССЫ КОД-РЕВЬЮ:","t":"Процессы код-ревью:","tags":[],"b":"<ul><li><b>CODEOWNERS</b> — файл в репозитории, который автоматически назначает конкретных людей/команды на ревью изменений в определённых директориях (например, изменения в <code>/infra</code> всегда идут на ревью DevOps-лида).</li><li><b>Protected branches</b> — настройка в GitLab/GitHub, запрещающая прямой push в ветку (например, <code>main</code>) без прохождения PR/MR и обязательных проверок.</li></ul>"},{"a":"CI/CD ИНФРАСТРУКТУРА:","t":"CI/CD инфраструктура:","tags":[],"b":"<ul><li><b>SCM (Source Control Management)</b> — система управления версиями кода (Git — это реализация SCM).</li><li><b>Runner</b> (GitLab) — исполнитель, который реально запускает джобы пайплайна (может быть shared — общий для всех проектов, или specific — выделенный под конкретный проект/окружение).</li><li><b>Jenkins Master + Agent/Node</b> — Master управляет пайплайнами и UI, Agent — машина, где физически выполняется сборка.</li><li><b>Matrix jobs</b> — запуск одной и той же джобы параллельно с разными параметрами (например, тесты на 3 версиях Node.js одновременно).</li></ul>"},{"a":"СТРАТЕГИИ ДЕПЛОЯ:","t":"Стратегии деплоя:","tags":[],"b":"<ul><li><b>Blue-Green deployment</b> — держим два идентичных окружения (blue — текущее прод, green — новая версия), переключаем трафик мгновенно после проверки, откат = переключить обратно.</li><li><b>Canary deployment</b> — новая версия выкатывается на малый % трафика/пользователей, если всё ок — постепенно увеличиваем долю.</li><li><b>Feature flags</b> — переключатели в коде, позволяющие включать/выключать функционал без нового деплоя (LaunchDarkly, Unleash, или самописные).</li></ul>"},{"a":"СЕКРЕТЫ:","t":"Секреты:","tags":[],"b":"<ul><li><b>Vault</b> (HashiCorp Vault) — централизованное хранилище секретов (пароли, токены, ключи) с контролем доступа и аудитом.</li><li><b>GitLab CI/CD Variables</b> — встроенный механизм GitLab для хранения секретов на уровне проекта/группы (проще, но менее гибко, чем Vault).</li><li><b>Jenkins Credentials Plugin</b> — аналогичный механизм в Jenkins.</li></ul>"},{"a":"CONFIGURATION MANAGEMENT","t":"Configuration Management / IaC:","tags":[],"b":"<ul><li><b>IaC (Infrastructure as Code)</b> — описание инфраструктуры кодом (декларативно), а не ручными кликами в консоли облака.</li><li><b>Provisioning</b> — создание ресурсов \"с нуля\" (виртуалка, сеть, база данных) — этим занимается <b>Terraform</b>.</li><li><b>Configuration Management</b> — настройка того, что уже создано (установка пакетов, конфиги, пользователи на сервере) — этим занимаются <b>Ansible/Chef/Puppet</b>.</li><li><b>Ansible</b> — agentless (не требует агента на серверах, работает по SSH), использует YAML-плейбуки.</li><li><b>Puppet/Chef</b> — требуют установки агента на управляемые серверы, более старая архитектура, чаще встречаются в legacy enterprise.</li><li><b>Helm</b> — \"менеджер пакетов\" для Kubernetes, упаковывает манифесты в чарты с параметрами.</li><li><b>Kustomize</b> — альтернатива Helm, патчит YAML-манифесты K8s без шаблонизации.</li></ul>"},{"a":"GITOPS:","t":"GitOps:","tags":[],"b":"<ul><li><b>GitOps</b> — подход, где Git-репозиторий — единственный источник истины о состоянии инфраструктуры/деплоя; изменения происходят через коммит в Git, а не прямой доступ к кластеру.</li><li><b>ArgoCD / Flux</b> — инструменты, которые следят за Git-репозиторием и автоматически синхронизируют состояние кластера Kubernetes с тем, что описано в репо (pull-based deploy, в отличие от push-based, когда CI сам \"толкает\" изменения в прод).</li></ul>"},{"a":"МЕТРИКИ ЗРЕЛОСТИ:","t":"Метрики зрелости:","tags":[],"b":"<ul><li><b>DORA-метрики</b> (DevOps Research and Assessment) — 4 ключевых метрики зрелости DevOps:<ol><li><b>Deployment Frequency</b> — как часто деплоите в прод</li><li><b>Lead Time for Changes</b> — время от коммита до попадания в прод</li><li><b>MTTR (Mean Time To Recovery)</b> — среднее время восстановления после инцидента/падения</li><li><b>Change Failure Rate</b> — % деплоев, вызвавших сбой в проде</li></ol></li></ul>"},{"a":"GITLAB CI","t":"GitLab CI / Jenkins — сравнение и архитектура","tags":[],"b":"<table><thead><tr><th>Критерий</th><th>GitLab CI</th><th>Jenkins</th></tr></thead><tbody><tr><td>Конфигурация</td><td><code>.gitlab-ci.yml</code>, декларативно</td><td>Groovy (Jenkinsfile), больше гибкости, но сложнее</td></tr><tr><td>Инфраструктура</td><td>Runners (shared/specific)</td><td>Master + Agents/Nodes</td></tr><tr><td>Порог входа</td><td>Ниже</td><td>Выше (плюс много legacy-настроек через UI)</td></tr><tr><td>Экосистема</td><td>Встроено (SCM+CI+CD+registry)</td><td>Огромный набор плагинов, но зависимость от них</td></tr><tr><td>Масштабирование</td><td>Runners в k8s, auto-scaling</td><td>Требует ручной настройки agent pool</td></tr></tbody></table>"},{"a":"PROTECTED BRANCHES","t":"Protected Branches (защищённые ветки)","tags":[],"b":"<p>Настройка на уровне репозитория (GitLab/GitHub/Bitbucket), которая накладывает ограничения на конкретную ветку (обычно <code>main</code>/<code>master</code>, <code>release/*</code>).</p>\n<p><b>Что конкретно можно запретить/разрешить:</b></p>\n<ul><li>Прямой <code>push</code> в ветку (даже для мейнтейнеров) — изменения только через Merge Request</li><li><code>force push</code> — запрет перезаписи истории</li><li>Удаление ветки</li><li>Кто может мержить (Maintainers only / Developers+Maintainers / No one)</li><li>Кто может пушить напрямую (обычно никто, кроме CI-бота для автоматических тэгов)</li></ul>\n<p><b>Пример из GitLab (Settings → Repository → Protected Branches):</b></p>\n<pre><code>Branch: main\nAllowed to merge: Maintainers\nAllowed to push: No one\nAllowed to force push: No</code></pre>"},{"a":"REQUIRED CHECKS","t":"Required Checks / Required Status Checks","tags":[],"b":"<p>Список проверок (CI-джобов), которые <b>обязаны</b> пройти успешно, прежде чем MR/PR можно замержить. Кнопка \"Merge\" физически неактивна, пока джобы не зелёные.</p>\n<p><b>Типичный набор required checks:</b></p>\n<pre><code>✅ unit-tests\n✅ lint\n✅ build\n✅ security-scan (SAST)\n✅ code-coverage &gt;= 80%\n✅ at least 1 approval from CODEOWNERS</code></pre>\n<p><b>Дополнительно к этому часто настраивают:</b></p>\n<ul><li><b>\"Require branches to be up to date before merging\"</b> — MR должен быть смержен с последней <code>main</code>, иначе может быть \"false green\" (протестировали старую версию кода, а не то, что реально будет в main)</li><li><b>Required reviewers</b> — не просто \"1 approve\", а approve именно от владельца компонента (через CODEOWNERS)</li></ul>\n<p><b>Ответ на собесе:</b><i>\"Required checks — это способ технически, а не на словах, гарантировать качество: код физически не попадёт в main, если не прошёл тесты, security scan и ревью. Это убирает человеческий фактор 'забыли проверить'.\"</i></p>"},{"a":"КОНФЛИКТЫ ПРОЦЕССОВ","t":"Конфликты процессов при масштабировании 10 → 100 разработчиков","tags":[],"b":"<p>При росте с 10 до 100 разработчиков главная проблема — не техническая, а организационная: ревью становится бутылочным горлышком, а процессы у команд расходятся. Я решал это через: (1) распределение владения кодом по CODEOWNERS вместо ревью через 1-2 лидов, (2) единые CI-шаблоны на уровне организации через include/shared libraries, чтобы команды не изобретали процесс заново, (3) переход на selective/affected testing, чтобы пайплайн не деградировал с ростом кодовой базы.</p>"}],"qa":[{"q":"Почему выбрали GitLab CI или Jenkins для проекта?","b":"Шаблон ответа: \"Выбирал по трём критериям — экосистема (нужен ли встроенный registry/SCM или отдельные системы), порог входа команды и стоимость поддержки инфраструктуры. GitLab CI брал, когда нужна была быстрая настройка \"из коробки\" (SCM+CI+CD+Container Registry в одном месте) и команда не хотела администрировать отдельный CI-сервер. Jenkins — когда были специфичные legacy-интеграции или нужна была максимальная гибкость через плагины, которой GitLab не давал.\""},{"q":"Как организованы стадии пайплайна?","b":"тандартно: build → lint/unit-test → security scan (SAST/dependency check) → integration test → deploy to staging → e2e test → manual approval → deploy to prod. Параллелю независимые джобы (например, lint и unit-test идут одновременно), кэширую зависимости (node_modules, Docker layers), чтобы сократить время пайплайна."},{"q":"Как решается проблема долгого пайплайна?","b":"- Параллелизация независимых стадий\n- Кэширование (Docker layer caching, dependency caching)\n- Matrix-джобы вместо последовательных\n- Разделение на \"быстрый\" пайплайн (для PR) и \"полный\" (для мержа в main)"},{"q":"Rollback-стратегия?","b":"Зависит от критичности сервиса. Для высоконагруженных — blue-green (мгновенный откат переключением трафика). Для менее критичных — canary с автоматическим rollback по метрикам (error rate, latency). Плюс feature flags для отключения функционала без деплоя вообще."},{"q":"Как решается конфигурационный дрифт?","b":"Всё описано как код (IaC) — ручные изменения на серверах запрещены политикой. Регулярно прогоняю terraform plan/ansible-playbook --check в dry-run режиме в CI по расписанию, чтобы поймать дрифт до того, как он стал проблемой."},{"q":"Конфликты процессов при масштабировании 10 → 100 разработчиков","b":"### Что ломается при росте команды:\n\n**Проблема 1: Bottleneck на ревью**\n\n- При 10 разработчиках 1-2 тимлида успевают ревьюить всё\n- При 100 — тимлиды становятся узким местом, MR лежат по 2-3 дня\n\n**Решение:** Распределённое владение кодом через CODEOWNERS по доменам/модулям + правило \"минимум 1 approve от любого члена команды-владельца\", а не только от лида. Внедрение ротации ревьюеров.\n\n---\n\n**Проблема 2: Конфликты в общей ветке (merge hell)**\n\n- При Trunk-Based Development с 10 людьми — коммитят в main спокойно\n- При 100 людях в один trunk — постоянные конфликты, нестабильный main\n\n**Решение:**\n\n- Дробление монолитного репозитория на **сервисы/модули** с независимыми пайплайнами (или переход на monorepo с умным CI, который гоняет тесты только для изменённых частей — affected-based testing, например через Nx, Bazel, Turborepo)\n- Более короткие feature-ветки + обязательный rebase перед мержем\n- Feature flags, чтобы не держать долгоживущие ветки\n\n---\n\n**Проблема 3: Долгий пайплайн из-за роста кодовой базы**\n\n- 10 разработчиков — пайплайн 5 минут, никто не жалуется\n- 100 разработчиков — тысячи MR в день, пайплайн разросся до 40 минут — очереди на CI runners\n\n**Решение:**\n\n- Параллелизация + selective testing (гонять тесты только для изменённых модулей)\n- Увеличение пула runners, auto-scaling runners в Kubernetes\n- Разделение на \"fast feedback\" pipeline (для каждого коммита — только линт+юниты) и \"full\" pipeline (перед мержем в main)\n\n---\n\n**Проблема 4: Расхождение процессов между командами**\n\n- 10 человек — один процесс на всех, все в одном контексте\n- 100 человек — 8 команд, каждая тихонько придумала свой процесс релиза, свои конвенции коммитов\n\n**Решение:**\n\n- Единый **Git-стандарт** на уровне компании (naming conventions для веток, commit message convention — например, Conventional Commits)\n- Platform/DevOps команда, которая владеет шаблонами `.gitlab-ci.yml` (Include-механизм в GitLab — команды наследуют базовый пайплайн, а не копипастят)\n- Внутренний \"Golden path\" / CI template — чтобы новая команда не изобретала пайплайн с нуля"},{"q":"Ansible","b":"**Как работает:** Agentless — не нужно ставить агента на управляемый сервер, подключается по **SSH** (для Linux) или **WinRM** (для Windows) и выполняет модули напрямую.\n\n**Формат:** YAML-плейбуки.\n\n```yaml\n- hosts: webservers\n  tasks:\n    - name: Install nginx\n      apt:\n        name: nginx\n        state: present\n    - name: Copy config\n      template:\n        src: nginx.conf.j2\n        dest: /etc/nginx/nginx.conf\n      notify: restart nginx\n```\n\n**\"Декларативно + императивно\"** — что это значит:\n\n- Декларативная часть: ты описываешь **желаемое состояние** (\"nginx должен быть установлен\"), а не команды \"как установить\" — Ansible сам решает, нужно ли что-то менять (idempotency — повторный запуск ничего не ломает, если всё уже так, как надо)\n- Императивная часть: задачи (`tasks`) выполняются **строго по порядку сверху вниз**, как обычный скрипт — в отличие от Terraform, где Terraform сам строит граф зависимостей\n\n**Где применяется:** настройка серверов (установка пакетов, юзеров, конфигов), оркестрация деплоя приложений (rolling restart, zero-downtime deploy последовательно по нодам)."},{"q":"Terraform","b":"**Провижининг = создание ресурсов \"с нуля\".** Terraform не занимается тем, что происходит **внутри** сервера — только тем, **что этот сервер из себя представляет как ресурс облака**.\n\n```hcl\nresource \"aws_instance\" \"web\" {\n  ami           = \"ami-0c55b159cbfafe1f0\"\n  instance_type = \"t3.medium\"\n}\n```\n\nTerraform создаст виртуалку в AWS. Но что там внутри — какая ОС, какие пакеты, какие пользователи — это **не его задача**, это задача Ansible/Chef/Puppet.\n\n**Почему \"не путать с конфигурацией ОС\":**\nЧастая ошибка на собесе — сказать \"Terraform настраивает сервер\". Нет — Terraform **создаёт** сервер (VM, сеть, диск, DNS-запись, RDS-инстанс), а настройка того, что внутри — отдельный инструмент.\n\n**Типичная связка в пайплайне:**\n\n```\n1. terraform apply     → создаём VM в облаке\n2. ansible-playbook    → устанавливаем на неё софт и конфиги\n3. deploy application  → выкатываем само приложение\n```\n\n**Ключевое отличие от Ansible в механике:** Terraform строит **граф зависимостей ресурсов** и сам определяет порядок создания/изменения/удаления (declarative, no order needed от тебя). State хранится в `terraform.tfstate` — Terraform \"помнит\", что уже создано."},{"q":"Helm / Kustomize — контекст Kubernetes","b":"Это отдельная категория — configuration management **не для серверов, а для Kubernetes-манифестов**.\n\n**Helm** — \"пакетный менеджер\" для K8s:\n\n- Упаковывает набор YAML-манифестов (Deployment, Service, ConfigMap...) в **Chart**\n- Использует шаблонизацию (Go templates) — один Chart с разными `values.yaml` разворачивается в разные окружения (dev/staging/prod)\n\n```bash\nhelm install myapp ./mychart -f values-prod.yaml\n```\n\n**Kustomize** — встроен в `kubectl`, без шаблонизации:\n\n- Берёт базовый набор манифестов (`base/`) и накладывает патчи (`overlays/dev`, `overlays/prod`), которые точечно меняют нужные поля\n\n```\nbase/deployment.yaml\noverlays/prod/patch-replicas.yaml   → меняет replicas: 3 → 10\n```\n\n**Ключевое отличие для собеса:**\n\n- Helm — для сложных приложений с множеством параметров, где нужны шаблоны и версионирование чартов (можно \"откатиться\" на предыдущую версию релиза чарта — `helm rollback`)\n- Kustomize — для более простых случаев, когда не хочешь тащить шаблонизацию, а просто патчишь готовый YAML под окружение"},{"q":"Настройка алертов в Zabbix для GitLab","b":"# Настройка алертов в Zabbix для GitLab\n\nСкрипты `01`-`04` ставят GitLab и настраивают сбор метрик агентом.\nЭта часть — что нужно сделать **на самом Zabbix Server** (через Web UI),\nчтобы метрики превратились в реальные уведомления (Slack/Telegram/Email).\n\n## Порядок действий\n\n### 1. Добавить хост в Zabbix Server\n`Data collection → Hosts → Create host`\n- Host name: как в скрипте `03_install_zabbix_agent.sh` (второй аргумент)\n- Templates: добавить `Linux by Zabbix agent` (стандартный, для CPU/RAM/Disk/Network)\n- Отдельно создать кастомный template для GitLab (см. шаг 2)\n- Interfaces: Agent, IP этого сервера, порт 10050\n\n### 2. Создать кастомный Template \"GitLab Health\"\n`Data collection → Templates → Create template`\n\nДобавить Items (тип: **Zabbix agent**, ключи — из `gitlab_userparams.conf`):\n\n| Item name | Key | Type of information | Update interval |\n|---|---|---|---|\n| GitLab services down | `gitlab.services.down.count` | Numeric (unsigned) | 1m |\n| GitLab readiness | `gitlab.health.readiness` | Numeric (unsigned) | 1m |\n| GitLab liveness | `gitlab.health.liveness` | Numeric (unsigned) | 1m |\n| GitLab disk free % | `gitlab.disk.free.percent` | Numeric (unsigned) | 5m |\n| Sidekiq queue size | `gitlab.sidekiq.queue.size` | Numeric (unsigned) | 2m |\n| Sidekiq retry size | `gitlab.sidekiq.retry.size` | Numeric (unsigned) | 5m |\n| PostgreSQL alive | `gitlab.postgres.alive` | Numeric (unsigned) | 1m |\n| Online CI runners | `gitlab.runners.online` | Numeric (unsigned) | 5m |\n\n### 3. Создать Triggers (условия срабатывания)\n\n`Data collection → Templates → [GitLab Health] → Triggers → Create trigger`\n\n**Критичные (Severity: Disaster/High):**\n\n```\nName: GitLab has services down\nExpression: last(/GitLab Health/gitlab.services.down.count)>0\nSeverity: High\n\nName: GitLab readiness check failed\nExpression: last(/GitLab Health/gitlab.health.readiness)<>200\nSeverity: Disaster\n\nName: PostgreSQL is down on GitLab host\nExpression: last(/GitLab Health/gitlab.postgres.alive)=0\nSeverity: Disaster\n```\n\n**Warning-уровень (предупреждение до того, как всё упало):**\n\n```\nName: GitLab disk space low\nExpression: last(/GitLab Health/gitlab.disk.free.percent)<15\nSeverity: Warning\n\nName: Sidekiq queue is growing abnormally\nExpression: min(/GitLab Health/gitlab.sidekiq.queue.size,10m)>500\nSeverity: Warning\n\nName: No CI runners online\nExpression: last(/GitLab Health/gitlab.runners.online)=0\nSeverity: Average\n```\n\n> Совет: используй функцию `min(...,10m)` вместо `last()` там, где важно не\n> реагировать на кратковременный всплеск (например, очередь Sidekiq может\n> подскочить на 30 секунд и это нормально — а вот держится 10 минут — уже проблема).\n\n### 4. Настроить Media Type (куда слать алерт)\n\n`Alerts → Media types`\n\n**Вариант A — Telegram (самый быстрый способ для команды):**\n1. Создать бота через `@BotFather`, получить `bot token`\n2. `Media types → Create media type`:\n   - Type: `Webhook`\n   - Использовать готовый шаблон Zabbix для Telegram (есть в стандартной поставке —\n     `Media types → Telegram`, просто указать токен)\n3. В своём Zabbix-пользователе (`Users → [твой юзер] → Media`) добавить Telegram,\n   указав `chat_id` (получить, написав боту `/start` и посмотрев через\n   `https://api.telegram.org/bot<TOKEN>/getUpdates`)\n\n**Вариант B — Email:**\n`Alerts → Media types → Email` → указать SMTP relay (host, port, from-address)\n\n**Вариант C — Slack:**\nАналогично Telegram — `Media types → Slack`, указать Webhook URL из Slack App.\n\n### 5. Создать Action (правило \"триггер → кому слать\")\n\n`Alerts → Actions → Trigger actions → Create action`\n\n```\nName: GitLab Critical Alerts\n\nConditions:\n  - Host groups equals \"GitLab Servers\"\n  - Trigger severity >= High\n\nOperations:\n  - Send message to: [группа дежурных / конкретный пользователь]\n  - Send to media type: Telegram\n  - Step 1, default message\n\nOperations for Recovery:\n  - Send message: \"RESOLVED: {TRIGGER.NAME}\"\n```\n\nОтдельное правило для Warning с меньшей частотой эскалации (например,\nслать в почту, а не будить дежурного в Telegram/SMS ночью).\n\n### 6. (Опционально) Escalation — если 15 минут никто не отреагировал\n\nВ том же Action добавляем `Step 2` с задержкой (`Step duration: 15m`)\nи другим получателем (например, эскалация на IT Head / дежурного инженера\nпо телефону через Zabbix + Twilio-интеграцию).\n\n---\n\n## Проверка что всё работает\n\n```bash\n# На сервере с GitLab — проверить, что агент видит метрики\nzabbix_agent2 -t gitlab.health.readiness\nzabbix_agent2 -t gitlab.services.down.count\n\n# На Zabbix Server — Latest Data\nMonitoring → Latest data → фильтр по хосту \"gitlab-prod-01\"\n```\n\nИскусственно вызвать алерт для проверки цепочки (не на проде!):\n```bash\nsudo gitlab-ctl stop sidekiq\n# подождать 1-2 интервала опроса, должен прилетов алерт \"services down\"\nsudo gitlab-ctl start sidekiq\n```"}],"scripts":[{"t":"01 install gitlab","code":"#!/usr/bin/env bash\n#\n# Установка GitLab CE (Community Edition) на Ubuntu/Debian\n# Проверено на: Ubuntu 22.04 / 24.04, Debian 11/12\n# Требования: минимум 4 GB RAM (рекомендуется 8+ GB), 2 vCPU, 10+ GB диска\n#\n# Запуск: sudo bash 01_install_gitlab.sh <ваш_домен_или_IP>\n#\n# Пример: sudo bash 01_install_gitlab.sh gitlab.mycompany.local\n\nset -euo pipefail\n\nif [[ \"$EUID\" -ne 0 ]]; then\n  echo \"Скрипт нужно запускать от root (sudo).\" >&2\n  exit 1\nfi\n\nGITLAB_URL=\"${1:-}\"\nif [[ -z \"$GITLAB_URL\" ]]; then\n  echo \"Использование: $0 <домен-или-IP-для-GitLab>\"\n  echo \"Пример: $0 gitlab.mycompany.local\"\n  exit 1\nfi\n\necho \"=== 1. Обновление системы и установка зависимостей ===\"\napt-get update -y\napt-get upgrade -y\napt-get install -y curl openssh-server ca-certificates tzdata perl postfix\n\n# Postfix спросит режим — на серверах без внешней почты обычно выбирают \"Local only\".\n# Если планируете email-уведомления GitLab через внешний SMTP — настроите это позже в gitlab.rb.\n\necho \"=== 2. Добавление репозитория GitLab CE ===\"\ncurl -fsSL https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.deb.sh | bash\n\necho \"=== 3. Установка GitLab CE ===\"\n# EXTERNAL_URL задаёт домен/IP, по которому будет доступен GitLab\nEXTERNAL_URL=\"http://${GITLAB_URL}\" apt-get install -y gitlab-ce\n\necho \"=== 4. Первичная настройка (reconfigure) ===\"\ngitlab-ctl reconfigure\n\necho \"=== 5. Проверка статуса сервисов ===\"\ngitlab-ctl status\n\necho \"\"\necho \"================================================================\"\necho \"Установка завершена.\"\necho \"GitLab доступен по адресу: http://${GITLAB_URL}\"\necho \"\"\necho \"Пароль root по умолчанию сохранён (только 24 часа после установки) в файле:\"\necho \"  /etc/gitlab/initial_root_password\"\necho \"Посмотреть: sudo cat /etc/gitlab/initial_root_password\"\necho \"===================================================
