[],"b":"<p>VRRP — резервирование шлюза по умолчанию: несколько маршрутизаторов представляются сети одним виртуальным IP/MAC. Использовал в связке пары MikroTik/pfSense, когда нужно было убрать единую точку отказа на границе сети — если основной роутер (Master, с более высоким priority) падает, Backup подхватывает виртуальный IP по истечении таймаута отсутствия advertisement-пакетов, и клиенты продолжают ходить через тот же шлюз, даже не замечая переключения. Практически важно: VRRP резервирует именно шлюз, а не состояние соединений — если было активное TCP-соединение через основной роутер, оно, скорее всего, порвётся при переключении (если нет дополнительной синхронизации состояний, как в некоторых enterprise-решениях). Для большинства офисных сценариев это приемлемо, для критичных сервисов надо смотреть отдельно.</p>"},{"a":"LACP","t":"LACP","tags":[],"b":"<p>LACP — агрегация каналов: объединяю несколько физических линков между двумя устройствами в один логический канал, чтобы получить и суммарную пропускную способность, и отказоустойчивость (при обрыве одного линка трафик продолжает идти по оставшимся без падения сервиса). Настраивал между коммутаторами ядра сети и между сервером/гипервизором и коммутатором — там это особенно важно для отказоустойчивости хранилища/виртуализации. Момент, который часто спрашивают: балансировка внутри агрегированного канала идёт по хэшу (обычно MAC/IP/порт источника-назначения), поэтому единственный TCP-поток не может превысить скорость одного физического линка — прирост скорости заметен только при множестве параллельных соединений. Это важно объяснять бизнесу, когда просят «просто добавить второй кабель, и будет в 2 раза быстрее» — не будет, если трафик это один поток.</p>"},{"a":"OSPF","t":"OSPF","tags":[],"b":"<p>Динамическая машрутизация если весь роутинг внутри одной организации (внутренний протокол), считает метрику по «стоимости» линка (обычно исходя из полосы), быстро сходится при изменениях топологии. Настраивал в связке резервных каналов между филиалами и ЦОД — при обрыве основного линка трафик автоматически перестраивается на резервный без ручного вмешательства.</p>"},{"a":"BGP","t":"BGP","tags":[],"b":"<p>Динамическая машрутизация - там, где несколько внешних провайдеров (multihoming) или где нужен явный контроль политик маршрутизации между автономными системами. На уровне enterprise чаще встречается в контексте выхода в интернет через двух провайдеров с балансировкой/failover, реже — во внутренней сети (разве что очень крупная организация с множеством ЦОД).</p>"},{"a":"Настройка ACL","t":"Настройка ACL","tags":[],"b":"<p>ACL — списки правил, которые разрешают или запрещают трафик по критериям source/destination IP, порту, протоколу. Мой практический подход:</p>\n<p>Начинаю с принципа наименьших привилегий — сначала всё закрыто (implicit deny в конце списка), потом точечно открываю только необходимое. Порядок правил критичен — более специфичные правила выше общих, потому что обработка идёт сверху вниз до первого совпадения. Разделяю ACL по сегментам сети: между VLAN пользователей и VLAN серверов, между DMZ и внутренней сетью, между гостевым Wi-Fi и всем остальным. Всегда логирую срабатывания deny-правил — это и диагностика (кто-то жалуется, что не работает — вижу, что упёрлось в конкретное правило), и элемент безопасности (видно попытки сканирования/несанкционированного доступа). Регулярно аудирую список правил — на практике за пару лет накапливаются «временные» правила, о которых все забыли, но которые никто не удаляет из страха что-то сломать. Веду документацию с указанием, для чего и когда было добавлено правило, чтобы можно было безопасно чистить legacy</p>"},{"a":"L2/L3","t":"Маршрутизаторы, коммутаторы L2/L3","tags":[],"b":"<p>«Разделение по функциям: L2-коммутатор работает на уровне MAC-адресов внутри одного broadcast-домена (или нескольких VLAN, но без маршрутизации между ними), L3-коммутатор умеет маршрутизировать трафик между VLAN на аппаратной скорости (без выноса на отдельный роутер) — это то, что я предпочитаю в сетях с несколькими VLAN и высокой внутренней нагрузкой (inter-VLAN routing на L3-свиче быстрее, чем гонять весь межVLAN-трафик через отдельный пограничный роутер). Практическая архитектура, которую обычно выстраиваю: L3-коммутатор ядра — маршрутизация между VLAN внутри сети, пограничный роутер/firewall (MikroTik/pfSense) — только выход в интернет, VPN, NAT и периметровая защита. Такое разделение ролей упрощает и производительность, и диагностику — сразу понятно, где искать проблему: во внутренней маршрутизации или на периметре.»</p>"},{"a":"IPsec (IP Security)","t":"IPsec (IP Security)","tags":[],"b":"<ul><li>это не один протокол, а <b>набор протоколов и стандартов</b>, работающих на сетевом уровне (L3), которые вместе обеспечивают конфиденциальность, целостность и аутентификацию IP-трафика. Ключевые компоненты<ul><li><b>IKE (Internet Key Exchange)</b> — протокол, который занимается не самим шифрованием данных, а <i>согласованием</i> всего остального: как стороны аутентифицируют друг друга и какими ключами/алгоритмами будут пользоваться дальше. Работает в две фазы (описал выше).</li><li><b>ESP (Encapsulating Security Payload)</b> — протокол, который реально шифрует и проверяет целостность полезной нагрузки. Используется практически всегда.</li><li><b>AH (Authentication Header)</b> — только проверка целостности/подлинности без шифрования содержимого. На практике почти не встречается, потому что не даёт конфиденциальности — обычно выбирают ESP.</li><li><b>SA (Security Association)</b> — «договорённость» между двумя сторонами о конкретных параметрах защиты (алгоритмы, ключи, время жизни); формируется отдельно для IKE (Phase 1) и для передачи данных (Phase 2), причём IPsec SA всегда однонаправленные — на каждое направление трафика своя.</li></ul></li></ul>"},{"a":"WireGuard","t":"WireGuard","tags":[],"b":"<ul><li>современный VPN-протокол, разработанный существенно позже IPsec/OpenVPN с целью радикально упростить и то, и другое. Ключевые отличия, которые я всегда проговариваю::<ul><li><b>Минимализм кода</b> — весь протокол уместился примерно в 4000 строк кода (для сравнения, у IPsec-стека и OpenVPN — десятки тысяч строк) — меньше поверхность для уязвимостей и проще независимый аудит.</li><li><b>Нет выбора алгоритмов</b> — в отличие от IPsec, где нужно вручную согласовывать шифры/хеши/DH-группы (и легко ошибиться), WireGuard использует фиксированный, современный набор криптографии \"по умолчанию\" (Curve25519 для обмена ключами, ChaCha20 для шифрования, Poly1305 для целостности, BLAKE2s для хеширования) — меньше пространство для ошибки конфигурации.</li><li><b>Модель конфигурации похожа на SSH</b> — каждый пир идентифицируется парой публичный/приватный ключ, а не сложными политиками IKE. Конфиг буквально: свой приватный ключ + список пиров с их публичными ключами и разрешёнными подсетями (AllowedIPs).</li><li><b>Работает поверх UDP</b>, встроен в ядро Linux начиная с 5.6 — за счёт этого показывает более высокую производительность, чем userspace-реализации OpenVPN.</li><li><b>Ограничение</b>, которое всегда упоминаю: у него нет \"из коробки\" road-warrior механизма вроде DHCP — каждому клиенту IP-адрес прописывается статически в конфиге, плюс нет встроенной интеграции с корпоративными каталогами (AD/LDAP/RADIUS) — если нужна такая интеграция, обычно добавляют внешнюю обвязку (например, через веб-панель типа WireGuard Easy или Netbird/Tailscale поверх него).</li></ul></li></ul>"},{"a":"МАРШРУТИЗАТОРЫ, КОММУТАТОРЫ","t":"Маршрутизаторы, коммутаторы L2/L3","tags":[],"b":"<p>Разделение по функциям: L2-коммутатор работает на уровне MAC-адресов внутри одного broadcast-домена (или нескольких VLAN, но без маршрутизации между ними), L3-коммутатор умеет маршрутизировать трафик между VLAN на аппаратной скорости (без выноса на отдельный роутер) — это то, что я предпочитаю в сетях с несколькими VLAN и высокой внутренней нагрузкой (inter-VLAN routing на L3-свиче быстрее, чем гонять весь межVLAN-трафик через отдельный пограничный роутер).</p>\n<p>Практическая архитектура, которую обычно выстраиваю: L3-коммутатор ядра — маршрутизация между VLAN внутри сети, пограничный роутер/firewall (MikroTik/pfSense) — только выход в интернет, VPN, NAT и периметровая защита. Такое разделение ролей упрощает и производительность, и диагностику — сразу понятно, где искать проблему: во внутренней маршрутизации или на периметре</p>"},{"a":"TCP-UDP","t":"TCP-UDP","tags":[],"b":"<ul><li>TCP — это протокол, который гарантирует, что данные будут доставлены в целости и сохранности в правильном порядке.</li></ul>\n<p>    <b>Как работает:</b></p>\n<ol><li>Сначала устанавливает соединение («рукопожатие» или <b>3-way handshake</b>).</li><li>Если пакет потерялся по дороге, получатель сообщает об этом, и отправитель его <b>переотправляет</b>.</li><li>Данные собираются строго в той последовательности, в которой были отправлены.</li></ol>\n<p>    <b>Как работает:</b></p>\n<ol><li>Не тратит время на «рукопожатия». Просто «выстрелил и забыл» (fire and forget).</li><li>Если пакет потерялся — он потерялся навсегда. Никаких переотправок.</li><li>Пакеты могут прийти в разном порядке, и получателю придется разбираться с этим самому.</li></ol>"},{"a":"SITE-TO-SITE VPN","t":"Site-to-Site VPN","tags":[],"b":"<p>Это не отдельный протокол.</p>\n<p>Это режим работы VPN.</p>\n<p>Пример:</p>\n<pre><code>Офис Москва\n192.168.10.0/24\n      |\n     VPN\n      |\nОфис СПб\n192.168.20.0/24</code></pre>\n<p>Пользователи не запускают VPN-клиент.</p>\n<p>Маршрутизаторы сами создают туннель.</p>\n<p>Пользователь в Москве может открыть:</p>\n<pre><code>192.168.20.50</code></pre>\n<p>и попасть на сервер в Петербурге как будто он находится в локальной сети.</p>\n<p>Site-to-Site можно построить через:</p>\n<ul><li>IPsec;</li><li>WireGuard;</li><li>OpenVPN;</li><li>GRE+IPsec.</li></ul>"},{"a":"СПИСОК ПОРТОВ:","t":"Список портов:","tags":[],"b":"<table><thead><tr><th><b>Протокол</b></th><th><b>Порт</b></th><th><b>Тип (TCP/UDP)</b></th><th><b>Описание</b></th></tr></thead><tbody><tr><td><b>SSH</b></td><td>22</td><td>TCP</td><td>Управление</td></tr><tr><td><b>DNS</b></td><td>53</td><td>UDP/TCP</td><td>Имена</td></tr><tr><td><b>DHCP</b></td><td>67/68</td><td>UDP</td><td>Настройки IP</td></tr><tr><td><b>HTTP(S)</b></td><td>80/443</td><td>TCP</td><td>Веб</td></tr><tr><td><b>NTP</b></td><td>123</td><td>UDP</td><td>Время</td></tr><tr><td><b>SMB</b></td><td>445</td><td>TCP</td><td>Файловая шара</td></tr><tr><td><b>RDP</b></td><td>3389</td><td>TCP/UDP</td><td>Удаленный стол</td></tr></tbody></table>"},{"a":"SNMP (SIMPLE","t":"SNMP (Simple Network Management Protocol)","tags":[],"b":"<p>Ключевые порты: 161 (UDP): Стандартный порт, по которому Zabbix-сервер опрашивает сетевое устройство (запрашивает данные об интерфейсах, загрузке CPU, памяти и т.д.).</p>\n<p>162 (UDP): Порт для приема SNMP Traps (сообщений, которые устройство само отправляет на Zabbix при возникновении критических событий, например, при падении линка).</p>\n<p>Основные моменты настройки: Тип интерфейса: При добавлении узла сети (Host) в интерфейсах Zabbix необходимо выбрать тип SNMP и указать порт 161.</p>\n<p>Шаблоны: Вам потребуется применить соответствующий SNMP-шаблон (например, Cisco IOS SNMP, Generic SNMP или специфичный для вашего вендора).</p>\n<p>Сообщество (Community): Убедитесь, что на сетевом устройстве настроена строка сообщества (community string), которая совпадает с той, что указана в настройках SNMP-интерфейса узла сети в Zabbix.</p>\n<p>Если вы хотите мониторить не состояние устройства, а доступность определенного TCP-порта на каком-либо сервере или устройстве, Zabbix использует другие механизмы:</p>\n<p>Simple Check: Элемент данных с ключом net.tcp.service[tcp,,port] — Zabbix сам пытается подключиться к указанному порту.</p>\n<p>Zabbix Agent: Если на целевом устройстве установлен агент, можно использовать net.tcp.listen[port] или net.tcp.port[ip,port].</p>"},{"a":"DEFAULT GATEWAY","t":"Default Gateway","tags":[],"b":"<p>это сетевое устройство (обычно маршрутизатор или межсетевой экран), через которое ваш компьютер или сервер выходит за пределы своей локальной сети (подсети) в другие сети или в глобальный Интернет.</p>"},{"a":"CAT5E/CAT6;","t":"Cat5e/Cat6;","tags":[],"b":"<table><thead><tr><th><b>Характеристика</b></th><th><b>Cat5e</b></th><th><b>Cat6</b></th></tr></thead><tbody><tr><td><b>Макс. частота</b></td><td>100 МГц</td><td>250 МГц</td></tr><tr><td><b>Макс. скорость</b></td><td>1 Гбит/с (1000BASE-T)</td><td>1 Гбит/с (до 100м) / 10 Гбит/с (до 55м)</td></tr><tr><td><b>Макс. расстояние</b></td><td>100 метров</td><td>100 метров (для 1 Гбит/с)</td></tr><tr><td><b>Конструкция</b></td><td>Обычно без разделителя</td><td>Часто имеет пластиковый разделитель (сепаратор)</td></tr><tr><td><b>Помехоустойчивость</b></td><td>Базовая</td><td>Высокая (лучше защищена от перекрестных помех)</td></tr></tbody></table>"},{"a":"ЗАЩИТА САМОГО","t":"Защита самого VPN-сервера","tags":[],"b":"<ul><li>Размещать <b>в DMZ</b>, а не внутри основной сети.</li><li><b>MFA обязательна</b> — иначе скомпрометированный пароль = полный доступ.</li><li><b>Ограничение по IP/гео</b>, если сотрудники работают из конкретных регионов — снижает поверхность brute-force.</li><li><b>Логирование подключений</b> — кто, когда, откуда подключался (SIEM/syslog).</li><li><b>Регулярные обновления</b> прошивки/ПО VPN-сервера — это один из самых частых векторов атак на инфраструктуру.</li><li><b>Отдельные VPN-профили/сертификаты на пользователя</b>, а не общий shared-secret — чтобы можно было отозвать доступ конкретному человеку без пересоздания всей инфраструктуры.</li></ul>"}],"qa":[{"q":"VPN-туннели","b":"В моей практике VPN делится на две задачи: Site-to-Site между офисами/ЦОД и Remote Access для удалённых сотрудников. Для Site-to-Site я обычно использую IPsec — это отраслевой стандарт на пограничных маршрутизаторах (MikroTik, pfSense/OPNsense, Cisco). Настройка идёт в две фазы: сначала IKE Phase 1 — согласование алгоритмов шифрования/хеширования и аутентификация сторон (PSK для простых случаев, сертификаты — если точек больше 3-4 и PSK неудобно ротировать), создаётся защищённый управляющий канал. Затем Phase 2 — уже согласование параметров для реального трафика, создаются IPsec SA в обе стороны, и определяется interesting traffic — какие подсети должны уходить в туннель"},{"q":"Что использовать для  Remote Access","b":"Для Remote Access последние 2-3 года предпочитаю WireGuard там, где позволяет оборудование — минималистичный конфиг (публичные ключи пиров вместо сложных политик IKE), быстрее по производительности, меньше пространство для ошибок конфигурации. OpenVPN оставляю там, где важна максимальная совместимость с legacy-клиентами или нужен режим TAP (L2-мост) — WireGuard работает только на L3.»"},{"q":"а как выбираете, что использовать?","b":"Смотрю на три фактора: что поддерживает оборудование на обеих сторонах, нужна ли L2-связность (тогда OpenVPN TAP или EoIP+IPsec) и насколько критична скорость разворачивания — WireGuard разворачивается быстрее всего"},{"q":"pfSense / OPNsense / MikroTik / TP-Link","b":"MikroTik (RouterOS) — соотношение цена/функциональность лучшее на рынке для малого-среднего бизнеса: полноценный firewall с цепочками input/forward/output, NAT (masquerade + dst-nat), VLAN, bridge, VPN (IPsec, WireGuard, EoIP), QoS через Simple Queue/Queue Tree. Использую как основной пограничный маршрутизатор в большинстве небольших офисов и филиалов.\npfSense/OPNsense — беру, когда нужен более серьёзный набор функций из коробки: встроенный IDS/IPS (Suricata/Snort), более развитый веб-интерфейс для командной работы нескольких админов, пакетная система расширений. OPNsense выбираю, когда важна более открытая модель обновлений и разработки, pfSense — где важна максимальная зрелость и обкатанность конкретных фич (например HA через CARP давно и стабильно работает в обоих).\nTP-Link (Omada/Jetstream линейка) — это уже скорее уровень небольшого офиса/SMB, где не нужен серьёзный firewall/VPN-функционал, а важны управляемые L2/L3-коммутаторы и Wi-Fi с централизованным контроллером (Omada Controller) по разумной цене. Использую там, где бюджет ограничен, а требования по безопасности не enterprise-уровня."},{"q":"а что бы вы поставили в новый офис","b":"зависит от требований: если это просто выход в интернет + Wi-Fi для 15 человек — MikroTik/TP-Link, если нужен серьёзный периметровый контроль, VPN-концентратор с IDS — pfSense/OPNsense."},{"q":"DNS/DHCP","b":"«DNS и DHCP — то, что \"просто работает\", пока не перестаёт, и тогда это самый частый источник массовых обращений в поддержку.\nDNS: в доменной инфраструктуре использую AD-интегрированные зоны (репликация вместе с AD, а не отдельными зонными передачами), настраиваю forwarders на внешние DNS для резолва интернет-имён. Критичные для работы AD записи — SRV (_ldap._tcp, _kerberos._tcp) — по ним клиенты находят контроллеры домена; если SRV-записи повреждены или устарели после миграции DC, начинаются проблемы с аутентификацией по всей сети, это одна из первых вещей, которую проверяю при странных проблемах входа в домен.\nDHCP: настраиваю reservations для оборудования, которому нужен постоянный IP без ручной статики (принтеры, серверы, IP-камеры), scope с разумным сроком аренды, DHCP failover или split-scope между двумя серверами для отказоустойчивости — чтобы выход из строя одного DHCP-сервера не оставил офис без адресов. При росте инфраструктуры и появлении нескольких VLAN — обязательно настраиваю DHCP relay/IP helper на L3-коммутаторах, чтобы не ставить DHCP-сервер в каждый VLAN отдельно.»"},{"q":"Сегментация сети: VLAN, ACL, DMZ","b":"«Это то, что реально спрашивают у Teamlead/Head of IT именно с точки зрения архитектуры, а не только «как настроить одну команду». Моя типовая модель сегментации:\n\nVLAN пользователей — рабочие станции, минимум прав, доступ к серверным ресурсам только по необходимости.\nVLAN серверов/инфраструктуры — изолирован от пользовательского, доступ регулируется ACL точечно (например, только 1С-сервер видит SQL-сервер по нужному порту, а не «всё видит всё»).\nDMZ — отдельный сегмент для сервисов, доступных снаружи (веб-портал, почтовый релей, VPN-концентратор). Из DMZ нет прямого доступа во внутреннюю сеть — только точечные, явно разрешённые правила (например, веб-сервер в DMZ обращается к БД во внутренней сети по одному конкретному порту, а не наоборот и не «всё подряд»). Это классический принцип: скомпрометированный сервис в DMZ не должен автоматически давать доступ во внутреннюю сеть.\nГостевой Wi-Fi — полностью изолированный VLAN, доступ только в интернет.\nManagement VLAN — управление сетевым оборудованием, доступен только с ограниченного числа рабочих мест админов (по ACL/firewall-правилу), никогда не пересекается с пользовательским сегментом."},{"q":"Как настраивать Site-to-Site — пошагово","b":"**Шаг 1. Планирование до конфигурации**\n\n- Проверяю, что подсети офисов не пересекаются (это первое, что ломает Site-to-Site — если в обоих офисах 192.168.1.0/24, туннель поднимется, но маршрутизация будет неработоспособна).\n- Определяю внешние (публичные) IP обоих шлюзов — они нужны как endpoints туннеля. Если у одной из сторон динамический IP — использую DDNS или identity-based аутентификацию вместо привязки к IP.\n\n**Шаг 2. Phase 1 (IKE) — настройка защищённого канала управления**\n\n- Указываю peer (внешний IP второй стороны).\n- Выбираю алгоритмы: шифрование (обычно AES-256), хеш (SHA-256), DH group (например group 14 или выше — от него зависит стойкость обмена ключами).\n- Метод аутентификации — Pre-Shared Key для 2 точек, сертификаты — если точек больше и PSK неудобно ротировать при компрометации.\n- **Важно**: на обеих сторонах эти параметры должны совпадать буквально — не «примерно похожие», а идентичные, иначе Phase 1 просто не поднимется, и это первое место, куда я смотрю в логах при диагностике.\n\n**Шаг 3. Phase 2 (IPsec SA) — что реально шифруется**\n\n- Задаю **Proposal** — уже параметры для передачи данных (шифрование ESP, хеш для целостности).\n- Задаю **Policy / interesting traffic** — конкретно какие подсети должны идти через туннель (source subnet ↔ destination subnet). Это критично: если забыл добавить подсеть в policy, трафик из неё просто уйдёт в открытый интернет мимо туннеля, а не «не пройдёт» — это самая опасная ошибка конфигурации, потому что не сразу заметна.\n- Режим — Tunnel mode (для Site-to-Site всегда так, если не host-to-host).\n\n**Шаг 4. Firewall-правила**\n\n- Отдельно разрешаю трафик IKE (UDP 500) и ESP (протокол 50) на внешнем интерфейсе — иначе даже правильно настроенный туннель не поднимется, потому что пакеты просто дропаются firewall'ом раньше, чем дойдут до IPsec-стека.\n- Если один из шлюзов за NAT — добавляю разрешение NAT-T (UDP 4500).\n\n**Шаг 5. Проверка**\n\n- Смотрю статус Phase 1/Phase 2 (`/ip ipsec policy print` в MikroTik, IPsec status в pfSense) — должно быть established, а не connecting.\n- Проверяю реальным пингом между хостами в обеих подсетях, а не только между самими шлюзами — часто туннель \"поднят\", но маршрутизация внутри офиса до шлюза не настроена, и с конечных станций ничего не ходит.\n- Смотрю счётчики трафика по policy — растут ли байты в обе стороны, это подтверждает, что трафик реально идёт через туннель, а не мимо него.»"},{"q":"Где именно происходит шифрование  Site-to-Site","b":"Шифрование происходит **на границе туннеля — на самих шлюзах (маршрутизаторах/firewall'ах)**, а не на конечных станциях пользователей и не \"в сети\" где-то посередине.\n\nПуть пакета выглядит так:\n\n1. Компьютер пользователя в офисе А отправляет обычный, незашифрованный пакет на адрес сервера в офисе Б — для него это просто маршрутизация, он ничего не знает про VPN.\n2. Пакет доходит до шлюза офиса А. Шлюз видит по policy/interesting traffic, что destination попадает под VPN, и **на этом шлюзе** пакет шифруется (ESP) и оборачивается в новый IP-заголовок с адресами самих шлюзов (Tunnel mode).\n3. Зашифрованный пакет идёт через публичный интернет — тут он для стороннего наблюдателя выглядит просто как ESP-трафик между двумя IP, содержимое нечитаемо.\n4. Шлюз офиса Б получает пакет, расшифровывает его (снова на границе, на шлюзе), достаёт исходный пакет и маршрутизирует его дальше внутри своей локальной сети — уже в открытом виде.\n5. Сервер получает обычный пакет, как будто он пришёл из локальной сети — он тоже ничего не знает про шифрование."},{"q":"Маршрутизация (static / OSPF / BGP)","b":"«В большинстве компаний, где я работал, до 5-10 площадок достаточно статической маршрутизации — она простая, предсказуемая, не требует протокола обмена и, соответственно, меньше вещей, которые могут сломаться сами по себе. Я использую статику как основной вариант, пока топология не начинает расти или не появляется избыточность каналов (второй провайдер, резервный туннель) — тогда статика перестаёт масштабироваться, потому что при отказе линка надо руками менять маршруты.\n\nКак только появляется избыточность — использую динамическую маршрутизацию:\n\n- **OSPF** — если весь роутинг внутри одной организации (внутренний протокол), считает метрику по «стоимости» линка (обычно исходя из полосы), быстро сходится при изменениях топологии. Настраивал в связке резервных каналов между филиалами и ЦОД — при обрыве основного линка трафик автоматически перестраивается на резервный без ручного вмешательства.\n- **BGP** — там, где несколько внешних провайдеров (multihoming) или где нужен явный контроль политик маршрутизации между автономными системами. На уровне enterprise чаще встречается в контексте выхода в интернет через двух провайдеров с балансировкой/failover, реже — во внутренней сети (разве что очень крупная организация с множеством ЦОД).\n\nНа собеседовании обычно подчёркиваю: выбор протокола — это всегда компромисс между сложностью администрирования и необходимой гибкостью, я не «внедряю OSPF, потому что он есть», а только когда статика реально становится узким местом.»"},{"q":"pfSense / OPNsense / MikroTik / TP-Link","b":"- **MikroTik (RouterOS)** — соотношение цена/функциональность лучшее на рынке для малого-среднего бизнеса: полноценный firewall с цепочками input/forward/output, NAT (masquerade + dst-nat), VLAN, bridge, VPN (IPsec, WireGuard, EoIP), QoS через Simple Queue/Queue Tree. Использую как основной пограничный маршрутизатор в большинстве небольших офисов и филиалов.\n- **pfSense/OPNsense** — беру, когда нужен более серьёзный набор функций из коробки: встроенный IDS/IPS (Suricata/Snort), более развитый веб-интерфейс для командной работы нескольких админов, пакетная система расширений. OPNsense выбираю, когда важна более открытая модель обновлений и разработки, pfSense — где важна максимальная зрелость и обкатанность конкретных фич (например HA через CARP давно и стабильно работает в обоих).\n- **TP-Link** (Omada/Jetstream линейка) — это уже скорее уровень небольшого офиса/SMB, где не нужен серьёзный firewall/VPN-функционал, а важны управляемые L2/L3-коммутаторы и Wi-Fi с централизованным контроллером (Omada Controller) по разумной цене. Использую там, где бюджет ограничен, а требования по безопасности не enterprise-уровня."},{"q":"а что бы вы поставили в новый офис","b":"зависит от требований: если это просто выход в интернет + Wi-Fi для 15 человек — MikroTik/TP-Link, если нужен серьёзный периметровый контроль, VPN-концентратор с IDS — pfSense/OPNsense"},{"q":"Настройка ACL","b":"«ACL — списки правил, которые разрешают или запрещают трафик по критериям source/destination IP, порту, протоколу. Мой практический подход:\n\n1. Начинаю с принципа наименьших привилегий — сначала всё закрыто (implicit deny в конце списка), потом точечно открываю только необходимое.\n2. Порядок правил критичен — более специфичные правила выше общих, потому что обработка идёт сверху вниз до первого совпадения.\n3. Разделяю ACL по сегментам сети: между VLAN пользователей и VLAN серверов, между DMZ и внутренней сетью, между гостевым Wi-Fi и всем остальным.\n4. Всегда логирую срабатывания deny-правил — это и диагностика (кто-то жалуется, что не работает — вижу, что упёрлось в конкретное правило), и элемент безопасности (видно попытки сканирования/несанкционированного доступа).\n5. Регулярно аудирую список правил — на практике за пару лет накапливаются «временные» правила, о которых все забыли, но которые никто не удаляет из страха что-то сломать. Веду документацию с указанием, для чего и когда было добавлено правило, чтобы можно было безопасно чистить legacy.\n\nТестирую изменения ACL по возможности в окне обслуживания с явным планом отката — ошибка в ACL на границе сети моментально роняет доступ, и это не тот случай, где стоит рисковать «на живую» в рабочее время.»"},{"q":"NAT","b":"Три сценария, с которыми реально работаю каждый день:\n\n- **SNAT/Masquerade** — выход локальной сети в интернет через один внешний IP, стандартная настройка на любом пограничном роутере.\n- **DNAT/Port forwarding** — публикация внутреннего сервиса наружу (например, веб-портал 1С или почтовый сервер) — конкретный внешний порт пробрасывается на внутренний адрес и порт.\n- **NAT-T** — обязательно учитываю при настройке IPsec, если одна из сторон за NAT — иначе ESP-пакеты просто теряются.\n\nИз архитектурных соображений всегда стараюсь минимизировать зависимость от NAT там, где можно — например, для внутренней связности между офисами через VPN лучше иметь честную маршрутизацию без NAT, это упрощает диагностику и избегает конфликтов пересекающихся подсетей в будущем"},{"q":"Сегментация сети: VLAN, ACL, DMZ","b":"Это то, что реально спрашивают у Teamlead/Head of IT именно с точки зрения архитектуры, а не только «как настроить одну команду». Моя типовая модель сегментации:\n\n1. **VLAN пользователей** — рабочие станции, минимум прав, доступ к серверным ресурсам только по необходимости.\n2. **VLAN серверов/инфраструктуры** — изолирован от пользовательского, доступ регулируется ACL точечно (например, только 1С-сервер видит SQL-сервер по нужному порту, а не «всё видит всё»).\n3. **DMZ** — отдельный сегмент для сервисов, доступных снаружи (веб-портал, почтовый релей, VPN-концентратор). Из DMZ нет прямого доступа во внутреннюю сеть — только точечные, явно разрешённые правила (например, веб-сервер в DMZ обращается к БД во внутренней сети по одному конкретному порту, а не наоборот и не «всё подряд»). Это классический принцип: скомпрометированный сервис в DMZ не должен автоматически давать доступ во внутреннюю сеть.\n4. **Гостевой Wi-Fi** — полностью изолированный VLAN, доступ только в интернет.\n5. **Management VLAN** — управление сетевым оборудованием, доступен только с ограниченного числа рабочих мест админов (по ACL/firewall-правилу), никогда не пересекается с пользовательским сегментом.\n\nНа вопрос «зачем такая сегментация, если и так работает» отвечаю с точки зрения risk management: сегментация не предотвращает инцидент сам по себе, но ограничивает его распространение (blast radius) — если скомпрометирована рабочая станция пользователя, злоумышленник не должен сразу получать доступ к серверу 1С или контроллеру домена только потому, что \"всё в одной сети\". Это стандартный аргумент, который использую и перед бизнесом, когда обосновываю бюджет на L3-коммутаторы или пересмотр сетевой архитектуры при аудите"},{"q":"Какие бывают Firewall это межсетевой экран, который фильтрует входящий и исходящий трафик на основе установленных правил.","b":"Firewall анализирует сетевые пакеты и решает:\n\n- пропустить;\n- заблокировать.\n- Firewall на MikroTik\n    - Filter Rules - Фильтрация пакетов.\n        \n        Например:\n        \n        Разрешить: 192.168.10.0/24 → Интернет\n        \n        Запретить: 192.168.20.0/24 → Серверы\n        \n    - NAT - Подмена адресов.\n        \n        Когда внутренние адреса: 192.168.x.x  выходят в интернет через один внешний IP.\n        \n    - Mangle - Изменение пакетов.\n        \n        Используется для:\n        \n        - QoS;\n        - балансировки каналов;\n        - маркировки трафика.\n    - Raw- Обработка пакетов до Firewall.\n        \n        Используется для:\n        \n        - защиты от DDoS;\n        - отсечения мусорного трафика.\n- Firewall на UniFi\n    \n    В экосистеме **Ubiquiti UniFi** Firewall настраивается через графический интерфейс.\n    \n    Обычно создают правила:\n    \n    - LAN IN - Трафик внутри сети.\n        \n        Пример: Guests → Servers\n        DROP\n        \n    - WAN IN - Трафик из интернета.\n        \n        Пример:  Интернет → LAN\n        DROP\n        \n    - WAN LOCAL - Доступ к самому маршрутизатору.\n        \n        Например: Разрешить SSH только с IP администратора\n        \n- Как обычно настраивают Firewall\n    \n    Шаг 1:\n    \n    Разрешают установленные соединения.\n    \n    ```\n    established\n    related\n    ```\n    \n    Шаг 2:\n    \n    Удаляют поврежденные пакеты.\n    \n    ```\n    invalid\n    ```\n    \n    Шаг 3:\n    \n    Запрещают входящие подключения из интернета.\n    \n    Шаг 4:\n    \n    Разрешают только нужные сервисы.\n    \n    Принцип:\n    \n    > Запрещено всё, кроме явно разрешённого.\n    >"},{"q":"Что такое маршрутизация и зачем она нужна","b":"это процесс определения пути, по которому данные (пакеты информации) путешествуют от источника к получателю в компьютерной сети (например, в интернете).\n\nПростыми словами: если интернет — это система городов и дорог, то маршрутизация — это навигатор (как Яндекс.Карты), который прокладывает маршрут для вашего письма или запрошенной веб-страницы, чтобы оно дошла точно по адресу и без потерь."},{"q":"Балансировка каналов и Failover (Multi-WAN)","b":"Балансировка каналов и Failover (Multi-WAN) - это две фундаментальные технологии они позволяют объединить несколько интернет-каналов (от разных провайдеров) в единую систему.\n\n- ailover (Отказоустойчивость):\nРежим «активный/резервный». Система использует основной канал, а второй простаивает. Если основной пропадает, трафик автоматически переключается на резервный.  **Цель:** Обеспечить 100% доступность интернета.\n\n- Балансировка каналов (Load Balancing):\nРежим «активный/активный». Система использует оба (или несколько) канала одновременно. **Цель:** Увеличить суммарную пропускную способность (скорость) и распределить нагрузку между провайдерами.\n\n- Как это работает:\n    - **Механизм Failover:**\n    Маршрутизатор постоянно выполняет **Health Check** (пингует внешние адреса, например, 8.8.8.8). Если пинги перестают проходить через канал А, роутер помечает его как «недоступный» и перенаправляет весь трафик в таблицу маршрутизации канала Б.\n    - **Механизм Балансировки:**\n    Роутер распределяет исходящие запросы между каналами. Самый распространенный метод — **Per-Connection Load Balancing** (распределение по соединениям):\n        - Один пользователь качает файл через Провайдера А.\n        - Второй пользователь смотрит видео через Провайдера Б.\n        - Это не дает одному пользователю «склеить» скорость двух провайдеров для одного файла, но разгружает канал для всей сети в целом."},{"q":"Для чего нужен ARP?","b":"ARP (Address Resolution Protocol) — это сетевой протокол, который связывает IP-адрес устройства (уровень 3 сетевой модели OSI) с его MAC-адресом (уровень 2, физический/канальный уровень).\n\nПроблема: Сетевое оборудование и хосты в локальной сети общаются на канальном уровне с помощью MAC-адресов. Однако приложения и пользователи используют IP-адреса.\n\nРешение: Когда устройству нужно отправить пакет на известный IP-адрес в той же подсети, оно не знает физический MAC-адрес получателя. ARP выполняет функцию «справочника»: отправляет широковещательный запрос («У кого такой IP-адрес? Отзовитесь и назовите свой MAC») и получает ответ от владельца.\n\nARP-таблица: Полученная пара IP <-> MAC сохраняется в кэше устройства на некоторое время, чтобы не делать запросы постоянно."},{"q":"Что произойдет при пинге другого хоста?","b":"Процесс отправки эхо-запроса (ICMP Echo Request) зависит от того, находится ли целевой хост в вашей локальной сети или в другой подсети.\n\nСценарий А: Хосты в одной локальной сети\nПроверка назначения: Хост-отправитель сравнивает свой IP и маску подсети с IP-адресом назначения и понимает, что цель находится рядом.\n\nПроверка ARP-кэша: Отправитель ищет MAC-адрес целевого хоста в своей таблице.\n\nЕсли его нет, отправляется ARP-запрос, и целевой хост возвращает свой MAC-адрес.\n\nФормирование пакета: Создается ICMP-пакет, который упаковывается в Ethernet-кадр, где в качестве получателя указан MAC-адрес целевого хоста.\n\nПередача: Кадр улетает в свитч (коммутатор), который доставляет его точно на нужный порт.\n\nОтвет: Получатель обрабатывает пакет и отправляет ICMP Echo Reply обратно по MAC-адресу отправителя."},{"q":"Что такое шлюз по умолчанию?","b":"Шлюз по умолчанию (Default Gateway) — это сетевое устройство (обычно маршрутизатор или межсетевой экран), через которое ваш компьютер или сервер выходит за пределы своей локальной сети (подсети) в другие сети или в глобальный Интернет.\n\nАналогия: Это как единственный выход (дверь) из здания с офисами на общую городскую улицу. Если вам нужно сходить в соседний кабинет в том же здании (локальная сеть), выход на улицу не нужен. Но если вам нужно поехать в другой город (в другую подсеть), вы обязаны выйти через эту главную дверь.\n\nКак назначается: Шлюз по умолчанию настраивается в сетевых параметрах хоста (статически или автоматически через DHCP). Это IP-адрес вашего роутера, находящийся с вами в одной подсети. Все трафик, назначение которого не принадлежит вашей локальной сети, операционная система отправляет именно на этот IP-адрес."},{"q":"В один коммутатор подключены два ПК. Как данные найдут нужный компьютер?","b":"1. Этап обучения (Коммутатор запоминает)\nВ тот момент, когда ПК1 включается или отправляет первый пакет (даже просто ARP-запрос), свитч заглядывает в кадр (Ethernet frame):\n\nОн видит исходный MAC-адрес отправителя.\n\nОн смотрит на порт, в который вставлен кабель от ПК1.\n\nОн записывает эту пару в свою память: «MAC-адрес ПК1 находится на порту №1».\n\nТеперь, когда ПК2 отправит свой первый пакет, свитч точно так же запишет: «MAC-адрес ПК2 находится на порту №2».\n\n2. Этап передачи (Данные находят путь)\nКогда ПК1 хочет отправить данные на ПК2:\n\nСоздание кадра: ПК1 упаковывает данные в кадр, где указан адрес получателя (MAC-адрес ПК2).\n\nАнализ свитчом: Коммутатор получает этот кадр на порт №1. Он читает адрес назначения (MAC ПК2).\n\nПоиск в таблице: Свитч заглядывает в свою таблицу MAC-адресов. Он видит: «Ага, MAC-адрес ПК2 связан с портом №2».\n\nКоммутация: Свитч делает прямое соединение (виртуальный мост) между портом №1 и портом №2.\n\nДоставка: Кадр улетает строго на порт №2, к которому подключен ПК2. Остальные порты (если бы их было больше) даже «не узнают», что передавались какие-то данные."},{"q":"Пользователь не открывает сетевую папку.","b":"1. Проверить IP (`ipconfig`).\n2. Проверить шлюз.\n3. Проверить DNS.\n4. Проверить пинг сервера.\n5. Проверить доступность порта.\n6. Проверить права доступа.\n7. Проверить сетевое оборудование."},{"q":"Весь офис потерял интернет.","b":"Тогда ожидают, что ты последовательно проверишь:\n\n- локальную сеть;\n- коммутатор;\n- маршрутизатор;\n- провайдера;\n- DHCP/DNS."}]},{"id":"grafana","u":"U13","short":"Grafana","full":"Дашборды в Grafana","title":"Grafana","eyebrow":"Визуализация метрик","desc":"Из чего состоит дашборд, какие источники данных подключаются и как устроен алертинг.","cards":[{"a":"WHAT","t":"Что такое Grafana","tags":["ok"],"b":"\n      <p>Платформа визуализации данных: сама Grafana ничего не собирает и не хранит — она подключается к внешним источникам данных (<b>Data Source</b>) и строит по ним графики/таблицы/панели.</p>\n      <ul>\n        <li>Типичные источники: <b>Prometheus</b> (PromQL), <b>Zabbix</b> (через плагин, поверх уже собранных Zabbix метрик), <b>InfluxDB</b>, <b>Loki</b> (логи), <b>Elasticsearch</b>, обычные СУБД (MySQL/PostgreSQL).</li>\n        <li>Часто выступает единой «витриной» поверх нескольких разных систем мониторинга сразу — например, метрики из Zabbix и логи из Loki на одном дашборде.</li>\n      </ul>"},{"a":"STRUCT","t":"Структура дашборда","tags":["ok"],"b":"\n      <ul>\n        <li><b>Dashboard</b> — страница целиком, набор панелей, объединённых общей темой (например «Состояние кластера Proxmox»).</li>\n        <li><b>Panel</b> — отдельный визуальный блок с одним или несколькими запросами (Query) к источнику данных.</li>\n        <li><b>Row</b> — сворачиваемая группа панелей, помогает структурировать длинный дашборд.</li>\n        <li><b>Query</b> — запрос к источнику данных внутри панели (например строка PromQL или выбор Item'а Zabbix).</li>\n      </ul>"},{"a":"PANELS","t":"Типы панелей","tags":[],"b":"\n      <ul>\n        <li><b>Time series</b> — классический график во времени, самый частый тип панели.</li>\n        <li><b>Stat</b> — одно большое число (текущее значение метрики), часто с цветовыми порогами.</li>\n        <li><b>Gauge / Bar gauge</b> — «спидометр» или горизонтальная шкала с порогами (удобно для % загрузки/свободного места).</li>\n        <li><b>Table</b> — табличное представление, удобно для списков хостов/проблем.</li>\n        <li><b>Heatmap</b> — тепловая карта распределения значений во времени.</li>\n        <li><b>Alert list</b> — список текущих сработавших алертов прямо на дашборде.</li>\n      </ul>"},{"a":"VARS","t":"Переменные (Templating)","tags":[],"b":"\n      <p>Переменные превращают один дашборд в универсальный шаблон, а не отдельную страницу под каждый хост.</p>\n      <ul>\n        <li>Например переменная <code>$host</code> — выпадающий список хостов, при выборе которого все панели дашборда перестраиваются под конкретный хост без копирования дашборда.</li>\n        <li>Переменные можно строить из статического списка, запроса к источнику данных (например «все хосты группы X из Zabbix») или из других переменных (каскадные фильтры: сначала выбрали датацентр — обновился список хостов в нём).</li>\n      </ul>"},{"a":"ALERT","t":"Алертинг в Grafana","tags":["warn"],"b":"\n      <p>С версии Grafana 8+ используется единая система алертинга (Unified Alerting), не завязанная на конкретный источник данных.</p>\n      <ul>\n        <li><b>Alert rule</b> — условие над запросом (например «среднее значение метрики выше порога N минут подряд»).</li>\n        <li><b>Contact point</b> — куда слать уведомление: email, Telegram, Slack, Webhook, PagerDuty.</li>\n        <li><b>Notification policy</b> — маршрутизация алертов по контакт-пунктам в зависимости от лейблов (например все алерты с меткой <code>team=network</code> — в отдельный чат сетевой команды).</li>\n        <li><b>Silence</b> — временное отключение уведомлений по алерту (аналог Maintenance period в Zabbix) на время плановых работ.</li>\n      </ul>"},{"a":"PROV","t":"Provisioning — дашборды как код","tags":[],"b":"\n      <p>Дашборд Grafana — это, по сути, JSON-модель. Это позволяет хранить дашборды не только через веб-интерфейс, но и версионировать их как код.</p>\n      <ul>\n        <li><b>Provisioning</b> — автоматическая загрузка дашбордов и источников данных из YAML/JSON-файлов при старте сервера, без ручной настройки через UI.</li>\n        <li>Типичная практика — хранить JSON-модели дашбордов в Git и накатывать их через CI/CD вместе с инфраструктурой (Infrastructure as Code).</li>\n      </ul>"},{"a":"PROMETHEUS","t":"Prometheus","tags":[],"b":"<p><b>Prometheus</b> — инструмент мониторинга на базе time-series БД. Отличается от Zabbix тем что Prometheus сам активно опрашивает метрики (pull model), а не получает их pushed от агентов.</p><ul><li><b>Архитектура:</b> сервер Prometheus, экспортёры (приложения/middleware exposing metrics на HTTP), AlertManager (для алертов), Grafana (визуализация).</li><li><b>PromQL:</b> язык запросов для выборки и агрегирования метрик из Prometheus.</li><li><b>Хранение:</b> данные хранятся локально на диске, можно настроить retention policy (сколько дней хранить).</li><li>Часто используется как основа для мониторинга в Kubernetes-кластерах, более лёгкий и гибкий чем Zabbix.</li></ul>"},{"a":"ZABBIX","t":"Zabbix","tags":[],"b":"<p><b>Zabbix в Grafana</b> — подключение Zabbix как Data Source к Grafana через встроенный плагин. Grafana берёт уже собранные Zabbix-метрики и создаёт красивые графики и дашборды.</p><ul><li>Это более простой вариант, чем собирать метрики заново через Prometheus, если у вас уже установлен и настроен Zabbix.</li><li>Зabbix-плагин в Grafana поддерживает: Items, Triggers, Groups, History, Trends — всё что собирает Zabbix.</li></ul>"},{"a":"СБОР И","t":"сбор и анализ логов (EFK/ELK)","tags":[],"b":"<p><b>ELK Stack</b> (Elasticsearch, Logstash, Kibana) или <b>EFK Stack</b> (Elasticsearch, Fluentd, Kibana) — решение для централизованного сбора, индексирования и анализа логов из множества источников.</p><ul><li><b>Компоненты:</b> Logstash/Fluentd парсят и трансформируют логи, Elasticsearch индексирует в полнотекстовую БД, Kibana предоставляет веб-интерфейс для поиска и анализа.</li><li><b>Интеграция с Grafana:</b> Elasticsearch можно подключить как Data Source к Grafana для создания дашбордов по логам.</li><li>Используется для: security анализа (SIEM), application troubleshooting, audit logs, performance analysis.</li></ul>"},{"a":"НАСТРОЙКА АЛЕРТОВ","t":"настройка алертов и он-колл по регламенту","tags":[],"b":"<p><b>Alert Rules + On-call Scheduling</b> — настройка условий для срабатывания алертов (CPU > 80%, Disk > 90% и т.п.) и расписание дежурств (кому звонить, в какое время, в каком приоритете).</p><ul><li><b>Инструменты:</b> встроенные алерты в Grafana/Zabbix, PagerDuty/Opsgenie для управления дежурствами и эскалациями.</li><li><b>Эскалация:</b> первый звонок → через N минут звонок на следующего → через M минут вовлечение manager.</li><li><b>Acknowledge/Resolve:</b> дежурный может подтвердить что видел алерт и начал работать над проблемой, система не будет звонить дальше, пока не решится.</li></ul>"}]},{"id":"plan3090","u":"U14","short":"30/60/90 дней","full":"План на 30/60/90 дней","title":"План на первые 30/60/90 дней","eyebrow":"Онбординг руководителя","desc":"Типовой ответ на вопрос «а как вы начнёте работу на этой позиции» — структура входа нового руководителя техподдержки: от аудита к первым результатам.","extra":"<div class=\"subhead\">Логика по фазам</div>\n  <div class=\"diagram\">Дни 1-30   → <b>Слушать и диагностировать</b>  (аудит, знакомство с командой, быстрые победы)\n                │\n                ▼\nДни 31-60  → <b>Внедрять изменения</b>       (процессы, метрики, первые правки регламентов)\n                │\n                ▼\nДни 61-90  → <b>Закреплять результат</b>     (первые измеримые улучшения, план на квартал вперёд)</div>","cards":[{"a":"D30","t":"Первые 30 дней — диагностика","tags":["ok"],"b":"\n      <p>Главная задача первого месяца — не менять, а понять: как всё устроено на самом деле, а не по регламенту на бумаге.</p>\n      <ul>\n        <li><b>Аудит процессов</b> — как реально регистрируются, приоритизируются и эскалируются обращения; сверить с документацией, если она есть.</li>\n        <li><b>Аудит метрик</b> — какие SLA/KPI уже считаются, откуда берутся данные, насколько им можно доверять.</li>\n        <li><b>1-1 со всей командой</b> — с каждым сотрудником лично: что мешает работать, какие есть болевые точки, кто на кого рассчитывает по факту (неформальные лидеры).</li>\n        <li><b>Знакомство с заказчиками/бизнесом</b> — какие у них ожидания от поддержки и где сейчас основное недовольство.</li>\n        <li><b>Инвентаризация инструментов</b> — тикет-система, база знаний, мониторинг: что реально используется, а что «стоит для галочки».</li>\n        <li><b>Быстрые победы (quick wins)</b> — 1-2 заметные, но небольшие проблемы, которые можно решить сразу — это создаёт доверие команды и заказчика к новому руководителю.</li>\n      </ul>"},{"a":"D60","t":"Дни 31-60 — первые изменения","tags":["warn"],"b":"\n      <ul>\n        <li><b>Приоритизация проблем</b> — на основе аудита выбрать 2-3 системные проблемы с наибольшим влиянием (не пытаться чинить всё сразу).</li>\n        <li><b>Донастройка процессов</b> — уточнение матрицы приоритизации, регламента эскалации, если аудит показал в этом дыры.</li>\n        <li><b>Прозрачные метрики</b> — если отчётность была недостоверной или её не было, ввести базовый набор метрик (SLA-compliance, backlog, CSAT) как основу для дальнейших решений.</li>\n        <li><b>Точечная работа с людьми</b> — по итогам 1-1 запустить изменения в нагрузке/мотивации там, где виден риск выгорания или текучки.</li>\n        <li>Изменения стоит вносить постепенно и объяснять команде «зачем», а не просто спускать сверху — иначе высок риск сопротивления.</li>\n      </ul>"},{"a":"D90","t":"Дни 61-90 — закрепление результата","tags":[],"b":"\n      <ul>\n        <li><b>Первые измеримые улучшения</b> — показать динамику по ключевым метрикам (SLA, backlog, CSAT) относительно точки входа в должность.</li>\n        <li><b>План на следующий квартал</b> — сформулировать для руководства/заказчика: что уже сделано, что в работе, какие ресурсы нужны дальше.</li>\n        <li><b>Регламенты и база знаний</b> — зафиксировать изменения процессов письменно, чтобы они не держались только на устных договорённостях.</li>\n        <li><b>Обратная связь по онбордингу самого себя</b> — честно оценить, что из плана не сработало, и скорректировать подход к дальнейшим изменениям.</li>\n      </ul>"},{"a":"QUEST","t":"Что важно выяснить в первую неделю","tags":[],"b":"\n      <ul>\n        <li>Есть ли формальный SLA и как часто он реально нарушается — и почему.</li>\n        <li>Кто фактически принимает решения в спорных ситуациях (не всегда совпадает с оргструктурой).</li>\n        <li>Какие инциденты были самыми болезненными за последний год и что из них вынесли.</li>\n        <li>Есть ли текучка на линии и какая у неё причина по мнению самой команды (не только по мнению предыдущего руководителя).</li>\n        <li>Какие инструменты/бюджет уже согласованы, а какие придётся выбивать заново.</li>\n      </ul>"},{"a":"REDFLAGS","t":"Красные флаги при входе в новую команду","tags":["warn"],"b":"\n      <ul>\n        <li>Метрики есть, но никто не может объяснить, как именно они считаются — признак «метрик для отчёта», а не управления.</li>\n        <li>База знаний формально существует, но команда ей не пользуется — сигнал, что она устарела или неудобна.</li>\n        <li>Все ключевые знания держатся в голове 1-2 человек («bus factor») — риск для непрерывности поддержки.</li>\n        <li>Резкое и быстрое внедрение изменений без объяснений — вызывает сопротивление и потерю доверия ещё до результата.</li>\n      </ul>"}],"qa":[{"q":"Построил Service Desk с нуля.","b":"- **Situation (Ситуация):** В компании на 500+ сотрудников отсутствовала единая точка входа для IT-запросов. Заявки поступали хаотично: в slack, gmail на личный telegram. Из-за этого замедлялась обработка обращений, приоритеты не соблюдались.\n- **Task (Задача):** Спроектировал и запустить централизованный Service Desk, перевел 100% обращений в единый канал за 3 месяца.\n- **Action (Действие):** Выбрал и развернул Jira Service Management. Разработал каталог ИТ-услуг (более 50 типичных запросов). Настроил клиентский портал самообслуживания. **Сформировал SLA-матрицу в зависимости от критичности сервиса.** Запустил пилот на одном отделе, собрал фидбек, после чего провел обучение для всей компании и отключил старые каналы связи директивным приказом через руководство.\n- **Result (Результат):** Через 1 месяц 100% заявок регистрировались через портал. Уровень потерь заявок снизился до 0. Среднее время первой реакции (FRT) составило 15 минут, появилась прозрачная аналитика для бизнеса."},{"q":"Как именно я сформировал SLA-матрицу","b":"Создание SLA «из головы» не работает — бизнес его не примет, а инженеры не смогут выполнить. Я делал это по классической методологии ITIL, адаптированной под реалии компании.\n\n- **Шаг 1. Категоризация сервисов (Service Tiering)**\nЯ пошел к владельцам бизнес-процессов (финансовый директор, коммерческий директор, склад) и мы вместе разделили все ИТ-сервисы на 3 уровня (Tier) по степени влияния на выручку:\n    - **Tier 1 (Mission-critical):** Остановка ведет к прямым финансовым потерям. (ERP-система, кассовое ПО, основной биллинг, складская WMS).\n    - **Tier 2 (Business-operational):** Работа замедляется, но процессы идут. (Корпоративная почта, 1С:Бухгалтерия в период вне закрытия, телефония бэк-офиса).\n    - **Tier 3 (Supporting):** Внутренние сервисы, не влияющие на клиентов. (Гостевой Wi-Fi, принтеры в переговорках, интранет-портал).\n- **Шаг 2. Внедрение матрицы «Срочность × Влияние = Приоритет»**\nЯ убрал у пользователей возможность самим ставить статус «Критично» (иначе 90% заявок были бы красными). Пользователь выбирал только сервис и масштаб проблемы, а система сама считала приоритет.\n    - **Влияние (Impact):** Массовое (вся компания/склад), Групповое (отдел), Индивидуальное (один человек).\n    - **Срочность (Urgency):** Работа полностью остановлена (Blocker), есть обходной путь (Workaround), не мешает работе (Cosmetic).\n- **Шаг 3. Оцифровка нормативов (Тайминги)**\nНа основе этой матрицы я задал жесткие тайминги в Jira (SLA):\n    - **Critical (P1 — упало ядро, Tier 1, массовое):** Реакция (FRT) — 15 мин. Решение — 2 часа.\n    - **High (P2 — упал Tier 2 у отдела):** Реакция — 30 мин. Решение — 4 часа.\n    - **Medium (P3 — сломался ПК у одного сотрудника):** Реакция — 2 часа. Решение — 8 рабочих часов.\n    - **Low (P4 — выдача прав новому сотруднику):** Реакция — 4 часа. Решение — до 3 рабочих дней.\n- **Шаг 4. Защита перед бизнесом (SLA Sign-off)**\n    \n    Я принес эту матрицу на совет директоров. Главный аргумент: *\"Если вы хотите SLA 2 часа на починку принтера (P3), мне нужно нанять еще 5 эникеев. Это стоит X миллионов в год. Вы готовы за это платить?\"* Бизнес посмотрел на цифры, согласился с предложенной матрицей и официально её подписал. Мы перестали тушить пожары и начали работать по приоритетам бизнеса."},{"q":"Поднял SLA с 70% до 98%.","b":"Контекст: до моего прихода в отдел не особо занимались очередью и вообще ресурса не было для этого проекта\n\n- **Situation (Ситуация):** Доля заявок, закрываемых в рамках нормативного времени (SLA), была на уровне 70%. Бизнес в лице супервайзеров регулярно эскалировал проблемы из-за медленной работы IT.\n- **Task (Задача):** Достичь стабильного показателя SLA Resolution > 95% за один квартал.\n- **Action (Действие):** Провел аудит и выявил \"узкие места\". Перестроил свой график под рабочие часы специалистов call-центра, под их пиковые утренние нагрузки. Внедрил многоуровневую систему авто-эскалации (за 20% до истечения SLA тикет подсвечивался красным для всех участиков тикета). Ввел еженедельный отчет с обязательной обратной связью от Лида по всем просроченным заявкам автоматизируя эскалации.\n- **Result (Результат):** За 3 месяца показатель SLA вырос до 98% и стабилизировался. Индекс удовлетворенности пользователей (CSAT) параллельно поднялся с 3.8 до 4.7 из 5."},{"q":"Масштабировал команду с 0 до 25 человек.","b":"Контекст: Я пришел первым Ит специалистом в компанию, позже появилась команда девопс на пол ставки. \n\n- **Situation (Ситуация):** Разработка начала международную экспансию по найму и формированию комманд, потребовалась поддержка клиентов(сотрудников) в других часовых поясах, тогда как я работал только в графике 5/2 (Алматы).\n- **Task (Задача):** Построить распределенную структуру поддержки (L1/L2) в формате 24/7 (Follow-the-Sun) за 6 месяцев.\n- **Action (Действие):** ***Разработал профили компетенций и грейды. Внедрил строгий процесс онбординга (снизил время выхода инженера на продуктивность с 4 до 2 недель). Нанял региональных тимлидов в 3 часовых поясах (Европа, Азия, LATAM) и делегировал им операционный найм линейного персонала. Перевел документацию на английский язык и создал единую базу знаний.***\n- **Result (Результат):** Команда масштабирована до 25 человек за год. Обеспечено непрерывное покрытие 24/7 без ночных смен для сотрудников. Текучесть кадров в первый год интенсивного роста составила менее 12%.\n- Расчет\n    - **Уволенные**: 3 человека.\n    - **Штат**: 25 человек.\n    - **Формула**: (3 ÷ 25) × 100%.\n    - **Итог**: 12%. [1, 2]"},{"q":"Снизил повторные обращения благодаря интеграции Jira + Git + Notion + slack","b":"- **Situation (Ситуация):** Около 30% обращений в L2 поддержку генерировались из-за известных, но неисправленных программных багов. Саппорт работал как \"глушитель\", постоянно применяя временные воркэраунды.\n- **Task (Задача):** Наладить процесс Problem Management и снизить нагрузку на саппорт от повторяющихся инцидентов.\n- **Action (Действие):** Связал Jira Service Desk (поддержка) с Jira Software (разработка). Настроил автоматическое связывание обращений пользователей с эпиками дефектов. Внедрил правило: если с одним багом связано более 5 тикетов, автоматически создается Problem-тикет с высоким приоритетом в спринте разработчиков, минуя стандартный бэклог.\n- **Result (Результат):** Количество повторяющихся обращений (Recurring Issues) упало на 42% за квартал. Это высвободило около 120 часов работы инженеров поддержки ежемесячно."},{"q":"Внедрил CMDB.","b":"- **Situation (Ситуация):** Инвентаризация серверов, лицензий и железа велась в разрозненных Excel-файлах. При учете что мы стартап, не везде есть ответственный сотрудник, не везде вообще согласовали ставку на it Support были задвоения или неучет, бизнес например сам пытался без согласования закупать технику а потом задумывался об возмещение.\n- **Task (Задача):** Создать единую и актуальную базу конфигурационных единиц (CMDB). Привести хаус в порядок.\n- **Action (Действие):** Запустил интеграцию системы инвентаризации (на базе GLPI/Zabbix) с Service Desk. Настроил агенты для авто-обнаружения (auto-discovery) сетевого оборудования и софта. Прописал связи сервисов с физическими ресурсами (Service Mapping). Ввел жесткий регламент: заявка на изменение инфраструктуры не закрывается без апдейта в CMDB.\n- **Result (Результат):** Точность данных о ресурсах достигла 95%. Среднее время диагностики при инфраструктурных инцидентах (MTTR) сократилось на 30%, так как дежурный сразу видел топологию и зону ответственности"},{"q":"Автоматизировал процесс и получил измеримый эффект.","b":"- **Situation (Ситуация):** Олег настаивал на внедрении круглосуточной телефонной поддержки для всех клиентов банка, считая это конкурентным преимуществом. Это требовало раздувания штата в 2.5 раза.\n- **Task (Задача):** Обосновал нецелесообразность огромных трат и предложил эффективную альтернативу.\n- **Action (Действие):** Во первых выгрузил и проанализировал данные из ITSM-системы за 3 месяца. Показал, что лишь 5% обращений требуют синхронного голосового общения (в основном это консультации, а не аварии). Рассчитал Cost per Contact (стоимость одного места сотрудника) в сравнении с тикетом/чатом. Предложил компромисс: телефонная линия только для VIP сегмента внутри компании, а для остальных - мощная база знаний и чат-бот в приложении и CRM системе агентов и интеграция с внешним колл центрами если очень хочется живое общение.\n- **Result (Результат):** Защитил проект перед руководством. Сэкономил бизнесу около 50% от изначального бюджета на оснощение колл-центр, снизил нагрузку на свой отдел, при этом обеспечив VIP-клиентам премиальный сервис с SLA 90% (с пометкой что это мексиканцы)."},{"q":"Убедил бизнес изменить процесс на основе данных.","b":"- **Situation (Ситуация):** HR-директор и руководители отделов регулярно жаловались CEO, что IT-поддержка работает ужасно: новые сотрудники выходят на работу, а им по 2-3 дня не могут выдать настроенный ноутбук и доступы к системам. Люди сидели без дела, компания теряла деньги. Руководство потребовало от меня расширить штат инженеров L1, чтобы \"ускорить процесс\".\n- **Task (Задача):** Найти реальное \"узкое горлышко\" в процессе онбординга (Onboarding), избежать необоснованного найма в IT и заставить бизнес соблюдать сроки подачи заявок.\n- **Action (Действие):**\n    1. Я выгрузил из Service Desk данные по 150 последним заявкам на выход новых сотрудников.\n    2. Построил в Power BI простой дашборд с двумя метриками: **\"Дата создания заявки от HR\"** и **\"Дата фактического выхода сотрудника\"**.\n    3. Данные показали: в **82% случаев** заявка на подготовку рабочего места падала в IT менее чем за 18 часов до выхода человека (часто вечером в пятницу на утро понедельника). При этом цикл подготовки ноутбука (достать со склада, накатить образ Windows/MDM, выдать лицензии) физически занимает около 4-6 рабочих часов.\n    4. Я пришел на встречу с CEO и HRD с распечаткой этих данных. Я не стал обвинять HR, а показал математику: *\"Проблема не в нехватке инженеров. Проблема в процессе найма. Если мы хотим 100% готовность к утру первого дня, нам нужно минимум 3 рабочих дня (72 часа) запаса\"*.\n- **Result (Результат):**\n    - Мы не стали нанимать новых инженеров (сэкономили ФОТ).\n    - Бизнес изменил процесс: HRD выпустил приказ, по которому оффер подписывается так, чтобы дата выхода была не раньше, чем через 4 дня.\n    - Мы интегрировали HR-систему (BambooHR/1C) с Jira — заявка в IT стала создаваться автоматически в момент перевода кандидата в статус \"Hired\".\n    - Показатель готовности рабочего места в первый день (Day 1 Readiness) вырос с 60% до 98%. Конфликт между IT и HR был полностью исчерпан."},{"q":"Как поймете через полгода, что команда стала лучше?","b":"Для меня есть три уровня оценки.\n\nПервый — цифры. SLA, MTTR, количество повторных обращений, backlog, CSAT.\n\nВторой — зрелость команды. Насколько сотрудники самостоятельно принимают решения, помогают друг другу, делятся знаниями.\n\nТретий — отношение бизнеса.\n\nЧерез полгода я хотел бы услышать от внутренних заказчиков не \"поддержка быстро закрывает тикеты\", а \"с поддержкой стало проще работать\"."},{"q":"Что никогда не автоматизируете?","b":"Я считаю, что автоматизировать можно практически любые рутинные операции.\n\nНо полностью автоматизировать нельзя ситуации, где требуется принятие решений и понимание контекста.\n\nНапример:\n\n- крупные инциденты;\n- конфликтные обращения пользователей;\n- приоритизацию неоднозначных задач;\n- разбор первопричин;\n- сложные коммуникации с бизнесом.\n\nAI может помочь собрать информацию или предложить решение, но ответственность за решение должен нести человек."},{"q":"За что вас могут не любить сотрудники?","b":"Думаю, иногда меня могут считать требовательным руководителем. Я люблю понятные процессы, ответственность и договоренности. Если мы согласовали срок или правило, я ожидаю, что команда будет его соблюдать.\n\nНо при этом я считаю, что требовательность должна сочетаться с поддержкой. Если человек сталкивается со сложной задачей или ошибается, моя цель — помочь разобраться и сделать так, чтобы подобная ситуация не повторилась. Я не сторонник культуры поиска виноватых, я сторонник культуры поиска причин."}]},{"id":"onec","u":"U15","short":"1С","full":"1С:Предприятие","title":"1С:Предприятие","eyebrow":"Учётная система — инфраструктурный взгляд","desc":"Не про бухгалтерию — про то, как это работает «под капотом» и что может сломаться с точки зрения ИТ.","cards":[{"a":"MODE","t":"Файловый vs клиент-серверный режим","tags":[],"b":"\n      <ul>\n        <li><b>Файловый режим</b> — вся база в одном файле <code>.1CD</code>, каждый клиент читает/пишет файл напрямую по сети. Подходит для малых баз (до нескольких пользователей), плохо масштабируется и чувствителен к обрывам сети.</li>\n        <li><b>Клиент-серверный режим</b> — данные хранятся в СУБД, между клиентом и СУБД находится кластер серверов 1С. Основной вариант для организаций.</li>\n      </ul>"},{"a":"ARCH","t":"Трёхзвенная архитектура","tags":["ok"],"b":"\n      <div class=\"diagram\">Клиент (толстый / тонкий / веб-клиент)\n        │\n        ▼\nКластер серверов 1С:Предприятия\n   ├─ ragent  — агент сервера, реестр кластеров\n   ├─ rmngr   — менеджер кластера: блокировки, лицензии, балансировка\n   └─ rphost  — рабочий процесс, исполняет бизнес-логику (можно несколько)\n        │\n        ▼\nСУБД (MS SQL Server / PostgreSQL / Oracle)</div>\n      <ul>\n        <li><b>Тонкий клиент</b> — вся логика на сервере, клиент только отрисовывает интерфейс — хорошо работает по медленным каналам.</li>\n        <li><b>Толстый клиент</b> — часть логики выполняется локально.</li>\n        <li><b>Веб-клиент</b> — работа через браузер, требует публикации базы на веб-сервере (IIS/Apache).</li>\n      </ul>"},{"a":"LIC","t":"Лицензирование","tags":[],"b":"\n      <ul>\n        <li><b>Аппаратные ключи HASP</b> (USB-донглы) — локальные или сетевые (через сервер лицензирования).</li>\n        <li><b>Программные лицензии</b> — привязка к оборудованию сервера, без физического ключа.</li>\n        <li>Лицензии клиентские (на подключение) отдельно от серверных (на сам сервер 1С).</li>\n      </ul>"},{"a":"ISSUES","t":"Типичные инфраструктурные проблемы","tags":["warn"],"b":"\n      <ul>\n        <li><b>Блокировки</b> — управляемые (программные, на уровне 1С) и объектные блокировки СУБД — частая причина «зависаний» при одновременной работе.</li>\n        <li><b>Просадка производительности</b> — нужны регламентные операции: реиндексация/обновление статистики СУБД, тестирование и исправление ИБ.</li>\n        <li><b>Обновление конфигураций</b> — конфликт типовой конфигурации с локальными доработками, требует снятия/постановки с поддержки.</li>\n        <li><b>Резервное копирование</b> — выгрузка <code>.dt</code> (архив на уровне 1С) vs бэкап средствами СУБД (быстрее и надёжнее для крупных баз).</li>\n        <li>Публикация веб-клиента и внешние подключения — частый источник проблем с сертификатами и правами на веб-сервере.</li>\n      </ul>"},{"a":"ERP","t":"1С:ERP","tags":["ok"],"b":"\n      <p>Флагманская конфигурация для комплексной автоматизации управления предприятием: производство, закупки, продажи, склад, бюджетирование, казначейство, себестоимость — «старший» продукт линейки, объединяющий то, что раньше закрывалось несколькими отдельными конфигурациями (УПП и др.).</p>\n      <ul>\n        <li>Инфраструктурно — самая тяжёлая конфигурация с точки зрения ресурсов: обычно требует выделенного сервера СУБД, толстого клиента для части ролей и серьёзного планирования регламентных заданий (пересчёт себестоимости, обмены).</li>\n        <li>Часто интегрируется с другими базами (БП, ЗУП, CRM, сайтом) через обмены данными — важна инфраструктура очередей/сервисов обмена (например, через <b>1С:Шину</b> или регламентные обмены по расписанию).</li>\n      </ul>"},{"a":"BP","t":"1С:Бухгалтерия предприятия (БП)","tags":[],"b":"\n      <p>Самая массовая конфигурация — бухгалтерский и налоговый учёт: проводки, регламентированная отчётность, расчёты с контрагентами, учёт НДС.</p>\n      <ul>\n        <li>Как правило легче ERP по нагрузке, часто работает в связке с ЗУП (через обмен данными по расчёту зарплаты) или в составе ERP как встроенный функционал.</li>\n        <li>Регулярно требует обновлений в связи с изменениями законодательства — обновление конфигурации с сохранением доработок обычная рутинная задача поддержки.</li>\n      </ul>"},{"a":"ZUP","t":"1С:Зарплата и управление персоналом (ЗУП)","tags":[],"b":"\n      <p>Конфигурация для кадрового учёта и расчёта заработной платы: приёмы/увольнения, отпуска, больничные, расчёт НДФЛ и страховых взносов, регламентированная кадровая/зарплатная отчётность.</p>\n      <ul>\n        <li>Содержит персональные данные сотрудников — с точки зрения ИТ это повышенные требования к резервному копированию, разграничению прав доступа и защите базы (152-ФЗ).</li>\n        <li>Обычно интегрируется с БП/ERP: результаты расчёта зарплаты передаются в бухгалтерский учёт через обмен данными (готовые типовые правила обмена от 1С).</li>\n      </ul>"},{"a":"БЕЗОПАСНАЯ АРХИТЕКТУРА","t":"Безопасная архитектура 1С","tags":[],"b":"<pre><code>Удалённый пользователь\n        │\n   [VPN-туннель]\n        │\n  Периметр офиса (firewall/UTM)\n        │\n   VPN-сервер (в DMZ или на периметре)\n        │\n   Внутренняя сеть (VLAN для терминальных серверов/1С)\n        │\n   Сервер 1С + СУБД (изолированный VLAN)</code></pre>\n<p>Ключевой принцип: пользователь не должен подключаться напрямую к серверу 1С по протоколу 1С через интернет — только через VPN, и желательно через промежуточный терминальный слой.</p>"},{"a":"ВЫБОР СПОСОБА","t":"Выбор способа доступа к 1С","tags":[],"b":"<p>Есть три модели, от менее к более безопасной:</p>\n<p><b>А) Прямое подключение толстого/тонкого клиента через VPN</b></p>\n<ul><li>Клиент 1С на компьютере пользователя, VPN поднимает L3-туннель до внутренней сети, клиент коннектится к серверу 1С по TCP.</li><li>Минус: у пользователя есть сетевая видимость внутренней инфраструктуры (в зависимости от настроек split-tunnel), больше поверхность атаки, локальные данные кэшируются на устройстве пользователя.</li></ul>\n<p><b>Б) Терминальный сервер (RDS) + VPN</b> — рекомендуемый вариант для большинства</p>\n<ul><li>Пользователь подключается по VPN только к терминальному серверу (или вообще без VPN — RDS Gateway с TLS сам может служить периметром).</li><li>1С запускается уже на терминальном сервере, данные не покидают инфраструктуру.</li><li>Меньше поверхность атаки: наружу торчит только RDP/RDS Gateway (443/TLS), а не вся внутренняя сеть.</li></ul>\n<p><b>В) Веб-клиент 1С (тонкий клиент через браузер) + обратный прокси</b></p>\n<ul><li>Публикация 1С через веб-сервер (Apache/IIS) с HTTPS, доступ вообще без VPN, но через reverse proxy с WAF.</li><li>Хорошо для мобильных/внешних пользователей, но требует отдельного слоя защиты веб-публикации (это уже не VPN-архитектура, а альтернатива ей).</li></ul>\n<p>Для «безопасной архитектуры через VPN» разумнее всего <b>сочетание Б</b> — терминальный сервер за VPN.</p>"},{"a":"ВЫБОР VPN","t":"Выбор VPN для 1С","tags":[],"b":"<table><thead><tr><th>Тип</th><th>Когда использовать</th><th>Плюсы</th></tr></thead><tbody><tr><td><b>IPsec (site-to-site)</b></td><td>Для филиалов, постоянное подключение офис-офис</td><td>Стабильно, аппаратная поддержка на роутерах</td></tr><tr><td><b>WireGuard</b></td><td>Для удалённых сотрудников, современный вариант</td><td>Быстрый, простой, минимальная поверхность атаки (маленький кодовый база)</td></tr><tr><td><b>OpenVPN</b></td><td>Универсальный вариант, если нужна гибкая настройка ACL</td><td>Хорошая поддержка MFA, гибкие профили доступа</td></tr><tr><td><b>SSTP/L2TP</b></td><td>Если инфраструктура на Windows Server и требуется совместимость</td><td>Проще для Windows-only окружений</td></tr></tbody></table>"},{"a":"СЕГМЕНТАЦИЯ СЕТИ","t":"Сегментация сети с учетом 1С","tags":[],"b":"<ul><li><b>LAN для VPN-клиентов</b> — отдельная подсеть, из которой разрешён доступ только к конкретным ресурсам (терминальный сервер/1С), а не ко всей сети.</li><li><b>VLAN для сервера 1С + СУБД</b> — изолирован firewall-правилами: только с терминального VLAN, только по нужным портам (1541/1540 для кластера 1С, 1433/5432 для MS SQL/PostgreSQL).</li><li><b>Запрет east-west трафика</b> — VPN-клиент не должен видеть контроллер домена, файловые серверы и т.п., если это не нужно для работы.</li></ul>\n<p>Пример правил firewall (условно):</p>\n<pre><code>VPN_VLAN → RDS_VLAN : порт 3389/443 (RDP/RDS Gateway) — разрешить\nVPN_VLAN → 1C_VLAN   : запретить напрямую\nRDS_VLAN → 1C_VLAN   : порт 1541, 1433/5432 — разрешить\nVPN_VLAN → *          : запретить всё остальное</code></pre>"},{"a":"ЗАЩИТА САМОГО","t":"Защита самого VPN-сервера для 1С","tags":[],"b":"<ul><li>Размещать <b>в DMZ</b>, а не внутри основной сети.</li><li><b>MFA обязательна</b> — иначе скомпрометированный пароль = полный доступ.</li><li><b>Ограничение по IP/гео</b>, если сотрудники работают из конкретных регионов — снижает поверхность brute-force.</li><li><b>Логирование подключений</b> — кто, когда, откуда подключался (SIEM/syslog).</li><li><b>Регулярные обновления</b> прошивки/ПО VPN-сервера — это один из самых частых векторов атак на инфраструктуру.</li><li><b>Отдельные VPN-профили/сертификаты на пользователя</b>, а не общий shared-secret — чтобы можно было отозвать доступ конкретному человеку без пересоздания всей инфраструктуры.</li></ul>"},{"a":"СПЕЦИФИКА 1С","t":"Специфика 1С","tags":[],"b":"<ul><li><b>Разграничение прав в самой 1С</b> — роли, RLS (Row Level Security) на уровне конфигурации, чтобы даже легитимный пользователь видел только свои данные.</li><li><b>Журналирование действий пользователей 1С</b> (Журнал регистрации) — включить и хранить достаточный срок, это ваш аудиторский след.</li><li><b>Шифрование соединения клиент-сервер 1С</b> — использовать защищённое соединение (SSL для веб-сервисов, TLS для публикации).</li><li><b>Резервное копирование</b> (то, что обсуждали ранее) — обязательно с шифрованием бекапов, особенно если хранятся вне периметра.</li><li>Отдельный технический аккаунт для сервиса 1С к СУБД, не administrator/sa.</li></ul>"},{"a":"ЧТО МОНИТОРИТЬ","t":"Что мониторить","tags":[],"b":"<ul><li>Неудачные попытки VPN-аутентификации (bruteforce индикатор)</li><li>Аномальные подключения (нетипичное время, гео, устройство)</li><li>Активность в Журнале регистрации 1С — массовые выгрузки данных, нетипичные операции</li><li>Целостность бекапов (Veeam SureBackup verification, если используете Veeam)</li></ul>"}],"qa":[{"q":"Как бекапить 1С","b":"1С — это обычно связка «база данных + сервер приложений», поэтому бекапить нужно грамотно, а не просто копировать файлы:\n\n**Вариант 1 — через СУБД (правильный способ)**\n\n- Если 1С работает на **MS SQL Server**: Veeam умеет делать application-aware бекап через VSS-снепшот виртуальной машины с последующим **truncate transaction log** и поддержкой Log Backup для MS SQL — это даёт точку восстановления вплоть до нужного момента (не только на момент снепшота).\n- Настраивается в свойствах задания: **Guest Processing → Enable application-aware processing**. Там указываются учётные данные для входа в гостевую ОС, и Veeam координирует VSS-writer SQL Server.\n\n**Вариант 2 — файловая база 1С**\n\n- Если это простая файловая база (.1CD), достаточно бекапить саму ВМ целиком (образ) — но для гарантии целостности базы рекомендуется предварительно выгружать базу средствами самой 1С (`dt`файл через конфигуратор) по расписанию, а Veeam уже бекапит эту выгрузку как файл на диске.\n\n**Вариант 3 — сервер 1С на PostgreSQL**\n\n- Аналогично MS SQL: приложение-осведомлённая обработка не такая глубокая, как для MS SQL, поэтому чаще используют скрипт `pg_dump` по расписанию + Veeam бекапит получившийся дамп как обычный файл/папку.\n\n**Практическая рекомендация:** для критичных баз 1С — комбинировать: (а) регулярный дамп/выгрузку средствами 1С или СУБД, (б) образный бекап всей ВМ через Veeam с приложение-осведомлённой обработкой. Так вы получаете и гранулярное восстановление, и полный откат системы."},{"q":"Итоговая рекомендация для среднего бизнеса","b":"**VPN (WireGuard/OpenVPN + MFA) → терминальный сервер (RDS) в отдельном VLAN → сервер 1С+СУБД в изолированном VLAN с firewall-правилами только с терминального сегмента.**\n\nЭто даёт: минимальную поверхность атаки на периметре, отсутствие прямого сетевого доступа снаружи к базе данных, централизованный аудит и возможность быстро отозвать доступ конкретному пользователю."}]},{"id":"logs","u":"U16","short":"Логи Linux/Windows","full":"Чтение логов","title":"Чтение логов: Linux и Windows","eyebrow":"Диагностика инцидентов","desc":"Где искать журналы событий в обеих экосистемах и какими инструментами их читать под давлением дедлайна.","cards":[{"a":"VARLOG","t":"/var/log — структура (Linux)","tags":["ok"],"b":"\n      <ul>\n        <li><code>/var/log/syslog</code> (Debian/Ubuntu) или <code>/var/log/messages</code> (RHEL/CentOS) — общий системный журнал.</li>\n        <li><code>/var/log/auth.log</code> (Debian) / <code>/var/log/secure</code> (RHEL) — попытки аутентификации, sudo, SSH.</li>\n        <li><code>/var/log/kern.log</code> — сообщения ядра; <code>dmesg</code> — буфер сообщений ядра с момента загрузки (полезно для проблем с оборудованием/драйверами).</li>\n        <li>Логи приложений обычно в своих подкаталогах, например <code>/var/log/nginx/</code>, <code>/var/log/mysql/</code>.</li>\n      </ul>"},{"a":"JCTL","t":"journalctl (systemd)","tags":["ok"],"b":"\n      <p>На современных дистрибутивах с systemd основной источник логов — бинарный журнал systemd-journald, а не только текстовые файлы.</p>\n      <ul>\n        <li><code>journalctl -xe</code> — последние записи с расшифровкой ошибок.</li>\n        <li><code>journalctl -u nginx.service</code> — логи конкретного сервиса.</li>\n        <li><code>journalctl -f</code> — просмотр в реальном времени (аналог <code>tail -f</code>).</li>\n        <li><code>journalctl --since \"2026-07-01\" --until \"2026-07-02\"</code> — фильтр по времени.</li>\n      </ul>"},{"a":"ROTATE","t":"logrotate и rsyslog","tags":[],"b":"\n      <ul>\n        <li><b>rsyslog</b> / <b>syslog-ng</b> — демоны, принимающие сообщения от ядра/приложений и раскладывающие их по файлам согласно правилам (<code>/etc/rsyslog.conf</code>).</li>\n        <li><b>logrotate</b> — периодически архивирует и удаляет старые логи, чтобы не забить диск (конфиг <code>/etc/logrotate.conf</code> и <code>/etc/logrotate.d/</code>).</li>\n      </ul>"},{"a":"EVTVWR","t":"Event Viewer (Windows)","tags":["ok"],"b":"\n      <p>Основной инструмент просмотра журналов в Windows — <code>eventvwr.msc</code>. Ключевые журналы:</p>\n      <ul>\n        <li><b>Application</b> — события приложений (сбои служб, ошибки ПО).</li>\n        <li><b>System</b> — события самой ОС (драйверы, службы, перезагрузки).</li>\n        <li><b>Security</b> — аудит: входы в систему, изменения прав (требует включённого аудита политикой).</li>\n      </ul>\n      <p>Файлы журналов физически хранятся как <code>.evtx</code> в <code>C:\\Windows\\System32\\winevt\\Logs\\</code>.</p>"},{"a":"EVTID","t":"Важные Event ID","tags":["warn"],"b":"\n      <ul>\n        <li><code>4624</code> — успешный вход в систему; <code>4625</code> — неудачная попытка входа (важно для расследования брутфорса).</li>\n        <li><code>4720</code> — создана учётная запись пользователя; <code>4732</code> — пользователь добавлен в группу.</li>\n        <li><code>6005</code> / <code>6006</code> — служба логирования событий запущена/остановлена (фактически = старт/штатное выключение системы).</li>\n        <li><code>41</code> (Kernel-Power) — система перезагрузилась без штатного завершения работы (внезапное отключение питания/зависание).</li>\n      </ul>"},{"a":"PSH","t":"PowerShell для логов","tags":[],"b":"\n      <ul>\n        <li><code>Get-WinEvent -LogName System -MaxEvents 50</code> — современный командлет (быстрее и гибче старого).</li>\n        <li><code>Get-EventLog -LogName Application -Newest 20</code> — устаревающий, но всё ещё встречается командлет.</li>\n        <li>Фильтрация: <code>Get-WinEvent -FilterHashtable @{LogName='Security';ID=4625}</code>.</li>\n        <li>Отдельные логи стоит проверять и у служебных ролей: IIS (<code>C:\\inetpub\\logs</code>), DNS- и DHCP-сервер имеют свои журналы диагностики.</li>\n      </ul>"}]},{"id":"fs","u":"U17","short":"Файловые системы","full":"Файловые системы","title":"Файловые системы","eyebrow":"Хранение данных","desc":"Ключевые ФС Linux и Windows, инод, ссылки, LVM и RAID — то, что связывает диски, ОС и бэкапы.","cards":[{"a":"INODE","t":"Инод и ссылки (Linux)","tags":[],"b":"\n      <p><b>Inode</b> — структура, хранящая метаданные файла (права, владелец, время, указатели на блоки данных), но не само имя файла — имя это просто запись в каталоге, указывающая на inode.</p>\n      <ul>\n        <li><b>Hard link</b> — второе имя для того же inode; при удалении одного из имён файл продолжает существовать, пока есть хотя бы одна ссылка.</li>\n        <li><b>Symlink (symbolic link)</b> — отдельный файл-указатель на путь; если исходный файл удалить, ссылка «битая».</li>\n      </ul>"},{"a":"EXT4","t":"ext4","tags":["ok"],"b":"\n      <p>Стандартная журналируемая файловая система Linux (наследник ext2/ext3).</p>\n      <ul>\n        <li>Журналирование метаданных (и опционально данных) для быстрого восстановления после сбоя.</li>\n        <li>Поддержка больших разделов и файлов, extents вместо блочных карт (быстрее для больших файлов).</li>\n      </ul>"},{"a":"XFS","t":"XFS","tags":[],"b":"\n      <p>Высокопроизводительная журналируемая ФС, ФС по умолчанию в RHEL/CentOS. Хорошо работает с очень большими файлами и параллельным вводом-выводом, но исторически сложнее уменьшать размер раздела «на лету».</p>"},{"a":"BTRFS","t":"Btrfs","tags":[],"b":"\n      <p>Современная ФС Linux с «продвинутыми» возможностями уровня LVM/RAID прямо внутри ФС.</p>\n      <ul>\n        <li><b>Snapshots</b> и <b>subvolumes</b> — быстрые снимки без полного копирования (copy-on-write).</li>\n        <li>Встроенные контрольные суммы данных для обнаружения повреждений.</li>\n      </ul>"},{"a":"NTFS","t":"NTFS (Windows)","tags":[],"b":"\n      <p>Основная файловая система Windows со времён NT.</p>\n      <ul>\n        <li>Журналирование, ACL на уровне файлов, шифрование (EFS), сжатие, квоты.</li>\n        <li><b>MFT</b> (Master File Table) — центральная таблица метаданных, аналог inode-таблицы в Linux.</li>\n      </ul>"},{"a":"REFS","t":"ReFS","tags":[],"b":"\n      <p>«Resilient File System» — более новая ФС Windows Server, ориентированная на отказоустойчивость больших хранилищ (часто используется со Storage Spaces).</p>\n      <ul>\n        <li>Контроль целостности данных через контрольные суммы, автоматическое исправление ошибок при наличии зеркалирования.</li>\n        <li>Не является полной заменой NTFS — нет, например, поддержки некоторых старых возможностей и загрузочных разделов.</li>\n      </ul>"},{"a":"FAT","t":"FAT32 / exFAT","tags":[],"b":"\n      <ul>\n        <li><b>FAT32</
